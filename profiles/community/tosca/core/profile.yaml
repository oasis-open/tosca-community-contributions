tosca_definitions_version: tosca_2_0

profile: community.tosca.core:0.1

description: >-
  TOSCA Community Core Profile type definitions. These definitions are
  intended to be shared between profiles of all levels of abstraction.

data_types:
  JSON:
    description: >-
      The JSON type defines a string that contains data in the JSON
      format
    derived_from: string
    validation: {$validate_json: [$value]}
  YAML:
    description: >-
      The YAML type defines a string that contains data in the YAML
      format
    derived_from: string
    #validation: TBD (may need custom functions)
  IPv4:
    description: >-
      The IPv4 type defines a string that contain an IPv4 address
    derived_from: string
    validation:
      $matches: [$value, "^((25[0-5]|2[0-4][0-9]|[01]?[0-9][0-9]?)\\.){3}(25[0-5]|2[0-4][0-9]|[01]?[0-9][0-9]?)$"]
  Port:
    description: >-
      The Port type defines integer that contain valid ports
    derived_from: integer
    validation: {$in_range: [$value, 0, 65535]}
  IPv4Socket:
    description: >-
      This complex type represents an IPv4 socket (address+port)
    properties:
      ip-address:
        type: IPv4
      transport-port:
        type: Port
  GenericId:
    description: >-
      The GenericId type represents a generic string identifier. It can be used to
      derive specific types, by adding proper validation
    derived_from: string
  AlphanumericId:
    description: >-
      The alphanumericId type represents an alphanumeric type of arbitrary length
      made up only by digits and uppercase/lowercase letters
    derived_from: GenericId
    validation:
      $matches: [$value, "^[A-Za-z0-9]+$"]
  UUID:
    description: >-
      The UUID type represents an IETF RFC4122 compliant universal identifier (types 1-5)
    derived_from: GenericId
    validation:
      $matches: [$value, "^[0-9a-fA-F]{8}-[0-9a-fA-F]{4}-[1-5][0-9a-fA-F]{3}-[89abAB][0-9a-fA-F]{3}-[0-9a-fA-F]{12}$"]
  UUIDRelaxed:
    description: >-
      The UUIDRelaxed type represents an identifier with format 8-4-4-4-12 (hex digits with dashes),
      but without full compliance to IETF RFC4122
    derived_from: GenericId
    validation:
      $matches: [$value, "^[0-9a-fA-F]{8}-[0-9a-fA-F]{4}-[0-9a-fA-F]{4}-[0-9a-fA-F]{4}-[0-9a-fA-F]{12}$"]

artifact_types:
  Bash:
    description: >-
      Artifact type representing a script for the Bash shell
    mime_type: application/x-sh
    file_ext: [sh]
    #properties: TBD (e.g. to specify the shell to use, or the script entry point)
  Python:
    description: >-
      Artifact type representing a Python script
    mime_type: text/x-python
    file_ext: [py]
    #properties: TBD (e.g. to specify the Python version to use, or the script entry point)

relationship_types:
  ContainedBy:
    description: >-
      The ContainedBy type represents a containment relationship
      between two nodes.
    metadata:
      relationship_kind: CONTAINMENT
    valid_capability_types: [Container]
  DependsOn:
    description: >-
      Generic dependency on a feature
    metadata:
      relationship_kind: DEPENDENCY
    valid_capability_types: [Feature]
  AssociatesWith:
    description: >-
      The AssociatesWith type represents an association relationship
      between two nodes.
    metadata:
      relationship_kind: ASSOCIATION
    valid_capability_types: [Partner]

capability_types:
  Container:
    description: >-
      Base capability type for capabilities that can be targeted by a
      ContainedBy relationship.  Advertizes the ability to contain one
      or more other nodes.
    valid_relationship_types: [ContainedBy]
  Feature:
    description: >-
      Base capability type for capabilities that can be targeted by a
      DependsOn relationship. Derived types define
      application-specific functionality.
    valid_relationship_types: [DependsOn]
  Partner:
    description: >-
      Base capability type for capabilities that can be targeted by an
      AssociatesWith relationship.
    valid_relationship_types: [AssociatesWith]
    
functions:
  to_string:
    description: >-
      Convert an integer to string 
    signatures:
      - arguments:
          - type: integer
            description: >-
              The integer to convert to string
        result: string
        implementation:
          primary:
            type: Python
            file: functions/to_string.py
  to_uppercase:
    description: >-
      Convert a string to upper case
    signatures:
      - arguments:
          - type: string
            description: >-
              The string to convert to upper case.
        result: string
        implementation:
          primary:
            type: Python
            file: functions/to_uppercase.py
  validate_json:
    description: >-
      Check if a string argument contains valid JSON.
    signatures:
      - arguments:
          - type: string
            description: >-
              The json string to validate.
        result: boolean
        implementation:
          primary:
            type: Python
            file: functions/validate_json.py
  decode_json:
    signatures:
      - arguments:
          - type: string
            description: >-
              The json string to decode
        implementation:
          primary:
            type: Python
            file: functions/decode_json.py
  in_range:
    description: >
        This function provide true if first argument (value) is within
        the range delimited by the second (min) and the third (max)
        min <= value <= max
        Arguments shall be integers, floats, strings or versions.
        In any other case, including errors, it provides false.
    signatures:
      - arguments: [integer, integer, integer]
        result: boolean
        implementation:
          primary:
            type: Python
            file: functions/in_range.py
      - arguments: [float, float, float]
        result: boolean
        implementation:
          primary:
            type: Python
            file: functions/in_range.py
      - arguments: [string, string, string]
        result: boolean
        implementation:
          primary:
            type: Python
            file: functions/in_range.py
      - arguments: [version, version, version]
        result: boolean
        implementation:
          primary:
            type: Python
            file: functions/in_range.py
  in_range_strict:
    description: >
        This function provide true if first argument (value) is within
        the range delimited by the second (min) and the third (max)
        min < value < max
        Strict comparison is used (i.e. value cannot be equal to
        interval boundaries)
        Arguments shall be integers, floats, strings or versions.
        In any other case, including errors, it provides false.
    signatures:
      - arguments: [integer, integer, integer]
        result: boolean
        implementation:
          primary:
            type: Python
            file: functions/in_range_strict.py
      - arguments: [float, float, float]
        result: boolean
        implementation:
          primary:
            type: Python
            file: functions/in_range_strict.py
      - arguments: [string, string, string]
        result: boolean
        implementation:
          primary:
            type: Python
            file: functions/in_range_strict.py
      - arguments: [version, version, version]
        result: boolean
        implementation:
          primary:
            type: Python
            file: functions/in_range_strict.py
