tosca_definitions_version: tosca_2_0

profile: com.ubicity.kubernetes:2.5

description: >-
  TOSCA profile for installing and operating Kubernetes clusters.
  Distinct from io.kubernetes (which models the Kubernetes API
  resources). This profile provides node types for the Kubectl CLI,
  the abstract KubernetesController/KubernetesWorker base types, and
  concrete distributions (k3s, k0s, MicroK8s, kubeadm, minikube) as
  well as a base type for cloud-managed clusters (EKS/AKS/GKE).

imports:
  - profile: com.ubicity:2.5
    namespace: ubct
  - profile: com.ubicity.docker:2.5
    namespace: docker

capability_types:
  Kubernetes:
    description: >-
      Advertizes the ability to act as a Kubernetes cluster that
      hosts Kubernetes workloads.
    derived_from: ubct:Container
  Master:
    description: >-
      Advertizes the ability to act as a Kubernetes controller that
      worker nodes can join.
    derived_from: ubct:Feature

relationship_types:
  JoinedTo:
    description: >-
      Relationship from a Kubernetes worker node to its controller.
    derived_from: ubct:DependsOn
    valid_capability_types: [Master]

node_types:
  Kubectl:
    derived_from: ubct:InstallablePackage
    description: >-
      An installation of the kubectl CLI tool.
    properties:
      name: kubernetes
      package_names: [kubectl]
      repository: https://pkgs.k8s.io/core:/stable:/v1.30/deb/
      suite: /
      repository_key: https://pkgs.k8s.io/core:/stable:/v1.30/deb/Release.key
    capabilities:
      manager:
        description: >-
          Ability to manage Kubernetes clusters.
        type: ubct:Manager

  KubernetesCluster:
    description: >-
      Abstract base type for any Kubernetes cluster onto which
      Kubernetes API resources (Pod, Service, Deployment, Namespace,
      etc.) can be deployed. Concrete subtypes cover the two
      realizations: KubernetesController (self-installed on a
      Compute host) and ManagedKubernetes (provisioned by a cloud
      provider such as EKS, AKS, or GKE). Both flavors are managed
      via the kubectl CLI once the cluster exists.
    derived_from: ubct:Root
    properties:
      name:
        type: string
      version:
        type: string
        required: false
      vault:
        type: string
        description: >-
          Vault in which to store the kubeconfig file.
        default: '~/vault'
      kubeconfig:
        type: string
        required: false
        description: >-
          Path to the kubeconfig file. If not specified, a file is
          created in the vault directory.
    attributes:
      kubeconfig:
        type: string
        description: >-
          Path to the kubeconfig file for accessing the cluster.
    capabilities:
      host:
        type: Kubernetes
    requirements:
      - manager:
          capability: ubct:Manager
          relationship: ubct:ManagedBy
          node: Kubectl
          count_range: [1, 1]

  KubernetesController:
    description: >-
      A Kubernetes cluster installed on a Compute host.
    derived_from: KubernetesCluster
    properties:
      public_address:
        type: string
        default: {$get_attribute: [SELF, RELATIONSHIP, host, TARGET, public_address]}
    attributes:
      join_token:
        type: string
    capabilities:
      master:
        type: Master
    requirements:
      - host:
          capability: ubct:OperatingSystem
          relationship: ubct:HostedOn
          node: ubct:Compute
          count_range: [1, 1]

  KubernetesWorker:
    description: >-
      The KubernetesWorker node type represents a worker node that
      joins an existing Kubernetes cluster.
    derived_from: ubct:Software
    requirements:
      - cluster:
          capability: Master
          relationship: JoinedTo
          node: KubernetesController
          count_range: [1, 1]
          description: The Kubernetes controller this worker joins

  K3sController:
    description: >-
      The K3s node type represents an installation of a K3s
      Kubernetes cluster.
    derived_from: KubernetesController
    artifacts:
      create:
        file: artifacts/k3s_controller/create.sh
        type: ubct:Bash
        properties:
          host: {$get_attribute: [SELF, RELATIONSHIP, host, TARGET, CAPABILITY, endpoint, address]}
          user: {$get_attribute: [SELF, RELATIONSHIP, host, TARGET, sudo_user]}
      config:
        file: artifacts/k3s_controller/config.sh
        type: ubct:Bash
      stop:
        file: artifacts/k3s_controller/stop.sh
        type: ubct:Bash
        properties:
          host: {$get_attribute: [SELF, RELATIONSHIP, host, TARGET, CAPABILITY, endpoint, address]}
          user: {$get_attribute: [SELF, RELATIONSHIP, host, TARGET, sudo_user]}
      delete_config:
        file: artifacts/k3s_controller/delete_config.sh
        type: ubct:Bash
      delete:
        file: artifacts/k3s_controller/delete.sh
        type: ubct:Bash
        properties:
          host: {$get_attribute: [SELF, RELATIONSHIP, host, TARGET, CAPABILITY, endpoint, address]}
          user: {$get_attribute: [SELF, RELATIONSHIP, host, TARGET, sudo_user]}
    interfaces:
      Standard:
        operations:
          create:
            implementation: create
          configure:
            inputs:
              host: {$get_attribute: [SELF, RELATIONSHIP, host, TARGET, public_address]}
              user: {$get_attribute: [SELF, RELATIONSHIP, host, TARGET, sudo_user]}
              vault: {$get_property: [SELF, vault]}
            outputs:
              kubeconfig: [SELF, kubeconfig]
              version: [SELF, version]
              join_token: [SELF, join_token]
            implementation: config
          stop:
            implementation: stop
          delete:
            inputs:
              kubeconfig: {$get_attribute: [SELF, kubeconfig]}
            implementation:
              primary: delete
              dependencies: [delete_config]

  Minikube:
    description: >-
      The Minikube node type represents an installation of a Minikube
      Kubernetes cluster.
    derived_from: KubernetesController
    artifacts:
      create:
        file: artifacts/minikube/create.sh
        type: ubct:Bash
        properties:
          host: {$get_attribute: [SELF, RELATIONSHIP, host, TARGET, CAPABILITY, endpoint, address]}
          user: {$get_attribute: [SELF, RELATIONSHIP, host, TARGET, sudo_user]}
      start:
        file: artifacts/minikube/start.sh
        type: ubct:Bash
        properties:
          host: {$get_attribute: [SELF, RELATIONSHIP, host, TARGET, CAPABILITY, endpoint, address]}
          user: {$get_attribute: [SELF, RELATIONSHIP, host, TARGET, sudo_user]}
      get_config:
        file: artifacts/minikube/get_config.sh
        type: ubct:Bash
      stop:
        file: artifacts/minikube/stop.sh
        type: ubct:Bash
        properties:
          host: {$get_attribute: [SELF, RELATIONSHIP, host, TARGET, CAPABILITY, endpoint, address]}
          user: {$get_attribute: [SELF, RELATIONSHIP, host, TARGET, sudo_user]}
      delete_config:
        file: artifacts/minikube/delete_config.sh
        type: ubct:Bash
      delete:
        file: artifacts/minikube/delete.sh
        type: ubct:Bash
        properties:
          host: {$get_attribute: [SELF, RELATIONSHIP, host, TARGET, CAPABILITY, endpoint, address]}
          user: {$get_attribute: [SELF, RELATIONSHIP, host, TARGET, sudo_user]}
    requirements:
      - containerd:
          capability: ubct:Feature
          relationship: ubct:DependsOn
          node: docker:Containerd
          count_range: [1, 1]
          description: Minikube uses containerd as the container runtime
    interfaces:
      Standard:
        operations:
          create:
            implementation: create
          start:
            inputs:
              host: {$get_attribute: [SELF, RELATIONSHIP, host, TARGET, public_address]}
              user: {$get_attribute: [SELF, RELATIONSHIP, host, TARGET, sudo_user]}
              vault: {$get_property: [SELF, vault]}
              public_address: {$get_attribute: [SELF, public_address]}
            outputs:
              kubeconfig: [SELF, kubeconfig]
              version: [SELF, version]
            implementation:
              primary: get_config
              dependencies: [start]
          stop:
            implementation: stop
          delete:
            inputs:
              kubeconfig: {$get_attribute: [SELF, kubeconfig]}
            implementation:
              primary: delete
              dependencies: [delete_config]

  K3sWorker:
    description: >-
      The K3sWorker node type represents a K3s agent node that joins
      an existing K3s cluster.
    derived_from: KubernetesWorker
    requirements:
      - cluster:
          capability: Master
          relationship: JoinedTo
          node: K3sController
          count_range: [1, 1]
    artifacts:
      worker_create:
        file: artifacts/k3s_worker/create.sh
        type: ubct:Bash
        properties:
          host: {$get_attribute: [SELF, RELATIONSHIP, host, TARGET, CAPABILITY, endpoint, address]}
          user: {$get_attribute: [SELF, RELATIONSHIP, host, TARGET, sudo_user]}
      worker_stop:
        file: artifacts/k3s_worker/stop.sh
        type: ubct:Bash
        properties:
          host: {$get_attribute: [SELF, RELATIONSHIP, host, TARGET, CAPABILITY, endpoint, address]}
          user: {$get_attribute: [SELF, RELATIONSHIP, host, TARGET, sudo_user]}
      worker_delete:
        file: artifacts/k3s_worker/delete.sh
        type: ubct:Bash
        properties:
          host: {$get_attribute: [SELF, RELATIONSHIP, host, TARGET, CAPABILITY, endpoint, address]}
          user: {$get_attribute: [SELF, RELATIONSHIP, host, TARGET, sudo_user]}
    interfaces:
      Standard:
        operations:
          create:
            inputs:
              controller_address: {$get_attribute: [SELF, RELATIONSHIP, cluster, TARGET, public_address]}
              join_token: {$get_attribute: [SELF, RELATIONSHIP, cluster, TARGET, join_token]}
            implementation: worker_create
          stop:
            implementation: worker_stop
          delete:
            implementation: worker_delete

