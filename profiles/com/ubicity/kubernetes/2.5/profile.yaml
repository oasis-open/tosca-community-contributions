          host: {$get_attribute: [SELF, RELATIONSHIP, host, TARGET, CAPABILITY, endpoint, address]}
          user: {$get_attribute: [SELF, RELATIONSHIP, host, TARGET, sudo_user]}
    interfaces:
      Standard:
        operations:
          create:
            inputs:
              version:
                required: false
                value: {$get_attribute: [SELF, RELATIONSHIP, cluster, TARGET, version]}
              join_token: {$get_attribute: [SELF, RELATIONSHIP, cluster, TARGET, join_token]}
            implementation: worker_create
          stop:
            implementation: worker_stop
          delete:
            implementation: worker_delete

  Kubernetes:
    derived_from: ubct:InstallablePackage
    description: >-
      Node type that represents the Kubernetes Software components
      installed via apt.
    properties:
      name: kubernetes
      package_names: [kubelet kubeadm kubectl]
      repository: https://pkgs.k8s.io/core:/stable:/v1.30/deb/
      suite: /
      repository_key: https://pkgs.k8s.io/core:/stable:/v1.30/deb/Release.key
    requirements:
      - containerd:
          capability: ubct:Feature
          relationship: ubct:DependsOn
          node: docker:Containerd

  ManagedKubernetes:
    derived_from: KubernetesCluster
    description: >-
      A managed Kubernetes cluster provisioned by a cloud provider
      (e.g. EKS, AKS, GKE).
    properties:
      number_of_workers:
        type: integer
        description: >-
          Number of worker nodes in the default node pool.
        validation:
          $greater_than: [$value, 0]
      worker_machine_type:
        type: string
        required: false
        description: >-
          VM size or instance type for worker nodes (e.g.
          "t3.medium", "Standard_D2s_v3", "e2-medium"). If not
          specified, the cloud provider selects a default.
      worker_disk_size:
        type: scalar-unit.size
        required: false
        description: >-
          Disk size per worker node.
      worker_os_architecture:
        type: string
        required: false
        default: x86_64
        description: >-
          CPU architecture for worker nodes.
        validation:
          $valid_values: [$value, [x86_64, arm64]]
      max_pods_per_node:
        type: integer
        required: false
        description: >-
          Maximum number of pods that can be scheduled on each node.
      private_cluster:
        type: boolean
        required: false
        default: false
        description: >-
          If true, the cluster API endpoint is not publicly
          accessible.
      autoscaling:
        type: boolean
        required: false
        default: false
        description: >-
          Enable node autoscaling for the default node pool.
      min_nodes:
        type: integer
        required: false
        description: >-
          Minimum number of nodes when autoscaling is enabled.
      max_nodes:
        type: integer
        required: false
        description: >-
          Maximum number of nodes when autoscaling is enabled.
      network_policy:
        type: string
        required: false
        description: >-
          Network policy provider (e.g. calico, cilium). If not
          specified, the cloud provider's default is used.
    attributes:
      endpoint:
        type: string
        description: >-
          URL of the Kubernetes API server endpoint.
