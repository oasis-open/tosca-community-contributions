  KubeadmController:
    description: >-
      Kubernetes cluster deployed using kubeadm. The create artifact
      installs containerd, kubelet, kubeadm, and kubectl, then runs
      kubeadm init to bootstrap the control plane.
    derived_from: KubernetesController
    properties:
      pod_cidr:
        type: string
        required: false
        default: 10.244.0.0/16
        description: >-
          CIDR block for the pod network. Defaults to the Flannel
          default.
    artifacts:
      create:
        file: artifacts/kubeadm_controller/create.sh
        type: ubct:Bash
        properties:
          host: {$get_attribute: [SELF, RELATIONSHIP, host, TARGET, CAPABILITY, endpoint, address]}
          user: {$get_attribute: [SELF, RELATIONSHIP, host, TARGET, sudo_user]}
      config:
        file: artifacts/kubeadm_controller/config.sh
        type: ubct:Bash
      stop:
        file: artifacts/kubeadm_controller/stop.sh
        type: ubct:Bash
        properties:
          host: {$get_attribute: [SELF, RELATIONSHIP, host, TARGET, CAPABILITY, endpoint, address]}
          user: {$get_attribute: [SELF, RELATIONSHIP, host, TARGET, sudo_user]}
      delete_config:
        file: artifacts/kubeadm_controller/delete_config.sh
        type: ubct:Bash
      delete:
        file: artifacts/kubeadm_controller/delete.sh
        type: ubct:Bash
        properties:
          host: {$get_attribute: [SELF, RELATIONSHIP, host, TARGET, CAPABILITY, endpoint, address]}
          user: {$get_attribute: [SELF, RELATIONSHIP, host, TARGET, sudo_user]}
    interfaces:
      Standard:
        operations:
          create:
            inputs:
              name:
                value: {$get_property: [SELF, name]}
              version:
                required: false
                value: {$get_property: [SELF, version]}
              pod_cidr:
                required: false
                value: {$get_property: [SELF, pod_cidr]}
              api_server_address:
                required: false
                value: {$get_attribute: [SELF, RELATIONSHIP, host, TARGET, private_address]}
              api_server_public_address:
                required: false
                value: {$get_attribute: [SELF, RELATIONSHIP, host, TARGET, public_address]}
            implementation: create
          configure:
            inputs:
              host: {$get_attribute: [SELF, RELATIONSHIP, host, TARGET, public_address]}
              user: {$get_attribute: [SELF, RELATIONSHIP, host, TARGET, sudo_user]}
              vault: {$get_property: [SELF, vault]}
            outputs:
              kubeconfig: [SELF, kubeconfig]
              version: [SELF, version]
              join_token: [SELF, join_token]
            implementation: config
          stop:
            implementation: stop
          delete:
            inputs:
              kubeconfig: {$get_attribute: [SELF, kubeconfig]}
            implementation:
              primary: delete
              dependencies: [delete_config]

  KubeadmWorker:
    description: >-
      Kubernetes worker node deployed using kubeadm. The create artifact
      installs containerd, kubelet, and kubeadm, then joins the cluster
      using the join command from the controller.
    derived_from: KubernetesWorker
    requirements:
      - cluster:
          capability: Master
          relationship: JoinedTo
          node: KubeadmController
          count_range: [1, 1]
    artifacts:
      worker_create:
        file: artifacts/kubeadm_worker/create.sh
        type: ubct:Bash
        properties:
          host: {$get_attribute: [SELF, RELATIONSHIP, host, TARGET, CAPABILITY, endpoint, address]}
          user: {$get_attribute: [SELF, RELATIONSHIP, host, TARGET, sudo_user]}
