tosca_definitions_version: tosca_2_0
description: >-
  Types generated from JSON Schema by any2tosca
imports:
- url: Resource.yaml
  namespace: resource
- url: Key.yaml
  namespace: key
- url: CertificateCollection.yaml
  namespace: crtfcllc
- url: SoftwareInventoryCollection.yaml
  namespace: sftinvcl
- url: KeyCollection.yaml
  namespace: kycllctn
- url: UpdateService_caps.yaml
  namespace: updsrvcp
- url: Core.yaml
  namespace: core
- url: CertificateCollection_caps.yaml
  namespace: crtcllcp
- url: SoftwareInventoryCollection_caps.yaml
  namespace: sfinclcp
- url: Key_caps.yaml
  namespace: keycaps
- url: KeyCollection_caps.yaml
  namespace: kycllcp
- url: UpdateServiceCapabilities_caps.yaml
  namespace: upsrcpcp
data_types:
  ApplyTime:
    derived_from: string
    validation:
      $valid_values:
      - $value
      - - Immediate
        - OnReset
        - AtMaintenanceWindowStart
        - InMaintenanceWindowOnReset
        - OnStartUpdateRequest
        - OnTargetReset
  HttpPushUriApplyTime:
    description: >-
      The settings for when to apply `HttpPushUri`-provided software.
    properties:
      ApplyTime:
        type: ApplyTime
        description: >-
          The time when to apply the `HttpPushUri`-provided software update.
        required: false
      MaintenanceWindowDurationInSeconds:
        type: integer
        description: >-
          The expiry time, in seconds, of the maintenance window.
        required: false
        validation:
          $greater_or_equal:
          - $value
          - 0
      MaintenanceWindowStartTime:
        type: string
        description: >-
          The start time of a maintenance window.
        required: false
  HttpPushUriOptions:
    description: >-
      The settings for `HttpPushUri`-provided software updates.
    properties:
      ForceUpdate:
        type: boolean
        description: >-
          An indication of whether the service should bypass update policies when
          applying the `HttpPushUri`-provided image.
        required: false
      HttpPushUriApplyTime:
        type: HttpPushUriApplyTime
        description: >-
          The settings for when to apply `HttpPushUri`-provided firmware.
        required: false
  SupportedUpdateImageFormatType:
    derived_from: string
    validation:
      $valid_values:
      - $value
      - - PLDMv1_0
        - PLDMv1_1
        - PLDMv1_2
        - PLDMv1_3
        - UEFICapsule
        - VendorDefined
  TransferProtocolType:
    derived_from: string
    validation:
      $valid_values:
      - $value
      - - CIFS
        - FTP
        - SFTP
        - HTTP
        - HTTPS
        - NSF
        - SCP
        - TFTP
        - OEM
        - NFS
  UpdateParameters:
    description: >-
      The update parameters used with `MultipartHttpPushUri` software update.
    properties:
      ExcludeTargets:
        type: list
        description: >-
          An array of URIs that indicate where not to apply the update image.
        required: false
        entry_schema:
          type: string
      ForceUpdate:
        type: boolean
        description: >-
          An indication of whether the service should bypass update policies when
          applying the provided image.  The default is `false`.
        required: false
      LocalImage:
        type: boolean
        description: >-
          An indication of whether the service adds the image to the local image store.
        required: false
      Oem:
        type: resource:Oem
        description: >-
          The OEM extension property.
        required: false
      Stage:
        type: boolean
        description: >-
          An indication of whether the service stages the image on target devices
          for a client to activate at a later time.
        required: false
      Targets:
        type: list
        description: >-
          An array of URIs that indicate where to apply the update image.
        required: false
        entry_schema:
          type: string
interface_types:
  UpdateServiceActions:
    operations:
      Activate:
        description: >-
          This action activates specified software inventory instance.
        inputs:
          Targets:
            type: list
            description: >-
              The target software inventory instances to activate on staged devices.
            required: true
      GenerateSSHIdentityKeyPair:
        description: >-
          This action generates a new SSH identity key-pair to be used with the `UpdateService`
          resource.  The generated public key is stored in the `Key` resource referenced
          by the `PublicIdentitySSHKey` property.  Any existing key-pair is deleted
          and replaced by the new key-pair.
        inputs:
          Curve:
            type: key:ECDSACurveType
            description: >-
              The curve to use with the SSH key if the `KeyType` parameter contains
              `ECDSA`.
            required: false
          KeyLength:
            type: integer
            description: >-
              The length of the SSH key, in bits, if the `KeyType` parameter contains
              `RSA`.
            required: false
          KeyType:
            type: key:SSHKeyType
            description: >-
              The type of SSH key.
            required: true
      RemoveSSHIdentityKeyPair:
        description: >-
          This action removes the SSH identity key-pair used with the `UpdateService`
          resource.
      SimpleUpdate:
        description: >-
          This action updates software components.
        inputs:
          ExcludeTargets:
            type: list
            description: >-
              An array of URIs that indicate where not to apply the update image.
            required: false
          ForceUpdate:
            type: boolean
            description: >-
              An indication of whether the service should bypass update policies when
              applying the provided image.  The default is `false`.
            required: false
          ImageURI:
            type: string
            description: >-
              The URI of the software image to install.
            required: true
          LocalImage:
            type: boolean
            description: >-
              An indication of whether the service adds the image to the local image
              store.
            required: false
          Password:
            type: string
            description: >-
              The password to access the URI specified by the `ImageURI` parameter.
            required: false
          Stage:
            type: boolean
            description: >-
              An indication of whether the service stages the image on target devices
              for a client to activate at a later time.
            required: false
          Targets:
            type: list
            description: >-
              An array of URIs that indicate where to apply the update image.
            required: false
          TransferProtocol:
            type: TransferProtocolType
            description: >-
              The network protocol that the update service uses to retrieve the software
              image file located at the URI specified by the `ImageURI` parameter.  This
              parameter is ignored if the URI provided in `ImageURI` contains a scheme.
            required: false
          Username:
            type: string
            description: >-
              The username to access the URI specified by the `ImageURI` parameter.
            required: false
      StartUpdate:
        description: >-
          This action starts updating all images that have been previously invoked
          using an `OperationApplyTime` value of `OnStartUpdateRequest`.
node_types:
  UpdateService:
    description: >-
      The `UpdateService` schema describes the update service and the properties for
      the service itself with links to collections of firmware and software inventory.  The
      update service also provides methods for updating software and firmware of the
      resources in a Redfish service.
    properties:
      Description:
        type: resource:Description
        description: >-
          The description of this resource.  Used for commonality in the schema definitions.
        required: false
      HttpPushUri:
        type: string
        description: >-
          The URI used to perform an HTTP or HTTPS push update to the update service.  The
          format of the message is vendor-specific.
        required: false
      HttpPushUriOptions:
        type: HttpPushUriOptions
        description: >-
          The options for `HttpPushUri`-provided software updates.
        required: false
      HttpPushUriOptionsBusy:
        type: boolean
        description: >-
          An indication of whether a client has reserved the `HttpPushUriOptions`
          properties for software updates.
        required: false
      HttpPushUriTargets:
        type: list
        description: >-
          An array of URIs that indicate where to apply the update image.
        required: false
        entry_schema:
          type: string
      HttpPushUriTargetsBusy:
        type: boolean
        description: >-
          An indication of whether any client has reserved the `HttpPushUriTargets`
          property.
        required: false
      Id:
        type: resource:Id
        description: >-
          The unique identifier for this resource within the collection of similar
          resources.
        required: true
      LocalImageStoreAvailableCapacityBytes:
        type: integer
        description: >-
          The number of bytes currently available in the local image store.
        required: false
      LocalImageStoreTotalCapacityBytes:
        type: integer
        description: >-
          The total number of bytes available to the local image store.
        required: false
      MaxImageSizeBytes:
        type: integer
        description: >-
          The maximum size in bytes of the software update image that this service
          supports.
        required: false
      MultipartHttpPushUri:
        type: string
        description: >-
          The URI used to perform a Redfish Specification-defined multipart HTTP or
          HTTPS push update to the update service.
        required: false
      Name:
        type: resource:Name
        description: >-
          The name of the resource or array member.
        required: true
      Oem:
        type: resource:Oem
        description: >-
          The OEM extension property.
        required: false
      ServiceEnabled:
        type: boolean
        description: >-
          An indication of whether this service is enabled.
        required: false
      Status:
        type: resource:Status
        description: >-
          The status and health of the resource and its subordinate or dependent resources.
        required: false
      SupportedUpdateImageFormats:
        type: list
        description: >-
          The image format types supported by the service.
        required: false
        entry_schema:
          type: SupportedUpdateImageFormatType
      VerifyRemoteServerCertificate:
        type: boolean
        description: >-
          An indication of whether the service will verify the certificate of the
          server referenced by the `ImageURI` parameter in `SimpleUpdate` prior to
          sending the transfer request.
        required: false
      VerifyRemoteServerSSHKey:
        type: boolean
        description: >-
          An indication of whether the service will verify the SSH key of the server
          referenced by the `ImageURI` parameter in `SimpleUpdate` prior to sending
          the transfer request.
        required: false
    requirements:
    - ClientCertificates:
        node: crtfcllc:CertificateCollection
        capability: crtcllcp:CertificateCollectionContainable
        relationship: core:Contains
        count_range:
        - 0
        - 1
        description: >-
          The link to a collection of client identity certificates provided to the
          server referenced by the `ImageURI` parameter in `SimpleUpdate`.
    - FirmwareInventory:
        node: sftinvcl:SoftwareInventoryCollection
        capability: sfinclcp:SoftwareInventoryCollectionContainable
        relationship: core:Contains
        count_range:
        - 0
        - 1
        description: >-
          An inventory of firmware.
    - LocalImageStore:
        node: sftinvcl:SoftwareInventoryCollection
        capability: sfinclcp:SoftwareInventoryCollectionContainable
        relationship: core:Contains
        count_range:
        - 0
        - 1
        description: >-
          An inventory of locally stored images.
    - PublicIdentitySSHKey:
        node: key:Key
        capability: keycaps:KeyContainable
        relationship: core:Contains
        count_range:
        - 0
        - 1
        description: >-
          A link to the public key that is used with the `SimpleUpdate` action for
          the key-based authentication.  The GenerateSSHIdentityKeyPair and RemoveSSHIdentityKeyPair
          are used to update the key for the `SimpleUpdate` action.
    - RemoteServerCertificates:
        node: crtfcllc:CertificateCollection
        capability: crtcllcp:CertificateCollectionContainable
        relationship: core:Contains
        count_range:
        - 0
        - 1
        description: >-
          The link to a collection of server certificates for the server referenced
          by the `ImageURI` parameter in SimpleUpdate.
    - RemoteServerSSHKeys:
        node: kycllctn:KeyCollection
        capability: kycllcp:KeyCollectionContainable
        relationship: core:Contains
        count_range:
        - 0
        - 1
        description: >-
          The link to a collection of keys that can be used to authenticate the server
          referenced by the `ImageURI` parameter in `SimpleUpdate`.
    - SoftwareInventory:
        node: sftinvcl:SoftwareInventoryCollection
        capability: sfinclcp:SoftwareInventoryCollectionContainable
        relationship: core:Contains
        count_range:
        - 0
        - 1
        description: >-
          An inventory of software.
    - UpdateServiceCapabilities:
        node: updsrvcp:UpdateServiceCapabilities
        capability: upsrcpcp:UpdateServiceCapabilitiesContainable
        relationship: core:Contains
        count_range:
        - 0
        - 1
        description: >-
          A link to the capabilities of the update service.
    interfaces:
      Actions:
        type: UpdateServiceActions
    capabilities:
      feature:
        type: updsrvcp:UpdateServiceFeature
      containable:
        type: updsrvcp:UpdateServiceContainable
