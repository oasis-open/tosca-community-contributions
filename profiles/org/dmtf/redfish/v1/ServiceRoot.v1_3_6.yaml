        required: false
node_types:
  ServiceRoot:
    description: >-
      The ServiceRoot schema describes the root of the Redfish service, located at
      the '/redfish/v1' URI.  All other resources accessible through the Redfish interface
      on this device are linked directly or indirectly from the service root.
    properties:
      Description:
        type: resource:Description
        description: >-
          The description of this resource.  Used for commonality in the schema definitions.
        required: false
      Id:
        type: resource:Id
        description: >-
          The unique identifier for this resource within the collection of similar
          resources.
        required: true
      Name:
        type: resource:Name
        description: >-
          The name of the resource or array member.
        required: true
      Oem:
        type: resource:Oem
        description: >-
          The OEM extension property.
        required: false
      Product:
        type: string
        description: >-
          The product associated with this Redfish service.
        required: false
      ProtocolFeaturesSupported:
        type: ProtocolFeaturesSupported
        description: >-
          The information about protocol features that the service supports.
        required: false
      RedfishVersion:
        type: string
        description: >-
          The version of the Redfish service.
        required: false
        validation:
          $matches:
          - $value
          - ^\d+\.\d+\.\d+$
      UUID:
        type: string
        description: >-
          Unique identifier for a service instance.  When SSDP is used, this value
          contains the same UUID returned in an HTTP `200 OK` response from an SSDP
          `M-SEARCH` request during discovery.
        required: false
        validation:
          $matches:
          - $value
          - ([0-9a-fA-F]{8}-[0-9a-fA-F]{4}-[0-9a-fA-F]{4}-[0-9a-fA-F]{4}-[0-9a-fA-F]{12})
