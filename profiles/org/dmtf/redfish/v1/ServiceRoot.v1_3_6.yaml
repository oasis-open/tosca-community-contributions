data_types:
  Expand:
    description: >-
      The information about the use of $expand in the service.
    properties:
      ExpandAll:
        type: boolean
        description: >-
          An indication of whether the service supports the asterisk (`*`) option
          of the $expand query parameter.
        required: false
      Levels:
        type: boolean
        description: >-
          An indication of whether the service supports the $levels option of the
          $expand query parameter.
        required: false
      Links:
        type: boolean
        description: >-
          An indication of whether this service supports the tilde (`~`) option of
          the $expand query parameter.
        required: false
      MaxLevels:
        type: integer
        description: >-
          The maximum $levels option value in the $expand query parameter.
        required: false
        validation:
          $greater_or_equal:
          - $value
          - 1
      NoLinks:
        type: boolean
        description: >-
          An indication of whether the service supports the period (`.`) option of
          the $expand query parameter.
        required: false
  ProtocolFeaturesSupported:
    description: >-
      The information about protocol features that the service supports.
    properties:
      ExpandQuery:
        type: Expand
        description: >-
          The information about the use of $expand in the service.
        required: false
      FilterQuery:
        type: boolean
        description: >-
          An indication of whether the service supports the $filter query parameter.
        required: false
      SelectQuery:
        type: boolean
        description: >-
          An indication of whether the service supports the $select query parameter.
        required: false
relationship_types:
  ServiceRootDependsOn:
