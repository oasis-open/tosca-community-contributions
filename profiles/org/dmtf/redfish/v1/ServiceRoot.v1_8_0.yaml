data_types:
  DeepOperations:
    description: >-
      The information about deep operations that the service supports.
    properties:
      DeepPATCH:
        type: boolean
        description: >-
          An indication of whether the service supports the deep PATCH operation.
        required: false
      DeepPOST:
        type: boolean
        description: >-
          An indication of whether the service supports the deep POST operation.
        required: false
      MaxLevels:
        type: integer
        description: >-
          The maximum levels of resources allowed in deep operations.
        required: false
        validation:
          $and:
          - $greater_or_equal:
            - $value
            - 1
          - $less_or_equal:
            - $value
            - 6
  Expand:
    description: >-
      The information about the use of $expand in the service.
    properties:
      ExpandAll:
        type: boolean
        description: >-
          An indication of whether the service supports the asterisk (`*`) option
          of the $expand query parameter.
        required: false
      Levels:
        type: boolean
        description: >-
          An indication of whether the service supports the $levels option of the
          $expand query parameter.
        required: false
      Links:
        type: boolean
        description: >-
          An indication of whether this service supports the tilde (`~`) option of
          the $expand query parameter.
        required: false
      MaxLevels:
        type: integer
        description: >-
          The maximum $levels option value in the $expand query parameter.
        required: false
        validation:
          $and:
          - $greater_or_equal:
            - $value
            - 1
          - $less_or_equal:
            - $value
            - 6
      NoLinks:
        type: boolean
        description: >-
          An indication of whether the service supports the period (`.`) option of
          the $expand query parameter.
        required: false
  ProtocolFeaturesSupported:
    description: >-
      The information about protocol features that the service supports.
    properties:
      DeepOperations:
        type: DeepOperations
        description: >-
          The information about deep operations that the service supports.
        required: false
      ExcerptQuery:
        type: boolean
        description: >-
          An indication of whether the service supports the excerpt query parameter.
        required: false
      ExpandQuery:
        type: Expand
        description: >-
          The information about the use of $expand in the service.
        required: false
      FilterQuery:
        type: boolean
        description: >-
          An indication of whether the service supports the $filter query parameter.
        required: false
      OnlyMemberQuery:
        type: boolean
        description: >-
          An indication of whether the service supports the only query parameter.
        required: false
      SelectQuery:
        type: boolean
        description: >-
          An indication of whether the service supports the $select query parameter.
        required: false
relationship_types:
  ServiceRootDependsOn:
