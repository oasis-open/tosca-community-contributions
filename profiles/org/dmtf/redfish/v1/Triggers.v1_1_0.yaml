tosca_definitions_version: tosca_2_0
description: >-
  Types generated from JSON Schema by any2tosca
imports:
- url: Resource.yaml
  namespace: resource
- url: MetricReportDefinition.yaml
  namespace: mtrrprdf
- url: odata-v4.yaml
  namespace: odatav4
- url: Core.yaml
  namespace: core
- url: MetricReportDefinition_caps.yaml
  namespace: mtrpdfcp
- url: Triggers_caps.yaml
  namespace: trggcps
data_types:
  DirectionOfCrossingEnum:
    description: >-
      The direction of crossing which corresponds to a trigger.
    derived_from: string
    validation:
      $valid_values:
      - $value
      - - Increasing
        - Decreasing
  DiscreteTrigger:
    description: >-
      The characteristics of the discrete trigger.
    properties:
      DwellTime:
        type: string
        description: >-
          This time the trigger occurance persists before a trigger event has occurred.
        required: false
        validation:
          $matches:
          - $value
          - -?P(\d+D)?(T(\d+H)?(\d+M)?(\d+(.\d+)?S)?)?
      Name:
        type: string
        description: >-
          The name of trigger.
        required: false
      Severity:
        type: resource:Health
        description: >-
          This property contains the value of the Severity property in the Event message.
        required: false
      Value:
        type: string
        description: >-
          The value of the discrete metric that constitutes a trigger occurance.
        required: false
  DiscreteTriggerConditionEnum:
    description: >-
      Specifies the condition, in relationship to the discrete trigger values, which
      constitutes a trigger.
    derived_from: string
    validation:
      $valid_values:
      - $value
      - - Specified
        - Changed
  MetricTypeEnum:
    description: >-
      Specifies the type of metric for which the trigger is configured.
    derived_from: string
    validation:
      $valid_values:
      - $value
      - - Numeric
        - Discrete
  Threshold:
    description: >-
      A threshold definition for a sensor.
    properties:
      Activation:
        type: ThresholdActivation
        description: >-
          The direction of crossing that activates this threshold.
        required: false
      DwellTime:
        type: string
        description: >-
          The time interval over which the sensor reading must have passed through
          this Threshold value before the threshold is considered to be violated.
        required: false
        validation:
          $matches:
          - $value
          - -?P(\d+D)?(T(\d+H)?(\d+M)?(\d+(.\d+)?S)?)?
      Reading:
        type: float
        description: >-
          The threshold value.
        required: false
  ThresholdActivation:
    derived_from: string
    validation:
      $valid_values:
      - $value
      - - Increasing
        - Decreasing
        - Either
  Thresholds:
    description: >-
      The set of thresholds defined for a sensor.
    properties:
      LowerCritical:
        type: Threshold
        description: >-
          Below normal range and requires attention.
        required: false
      LowerWarning:
        type: Threshold
        description: >-
          Below normal range.
        required: false
      UpperCritical:
        type: Threshold
        description: >-
          Above normal range and requires attention.
        required: false
      UpperWarning:
        type: Threshold
        description: >-
          Above normal range.
        required: false
  TriggerActionEnum:
    description: >-
      Specifies the actions to perform when a trigger occurs.
    derived_from: string
    validation:
      $valid_values:
      - $value
      - - LogToLogService
        - RedfishEvent
        - RedfishMetricReport
  Wildcard:
    description: >-
      Contains a wildcard and its substitution values.
    properties:
      Name:
        type: string
        description: >-
          The string used as a wildcard.
        required: false
      Values:
        type: list
        description: >-
          An array of values to substitute for the wildcard.
        required: false
        entry_schema:
          type: string
relationship_types:
  TriggersDependsOn:
    derived_from: core:DependsOn
    properties:
      MetricReportDefinitions@odata_count:
        type: odatav4:count
        description: >-
          The number of items in a collection.
        required: false
      Oem:
        type: resource:Oem
        description: >-
          Oem extension object.
        required: false
node_types:
  Triggers:
    description: >-
      Triggers which apply to a list of metrics.
    properties:
      Description:
        type: resource:Description
        description: >-
          The description of this resource.  Used for commonality in the schema definitions.
        required: false
      DiscreteTriggerCondition:
        type: DiscreteTriggerConditionEnum
        description: >-
          Specifies the conditions when a discrete metric triggers.
        required: false
      DiscreteTriggers:
        type: list
        description: >-
          List of discrete triggers.
        required: false
        entry_schema:
          type: DiscreteTrigger
      EventTriggers:
        type: list
        description: >-
          A list of MessageIds that specify when a trigger occurs based on an event.
        required: false
        validation:
          $matches:
          - $value
          - ^[A-Za-z0-9]+\.\d+\.\d+\.[A-Za-z0-9.]+$
        entry_schema:
          type: string
      Id:
        type: resource:Id
        description: >-
          The unique identifier for this resource within the collection of similar
          resources.
        required: true
      MetricProperties:
        type: list
        description: >-
          A list of URIs with wildcards and property identifiers for which this trigger
          is defined. If a URI has wildcards, the wildcards are substituted as specified
          in the Wildcards array property.
        required: false
        entry_schema:
          type: string
      MetricType:
        type: MetricTypeEnum
        description: >-
          The type of trigger.
        required: false
      Name:
        type: resource:Name
        description: >-
          The name of the resource or array member.
        required: true
      NumericThresholds:
        type: Thresholds
        description: >-
          Specifies the thresholds when a numeric metric triggers.
        required: false
      Oem:
        type: resource:Oem
        description: >-
          This is the manufacturer/provider specific extension moniker used to divide
          the Oem object into sections.
        required: false
      Status:
        type: resource:Status
        description: >-
          This property describes the status and health of the resource and its children.
        required: false
      TriggerActions:
        type: list
        description: >-
          This property specifies the actions to perform when the trigger occurs.
        required: false
        entry_schema:
          type: TriggerActionEnum
      Wildcards:
        type: list
        description: >-
          A list of wildcards and their substitution values to be applied to the entries
          in the MetricProperties array property.
        required: false
        entry_schema:
          type: Wildcard
    requirements:
    - MetricReportDefinitions:
        node: mtrrprdf:MetricReportDefinition
        capability: mtrpdfcp:MetricReportDefinitionFeature
        relationship: TriggersDependsOn
        count_range:
        - 0
        - UNBOUNDED
        description: >-
          The metric report definitions that will generate new metric reports when
          a trigger occurs when the TriggerActions property contains the value RedfishMetricReport.
    capabilities:
      feature:
        type: trggcps:TriggersFeature
      containable:
        type: trggcps:TriggersContainable
