tosca_definitions_version: tosca_2_0
description: >-
  Types generated from JSON Schema by any2tosca
imports:
- url: Resource.yaml
  namespace: resource
- url: Core.yaml
  namespace: core
- url: VCATEntry_caps.yaml
  namespace: vctncps
data_types:
  VCATableEntry:
    description: >-
      The Virtual Channel Action Table entry corresponding to a specific Virtual Channel.
    properties:
      Threshold:
        type: string
        description: >-
          The configured threshold.
        required: false
        validation:
          $matches:
          - $value
          - ^0[xX]([a-fA-F]|[0-9]){2}$
      VCMask:
        type: string
        description: >-
          The bits corresponding to the supported Virtual Channel.
        required: false
        validation:
          $matches:
          - $value
          - ^0[xX](([a-fA-F]|[0-9]){2}){4}$
node_types:
  VCATEntry:
    description: >-
      The `VCATEntry` schema defines an entry in a Virtual Channel Action Table.  A
      Virtual Channel is a mechanism used to create multiple, logical communication
      streams across a physical link.
    properties:
      Description:
        type: resource:Description
        description: >-
          The description of this resource.  Used for commonality in the schema definitions.
        required: false
      Id:
        type: resource:Id
        description: >-
          The unique identifier for this resource within the collection of similar
          resources.
        required: true
      Name:
        type: resource:Name
        description: >-
          The name of the resource or array member.
        required: true
      Oem:
        type: resource:Oem
        description: >-
          The OEM extension property.
        required: false
      RawEntryHex:
        type: string
        description: >-
          The hexadecimal value of the Virtual Channel Action Table entries.
        required: false
        validation:
          $matches:
          - $value
          - ^0[xX](([a-fA-F]|[0-9])*)$
      VCEntries:
        type: list
        description: >-
          An array of entries of the Virtual Channel Action Table.
        required: false
        entry_schema:
          type: VCATableEntry
    capabilities:
      feature:
        type: vctncps:VCATEntryFeature
      containable:
        type: vctncps:VCATEntryContainable
