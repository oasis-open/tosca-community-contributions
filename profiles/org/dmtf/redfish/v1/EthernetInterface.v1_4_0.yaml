tosca_definitions_version: tosca_2_0
description: >-
  Types generated from JSON Schema by any2tosca
imports:
- url: Chassis.yaml
  namespace: chassis
- url: Endpoint.yaml
  namespace: endpoint
- url: odata.v4_0_1.yaml
  namespace: odata
- url: HostInterface.yaml
  namespace: hstintr
- url: Resource.yaml
  namespace: resource
- url: Core.yaml
  namespace: core
- url: Chassis_caps.yaml
  namespace: chssscps
- url: Endpoint_caps.yaml
  namespace: endpcps
- url: HostInterface_caps.yaml
  namespace: hstintcp
- url: IPAddresses.yaml
  namespace: ipddrsss
- url: VLanNetworkInterface.yaml
  namespace: vlnntwin
- url: VLanNetworkInterfaceCollection.yaml
  namespace: vlntincl
- url: VLanNetworkInterfaceCollection_caps.yaml
  namespace: vlntincc
- url: EthernetInterface_caps.yaml
  namespace: ethintcp
data_types:
  DHCPv4Configuration:
    description: >-
      DHCPv4 configuration for this interface.
    properties:
      DHCPEnabled:
        type: boolean
        description: >-
          Determines whether DHCPv4 is enabled on this interface.
        required: false
      UseDNSServers:
        type: boolean
        description: >-
          Determines whether to use DHCPv4-supplied DNS servers.
        required: false
      UseDomainName:
        type: boolean
        description: >-
          Determines whether to use a DHCPv4-supplied domain name.
        required: false
      UseGateway:
        type: boolean
        description: >-
          Determines whether to use a DHCPv4-supplied gateway.
        required: false
      UseNTPServers:
        type: boolean
        description: >-
          Determines whether to use DHCPv4-supplied NTP servers.
        required: false
      UseStaticRoutes:
        type: boolean
        description: >-
          Determines whether to use DHCPv4-supplied static routes.
        required: false
  DHCPv6Configuration:
    description: >-
      DHCPv6 configuration for this interface.
    properties:
      OperatingMode:
        type: DHCPv6OperatingMode
        description: >-
          Determines the DHCPv6 operating mode for this interface.
        required: false
      UseDNSServers:
        type: boolean
        description: >-
          When enabled, DNS server addresses supplied through DHCPv6 stateless mode
          will be used.
        required: false
      UseDomainName:
        type: boolean
        description: >-
          When enabled, the domain name supplied through DHCPv6 stateless mode will
          be used.
        required: false
      UseNTPServers:
        type: boolean
        description: >-
          When enabled, NTP server addresses supplied through DHCPv6 stateless mode
          will be used.
        required: false
      UseRapidCommit:
        type: boolean
        description: >-
          Determines whether to use DHCPv6 rapid commit mode for stateful mode address
          assignments. Do not enable in networks where more than one DHCPv6 server
          is configured to provide address assignments.
        required: false
  DHCPv6OperatingMode:
    derived_from: string
    validation:
      $valid_values:
      - $value
      - - Stateful
        - Stateless
        - Disabled
  IPv6AddressPolicyEntry:
    description: >-
      A entry in the RFC 6724 Address Selection Policy Table.
    properties:
      Label:
        type: float
        description: >-
          The IPv6 Label (as defined in RFC 6724 section 2.1).
        required: false
        validation:
          $and:
          - $greater_or_equal:
            - $value
            - 0
          - $less_or_equal:
            - $value
            - 100
      Precedence:
        type: float
        description: >-
          The IPv6 Precedence (as defined in RFC 6724 section 2.1.
        required: false
        validation:
          $and:
          - $greater_or_equal:
            - $value
            - 1
          - $less_or_equal:
            - $value
            - 100
      Prefix:
        type: string
        description: >-
          The IPv6 Address Prefix (as defined in RFC 6724 section 2.1).
        required: false
  LinkStatus:
    derived_from: string
    validation:
      $valid_values:
      - $value
      - - LinkUp
        - NoLink
        - LinkDown
  MACAddress:
    derived_from: string
    validation:
      $matches:
      - $value
      - ^([0-9A-Fa-f]{2}[:-]){5}([0-9A-Fa-f]{2})$
  StatelessAddressAutoConfiguration:
    description: >-
      Stateless Address Automatic Configuration (SLAAC) parameters for this interface.
    properties:
      IPv4AutoConfigEnabled:
        type: boolean
        description: >-
          Indicates whether IPv4 SLAAC is enabled for this interface.
        required: false
      IPv6AutoConfigEnabled:
        type: boolean
        description: >-
          Indicates whether IPv6 SLAAC is enabled for this interface.
        required: false
relationship_types:
  EthernetInterfaceDependsOn:
    derived_from: core:DependsOn
    properties:
      Endpoints@odata_count:
        type: odata:count
        description: >-
          The number of items in a collection.
        required: false
      Oem:
        type: resource:Oem
        description: >-
          Oem extension object.
        required: false
node_types:
  EthernetInterface:
    description: >-
      The EthernetInterface schema represents a single, logical ethernet interface
      or network interface controller (NIC).
    properties:
      AutoNeg:
        type: boolean
        description: >-
          This indicates if the speed and duplex are automatically negotiated and
          configured on this interface.
        required: false
      DHCPv4:
        type: DHCPv4Configuration
        description: >-
          DHCPv4 configuration for this interface.
        required: false
      DHCPv6:
        type: DHCPv6Configuration
        description: >-
          DHCPv6 configuration for this interface.
        required: false
      Description:
        type: resource:Description
        description: >-
          The description of this resource.  Used for commonality in the schema definitions.
        required: false
      FQDN:
        type: string
        description: >-
          This is the complete, fully qualified domain name obtained by DNS for this
          interface.
        required: false
      FullDuplex:
        type: boolean
        description: >-
          This indicates if the interface is in Full Duplex mode or not.
        required: false
      HostName:
        type: string
        description: >-
          The DNS Host Name, without any domain information.
        required: false
      IPv4Addresses:
        type: list
        description: >-
          The IPv4 addresses currently assigned to this interface.
        required: false
        entry_schema:
          type: ipddrsss:IPv4Address
      IPv4StaticAddresses:
        type: list
        description: >-
          The IPv4 static addresses assigned to this interface.
        required: false
        entry_schema:
          type: ipddrsss:IPv4Address
      IPv6AddressPolicyTable:
        type: list
        description: >-
          An array representing the RFC 6724 Address Selection Policy Table.
        required: false
        entry_schema:
          type: IPv6AddressPolicyEntry
      IPv6Addresses:
        type: list
        description: >-
          Enumerates in an array all of the currently assigned IPv6 addresses on this
          interface.
        required: false
        entry_schema:
          type: ipddrsss:IPv6Address
      IPv6DefaultGateway:
        type: string
        description: >-
          This is the IPv6 default gateway address that is currently in use on this
          interface.
        required: false
      IPv6StaticAddresses:
        type: list
        description: >-
          Represents in an array all of the IPv6 static addresses to be assigned on
          this interface.
        required: false
        entry_schema:
          type: ipddrsss:IPv6StaticAddress
      IPv6StaticDefaultGateways:
        type: list
        description: >-
          The IPv6 static default gateways for this interface.
        required: false
        entry_schema:
          type: ipddrsss:IPv6StaticAddress
      Id:
        type: resource:Id
        description: >-
          The unique identifier for this resource within the collection of similar
          resources.
        required: true
      InterfaceEnabled:
        type: boolean
        description: >-
          This indicates whether this interface is enabled.
        required: false
      LinkStatus:
        type: LinkStatus
        description: >-
          The link status of this interface (port).
        required: false
      MACAddress:
        type: MACAddress
        description: >-
          This is the currently configured MAC address of the (logical port) interface.
        required: false
      MTUSize:
        type: float
        description: >-
          This is the currently configured Maximum Transmission Unit (MTU) in bytes
          on this interface.
        required: false
      MaxIPv6StaticAddresses:
        type: float
        description: >-
          This indicates the maximum number of Static IPv6 addresses that can be configured
          on this interface.
        required: false
      Name:
        type: resource:Name
        description: >-
          The name of the resource or array member.
        required: true
      NameServers:
        type: list
        description: >-
          This represents DNS name servers that are currently in use on this interface.
        required: false
        entry_schema:
          type: string
      Oem:
        type: resource:Oem
        description: >-
          This is the manufacturer/provider specific extension moniker used to divide
          the Oem object into sections.
        required: false
      PermanentMACAddress:
        type: MACAddress
        description: >-
          This is the permanent MAC address assigned to this interface (port).
        required: false
      SpeedMbps:
        type: float
        description: >-
          This is the current speed in Mbps of this interface.
        required: false
      StatelessAddressAutoConfig:
        type: StatelessAddressAutoConfiguration
        description: >-
          Stateless Address Automatic Configuration (SLAAC) parameters for this interface.
        required: false
      StaticNameServers:
        type: list
        description: >-
          A statically defined set of DNS server IP addresses (both IPv4 and IPv6).
        required: false
        entry_schema:
          type: string
      Status:
        type: resource:Status
        description: >-
          The status and health of a resource and its children.
        required: false
      UefiDevicePath:
        type: string
        description: >-
          The UEFI device path for this interface.
        required: false
      VLAN:
        type: vlnntwin:VLAN
        description: >-
          If this Network Interface supports more than one VLAN, this property is
          not present. VLANs collections appear in the Link section of this resource.
        required: false
    requirements:
    - VLANs:
        node: vlntincl:VLanNetworkInterfaceCollection
        capability: vlntincc:VLanNetworkInterfaceCollectionContainable
        relationship: core:Contains
        count_range:
        - 0
        - 1
        description: >-
          This is a reference to a collection of VLANs and is only used if the interface
          supports more than one VLANs.
    - Chassis:
        node: chassis:Chassis
        capability: chssscps:ChassisFeature
        relationship: EthernetInterfaceDependsOn
        count_range:
        - 0
        - 1
        description: >-
          A reference to the Chassis which contains this Ethernet Interface.
    - Endpoints:
        node: endpoint:Endpoint
        capability: endpcps:EndpointFeature
        relationship: EthernetInterfaceDependsOn
        count_range:
        - 0
        - UNBOUNDED
        description: >-
          An array of references to the endpoints that connect to this ethernet interface.
    - HostInterface:
        node: hstintr:HostInterface
        capability: hstintcp:HostInterfaceFeature
        relationship: EthernetInterfaceDependsOn
        count_range:
        - 0
        - 1
        description: >-
          This is a reference to a Host Interface that is associated with this Ethernet
          Interface.
    capabilities:
      feature:
        type: ethintcp:EthernetInterfaceFeature
      containable:
        type: ethintcp:EthernetInterfaceContainable
