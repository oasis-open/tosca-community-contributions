tosca_definitions_version: tosca_2_0
description: >-
  Types generated from JSON Schema by any2tosca
imports:
- url: Resource.yaml
  namespace: resource
- url: odata-v4.yaml
  namespace: odatav4
- url: Core.yaml
  namespace: core
- url: Port_caps.yaml
  namespace: portcaps
- url: RouteEntryCollection.yaml
  namespace: rtentcl
- url: VCATEntryCollection.yaml
  namespace: vctncllc
- url: EnvironmentMetrics.yaml
  namespace: envrmtrc
- url: NetworkDeviceFunction.yaml
  namespace: ntwdvcfn
- url: EnvironmentMetrics_caps.yaml
  namespace: envmtrcp
- url: RouteEntryCollection_caps.yaml
  namespace: rtenclcp
- url: VCATEntryCollection_caps.yaml
  namespace: vctcllcp
- url: NetworkDeviceFunction_caps.yaml
  namespace: ntdvfncp
data_types:
  Ethernet:
    description: >-
      Ethernet properties for this port.
    properties:
      AssociatedMACAddresses:
        type: list
        description: >-
          An array of all configured MAC addresses associated with this network port.  For
          example, this would include the programmed addresses for network device
          functions and the address for hardware port teaming.
        required: false
        validation:
          $matches:
          - $value
          - ^([0-9A-Fa-f]{2}[:-]){5}([0-9A-Fa-f]{2})$
        entry_schema:
          type: string
      EEEEnabled:
        type: boolean
        description: >-
          Indicates whether IEEE 802.3az Energy-Efficient Ethernet (EEE) is enabled
          on this port.
        required: false
      FlowControlConfiguration:
        type: string
        description: >-
          The locally configured 802.3x flow control setting for this port.
        required: false
      FlowControlStatus:
        type: string
        description: >-
          The 802.3x flow control behavior negotiated with the link partner for this
          port.
        required: false
      LLDPEnabled:
        type: boolean
        description: >-
          Enable/disable LLDP for this port.
        required: false
      LLDPReceive:
        type: LLDPReceive
        description: >-
          LLDP data being received on this link.
        required: false
      LLDPTransmit:
        type: LLDPTransmit
        description: >-
          LLDP data being transmitted on this link.
        required: false
      SupportedEthernetCapabilities:
        type: list
        description: >-
          The set of Ethernet capabilities that this port supports.
        required: false
        entry_schema:
          type: string
      WakeOnLANEnabled:
        type: boolean
        description: >-
          Indicates whether Wake on LAN (WoL) is enabled on this port.
        required: false
  LLDPReceive:
    description: >-
      LLDP data being received on this link.
    properties:
      AdditionalManagementAddressesIPv4:
        type: list
        description: >-
          Additional IPv4 management addresses received from the remote partner across
          this link.  `ManagementAddressIPv4` contains the first IPv4 address received.
        required: false
        validation:
          $matches:
          - $value
          - ^(?:[0-9]{1,3}\.){3}[0-9]{1,3}$
        entry_schema:
          type: string
      AdditionalManagementAddressesIPv6:
        type: list
        description: >-
          Additional IPv6 management addresses received from the remote partner across
          this link.  `ManagementAddressIPv6` contains the first IPv6 address received.
        required: false
        entry_schema:
          type: string
      ChassisId:
        type: string
        description: >-
          Link Layer Data Protocol (LLDP) chassis ID received from the remote partner
          across this link.
        required: false
      ChassisIdSubtype:
        type: string
        description: >-
          The type of identifier used for the chassis ID received from the remote
          partner across this link.
        required: false
      ManagementAddressIPv4:
        type: string
        description: >-
          The IPv4 management address received from the remote partner across this
          link.
        required: false
        validation:
          $matches:
          - $value
          - ^(?:[0-9]{1,3}\.){3}[0-9]{1,3}$
      ManagementAddressIPv6:
        type: string
        description: >-
          The IPv6 management address received from the remote partner across this
          link.
        required: false
      ManagementAddressMAC:
        type: string
        description: >-
          The management MAC address received from the remote partner across this
          link.
        required: false
        validation:
          $matches:
          - $value
          - ^([0-9A-Fa-f]{2}[:-]){5}([0-9A-Fa-f]{2})$
      ManagementVlanId:
        type: integer
        description: >-
          The management VLAN ID received from the remote partner across this link.
        required: false
        validation:
          $and:
          - $greater_or_equal:
            - $value
            - 0
          - $less_or_equal:
            - $value
            - 4095
      PortId:
        type: string
        description: >-
          A colon-delimited string of hexadecimal octets identifying a port.
        required: false
        validation:
          $matches:
          - $value
          - ^([0-9A-F]{2})([:]([0-9A-F]){2}){0,63}$
      PortIdSubtype:
        type: string
        description: >-
          The port ID subtype received from the remote partner across this link.
        required: false
      SystemCapabilities:
        type: list
        description: >-
          The system capabilities received from the remote partner across this link.
        required: false
        entry_schema:
          type: string
      SystemDescription:
        type: string
        description: >-
          The system description received from the remote partner across this link.
        required: false
      SystemName:
        type: string
        description: >-
          The system name received from the remote partner across this link.
        required: false
  LLDPTransmit:
    description: >-
      LLDP data being transmitted on this link.
    properties:
      AdditionalManagementAddressesIPv4:
        type: list
        description: >-
          Additional IPv4 management addresses advertised on this link.
        required: false
        validation:
          $matches:
          - $value
          - ^(?:[0-9]{1,3}\.){3}[0-9]{1,3}$
        entry_schema:
          type: string
      AdditionalManagementAddressesIPv6:
        type: list
        description: >-
          Additional IPv6 management addresses advertised on this link.
        required: false
        entry_schema:
          type: string
      ChassisId:
        type: string
        description: >-
          Link Layer Data Protocol (LLDP) chassis ID.
        required: false
      ChassisIdSubtype:
        type: string
        description: >-
          The type of identifier used for the chassis ID.
        required: false
      ManagementAddressIPv4:
        type: string
        description: >-
          The IPv4 management address to be transmitted from this endpoint.
        required: false
        validation:
          $matches:
          - $value
          - (^(?:[0-9]{1,3}\.){3}[0-9]{1,3}$)|(^$)
      ManagementAddressIPv6:
        type: string
        description: >-
          The IPv6 management address to be transmitted from this endpoint.
        required: false
      ManagementAddressMAC:
        type: string
        description: >-
          The management MAC address to be transmitted from this endpoint.
        required: false
        validation:
          $matches:
          - $value
          - (^([0-9A-Fa-f]{2}[:-]){5}([0-9A-Fa-f]{2})$)|(^$)
      ManagementVlanId:
        type: integer
        description: >-
          The management VLAN ID to be transmitted from this endpoint.
        required: false
        validation:
          $and:
          - $greater_or_equal:
            - $value
            - 0
          - $less_or_equal:
            - $value
            - 4095
      PortId:
        type: string
        description: >-
          A colon-delimited string of hexadecimal octets identifying a port to be
          transmitted from this endpoint.
        required: false
        validation:
          $matches:
          - $value
          - (^([0-9A-F]{2})([:]([0-9A-F]){2}){0,63}$)|(^$)
      PortIdSubtype:
        type: string
        description: >-
          The port ID subtype to be transmitted from this endpoint.
        required: false
      SystemCapabilities:
        type: list
        description: >-
          The system capabilities to be transmitted from this endpoint.
        required: false
        entry_schema:
          type: string
      SystemDescription:
        type: string
        description: >-
          The system description to be transmitted from this endpoint.
        required: false
      SystemName:
        type: string
        description: >-
          The system name to be transmitted from this endpoint.
        required: false
  FibreChannel:
    description: >-
      Fibre Channel properties for this port.
    properties:
      AssociatedWorldWideNames:
        type: list
        description: >-
          An array of configured World Wide Names (WWN) that are associated with this
          network port, including the programmed address of the lowest-numbered network
          device function, the configured but not active address, if applicable, the
          address for hardware port teaming, or other network addresses.
        required: false
        validation:
          $matches:
          - $value
          - ^([0-9A-Fa-f]{2}[:-]){7}([0-9A-Fa-f]{2})$
        entry_schema:
          type: string
      FabricName:
        type: string
        description: >-
          The Fibre Channel Fabric Name provided by the switch.
        required: false
      NumberDiscoveredRemotePorts:
        type: integer
        description: >-
          The number of ports not on the associated device that the associated device
          has discovered through this port.
        required: false
      PortConnectionType:
        type: string
        description: >-
          The connection type of this port.
        required: false
  LinkConfiguration:
    description: >-
      Static capabilities and configuration settings for a link.
    properties:
      AutoSpeedNegotiationCapable:
        type: boolean
        description: >-
          An indication of whether the port is capable of autonegotiating speed.
        required: false
      AutoSpeedNegotiationEnabled:
        type: boolean
        description: >-
          Controls whether this port is configured to enable autonegotiating speed.
        required: false
      CapableLinkSpeedGbps:
        type: list
        description: >-
          The set of link speed capabilities of this port.
        required: false
        entry_schema:
          type: float
      ConfiguredNetworkLinks:
        type: list
        description: >-
          The set of link speed and width pairs this port is configured to use for
          autonegotiation.
        required: false
        entry_schema:
          type: string
      LinkNetworkTechnology:
        type: string
        description: >-
          The link network technology for this link configuration.
        required: false
  SFP:
    description: >-
      The small form-factor pluggable (SFP) device associated with this port.
    properties:
      DateCode:
        type: string
        description: >-
          The manufacturing date code for this SFP.
        required: false
      FiberConnectionType:
        type: string
        description: >-
          The type of fiber connection currently used by this transceiver.
        required: false
      ManagementInterfaceType:
        type: string
        description: >-
          The type of management interface for this transceiver.
        required: false
      Manufacturer:
        type: string
        description: >-
          The manufacturer of this transceiver.
        required: false
      MediumType:
        type: string
        description: >-
          The medium type connected to this transceiver.
        required: false
      PartNumber:
        type: string
        description: >-
          The part number for this transceiver.
        required: false
      SerialNumber:
        type: string
        description: >-
          The serial number for this transceiver.
        required: false
      Status:
        type: resource:Status
        description: >-
          The status and health of the resource and its subordinate or dependent resources.
        required: false
      SupportedSFPTypes:
        type: list
        description: >-
          The types of transceivers that can be attached to this port.
        required: false
        entry_schema:
          type: string
      Type:
        type: string
        description: >-
          The type of transceiver that is attached to this port.
        required: false
      VendorOUI:
        type: string
        description: >-
          The IEEE OUI of the vendor of this SFP.
        required: false
        validation:
          $matches:
          - $value
          - ^([0-9A-Fa-f]{2}-){2}([0-9A-Fa-f]{2})$
      Version:
        type: string
        description: >-
          The hardware version of this SFP.
        required: false
  InfiniBand:
    description: >-
      InfiniBand properties for this port.
    properties:
      AssociatedNodeGUIDs:
        type: list
        description: >-
          An array of configured node GUIDs that are associated with this network
          port, including the programmed address of the lowest-numbered network device
          function, the configured but not active address, if applicable, the address
          for hardware port teaming, or other network addresses.
        required: false
        validation:
          $matches:
          - $value
          - ^([0-9A-Fa-f]{4}[:-]){3}([0-9A-Fa-f]{4})$
        entry_schema:
          type: string
      AssociatedPortGUIDs:
        type: list
        description: >-
          An array of configured port GUIDs that are associated with this network
          port, including the programmed address of the lowest-numbered network device
          function, the configured but not active address, if applicable, the address
          for hardware port teaming, or other network addresses.
        required: false
        validation:
          $matches:
          - $value
          - ^([0-9A-Fa-f]{4}[:-]){3}([0-9A-Fa-f]{4})$
        entry_schema:
          type: string
      AssociatedSystemGUIDs:
        type: list
        description: >-
          An array of configured system GUIDs that are associated with this network
          port, including the programmed address of the lowest-numbered network device
          function, the configured but not active address, if applicable, the address
          for hardware port teaming, or other network addresses.
        required: false
        validation:
          $matches:
          - $value
          - ^([0-9A-Fa-f]{4}[:-]){3}([0-9A-Fa-f]{4})$
        entry_schema:
          type: string
  CXL:
    description: >-
      CXL properties for this port.
    properties:
      Congestion:
        type: Congestion
        description: >-
          The congestion properties for this CXL port.
        required: false
      ConnectedDeviceMode:
        type: string
        description: >-
          The connected device mode.
        required: false
      ConnectedDeviceType:
        type: string
        description: >-
          The connected device type.
        required: false
      CurrentPortConfigurationState:
        type: string
        description: >-
          The current port configuration state.
        required: false
      MaxLogicalDeviceCount:
        type: integer
        description: >-
          The maximum number of logical devices supported.
        required: false
      QoSTelemetryCapabilities:
        type: QoSTelemetryCapabilities
        description: >-
          The quality of service telemetry capabilities for this CXL port.
        required: false
      SupportedCXLModes:
        type: list
        description: >-
          The supported device modes.
        required: false
        entry_schema:
          type: string
      TemporaryThroughputReductionEnabled:
        type: boolean
        description: >-
          Indicates whether temporary throughput reduction is enabled.
        required: false
  Congestion:
    description: >-
      The congestion properties for this CXL port.
    properties:
      BackpressureSampleInterval:
        type: integer
        description: >-
          The interval for the CXL Specification-defined 'Egress Port Congestion'
          mechanism to take samples in nanoseconds.
        required: false
      CompletionCollectionInterval:
        type: integer
        description: >-
          The interval for the CXL Specification-defined 'Completion Counting' mechanism
          to collect the number of transmitted responses in a single counter in nanoseconds.
        required: false
      CongestionTelemetryEnabled:
        type: boolean
        description: >-
          Indicates whether congestion telemetry collection is enabled for this port.
        required: false
      EgressModeratePercentage:
        type: integer
        description: >-
          The threshold for moderate egress port congestion as a percentage.
        required: false
        validation:
          $and:
          - $greater_or_equal:
            - $value
            - 0
          - $less_or_equal:
            - $value
            - 100
      EgressSeverePercentage:
        type: integer
        description: >-
          The threshold for severe egress port congestion as a percentage.
        required: false
        validation:
          $and:
          - $greater_or_equal:
            - $value
            - 0
          - $less_or_equal:
            - $value
            - 100
      MaxSustainedRequestCmpBias:
        type: integer
        description: >-
          The estimated maximum sustained sum of requests and recent responses across
          the entire device, serving as the basis for the CXL Specification-defined
          'QoS Limit Fraction'.
        required: false
  QoSTelemetryCapabilities:
    description: >-
      The quality of service telemetry capabilities for this CXL port.
    properties:
      EgressPortBackpressureSupported:
        type: boolean
        description: >-
          Indicates whether the port supports the CXL Specification-defined 'Egress
          Port Backpressure' mechanism.
        required: false
      TemporaryThroughputReductionSupported:
        type: boolean
        description: >-
          Indicates whether the port supports the CXL Specification-defined 'Temporary
          Throughput Reduction' mechanism.
        required: false
  UALink:
    description: >-
      The UALink properties of the port.
    properties:
      AuthenticationModeEnabled:
        type: boolean
        description: >-
          An indication of whether authentication mode is enabled.
        required: false
      Generation:
        type: string
        description: >-
          The UALink Data Link Layer/Physical Layer generation of this port.
        required: false
        validation:
          $valid_values:
          - $value
          - - UALink128G
            - UALink200G
      NonStrictOrderingModeEnabled:
        type: boolean
        description: >-
          An indication of whether non-strict ordering mode is enabled.
        required: false
      UPLIWatchdogTimerMicroseconds:
        type: integer
        description: >-
          The time limit, in microseconds, for the UPLI (UALink Protocol Level Interface)
          watchdog for the port.
        required: false
        validation:
          $greater_or_equal:
          - $value
          - 0
relationship_types:
  PortDependsOn:
    derived_from: core:DependsOn
    properties:
      AssociatedEndpoints@odata_count:
        type: odatav4:count
        description: >-
          The number of items in a collection.
        required: false
      AssociatedPhysicalPorts@odata_count:
        type: odatav4:count
        description: >-
          The number of items in a collection.
        required: false
      Cables@odata_count:
        type: odatav4:count
        description: >-
          The number of items in a collection.
        required: false
      ConnectedPorts@odata_count:
        type: odatav4:count
        description: >-
          The number of items in a collection.
        required: false
      ConnectedSwitchPorts@odata_count:
        type: odatav4:count
        description: >-
          The number of items in a collection.
        required: false
      ConnectedSwitches@odata_count:
        type: odatav4:count
        description: >-
          The number of items in a collection.
        required: false
      EthernetInterfaces@odata_count:
        type: odatav4:count
        description: >-
          The number of items in a collection.
        required: false
      Oem:
        type: resource:Oem
        description: >-
          The OEM extension property.
        required: false
interface_types:
  PortActions:
    operations:
      Reset:
        description: >-
          This action resets this port.
        inputs:
          ResetType:
            type: resource:ResetType
            description: >-
              The type of reset.
            required: false
      ResetPPB:
        description: >-
          This action resets the PCI-to-PCI bridge (PPB) for this port.
node_types:
  Port:
    description: >-
      The `Port` schema contains properties that describe a port of a switch, controller,
      chassis, or any other device that could be connected to another entity.
    properties:
      '@odata_id':
        type: odatav4:id
        description: >-
          The unique identifier for a resource.
        required: true
      '@odata_context':
        type: odatav4:context
        description: >-
          The OData description of a payload.
        required: false
      '@odata_etag':
        type: odatav4:etag
        description: >-
          The current ETag of the resource.
        required: false
      '@odata_type':
        type: odatav4:type
        description: >-
          The type of a resource.
        required: true
      CurrentSpeedGbps:
        type: float
        description: >-
          The current speed of this port.
        required: false
      Description:
        type: string
        required: false
      Id:
        type: resource:Id
        description: >-
          The unique identifier for this resource within the collection of similar
          resources.
        required: true
      MaxSpeedGbps:
        type: float
        description: >-
          The maximum speed of this port as currently configured.
        required: false
      Name:
        type: resource:Name
        description: >-
          The name of the resource or array member.
        required: true
      Oem:
        type: resource:Oem
        description: >-
          The OEM extension property.
        required: false
      PortId:
        type: string
        description: >-
          The hardware-defined identifier of this port.
        required: false
      PortProtocol:
        type: string
        description: >-
          The protocol being sent over this port.
        required: false
      PortType:
        type: string
        description: >-
          The type of this port.
        required: false
      Status:
        type: resource:Status
        description: >-
          The status and health of the resource and its subordinate or dependent resources.
        required: false
      Width:
        type: integer
        description: >-
          The number of lanes, phys, or other physical transport links that this port
          contains.
        required: false
      Location:
        type: resource:Location
        description: >-
          The location of the port.
        required: false
      ActiveWidth:
        type: integer
        description: >-
          The number of active lanes for this interface.
        required: false
      GenZ:
        type: GenZ
        description: >-
          Gen-Z specific properties.
        required: false
      InterfaceEnabled:
        type: boolean
        description: >-
          An indication of whether the port is enabled.
        required: false
      LinkNetworkTechnology:
        type: string
        description: >-
          The current link network technology for this port.
        required: false
      LinkState:
        type: string
        description: >-
          The desired link state for this interface.
        required: false
        validation:
          $valid_values:
          - $value
          - - Enabled
            - Disabled
      LinkStatus:
        type: string
        description: >-
          The link status for this interface.
        required: false
        validation:
          $valid_values:
          - $value
          - - LinkUp
            - Starting
            - Training
            - LinkDown
            - NoLink
      LinkTransitionIndicator:
        type: integer
        description: >-
          The number of link state transitions for this interface.
        required: false
      Metrics:
        type: string
        description: >-
          The link to the metrics associated with this port.
        required: false
      PortMedium:
        type: string
        description: >-
          The physical connection medium for this port.
        required: false
      SignalDetected:
        type: boolean
        description: >-
          An indication of whether a signal is detected on this interface.
        required: false
      Ethernet:
        type: Ethernet
        description: >-
          Ethernet properties for this port.
        required: false
      FibreChannel:
        type: FibreChannel
        description: >-
          Fibre Channel properties for this port.
        required: false
      LinkConfiguration:
        type: list
        description: >-
          The static capabilities and configuration settings of this port.
        required: false
        entry_schema:
          type: LinkConfiguration
      LocationIndicatorActive:
        type: boolean
        description: >-
          An indicator allowing an operator to physically locate this resource.
        required: false
      MaxFrameSize:
        type: integer
        description: >-
          The maximum frame size supported by the port.
        required: false
      CapableProtocolVersions:
        type: list
        description: >-
          The protocol versions capable of being sent over this port.
        required: false
        entry_schema:
          type: string
      CurrentProtocolVersion:
        type: string
        description: >-
          The protocol version being sent over this port.
        required: false
      Enabled:
        type: boolean
        description: >-
          An indication of whether this port is enabled.
        required: false
      FunctionMaxBandwidth:
        type: list
        description: >-
          An array of maximum bandwidth allocation percentages for the functions associated
          with this port.
        required: false
        entry_schema:
          type: FunctionMaxBandwidth
      FunctionMinBandwidth:
        type: list
        description: >-
          An array of minimum bandwidth allocation percentages for the functions associated
          with this port.
        required: false
        entry_schema:
          type: FunctionMinBandwidth
      SFP:
        type: SFP
        description: >-
          The small form-factor pluggable (SFP) device associated with this port.
        required: false
      InfiniBand:
        type: InfiniBand
        description: >-
          InfiniBand properties for this port.
        required: false
      CXL:
        type: CXL
        description: >-
          CXL properties for this port.
        required: false
      RemotePortId:
        type: string
        description: >-
          The identifier of the remote port to which this port is connected.
        required: false
      HostDevice:
        type: string
        description: >-
          The current host device for this port.
        required: false
      ConfiguredSpeedGbps:
        type: float
        description: >-
          The speed to which this port is configured to train when autonegotiation
          is disabled.
        required: false
      ConfiguredWidth:
        type: integer
        description: >-
          The number of lanes, phys, or other physical transport links to which this
          port is configured to train when autonegotiation is disabled.
        required: false
      AssociatedPhysicalPort:
        type: integer
        description: >-
          The index of the physical port from which this subport has been split.
        required: false
      FirstLane:
        type: integer
        description: >-
          The first lane that this port is configured to use.
        required: false
      IsSplit:
        type: boolean
        description: >-
          Indicates whether this is a subport split from a physical port.
        required: false
      IsAggregation:
        type: boolean
        description: >-
          Indicates whether this is a logical aggregation.
        required: false
      UALink:
