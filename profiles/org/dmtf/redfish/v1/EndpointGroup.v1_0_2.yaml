    description: >-
      A group of endpoints that are managed as a unit.
    properties:
      AccessState:
        type: endpgrp:AccessState
        description: >-
          Access State for this group.
        required: false
      Description:
        type: resource:Description
        description: >-
          The description of this resource.  Used for commonality in the schema definitions.
        required: false
      Endpoints@odata_count:
        type: odata:count
        description: >-
          The number of items in a collection.
        required: false
      GroupType:
        type: GroupType
        description: >-
          Endpoint group type.
        required: false
      Id:
        type: resource:Id
        description: >-
          The unique identifier for this resource within the collection of similar
          resources.
        required: true
      Identifier:
        type: resource:Identifier
        description: >-
          The value identifies this resource.
        required: false
      Name:
        type: resource:Name
        description: >-
          The name of the resource or array member.
        required: true
      Oem:
        type: resource:Oem
        description: >-
          The OEM extension property.
        required: false
      Preferred:
        type: boolean
        description: >-
          Access to resource is preferred.
        required: false
      TargetEndpointGroupIdentifier:
        type: integer
        description: >-
          A defined identifier for this group.
        required: false
    requirements:
