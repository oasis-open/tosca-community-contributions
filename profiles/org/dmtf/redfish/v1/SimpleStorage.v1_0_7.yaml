    description: >-
      A storage device, such as a disk drive or optical media device.
    properties:
      Manufacturer:
        type: string
        description: >-
          The name of the manufacturer of this device.
        required: false
      Model:
        type: string
        description: >-
          The product model number of this device.
        required: false
      Name:
        type: string
        description: >-
          The name of the Resource or array member.
        required: true
      Oem:
        type: resource:Oem
        description: >-
          The OEM extension property.
        required: false
      Status:
        type: resource:Status
        description: >-
          The status and health of the Resource and its subordinate or dependent Resources.
        required: false
node_types:
  SimpleStorage:
    description: >-
      The SimpleStorage schema represents the properties of a storage controller and
      its directly-attached devices.
    properties:
      Description:
        type: resource:Description
        description: >-
          The description of this resource.  Used for commonality in the schema definitions.
        required: false
      Devices:
        type: list
        description: >-
          The storage devices.
        required: false
        entry_schema:
          type: Device
      Id:
        type: resource:Id
        description: >-
          The unique identifier for this resource within the collection of similar
          resources.
        required: true
      Name:
        type: resource:Name
        description: >-
          The name of the resource or array member.
        required: true
      Oem:
        type: resource:Oem
        description: >-
          The OEM extension property.
        required: false
      Status:
        type: resource:Status
        description: >-
          The status and health of the Resource and its subordinate or dependent Resources.
        required: false
      UefiDevicePath:
        type: string
