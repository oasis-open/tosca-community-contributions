tosca_definitions_version: tosca_2_0
description: >-
  Types generated from JSON Schema by any2tosca
imports:
- url: Endpoint.yaml
  namespace: endpoint
- url: odata-v4.yaml
  namespace: odatav4
- url: Resource.yaml
  namespace: resource
- url: Port.yaml
  namespace: port
- url: Core.yaml
  namespace: core
- url: Endpoint_caps.yaml
  namespace: endpcps
- url: Port_caps.yaml
  namespace: portcaps
- url: VirtualPCI2PCIBridge_caps.yaml
  namespace: vrtpc2cp
data_types:
  vPPBStatusTypes:
    derived_from: string
    validation:
      $valid_values:
      - $value
      - - Unbound
        - Busy
        - BoundPhysicalPort
        - BoundLD
        - BoundPID
relationship_types:
  VirtualPCI2PCIBridgeDependsOn:
    derived_from: core:DependsOn
    properties:
      Endpoints@odata_count:
        type: odatav4:count
        description: >-
          The number of items in a collection.
        required: false
      Oem:
        type: resource:Oem
        description: >-
          The OEM extension property.
        required: false
node_types:
  VirtualPCI2PCIBridge:
    description: >-
      The `VirtualPCI2PCIBridge` schema describes Virtual PCI-to-PCI Bridge (vPPB)
      inside a CXL switch that is owned by the host.
    properties:
      BindingStatus:
        type: vPPBStatusTypes
        description: >-
          The binding status of the vPPB.
        required: false
      BoundLDId:
        type: integer
        description: >-
          The identifier of the bound local logical device.
        required: false
      BoundPBRId:
        type: integer
        description: >-
          The identifier of the bound PBR.
        required: false
      BoundPortId:
        type: integer
        description: >-
          The physical port number of the bound port.
        required: false
      Description:
        type: resource:Description
        description: >-
          The description of this resource.  Used for commonality in the schema definitions.
        required: false
      GCXLID:
        type: string
        description: >-
          The GCXLID for the CXL logical device bound to this vPPB.
        required: false
        validation:
          $matches:
          - $value
          - ^([0-9A-Fa-f]{2}-){7}[0-9A-Fa-f]{2}:([0-9A-Fa-f]{4})$
      Id:
        type: resource:Id
        description: >-
          The unique identifier for this resource within the collection of similar
          resources.
        required: true
      Name:
        type: resource:Name
        description: >-
          The name of the resource or array member.
        required: true
      Oem:
        type: resource:Oem
        description: >-
          The OEM extension property.
        required: false
      Status:
        type: resource:Status
        description: >-
          The status and health of the resource and its subordinate or dependent resources.
        required: false
      VPPBId:
        type: string
        description: >-
          The Virtual PCI-PCI Bridge identifier.
        required: false
    requirements:
    - Endpoints:
        node: endpoint:Endpoint
        capability: endpcps:EndpointFeature
        relationship: VirtualPCI2PCIBridgeDependsOn
        count_range:
        - 0
        - UNBOUNDED
        description: >-
          The links to the endpoints associated with this vPPB.
    - Port:
        node: port:Port
        capability: portcaps:PortFeature
        relationship: VirtualPCI2PCIBridgeDependsOn
        count_range:
        - 0
        - 1
        description: >-
          The link to the port associated with this vPPB.
    capabilities:
      feature:
        type: vrtpc2cp:VirtualPCI2PCIBridgeFeature
      containable:
        type: vrtpc2cp:VirtualPCI2PCIBridgeContainable
