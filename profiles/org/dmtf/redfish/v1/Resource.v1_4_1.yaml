tosca_definitions_version: tosca_2_0
description: >-
  Types generated from JSON Schema by any2tosca
imports:
- url: Resource.yaml
  namespace: resource
- url: Core.yaml
  namespace: core
- url: Resource_caps.yaml
  namespace: rsrccps
data_types:
  ReferenceableMember:
    description: >-
      This is the base type for addressable members of an array.
    properties:
      Oem:
        type: resource:Oem
        description: >-
          This is the manufacturer/provider specific extension moniker used to divide
          the Oem object into sections.
        required: false
      MemberId:
        type: string
        description: >-
          This is the identifier for the member within the collection.
        required: false
  ResourceCollection:
    properties:
      Description:
        type: resource:Description
        description: >-
          The description of this resource.  Used for commonality in the schema definitions.
        required: false
      Name:
        type: resource:Name
        description: >-
          The name of the resource or array member.
        required: false
      Oem:
        type: resource:Oem
        description: >-
          This is the manufacturer/provider specific extension moniker used to divide
          the Oem object into sections.
        required: false
  DurableNameFormat:
    derived_from: string
    validation:
      $valid_values:
      - $value
      - - NAA
        - iQN
        - FC_WWN
        - UUID
        - EUI
  Identifier:
    description: >-
      This type describes any additional identifiers for a resource.
    properties:
      DurableName:
        type: string
        description: >-
          This indicates the world wide, persistent name of the resource.
        required: false
      DurableNameFormat:
        type: DurableNameFormat
        description: >-
          This represents the format of the DurableName property.
        required: false
  IndicatorLED:
    derived_from: string
    validation:
      $valid_values:
      - $value
      - - Lit
        - Blinking
        - 'Off'
  PowerState:
    derived_from: string
    validation:
      $valid_values:
      - $value
      - - 'On'
        - 'Off'
        - PoweringOn
        - PoweringOff
  Location:
    description: >-
      The location of a resource.
    properties:
      Info:
        type: string
        description: >-
          This indicates the location of the resource.
        required: false
      InfoFormat:
        type: string
        description: >-
          This represents the format of the Info property.
        required: false
      Oem:
        type: resource:Oem
        description: >-
          The OEM extension.
        required: false
      PostalAddress:
        type: PostalAddress
        description: >-
          Postal address of the addressed resource.
        required: false
      Placement:
        type: Placement
        description: >-
          A place within the addressed location.
        required: false
  Placement:
    description: >-
      The placement within the addressed location.
    properties:
      Row:
        type: string
        description: >-
          Name of row.
        required: false
      Rack:
        type: string
        description: >-
          Name of a rack location within a row.
        required: false
      RackOffsetUnits:
        type: RackUnits
        description: >-
          The type of Rack Units in use.
        required: false
      RackOffset:
        type: float
        description: >-
          Vertical location of the item in terms of RackOffsetUnits.
        required: false
  PostalAddress:
    description: >-
      The PostalAddress for a resource.
    properties:
      Country:
        type: string
        description: >-
          Country.
        required: false
      Territory:
        type: string
        description: >-
          A top-level subdivision within a country.
        required: false
      District:
        type: string
        description: >-
          A county, parish, gun (JP), or  district (IN).
        required: false
      City:
        type: string
        description: >-
          City, township, or shi (JP).
        required: false
      Division:
        type: string
        description: >-
          City division, borough, dity district, ward, chou (JP).
        required: false
      Neighborhood:
        type: string
        description: >-
          Neighborhood or block.
        required: false
      LeadingStreetDirection:
        type: string
        description: >-
          A leading street direction.
        required: false
      Street:
        type: string
        description: >-
          Street name.
        required: false
      TrailingStreetSuffix:
        type: string
        description: >-
          A trailing street suffix.
        required: false
      StreetSuffix:
        type: string
        description: >-
          Avenue, Platz, Street, Circle.
        required: false
      HouseNumber:
        type: float
        description: >-
          Numeric portion of house number.
        required: false
      HouseNumberSuffix:
        type: string
        description: >-
          House number suffix.
        required: false
      Landmark:
        type: string
        description: >-
          Landmark.
        required: false
      Location:
        type: string
        description: >-
          Room designation or other additional info.
        required: false
      Floor:
        type: string
        description: >-
          Floor.
        required: false
      Name:
        type: string
        description: >-
          Name.
        required: false
      PostalCode:
        type: string
        description: >-
          Postal code (or zip code).
        required: false
      Building:
        type: string
        description: >-
          Name of the building.
        required: false
      Unit:
        type: string
        description: >-
          Name or number of the unit (apartment, suite).
        required: false
      Room:
        type: string
        description: >-
          Name or number of the room.
        required: false
      Seat:
        type: string
        description: >-
          Seat (desk, cubicle, workstation).
        required: false
      PlaceType:
        type: string
        description: >-
          A description of the type of place that is addressed.
        required: false
      Community:
        type: string
        description: >-
          Postal community name.
        required: false
      POBox:
        type: string
        description: >-
          Post office box (P.O. box).
        required: false
      AdditionalCode:
        type: string
        description: >-
          Additional code.
        required: false
      Road:
        type: string
        description: >-
          A primary road or street.
        required: false
      RoadSection:
        type: string
        description: >-
          Road Section.
        required: false
      RoadBranch:
        type: string
        description: >-
          Road branch.
        required: false
      RoadSubBranch:
        type: string
        description: >-
          Road sub branch.
        required: false
      RoadPreModifier:
        type: string
        description: >-
          Road pre-modifier.
        required: false
      RoadPostModifier:
        type: string
        description: >-
          Road post-modifier.
        required: false
      GPSCoords:
        type: string
        description: >-
          The GPS coordinates of the part.
        required: false
  RackUnits:
    description: >-
      Defines a rack unit.
    derived_from: string
    validation:
      $valid_values:
      - $value
      - - OpenU
        - EIA_310
node_types:
  Resource:
    description: >-
      This is the base type for resources and referenceable members.
    properties:
      Oem:
        type: resource:Oem
        description: >-
          This is the manufacturer/provider specific extension moniker used to divide
          the Oem object into sections.
        required: false
      Id:
        type: resource:Id
        description: >-
          The unique identifier for this resource within the collection of similar
          resources.
        required: true
      Description:
        type: resource:Description
        description: >-
          The description of this resource.  Used for commonality in the schema definitions.
        required: false
      Name:
        type: resource:Name
        description: >-
          The name of the resource or array member.
        required: true
    capabilities:
      feature:
        type: rsrccps:ResourceFeature
      containable:
        type: rsrccps:ResourceContainable
