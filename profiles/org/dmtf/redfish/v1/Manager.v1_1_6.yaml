tosca_definitions_version: tosca_2_0
description: >-
  Types generated from JSON Schema by any2tosca
imports:
- url: Chassis.yaml
  namespace: chassis
- url: odata.v4_0_3.yaml
  namespace: odata
- url: ComputerSystem.yaml
  namespace: cmptsyst
- url: Resource.yaml
  namespace: resource
- url: Manager.yaml
  namespace: manager
- url: Core.yaml
  namespace: core
- url: Chassis_caps.yaml
  namespace: chssscps
- url: ComputerSystem_caps.yaml
  namespace: cmpsyscp
- url: EthernetInterfaceCollection.yaml
  namespace: ethintcl
- url: LogServiceCollection.yaml
  namespace: lgsrvcl
- url: ManagerNetworkProtocol.yaml
  namespace: mngntwpr
- url: Redundancy.yaml
  namespace: rdndncy
- url: SerialInterfaceCollection.yaml
  namespace: srlintcl
- url: VirtualMediaCollection.yaml
  namespace: vrtmdcl
- url: EthernetInterfaceCollection_caps.yaml
  namespace: etinclcp
- url: LogServiceCollection_caps.yaml
  namespace: lgsrclcp
- url: ManagerNetworkProtocol_caps.yaml
  namespace: mnntprcp
- url: Redundancy_caps.yaml
  namespace: rdndcps
- url: SerialInterfaceCollection_caps.yaml
  namespace: srinclcp
- url: VirtualMediaCollection_caps.yaml
  namespace: vrmdclcp
- url: Manager_caps.yaml
  namespace: mngrcps
data_types:
  CommandConnectTypesSupported:
    derived_from: string
    validation:
      $valid_values:
      - $value
      - - SSH
        - Telnet
        - IPMI
        - Oem
  CommandShell:
    description: >-
      Information about a Command Shell service provided by a manager.
    properties:
      ConnectTypesSupported:
        type: list
        description: >-
          This object is used to enumerate the Command Shell connection types allowed
          by the implementation.
        required: false
        entry_schema:
          type: CommandConnectTypesSupported
      MaxConcurrentSessions:
        type: integer
        description: >-
          Indicates the maximum number of service sessions, regardless of protocol,
          this manager is able to support.
        required: false
        validation:
          $greater_or_equal:
          - $value
          - 0
      ServiceEnabled:
        type: boolean
        description: >-
          Indicates if the service is enabled for this manager.
        required: false
  GraphicalConnectTypesSupported:
    derived_from: string
    validation:
      $valid_values:
      - $value
      - - KVMIP
        - Oem
  GraphicalConsole:
    description: >-
      Information about a Graphical Console service provided by a manager.
    properties:
      ConnectTypesSupported:
        type: list
        description: >-
          This object is used to enumerate the Graphical Console connection types
          allowed by the implementation.
        required: false
        entry_schema:
          type: GraphicalConnectTypesSupported
      MaxConcurrentSessions:
        type: integer
        description: >-
          Indicates the maximum number of service sessions, regardless of protocol,
          this manager is able to support.
        required: false
        validation:
          $greater_or_equal:
          - $value
          - 0
      ServiceEnabled:
        type: boolean
        description: >-
          Indicates if the service is enabled for this manager.
        required: false
  ManagerService:
    description: >-
      Used for describing services like Serial Console, Command Shell or Graphical
      Console.
    properties:
      MaxConcurrentSessions:
        type: integer
        description: >-
          Indicates the maximum number of service sessions, regardless of protocol,
          this manager is able to support.
        required: false
        validation:
          $greater_or_equal:
          - $value
          - 0
      ServiceEnabled:
        type: boolean
        description: >-
          Indicates if the service is enabled for this manager.
        required: false
  ManagerType:
    derived_from: string
    validation:
      $valid_values:
      - $value
      - - ManagementController
        - EnclosureManager
        - BMC
        - RackManager
        - AuxiliaryController
  SerialConnectTypesSupported:
    derived_from: string
    validation:
      $valid_values:
      - $value
      - - SSH
        - Telnet
        - IPMI
        - Oem
  SerialConsole:
    description: >-
      Information about a Serial Console service provided by a manager.
    properties:
      ConnectTypesSupported:
        type: list
        description: >-
          This object is used to enumerate the Serial Console connection types allowed
          by the implementation.
        required: false
        entry_schema:
          type: SerialConnectTypesSupported
      MaxConcurrentSessions:
        type: integer
        description: >-
          Indicates the maximum number of service sessions, regardless of protocol,
          this manager is able to support.
        required: false
        validation:
          $greater_or_equal:
          - $value
          - 0
      ServiceEnabled:
        type: boolean
        description: >-
          Indicates if the service is enabled for this manager.
        required: false
relationship_types:
  ManagerDependsOn:
    derived_from: core:DependsOn
    properties:
      ManagerForChassis@odata_count:
        type: odata:count
        description: >-
          The number of items in a collection.
        required: false
      ManagerForServers@odata_count:
        type: odata:count
        description: >-
          The number of items in a collection.
        required: false
      Oem:
        type: resource:Oem
        description: >-
          Oem extension object.
        required: false
interface_types:
  ManagerActions:
    operations:
      ForceFailover:
        description: >-
          The ForceFailover action forces a failover of this manager to the manager
          used in the parameter.
        inputs:
          NewManager:
            type: manager:Manager
            description: >-
              This parameter specifies the Manager in which to fail over.  In this
              case, a valid reference is supported.
            required: true
      ModifyRedundancySet:
        description: >-
          The ModifyRedundancySet operation is used to add or remove members to a
          redundant group of manager.
        inputs:
          Add:
            type: list
            description: >-
              This array defines the Managers to add to the redundancy set.  In this
              case, a valid reference is supported.
            required: false
          Remove:
            type: list
            description: >-
              This array defines the Managers to remove from the redundancy set.  In
              this case, a valid reference is supported.
            required: false
      Reset:
        description: >-
          The reset action resets/reboots the manager.
        inputs:
          ResetType:
            type: resource:ResetType
            description: >-
              This is the type of reset to be performed.
            required: false
node_types:
  Manager:
    description: >-
      This is the schema definition for a Manager.  Examples of managers are BMCs,
      Enclosure Managers, Management Controllers and other subsystems assigned managability
      functions.
    properties:
      CommandShell:
        type: CommandShell
        description: >-
          Information about the Command Shell service provided by this manager.
        required: false
      DateTime:
        type: string
        description: >-
          The current DateTime (with offset) for the manager, used to set or read
          time.
        required: false
      DateTimeLocalOffset:
        type: string
        description: >-
          The time offset from UTC that the DateTime property is set to in format:
          +06:00 .
        required: false
        validation:
          $matches:
          - $value
          - ([-+][0-1][0-9]:[0-5][0-9])
      Description:
        type: resource:Description
        description: >-
          The description of this resource.  Used for commonality in the schema definitions.
        required: false
      FirmwareVersion:
        type: string
        description: >-
          The firmware version of this Manager.
        required: false
      GraphicalConsole:
        type: GraphicalConsole
        description: >-
          The value of this property shall contain the information about the Graphical
          Console (KVM-IP) service of this manager.
        required: false
      Id:
        type: resource:Id
        description: >-
          The unique identifier for this resource within the collection of similar
          resources.
        required: true
      ManagerType:
        type: ManagerType
        description: >-
          This property represents the type of manager that this resource represents.
        required: false
      Model:
        type: string
        description: >-
          The model information of this Manager as defined by the manufacturer.
        required: false
      Name:
        type: resource:Name
        description: >-
          The name of the resource or array member.
        required: true
      Oem:
        type: resource:Oem
        description: >-
          This is the manufacturer/provider specific extension moniker used to divide
          the Oem object into sections.
        required: false
      Redundancy@odata_count:
        type: odata:count
        description: >-
          The number of items in a collection.
        required: false
      SerialConsole:
        type: SerialConsole
        description: >-
          Information about the Serial Console service provided by this manager.
        required: false
      ServiceEntryPointUUID:
        type: resource:UUID
        description: >-
          The UUID of the Redfish Service provided by this manager.
        required: false
      Status:
        type: resource:Status
        description: >-
          This property describes the status and health of the resource and its children.
        required: false
      UUID:
        type: resource:UUID
        description: >-
          The Universal Unique Identifier (UUID) for this Manager.
        required: false
    requirements:
    - EthernetInterfaces:
        node: ethintcl:EthernetInterfaceCollection
        capability: etinclcp:EthernetInterfaceCollectionContainable
        relationship: core:Contains
        count_range:
        - 0
        - 1
        description: >-
          This is a reference to a collection of NICs that this manager uses for network
          communication.  It is here that clients will find NIC configuration options
          and settings.
    - LogServices:
        node: lgsrvcl:LogServiceCollection
        capability: lgsrclcp:LogServiceCollectionContainable
        relationship: core:Contains
        count_range:
        - 0
        - 1
        description: >-
          This is a reference to a collection of Logs used by the manager.
    - NetworkProtocol:
        node: mngntwpr:ManagerNetworkProtocol
        capability: mnntprcp:ManagerNetworkProtocolContainable
        relationship: core:Contains
        count_range:
        - 0
        - 1
        description: >-
          This is a reference to the network services and their settings that the
          manager controls.  It is here that clients will find network configuration
          options as well as network services.
    - Redundancy:
        node: rdndncy:Redundancy
        capability: rdndcps:RedundancyContainable
        relationship: core:Contains
        count_range:
        - 0
        - UNBOUNDED
        description: >-
          Redundancy information for the managers of this system.
    - SerialInterfaces:
        node: srlintcl:SerialInterfaceCollection
        capability: srinclcp:SerialInterfaceCollectionContainable
        relationship: core:Contains
        count_range:
        - 0
        - 1
        description: >-
          This is a reference to a collection of serial interfaces that this manager
          uses for serial and console communication.  It is here that clients will
          find serial configuration options and settings.
    - VirtualMedia:
        node: vrtmdcl:VirtualMediaCollection
        capability: vrmdclcp:VirtualMediaCollectionContainable
        relationship: core:Contains
        count_range:
        - 0
        - 1
        description: >-
          This is a reference to the Virtual Media services for this particular manager.
    - ManagerForChassis:
        node: chassis:Chassis
        capability: chssscps:ChassisFeature
        relationship: ManagerDependsOn
        count_range:
        - 0
        - UNBOUNDED
        description: >-
          This property is an array of references to the chassis that this manager
          has control over.
    - ManagerForServers:
        node: cmptsyst:ComputerSystem
        capability: cmpsyscp:ComputerSystemFeature
        relationship: ManagerDependsOn
        count_range:
        - 0
        - UNBOUNDED
        description: >-
          This property is an array of references to the systems that this manager
          has control over.
    - ManagerInChassis:
        node: chassis:Chassis
        capability: chssscps:ChassisFeature
        relationship: ManagerDependsOn
        count_range:
        - 0
        - 1
        description: >-
          This property is a reference to the chassis that this manager is located
          in.
    interfaces:
      Actions:
        type: ManagerActions
    capabilities:
      feature:
        type: mngrcps:ManagerFeature
      containable:
        type: mngrcps:ManagerContainable
