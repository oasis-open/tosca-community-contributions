tosca_definitions_version: tosca_2_0
description: >-
  Types generated from JSON Schema by any2tosca
imports:
- url: Resource.yaml
  namespace: resource
- url: odata-v4.yaml
  namespace: odatav4
- url: Core.yaml
  namespace: core
- url: Redundancy_caps.yaml
  namespace: rdndcps
data_types:
  RedundancyMode:
    derived_from: string
    validation:
      $valid_values:
      - $value
      - - Failover
        - N+m
        - Sharing
        - Sparing
node_types:
  Redundancy:
    description: >-
      The common redundancy definition and structure used in other Redfish schemas.
    properties:
      MaxNumSupported:
        type: integer
        description: >-
          The maximum number of members allowable for this particular redundancy group.
        required: false
      MemberId:
        type: string
        description: >-
          The unique identifier for the member within an array.
        required: true
      MinNumNeeded:
        type: integer
        description: >-
          The minimum number of members needed for this group to be redundant.
        required: true
      Mode:
        type: RedundancyMode
        description: >-
          The redundancy mode of the group.
        required: true
      Name:
        type: string
        description: >-
          The name of the resource or array member.
        required: true
      Oem:
        type: resource:Oem
        description: >-
          The OEM extension property.
        required: false
      RedundancyEnabled:
        type: boolean
        description: >-
          An indication of whether redundancy is enabled.
        required: false
      RedundancySet:
        type: list
        description: >-
          The links to components of this redundancy set.
        required: true
        entry_schema:
          type: odatav4:idRef
      RedundancySet@odata_count:
        type: odatav4:count
        description: >-
          The number of items in a collection.
        required: false
      Status:
        type: resource:Status
        description: >-
          The status and health of the resource and its subordinate or dependent resources.
        required: true
    capabilities:
      feature:
        type: rdndcps:RedundancyFeature
      containable:
        type: rdndcps:RedundancyContainable
