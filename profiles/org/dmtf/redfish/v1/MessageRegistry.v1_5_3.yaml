tosca_definitions_version: tosca_2_0
description: >-
  Types generated from JSON Schema by any2tosca
imports:
- url: Resource.yaml
  namespace: resource
- url: Core.yaml
  namespace: core
- url: MessageRegistry_caps.yaml
  namespace: mssrgscp
data_types:
  ClearingLogic:
    description: >-
      The clearing logic associated with a message.  The properties within indicate
      the events, specified by message keys for other messages in this registry, that
      are cleared by a message with optional conditions.
    properties:
      ClearsAll:
        type: boolean
        description: >-
          Indicates whether all logged events containing messages from this message
          registry are cleared when this message is received.  If conditional properties
          are present, such as the `ClearsIf` property, the specified conditions shall
          be required to clear the logged events.
        required: false
      ClearsIf:
        type: ClearingType
        description: >-
          The condition required to clear the logged events specified by other properties
          in this object when this message is received.
        required: false
      ClearsMessage:
        type: list
        description: >-
          An array of message keys for logged events that are cleared when this message
          is received.  If conditional properties are present, such as the `ClearsIf`
          property, the specified conditions are required to clear the logged events
          with these message keys.
        required: false
        entry_schema:
          type: string
  ClearingType:
    derived_from: string
    validation:
      $valid_values:
      - $value
      - - SameOriginOfCondition
  Message:
    description: >-
      This type represents how a message is defined within the message registry.
    properties:
      ArgDescriptions:
        type: list
        description: >-
          The `MessageArgs` descriptions, in order, used for this message.
        required: false
        entry_schema:
          type: string
      ArgLongDescriptions:
        type: list
        description: >-
          The `MessageArgs` normative descriptions, in order, used for this message.
        required: false
        entry_schema:
          type: string
      ClearingLogic:
        type: ClearingLogic
        description: >-
          The clearing logic associated with this message.  The properties within
          indicate the events, specified by message keys for other messages in this
          registry, that are cleared by this message with optional conditions.
        required: false
      Deprecated:
        type: string
        description: >-
          The reason the message has been deprecated.
        required: false
      Description:
        type: string
        description: >-
          A short description of how and when to use this message.
        required: true
      LongDescription:
        type: string
        description: >-
          The normative language that describes this message's usage.
        required: false
      Message:
        type: string
        description: >-
          The actual message.
        required: true
      MessageSeverity:
        type: resource:Health
        description: >-
          The severity of the message.
        required: true
      NumberOfArgs:
        type: integer
        description: >-
          The number of arguments in the message.
        required: true
        validation:
          $greater_or_equal:
          - $value
          - 0
      Oem:
        type: resource:Oem
        description: >-
          The OEM extension property.
        required: false
      ParamTypes:
        type: list
        description: >-
          The data types of the message arguments, prior to conversion to strings
          for inclusion in a message.
        required: false
        entry_schema:
          type: ParamType
      Resolution:
        type: string
        description: >-
          Used to provide suggestions on how to resolve the situation that caused
          the error.
        required: true
      Severity:
        type: string
        description: >-
          The severity of the message.
        required: true
      VersionAdded:
        type: string
        description: >-
          The registry version which added this message.
        required: false
        validation:
          $matches:
          - $value
          - ^\d+\.\d+\.\d+$
      VersionDeprecated:
        type: string
        description: >-
          The registry version when the message was deprecated.
        required: false
        validation:
          $matches:
          - $value
          - ^\d+\.\d+\.\d+$
  MessageProperty:
    description: >-
      The message keys contained in the message registry.
  ParamType:
    derived_from: string
    validation:
      $valid_values:
      - $value
      - - string
        - number
node_types:
  MessageRegistry:
    description: >-
      The `MessageRegistry` schema describes all message registries.  It represents
      the properties for the message registries themselves.
    properties:
      Description:
        type: resource:Description
        description: >-
          The description of this resource.  Used for commonality in the schema definitions.
        required: false
      Id:
        type: resource:Id
        description: >-
          The unique identifier for this resource within the collection of similar
          resources.
        required: true
      Language:
        type: string
        description: >-
          The RFC5646-conformant language code for the message registry.
        required: true
      Messages:
        type: MessageProperty
        description: >-
          The message keys contained in the message registry.
        required: true
      Name:
        type: resource:Name
        description: >-
          The name of the resource or array member.
        required: true
      Oem:
        type: resource:Oem
        description: >-
          The OEM extension property.
        required: false
      OwningEntity:
        type: string
        description: >-
          The organization or company that publishes this message registry.
        required: true
      RegistryPrefix:
        type: string
        description: >-
          The single-word prefix that is used in forming and decoding `MessageId`
          values.
        required: true
      RegistryVersion:
        type: string
        description: >-
          The message registry version in the middle portion of a `MessageId`.
        required: true
        validation:
          $matches:
          - $value
          - ^\d+\.\d+\.\d+$
    capabilities:
      feature:
        type: mssrgscp:MessageRegistryFeature
      containable:
        type: mssrgscp:MessageRegistryContainable
