tosca_definitions_version: tosca_2_0
description: >-
  Types generated from JSON Schema by any2tosca
imports:
- url: Sensor.yaml
  namespace: sensor
- url: Resource.yaml
  namespace: resource
- url: odata-v4.yaml
  namespace: odatav4
- url: Core.yaml
  namespace: core
- url: ThermalMetrics_caps.yaml
  namespace: thrmtrcp
data_types:
  TemperatureSummary:
    description: >-
      The temperature readings for a subsystem.
    properties:
      Ambient:
        type: sensor:SensorExcerpt
        description: >-
          The ambient temperature (Celsius) of this subsystem.
        required: false
      Exhaust:
        type: sensor:SensorExcerpt
        description: >-
          The exhaust temperature (Celsius) of this subsystem.
        required: false
      Intake:
        type: sensor:SensorExcerpt
        description: >-
          The intake temperature (Celsius) of this subsystem.
        required: false
      Internal:
        type: sensor:SensorExcerpt
        description: >-
          The internal temperature (Celsius) of this subsystem.
        required: false
interface_types:
  ThermalMetricsActions:
    operations:
      ResetMetrics:
        description: >-
          This action resets the summary metrics related to this equipment.
node_types:
  ThermalMetrics:
    description: >-
      The ThermalMetrics schema represents the thermal metrics of a chassis.
    properties:
      Description:
        type: resource:Description
        description: >-
          The description of this resource.  Used for commonality in the schema definitions.
        required: false
      Id:
        type: resource:Id
        description: >-
          The unique identifier for this resource within the collection of similar
          resources.
        required: true
      Name:
        type: resource:Name
        description: >-
          The name of the resource or array member.
        required: true
      Oem:
        type: resource:Oem
        description: >-
          The OEM extension property.
        required: false
      TemperatureReadingsCelsius:
        type: list
        description: >-
          The temperatures (Celsius) from all related sensors for this device.
        required: false
        entry_schema:
          type: sensor:SensorArrayExcerpt
      TemperatureReadingsCelsius@odata_count:
        type: odatav4:count
        description: >-
          The number of items in a collection.
        required: false
      TemperatureSummaryCelsius:
        type: TemperatureSummary
        description: >-
          The summary temperature readings for this chassis.
        required: false
    interfaces:
      Actions:
        type: ThermalMetricsActions
    capabilities:
      feature:
        type: thrmtrcp:ThermalMetricsFeature
      containable:
        type: thrmtrcp:ThermalMetricsContainable
