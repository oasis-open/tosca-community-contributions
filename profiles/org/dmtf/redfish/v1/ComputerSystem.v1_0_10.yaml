tosca_definitions_version: tosca_2_0
description: >-
  Types generated from JSON Schema by any2tosca
imports:
- url: ComputerSystem.yaml
  namespace: cmptsyst
- url: Resource.yaml
  namespace: resource
- url: Chassis.yaml
  namespace: chassis
- url: odata-v4.yaml
  namespace: odatav4
- url: Core.yaml
  namespace: core
- url: Chassis_caps.yaml
  namespace: chssscps
- url: Manager_caps.yaml
  namespace: mngrcps
- url: EthernetInterfaceCollection.yaml
  namespace: ethintcl
- url: LogServiceCollection.yaml
  namespace: lgsrvcl
- url: ProcessorCollection.yaml
  namespace: prcscllc
- url: SimpleStorageCollection.yaml
  namespace: smpstrcl
- url: EthernetInterfaceCollection_caps.yaml
  namespace: etinclcp
- url: LogServiceCollection_caps.yaml
  namespace: lgsrclcp
- url: ProcessorCollection_caps.yaml
  namespace: prccllcp
- url: SimpleStorageCollection_caps.yaml
  namespace: smstclcp
- url: ComputerSystem_caps.yaml
  namespace: cmpsyscp
data_types:
  Boot:
    description: >-
      This object contains the boot information for the current resource.
    properties:
      BootSourceOverrideEnabled:
        type: BootSourceOverrideEnabled
        description: >-
          Describes the state of the Boot Source Override feature.
        required: false
      BootSourceOverrideTarget:
        type: cmptsyst:BootSource
        description: >-
          The current boot source to be used at next boot instead of the normal boot
          device, if BootSourceOverrideEnabled is true.
        required: false
      UefiTargetBootSourceOverride:
        type: string
        description: >-
          This property is the UEFI Device Path of the device to boot from when BootSourceOverrideTarget
          is UefiTarget.
        required: false
  BootSourceOverrideEnabled:
    derived_from: string
    validation:
      $valid_values:
      - $value
      - - Disabled
        - Once
        - Continuous
  IndicatorLED:
    derived_from: string
    validation:
      $valid_values:
      - $value
      - - Unknown
        - Lit
        - Blinking
        - 'Off'
  MemorySummary:
    description: >-
      This object describes the memory of the system in general detail.
    properties:
      Status:
        type: resource:Status
        description: >-
          This property describes the status and health of the resource and its children.
        required: false
      TotalSystemMemoryGiB:
        type: float
        description: >-
          The total configured operating system-accessible memory (RAM), measured
          in GiB.
        required: false
        validation:
          $greater_or_equal:
          - $value
          - 0
  PowerState:
    derived_from: string
    validation:
      $valid_values:
      - $value
      - - 'On'
        - 'Off'
        - PoweringOn
        - PoweringOff
  ProcessorSummary:
    description: >-
      This object describes the central processors of the system in general detail.
    properties:
      Count:
        type: integer
        description: >-
          The number of physical processors in the system.
        required: false
        validation:
          $greater_or_equal:
          - $value
          - 0
      Model:
        type: string
        description: >-
          The processor model for the primary or majority of processors in this system.
        required: false
      Status:
        type: resource:Status
        description: >-
          This property describes the status and health of the resource and its children.
        required: false
  SystemType:
    derived_from: string
    validation:
      $valid_values:
      - $value
      - - Physical
        - Virtual
        - OS
        - PhysicallyPartitioned
        - VirtuallyPartitioned
relationship_types:
  ComputerSystemDependsOn:
    derived_from: core:DependsOn
    properties:
      Chassis@odata_count:
        type: odatav4:count
        description: >-
          The number of items in a collection.
        required: false
      CooledBy:
        type: list
        description: >-
          An array of ID[s] of resources that cool this computer system. Normally
          the ID will be a chassis or a specific set of fans.
        required: false
        entry_schema:
          type: odatav4:idRef
      CooledBy@odata_count:
        type: odatav4:count
        description: >-
          The number of items in a collection.
        required: false
      ManagedBy@odata_count:
        type: odatav4:count
        description: >-
          The number of items in a collection.
        required: false
      Oem:
        type: resource:Oem
        description: >-
          Oem extension object.
        required: false
      PoweredBy:
        type: list
        description: >-
          An array of ID[s] of resources that power this computer system. Normally
          the ID will be a chassis or a specific set of Power Supplies.
        required: false
        entry_schema:
          type: odatav4:idRef
      PoweredBy@odata_count:
        type: odatav4:count
        description: >-
          The number of items in a collection.
        required: false
interface_types:
  ComputerSystemActions:
    operations:
      Reset:
        description: >-
          This action is used to reset the system.
        inputs:
          ResetType:
            type: resource:ResetType
            description: >-
              The type of reset to be performed.
            required: false
node_types:
  ComputerSystem:
    description: >-
      This schema defines a computer system and its respective properties.  A computer
      system represents a machine (physical or virtual) and the local resources such
      as memory, cpu and other devices that can be accessed from that machine.
    properties:
      AssetTag:
        type: string
        description: >-
          The user definable tag that can be used to track this computer system for
          inventory or other client purposes.
        required: false
      BiosVersion:
        type: string
        description: >-
          The version of the system BIOS or primary system firmware.
        required: false
      Boot:
        type: Boot
        description: >-
          Information about the boot settings for this system.
        required: false
      Description:
        type: resource:Description
        description: >-
          The description of this resource.  Used for commonality in the schema definitions.
        required: false
      HostName:
        type: string
        description: >-
          The DNS Host Name, without any domain information.
        required: false
      Id:
        type: resource:Id
        description: >-
          The unique identifier for this resource within the collection of similar
          resources.
        required: true
      IndicatorLED:
        type: IndicatorLED
        description: >-
          The state of the indicator LED, used to identify the system.
        required: false
      Manufacturer:
        type: string
        description: >-
          The manufacturer or OEM of this system.
        required: false
      MemorySummary:
        type: MemorySummary
        description: >-
          This object describes the central memory of the system in general detail.
        required: false
      Model:
        type: string
        description: >-
          The product name for this system, without the manufacturer name.
        required: false
      Name:
        type: resource:Name
        description: >-
          The name of the resource or array member.
        required: true
      Oem:
        type: resource:Oem
        description: >-
          This is the manufacturer/provider specific extension moniker used to divide
          the Oem object into sections.
        required: false
      PartNumber:
        type: string
        description: >-
          The part number for this system.
        required: false
      PowerState:
        type: PowerState
        description: >-
          This is the current power state of the system.
        required: false
      ProcessorSummary:
        type: ProcessorSummary
        description: >-
          This object describes the central processors of the system in general detail.
        required: false
      SKU:
        type: string
        description: >-
          The manufacturer SKU for this system.
        required: false
      SerialNumber:
        type: string
        description: >-
          The serial number for this system.
        required: false
      Status:
        type: resource:Status
        description: >-
          This property describes the status and health of the resource and its children.
        required: false
      SystemType:
        type: SystemType
        description: >-
          The type of computer system represented by this resource.
        required: false
      UUID:
        type: resource:UUID
        description: >-
          The universal unique identifier (UUID) for this system.
        required: false
    requirements:
    - EthernetInterfaces:
        node: ethintcl:EthernetInterfaceCollection
        capability: etinclcp:EthernetInterfaceCollectionContainable
        relationship: core:Contains
        count_range:
        - 0
        - 1
        description: >-
          A reference to the collection of Ethernet interfaces associated with this
          system.
    - LogServices:
        node: lgsrvcl:LogServiceCollection
        capability: lgsrclcp:LogServiceCollectionContainable
        relationship: core:Contains
        count_range:
        - 0
        - 1
        description: >-
          A reference to the collection of Log Services associated with this system.
    - Processors:
        node: prcscllc:ProcessorCollection
        capability: prccllcp:ProcessorCollectionContainable
        relationship: core:Contains
        count_range:
        - 0
        - 1
        description: >-
          A reference to the collection of Processors associated with this system.
    - SimpleStorage:
        node: smpstrcl:SimpleStorageCollection
        capability: smstclcp:SimpleStorageCollectionContainable
        relationship: core:Contains
        count_range:
        - 0
        - 1
        description: >-
          A reference to the collection of storage devices associated with this system.
    - Chassis:
        node: chassis:Chassis
        capability: chssscps:ChassisFeature
        relationship: ComputerSystemDependsOn
        count_range:
        - 0
        - UNBOUNDED
        description: >-
          An array of references to the chassis in which this system is contained.
    - ManagedBy:
        node: Manager
        capability: mngrcps:ManagerFeature
        relationship: ComputerSystemDependsOn
        count_range:
        - 0
        - UNBOUNDED
        description: >-
          An array of references to the Managers responsible for this system.
    interfaces:
      Actions:
        type: ComputerSystemActions
    capabilities:
      feature:
        type: cmpsyscp:ComputerSystemFeature
      containable:
        type: cmpsyscp:ComputerSystemContainable
