tosca_definitions_version: tosca_2_0
description: >-
  Types generated from JSON Schema by any2tosca
imports:
- url: Resource.yaml
  namespace: resource
- url: Core.yaml
  namespace: core
- url: Session_caps.yaml
  namespace: sssncps
node_types:
  Session:
    description: >-
      The Session Resource describes a single connection (session) between a client
      and a Redfish Service instance.
    properties:
      Description:
        type: resource:Description
        description: >-
          The description of this resource.  Used for commonality in the schema definitions.
        required: false
      Id:
        type: resource:Id
        description: >-
          The unique identifier for this resource within the collection of similar
          resources.
        required: true
      Name:
        type: resource:Name
        description: >-
          The name of the resource or array member.
        required: true
      Oem:
        type: resource:Oem
        description: >-
          The OEM extension property.
        required: false
      Password:
        type: string
        description: >-
          The password for this session.  The value is `null` in responses.
        required: false
      UserName:
        type: string
        description: >-
          The UserName for the account for this session.
        required: false
    capabilities:
      feature:
        type: sssncps:SessionFeature
      containable:
        type: sssncps:SessionContainable
