tosca_definitions_version: tosca_2_0
description: >-
  Types generated from JSON Schema by any2tosca
imports:
- url: PCIeFunction.yaml
  namespace: pcfnctn
- url: Core.yaml
  namespace: core
- url: PCIeFunction_caps.yaml
  namespace: pcfnccp
- url: Resource.yaml
  namespace: resource
- url: odata.4.0.0.yaml
  namespace: odata400
- url: NetworkPort_caps.yaml
  namespace: ntwprtcp
- url: NetworkDeviceFunction_caps.yaml
  namespace: ntdvfncp
data_types:
  AuthenticationMethod:
    derived_from: string
    validation:
      $valid_values:
      - $value
      - - None
        - CHAP
        - MutualCHAP
  BootMode:
    derived_from: string
    validation:
      $valid_values:
      - $value
      - - Disabled
        - PXE
        - iSCSI
        - FibreChannel
        - FibreChannelOverEthernet
  BootTargets:
    properties:
      WWPN:
        type: string
        description: >-
          The World-Wide Port Name to boot from.
        required: false
      LUNID:
        type: string
        description: >-
          The Logical Unit Number (LUN) ID to boot from on the device referred to
          by the corresponding WWPN.
        required: false
      BootPriority:
        type: float
        description: >-
          The relative priority for this entry in the boot targets array.
        required: false
  Ethernet:
    properties:
      PermanentMACAddress:
        type: string
        description: >-
          This is the permanent MAC address assigned to this network device function
          (physical function).
        required: false
      MACAddress:
        type: string
        description: >-
          This is the currently configured MAC address of the (logical port) network
          device function.
        required: false
      MTUSize:
        type: float
        description: >-
          The Maximum Transmission Unit (MTU) configured for this network device function.
        required: false
  FibreChannel:
    properties:
      PermanentWWPN:
        type: string
        description: >-
          This is the permanent WWPN address assigned to this network device function
          (physical function).
        required: false
      PermanentWWNN:
        type: string
        description: >-
          This is the permanent WWNN address assigned to this network device function
          (physical function).
        required: false
      WWPN:
        type: string
        description: >-
          This is the currently configured WWPN address of the network device function
          (physical function).
        required: false
      WWNN:
        type: string
        description: >-
          This is the currently configured WWNN address of the network device function
          (physical function).
        required: false
      WWNSource:
        type: WWNSource
        description: >-
          The configuration source of the WWNs for this connection (WWPN and WWNN).
        required: false
      FCoELocalVLANId:
        type: float
        description: >-
          The locally configured FCoE VLAN ID.
        required: false
      AllowFIPVLANDiscovery:
        type: boolean
        description: >-
          Whether the FCoE Initialization Protocol (FIP) is used for populating the
          FCoE VLAN Id.
        required: false
      FCoEActiveVLANId:
        type: float
        description: >-
          The active FCoE VLAN ID.
        required: false
      BootTargets:
        type: list
        description: >-
          An array of Fibre Channel boot targets configured for this network device
          function.
        required: false
        entry_schema:
          type: BootTargets
  IPAddressType:
    derived_from: string
    validation:
      $valid_values:
      - $value
      - - IPv4
        - IPv6
  NetworkDeviceTechology:
    derived_from: string
    validation:
      $valid_values:
      - $value
      - - Disabled
        - Ethernet
        - FibreChannel
        - iSCSI
        - FibreChannelOverEthernet
  WWNSource:
    derived_from: string
    validation:
      $valid_values:
      - $value
      - - ConfiguredLocally
        - ProvidedByFabric
  iSCSIBoot:
    properties:
      IPAddressType:
        type: IPAddressType
        description: >-
          The type of IP address (IPv6 or IPv4) being populated in the iSCSIBoot IP
          address fields.
        required: false
      InitiatorIPAddress:
        type: string
        description: >-
          The IPv6 or IPv4 address of the iSCSI initiator.
        required: false
      InitiatorName:
        type: string
        description: >-
          The iSCSI initiator name.
        required: false
      InitiatorDefaultGateway:
        type: string
        description: >-
          The IPv6 or IPv4 iSCSI boot default gateway.
        required: false
      InitiatorNetmask:
        type: string
        description: >-
          The IPv6 or IPv4 netmask of the iSCSI boot initiator.
        required: false
      TargetInfoViaDHCP:
        type: boolean
        description: >-
          Whether the iSCSI boot target name, LUN, IP address, and netmask should
          be obtained from DHCP.
        required: false
      PrimaryTargetName:
        type: string
        description: >-
          The name of the iSCSI primary boot target.
        required: false
      PrimaryTargetIPAddress:
        type: string
        description: >-
          The IP address (IPv6 or IPv4) for the primary iSCSI boot target.
        required: false
      PrimaryTargetTCPPort:
        type: float
        description: >-
          The TCP port for the primary iSCSI boot target.
        required: false
      PrimaryLUN:
        type: float
        description: >-
          The logical unit number (LUN) for the primary iSCSI boot target.
        required: false
      PrimaryVLANEnable:
        type: boolean
        description: >-
          This indicates if the primary VLAN is enabled.
        required: false
      PrimaryVLANId:
        type: float
        description: >-
          The 802.1q VLAN ID to use for iSCSI boot from the primary target.
        required: false
      PrimaryDNS:
        type: string
        description: >-
          The IPv6 or IPv4 address of the primary DNS server for the iSCSI boot initiator.
        required: false
      SecondaryTargetName:
        type: string
        description: >-
          The name of the iSCSI secondary boot target.
        required: false
      SecondaryTargetIPAddress:
        type: string
        description: >-
          The IP address (IPv6 or IPv4) for the secondary iSCSI boot target.
        required: false
      SecondaryTargetTCPPort:
        type: float
        description: >-
          The TCP port for the secondary iSCSI boot target.
        required: false
      SecondaryLUN:
        type: float
        description: >-
          The logical unit number (LUN) for the secondary iSCSI boot target.
        required: false
      SecondaryVLANEnable:
        type: boolean
        description: >-
          This indicates if the secondary VLAN is enabled.
        required: false
      SecondaryVLANId:
        type: float
        description: >-
          The 802.1q VLAN ID to use for iSCSI boot from the secondary target.
        required: false
      SecondaryDNS:
        type: string
        description: >-
          The IPv6 or IPv4 address of the secondary DNS server for the iSCSI boot
          initiator.
        required: false
      IPMaskDNSViaDHCP:
        type: boolean
        description: >-
          Whether the iSCSI boot initiator uses DHCP to obtain the iniator name, IP
          address, and netmask.
        required: false
      RouterAdvertisementEnabled:
        type: boolean
        description: >-
          Whether IPv6 router advertisement is enabled for the iSCSI boot target.
        required: false
      AuthenticationMethod:
        type: AuthenticationMethod
        description: >-
          The iSCSI boot authentication method for this network device function.
        required: false
      CHAPUsername:
        type: string
        description: >-
          The username for CHAP authentication.
        required: false
      CHAPSecret:
        type: string
        description: >-
          The shared secret for CHAP authentication.
        required: false
      MutualCHAPUsername:
        type: string
        description: >-
          The CHAP Username for 2-way CHAP authentication.
        required: false
      MutualCHAPSecret:
        type: string
        description: >-
          The CHAP Secret for 2-way CHAP authentication.
        required: false
node_types:
  NetworkDeviceFunction:
    description: >-
      A Network Device Function represents a logical interface exposed by the network
      adapter.
    properties:
      Oem:
        type: resource:Oem
        description: >-
          This is the manufacturer/provider specific extension moniker used to divide
          the Oem object into sections.
        required: false
      Id:
        type: resource:Id
        description: >-
          The unique identifier for this resource within the collection of similar
          resources.
        required: true
      Description:
        type: resource:Description
        description: >-
          The description of this resource.  Used for commonality in the schema definitions.
        required: false
      Name:
        type: resource:Name
        description: >-
          The name of the resource or array member.
        required: true
      Status:
        type: resource:Status
        description: >-
          The status and health of a resource and its children.
        required: false
      NetDevFuncType:
        type: NetworkDeviceTechology
        description: >-
          The configured capability of this network device function.
        required: false
      DeviceEnabled:
        type: boolean
        description: >-
          Whether the network device function is enabled.
        required: false
      NetDevFuncCapabilities:
        type: list
        description: >-
          Capabilities of this network device function.
        required: false
        entry_schema:
          type: NetworkDeviceTechology
      Ethernet:
        type: Ethernet
        description: >-
          Ethernet.
        required: false
      iSCSIBoot:
        type: iSCSIBoot
        description: >-
          iSCSI Boot.
        required: false
      FibreChannel:
        type: FibreChannel
        description: >-
          Fibre Channel.
        required: false
      BootMode:
        type: BootMode
        description: >-
          The boot mode configured for this network device function.
        required: false
      VirtualFunctionsEnabled:
        type: boolean
        description: >-
          Whether Single Root I/O Virtualization (SR-IOV) Virual Functions (VFs) are
          enabled for this Network Device Function.
        required: false
      MaxVirtualFunctions:
        type: float
        description: >-
          The number of virtual functions (VFs) that are available for this Network
          Device Function.
        required: false
      AssignablePhysicalPorts@odata_count:
        type: odata400:count
        description: >-
          The number of items in a collection.
        required: false
      AssignablePhysicalPorts@odata_navigationLink:
        type: string
        required: false
    requirements:
    - AssignablePhysicalPorts:
        node: NetworkPort
        capability: ntwprtcp:NetworkPortContainable
        relationship: core:Contains
        count_range:
        - 0
        - UNBOUNDED
        description: >-
          Contains the members of this collection.
    - PhysicalPortAssignment:
        # node: ntwrkprt:NetworkPort
        capability: core:Containable
        relationship: core:Contains
        count_range:
        - 0
        - 1
        description: >-
          Contains the members of this collection.
    - PCIeFunction:
        # node: pcfnctn:PCIeFunction
        capability: pcfnccp:PCIeFunctionFeature
        relationship: core:DependsOn
        count_range:
        - 0
        - 1
        description: >-
          Contains the members of this collection.
    capabilities:
      feature:
        type: ntdvfncp:NetworkDeviceFunctionFeature
      containable:
        type: ntdvfncp:NetworkDeviceFunctionContainable
