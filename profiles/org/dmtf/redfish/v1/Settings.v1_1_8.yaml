tosca_definitions_version: tosca_2_0
description: >-
  Types generated from JSON Schema by any2tosca
imports:
- url: Message.yaml
  namespace: message
- url: odata-v4.yaml
  namespace: odatav4
- url: Core.yaml
  namespace: core
- url: Message_caps.yaml
  namespace: mssgcps
- url: Settings_caps.yaml
  namespace: sttncps
data_types:
  ApplyTime:
    derived_from: string
    validation:
      $valid_values:
      - $value
      - - Immediate
        - OnReset
        - AtMaintenanceWindowStart
        - InMaintenanceWindowOnReset
  PreferredApplyTime:
    description: >-
      The preferred time to apply configuration settings.
    properties:
      ApplyTime:
        type: ApplyTime
        description: >-
          The time when to apply the settings.
        required: false
      MaintenanceWindowDurationInSeconds:
        type: integer
        description: >-
          The expiry time of maintenance window in seconds.
        required: false
        validation:
          $greater_or_equal:
          - $value
          - 0
      MaintenanceWindowStartTime:
        type: string
        description: >-
          The start time of a maintenance window.
        required: false
node_types:
  Settings:
    description: >-
      The resource settings.
    properties:
      ETag:
        type: string
        description: >-
          The entity tag (ETag) of the resource to which the settings were applied,
          after the application.
        required: false
      SettingsObject:
        type: odatav4:idRef
        description: >-
          The link to the resource that the client can `PUT` or `PATCH` to modify
          the resource.
        required: false
      SupportedApplyTimes:
        type: list
        description: >-
          The time when the settings can be applied.
        required: false
        entry_schema:
          type: ApplyTime
      Time:
        type: string
        description: >-
          The time when the settings were applied.
        required: false
    requirements:
    - Messages:
        node: message:Message
        capability: mssgcps:MessageContainable
        relationship: core:Contains
        count_range:
        - 0
        - UNBOUNDED
        description: >-
          An array of messages associated with the settings.
    capabilities:
      feature:
        type: sttncps:SettingsFeature
      containable:
        type: sttncps:SettingsContainable
