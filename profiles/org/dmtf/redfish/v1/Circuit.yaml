tosca_definitions_version: tosca_2_0
description: >-
  Types generated from JSON Schema by any2tosca
imports:
- url: odata-v4.yaml
  namespace: odatav4
- url: Resource.yaml
  namespace: resource
- url: Core.yaml
  namespace: core
- url: Circuit_caps.yaml
  namespace: crctcps
data_types:
  BreakerStates:
    derived_from: string
    validation:
      $valid_values:
      - $value
      - - Normal
        - Tripped
        - 'Off'
  PolyPhaseCurrentAmps:
    description: >-
      The current readings for this circuit.
    properties:
      Line1:
        type: string
        description: >-
          Line 1 current (A).
        required: false
      Line2:
        type: string
        description: >-
          Line 2 current (A).
        required: false
      Line3:
        type: string
        description: >-
          Line 3 current (A).
        required: false
      Neutral:
        type: string
        description: >-
          Neutral line current (A).
        required: false
  PolyPhaseEnergykWh:
    description: >-
      The energy readings for this circuit.
    properties:
      Line1ToLine2:
        type: string
        description: >-
          The Line 1 to Line 2 energy (kWh) for this circuit.
        required: false
      Line1ToNeutral:
        type: string
        description: >-
          The Line 1 to Neutral energy (kWh) for this circuit.
        required: false
      Line2ToLine3:
        type: string
        description: >-
          The Line 2 to Line 3 energy (kWh) for this circuit.
        required: false
      Line2ToNeutral:
        type: string
        description: >-
          The Line 2 to Neutral energy (kWh) for this circuit.
        required: false
      Line3ToLine1:
        type: string
        description: >-
          The Line 3 to Line 1 energy (kWh) for this circuit.
        required: false
      Line3ToNeutral:
        type: string
        description: >-
          The Line 3 to Neutral energy (kWh) for this circuit.
        required: false
  PolyPhasePowerWatts:
    description: >-
      The power readings for this circuit.
    properties:
      Line1ToLine2:
        type: string
        description: >-
          The Line 1 to Line 2 power (W) for this circuit.
        required: false
      Line1ToNeutral:
        type: string
        description: >-
          The Line 1 to Neutral power (W) for this circuit.
        required: false
      Line2ToLine3:
        type: string
        description: >-
          The Line 2 to Line 3 power (W) for this circuit.
        required: false
      Line2ToNeutral:
        type: string
        description: >-
          The Line 2 to Neutral power (W) for this circuit.
        required: false
      Line3ToLine1:
        type: string
        description: >-
          The Line 3 to Line 1 power (W) for this circuit.
        required: false
      Line3ToNeutral:
        type: string
        description: >-
          The Line 3 to Neutral power (W) for this circuit.
        required: false
  PolyPhaseVoltage:
    description: >-
      The voltage readings for this circuit.
    properties:
      Line1ToLine2:
        type: string
        description: >-
          The Line 1 to Line 2 voltage (V) for this circuit.
        required: false
      Line1ToNeutral:
        type: string
        description: >-
          The Line 1 to Neutral voltage (V) for this circuit.
        required: false
      Line2ToLine3:
        type: string
        description: >-
          The Line 2 to Line 3 voltage (V) for this circuit.
        required: false
      Line2ToNeutral:
        type: string
        description: >-
          The Line 2 to Neutral voltage (V) for this circuit.
        required: false
      Line3ToLine1:
        type: string
        description: >-
          The Line 3 to Line 1 voltage (V) for this circuit.
        required: false
      Line3ToNeutral:
        type: string
        description: >-
          The Line 3 to Neutral voltage (V) for this circuit.
        required: false
  NominalVoltageType:
    derived_from: string
    validation:
      $valid_values:
      - $value
      - - AC100To127V
        - AC100To240V
        - AC100To277V
        - AC120V
        - AC200To240V
        - AC200To277V
        - AC208V
        - AC230V
        - AC240V
        - AC240AndDC380V
        - AC277V
        - AC277AndDC380V
        - AC400V
        - AC480V
        - DC48V
        - DC240V
        - DC380V
        - DC400V
        - DC800V
        - DCNeg48V
        - DC16V
        - DC12V
        - DC9V
        - DC5V
        - DC3_3V
        - DC1_8V
  PhaseWiringType:
    derived_from: string
    validation:
      $valid_values:
      - $value
      - - OnePhase3Wire
        - TwoPhase3Wire
        - OneOrTwoPhase3Wire
        - TwoPhase4Wire
        - ThreePhase4Wire
        - ThreePhase5Wire
  PlugType:
    derived_from: string
    validation:
      $valid_values:
      - $value
      - - NEMA_5_15P
        - NEMA_L5_15P
        - NEMA_5_20P
        - NEMA_L5_20P
        - NEMA_L5_30P
        - NEMA_6_15P
        - NEMA_L6_15P
        - NEMA_6_20P
        - NEMA_L6_20P
        - NEMA_L6_30P
        - NEMA_L14_20P
        - NEMA_L14_30P
        - NEMA_L15_20P
        - NEMA_L15_30P
        - NEMA_L21_20P
        - NEMA_L21_30P
        - NEMA_L22_20P
        - NEMA_L22_30P
        - California_CS8265
        - California_CS8365
        - IEC_60320_C14
        - IEC_60320_C20
        - IEC_60309_316P6
        - IEC_60309_332P6
        - IEC_60309_363P6
        - IEC_60309_516P6
        - IEC_60309_532P6
        - IEC_60309_563P6
        - IEC_60309_460P9
        - IEC_60309_560P9
        - Field_208V_3P4W_60A
        - Field_400V_3P5W_32A
  PowerRestorePolicyTypes:
    description: >-
      The enumerations of `PowerRestorePolicyTypes` specify the choice of power state
      when power is applied.
    derived_from: string
    validation:
      $valid_values:
      - $value
      - - AlwaysOn
        - AlwaysOff
        - LastState
  PowerState:
    derived_from: string
    validation:
      $valid_values:
      - $value
      - - 'On'
        - 'Off'
        - PowerCycle
relationship_types:
  CircuitDependsOn:
    derived_from: core:DependsOn
    properties:
      BranchCircuit:
        type: string
        description: >-
          A reference to the branch circuit related to this circuit.
        required: false
      DistributionCircuits@odata_count:
        type: odatav4:count
        description: >-
          The number of items in a collection.
        required: false
      Oem:
        type: resource:Oem
        description: >-
          The OEM extension property.
        required: false
      Outlets@odata_count:
        type: odatav4:count
        description: >-
          The number of items in a collection.
        required: false
      PowerOutlet:
        type: string
        description: >-
          A link to the power outlet that provides power to this circuit.
        required: false
      SourceCircuit:
        type: string
        description: >-
          A link to the circuit that provides power to this circuit.
        required: false
interface_types:
  CircuitActions:
    operations:
      BreakerControl:
        description: >-
          This action attempts to reset the circuit breaker.
        inputs:
          PowerState:
            type: PowerState
            description: >-
              The desired power state of the circuit if the breaker is reset successfully.
            required: false
      PowerControl:
        description: >-
          This action turns the circuit on or off.
        inputs:
          PowerState:
            type: PowerState
            description: >-
              The desired power state of the circuit.
            required: false
      ResetMetrics:
        description: >-
          This action resets metrics related to this circuit.
node_types:
  Circuit:
    description: >-
      This `Circuit` schema contains the definition for an electrical circuit.
    properties:
      '@odata_id':
        type: odatav4:id
        description: >-
          The unique identifier for a resource.
        required: true
      '@odata_context':
        type: odatav4:context
        description: >-
          The OData description of a payload.
        required: false
      '@odata_etag':
        type: odatav4:etag
        description: >-
          The current ETag of the resource.
        required: false
      '@odata_type':
        type: odatav4:type
        description: >-
          The type of a resource.
        required: true
      BreakerState:
        type: string
        description: >-
          The state of the overcurrent protection device.
        required: false
      CircuitType:
        type: string
        description: >-
          The type of circuit.
        required: false
      CriticalCircuit:
        type: boolean
        description: >-
          Designates if this is a critical circuit.
        required: false
      CurrentAmps:
        type: string
        description: >-
          The current (A) for this circuit.
        required: false
      Description:
        type: string
        required: false
      ElectricalContext:
        type: string
        description: >-
          The combination of current-carrying conductors.
        required: false
      EnergykWh:
        type: string
        description: >-
          The energy (kWh) for this circuit.
        required: false
      FrequencyHz:
        type: string
        description: >-
          The frequency (Hz) for this circuit.
        required: false
      Id:
        type: resource:Id
        description: >-
          The unique identifier for this resource within the collection of similar
          resources.
        required: true
      IndicatorLED:
        type: string
        description: >-
          The state of the indicator LED, which identifies the circuit.
        required: false
      Name:
        type: resource:Name
        description: >-
          The name of the resource or array member.
        required: true
      NominalVoltage:
        type: string
        description: >-
          The nominal voltage for this circuit.
        required: false
      Oem:
        type: resource:Oem
        description: >-
          The OEM extension property.
        required: false
      PhaseWiringType:
        type: string
        description: >-
          The number of ungrounded current-carrying conductors (phases) and the total
          number of conductors (wires).
        required: false
      PlugType:
        type: string
        description: >-
          The type of plug according to NEMA, IEC, or regional standards.
        required: false
      PolyPhaseCurrentAmps:
        type: PolyPhaseCurrentAmps
        description: >-
          The current readings for this circuit.
        required: false
      PolyPhaseEnergykWh:
        type: PolyPhaseEnergykWh
        description: >-
          The energy readings for this circuit.
        required: false
      PolyPhasePowerWatts:
        type: PolyPhasePowerWatts
        description: >-
          The power readings for this circuit.
        required: false
      PolyPhaseVoltage:
        type: PolyPhaseVoltage
        description: >-
          The voltage readings for this circuit.
        required: false
      PowerCycleDelaySeconds:
        type: float
        description: >-
          The number of seconds to delay power on after a `PowerControl` action to
          cycle power.  Zero seconds indicates no delay.
        required: false
      PowerEnabled:
        type: boolean
        description: >-
          Indicates if the circuit can be powered.
        required: false
      PowerOffDelaySeconds:
        type: float
        description: >-
          The number of seconds to delay power off after a `PowerControl` action.  Zero
          seconds indicates no delay to power off.
        required: false
      PowerOnDelaySeconds:
        type: float
        description: >-
          The number of seconds to delay power up after a power cycle or a `PowerControl`
          action.  Zero seconds indicates no delay to power up.
        required: false
      PowerRestoreDelaySeconds:
        type: float
        description: >-
          The number of seconds to delay power on after power has been restored.  Zero
          seconds indicates no delay.
        required: false
      PowerRestorePolicy:
        type: string
        description: >-
          The desired power state of the circuit when power is restored after a power
          loss.
        required: false
        validation:
          $valid_values:
          - $value
          - - AlwaysOn
            - AlwaysOff
            - LastState
      PowerState:
        type: string
        description: >-
          The power state of the circuit.
        required: false
      PowerWatts:
        type: string
        description: >-
          The power (W) for this circuit.
        required: false
      RatedCurrentAmps:
        type: float
        description: >-
          The rated maximum current allowed for this circuit.
        required: false
        validation:
          $greater_or_equal:
          - $value
          - 0
      Status:
        type: resource:Status
        description: >-
          The status and health of the resource and its subordinate or dependent resources.
        required: false
      Voltage:
        type: string
        description: >-
          The voltage (V) for this circuit.
        required: false
      VoltageType:
        type: string
        description: >-
          The type of voltage applied to the circuit.
        required: false
      LocationIndicatorActive:
        type: boolean
        description: >-
          An indicator allowing an operator to physically locate this resource.
        required: false
      PowerLoadPercent:
        type: string
        description: >-
          The power load (percent) for this circuit.
        required: false
      ElectricalConsumerNames:
        type: list
        description: >-
          An array of names of downstream devices that are powered by this circuit.
        required: false
        entry_schema:
          type: string
      ElectricalSourceManagerURI:
        type: string
        description: >-
          The URI of the management interface for the upstream electrical source connection
          for this circuit.
        required: false
      ElectricalSourceName:
        type: string
        description: >-
          The name of the upstream electrical source, such as a circuit or outlet,
          connected to this circuit.
        required: false
      UserLabel:
        type: string
        description: >-
          A user-assigned label.
        required: false
      ConfigurationLocked:
        type: boolean
        description: >-
          Indicates whether the configuration is locked.
        required: false
      PowerControlLocked:
        type: boolean
        description: >-
          Indicates whether power control requests are locked.
        required: false
      PowerStateInTransition:
        type: boolean
        description: >-
          Indicates whether the power state is undergoing a delayed transition.
        required: false
      UnbalancedCurrentPercent:
        type: string
        description: >-
          The current imbalance (percent) between phases.
        required: false
      UnbalancedVoltagePercent:
        type: string
        description: >-
          The voltage imbalance (percent) between phases.
        required: false
      NominalFrequencyHz:
        type: float
        description: >-
          The nominal frequency (Hz) for this circuit.
        required: false
    requirements:
    - DistributionCircuits:
        # node: circuit:Circuit
        capability: core:Feature
        relationship: CircuitDependsOn
        count_range:
        - 0
        - UNBOUNDED
        description: >-
          An array of links to the circuits powered by this circuit.
    - Outlets:
        # node: outlet:Outlet
        capability: core:Feature
        relationship: CircuitDependsOn
        count_range:
        - 0
        - UNBOUNDED
        description: >-
          An array of references to the outlets contained by this circuit.
    interfaces:
      Actions:
        type: CircuitActions
    capabilities:
      feature:
        type: crctcps:CircuitFeature
      containable:
        type: crctcps:CircuitContainable
