tosca_definitions_version: tosca_2_0
description: >-
  Types generated from JSON Schema by any2tosca
imports:
- url: Resource.yaml
  namespace: resource
- url: Chassis.yaml
  namespace: chassis
- url: Core.yaml
  namespace: core
- url: SimpleStorage_caps.yaml
  namespace: smpstrcp
- url: Chassis_caps.yaml
  namespace: chssscps
data_types:
  Device:
    description: >-
      A storage device such as a disk drive or optical media device.
    properties:
      Oem:
        type: resource:Oem
        description: >-
          The OEM extension.
        required: false
      Name:
        type: string
        description: >-
          The name of the resource or array element.
        required: true
      Status:
        type: resource:Status
        description: >-
          The status and health of a resource and its children.
        required: false
      Manufacturer:
        type: string
        description: >-
          The name of the manufacturer of this device.
        required: false
      Model:
        type: string
        description: >-
          The product model number of this device.
        required: false
      CapacityBytes:
        type: float
        description: >-
          The size of the storage device.
        required: false
        validation:
          $greater_or_equal:
          - $value
          - 0
  Actions:
    description: >-
      The available actions for this resource.
    properties:
      Oem:
        type: map
        description: >-
          The available OEM specific actions for this resource.
        required: false
node_types:
  SimpleStorage:
    description: >-
      This is the schema definition for the Simple Storage resource.  It represents
      the properties of a storage controller and its directly-attached devices.
    properties:
      Oem:
        type: resource:Oem
        description: >-
          This is the manufacturer/provider specific extension moniker used to divide
          the Oem object into sections.
        required: false
      Id:
        type: resource:Id
        description: >-
          The unique identifier for this resource within the collection of similar
          resources.
        required: true
      Description:
        type: resource:Description
        description: >-
          The description of this resource.  Used for commonality in the schema definitions.
        required: false
      Name:
        type: resource:Name
        description: >-
          The name of the resource or array member.
        required: true
      UefiDevicePath:
        type: string
        description: >-
          The UEFI device path used to access this storage controller.
        required: false
      Devices:
        type: list
        description: >-
          The storage devices associated with this resource.
        required: false
        entry_schema:
          type: Device
      Status:
        type: resource:Status
        description: >-
          The status and health of a resource and its children.
        required: false
      Links:
        type: Links
        description: >-
          Contains references to other resources that are related to this resource.
        required: false
      Actions:
        type: Actions
        description: >-
          The available actions for this resource.
        required: false
    capabilities:
      feature:
        type: smpstrcp:SimpleStorageFeature
      containable:
        type: smpstrcp:SimpleStorageContainable
  Links:
    description: >-
      Contains references to other resources that are related to this resource.
    properties:
      Oem:
        type: resource:Oem
        description: >-
          Oem extension object.
        required: false
    requirements:
    - Chassis:
        node: chassis:Chassis
        capability: chssscps:ChassisContainable
        relationship: core:Contains
        count_range:
        - 0
        - 1
        description: >-
          A reference to the Chassis which contains this Simple Storage.
    capabilities:
      containable:
        type: smpstrcp:LinksContainable
