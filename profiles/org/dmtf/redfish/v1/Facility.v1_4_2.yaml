node_types:
  Facility:
    description: >-
      The `Facility` schema represents the physical location containing equipment,
      such as a room, building, or campus.
    properties:
      Description:
        type: resource:Description
        description: >-
          The description of this resource.  Used for commonality in the schema definitions.
        required: false
      FacilityType:
        type: FacilityType
        description: >-
          The type of location this resource represents.
        required: true
      Id:
        type: resource:Id
        description: >-
          The unique identifier for this resource within the collection of similar
          resources.
        required: true
      Location:
        type: resource:Location
        description: >-
          The location of the facility.
        required: false
      Name:
        type: resource:Name
        description: >-
          The name of the resource or array member.
        required: true
      Oem:
        type: resource:Oem
        description: >-
          The OEM extension property.
        required: false
      Status:
        type: resource:Status
        description: >-
          The status and health of the resource and its subordinate or dependent resources.
        required: false
    requirements:
