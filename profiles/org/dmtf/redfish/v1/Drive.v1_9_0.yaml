tosca_definitions_version: tosca_2_0
description: >-
  Types generated from JSON Schema by any2tosca
imports:
- url: Resource.yaml
  namespace: resource
- url: Chassis.yaml
  namespace: chassis
- url: Endpoint.yaml
  namespace: endpoint
- url: odata-v4.yaml
  namespace: odatav4
- url: Core.yaml
  namespace: core
- url: Chassis_caps.yaml
  namespace: chssscps
- url: Endpoint_caps.yaml
  namespace: endpcps
- url: PCIeFunction_caps.yaml
  namespace: pcfnccp
- url: StoragePool_caps.yaml
  namespace: strplcp
- url: Volume_caps.yaml
  namespace: vlmcps
- url: Assembly.yaml
  namespace: assembly
- url: Protocol.yaml
  namespace: protocol
- url: Assembly_caps.yaml
  namespace: assmcps
- url: Protocol_caps.yaml
  namespace: prtclcps
- url: Drive_caps.yaml
  namespace: drvcps
- url: Task.yaml
  namespace: task
- url: Task_caps.yaml
  namespace: taskcaps
data_types:
  EncryptionAbility:
    derived_from: string
    validation:
      $valid_values:
      - $value
      - - None
        - SelfEncryptingDrive
        - Other
  EncryptionStatus:
    derived_from: string
    validation:
      $valid_values:
      - $value
      - - Unecrypted
        - Unlocked
        - Locked
        - Foreign
        - Unencrypted
  HotspareReplacementModeType:
    derived_from: string
    validation:
      $valid_values:
      - $value
      - - Revertible
        - NonRevertible
  HotspareType:
    derived_from: string
    validation:
      $valid_values:
      - $value
      - - None
        - Global
        - Chassis
        - Dedicated
  MediaType:
    derived_from: string
    validation:
      $valid_values:
      - $value
      - - HDD
        - SSD
        - SMR
  StatusIndicator:
    derived_from: string
    validation:
      $valid_values:
      - $value
      - - OK
        - Fail
        - Rebuild
        - PredictiveFailureAnalysis
        - Hotspare
        - InACriticalArray
        - InAFailedArray
relationship_types:
  DriveDependsOn:
    derived_from: core:DependsOn
    properties:
      Endpoints@odata_count:
        type: odatav4:count
        description: >-
          The number of items in a collection.
        required: false
      Oem:
        type: resource:Oem
        description: >-
          The OEM extension property.
        required: false
      PCIeFunctions@odata_count:
        type: odatav4:count
        description: >-
          The number of items in a collection.
        required: false
      StoragePools@odata_count:
        type: odatav4:count
        description: >-
          The number of items in a collection.
        required: false
      Volumes@odata_count:
        type: odatav4:count
        description: >-
          The number of items in a collection.
        required: false
interface_types:
  DriveActions:
    operations:
      Reset:
        description: >-
          This action resets this drive.
        inputs:
          ResetType:
            type: resource:ResetType
            description: >-
              The type of reset.
            required: false
      SecureErase:
        description: >-
          This action securely erases the contents of the drive.
node_types:
  Drive:
    description: >-
      The Drive schema represents a single physical drive for a system, including
      links to associated volumes.
    properties:
      AssetTag:
        type: string
        description: >-
          The user-assigned asset tag for this drive.
        required: false
      BlockSizeBytes:
        type: integer
        description: >-
          The size, in bytes, of the smallest addressable unit, or block.
        required: false
      CapableSpeedGbs:
        type: float
        description: >-
          The speed, in gigabit per second (Gbit/s), at which this drive can communicate
          to a storage controller in ideal conditions.
        required: false
      CapacityBytes:
        type: integer
        description: >-
          The size, in bytes, of this drive.
        required: false
      Description:
        type: resource:Description
        description: >-
          The description of this resource.  Used for commonality in the schema definitions.
        required: false
      EncryptionAbility:
        type: EncryptionAbility
        description: >-
          The encryption ability of this drive.
        required: false
      EncryptionStatus:
        type: EncryptionStatus
        description: >-
          The status of the encryption of this drive.
        required: false
      FailurePredicted:
        type: boolean
        description: >-
          An indication of whether this drive currently predicts a failure in the
          near future.
        required: false
      HotspareReplacementMode:
        type: HotspareReplacementModeType
        description: >-
          The replacement mode for the hot spare drive.
        required: false
      HotspareType:
        type: HotspareType
        description: >-
          The type of hot spare that this drive currently serves as.
        required: false
      Id:
        type: resource:Id
        description: >-
          The unique identifier for this resource within the collection of similar
          resources.
        required: true
      Identifiers:
        type: list
        description: >-
          The durable names for the drive.
        required: false
        entry_schema:
          type: resource:Identifier
      IndicatorLED:
        type: resource:IndicatorLED
        description: >-
          The state of the indicator LED, that identifies the drive.
        required: false
      Location:
        type: list
        description: >-
          The location of the drive.
        required: false
        entry_schema:
          type: resource:Location
      Manufacturer:
        type: string
        description: >-
          The manufacturer of this drive.
        required: false
      MediaType:
        type: MediaType
        description: >-
          The type of media contained in this drive.
        required: false
      Model:
        type: string
        description: >-
          The model number for the drive.
        required: false
      Multipath:
        type: boolean
        description: >-
          An indication of whether the drive is accessible from multiple paths.
        required: false
      Name:
        type: resource:Name
        description: >-
          The name of the resource or array member.
        required: true
      NegotiatedSpeedGbs:
        type: float
        description: >-
          The speed, in gigabit per second (Gbit/s), at which this drive currently
          communicates to the storage controller.
        required: false
      Oem:
        type: resource:Oem
        description: >-
          The OEM extension property.
        required: false
      Operations:
        type: list
        description: >-
          The operations currently running on the Drive.
        required: false
        entry_schema:
          type: Operations
      PartNumber:
        type: string
        description: >-
          The part number for this drive.
        required: false
      PhysicalLocation:
        type: resource:Location
        description: >-
          The location of the drive.
        required: false
      PredictedMediaLifeLeftPercent:
        type: float
        description: >-
          The percentage of reads and writes that are predicted to be available for
          the media.
        required: false
      Revision:
        type: string
        description: >-
          The revision of this drive.  This is typically the firmware or hardware
          version of the drive.
        required: false
      RotationSpeedRPM:
        type: float
        description: >-
          The rotation speed of this drive, in revolutions per minute (RPM).
        required: false
      SKU:
        type: string
        description: >-
          The SKU for this drive.
        required: false
      SerialNumber:
        type: string
        description: >-
          The serial number for this drive.
        required: false
      Status:
        type: resource:Status
        description: >-
          The status and health of the Resource and its subordinate or dependent Resources.
        required: false
      StatusIndicator:
        type: StatusIndicator
        description: >-
          The state of the status indicator, which communicates status information
          about this drive.
        required: false
      WriteCacheEnabled:
        type: boolean
        description: >-
          An indication of whether the drive write cache is enabled.
        required: false
    requirements:
    - Assembly:
        node: assembly:Assembly
        capability: assmcps:AssemblyContainable
        relationship: core:Contains
        count_range:
        - 0
        - 1
        description: >-
          The link to the assembly associated with this drive.
    - Protocol:
        node: protocol:Protocol
        capability: prtclcps:ProtocolContainable
        relationship: core:Contains
        count_range:
        - 0
        - 1
        description: >-
          The protocol that this drive currently uses to communicate to the storage
          controller.
    - Chassis:
        node: chassis:Chassis
        capability: chssscps:ChassisFeature
        relationship: DriveDependsOn
        count_range:
        - 0
        - 1
        description: >-
          The link to the chassis that contains this drive.
    - Endpoints:
        node: endpoint:Endpoint
        capability: endpcps:EndpointFeature
        relationship: DriveDependsOn
        count_range:
        - 0
        - UNBOUNDED
        description: >-
          An array of links to the endpoints that connect to this drive.
    - PCIeFunctions:
        node: PCIeFunction
        capability: pcfnccp:PCIeFunctionFeature
        relationship: DriveDependsOn
        count_range:
        - 0
        - UNBOUNDED
        description: >-
          An array of links to the PCIe functions that the drive produces.
    - StoragePools:
        node: StoragePool
        capability: strplcp:StoragePoolFeature
        relationship: DriveDependsOn
        count_range:
        - 0
        - UNBOUNDED
        description: >-
          An array of links to the storage pools to which this drive belongs.
    - Volumes:
        node: Volume
        capability: vlmcps:VolumeFeature
        relationship: DriveDependsOn
        count_range:
        - 0
        - UNBOUNDED
        description: >-
          An array of links to the volumes that this drive either wholly or only partially
          contains.
    interfaces:
      Actions:
        type: DriveActions
    capabilities:
      feature:
        type: drvcps:DriveFeature
      containable:
        type: drvcps:DriveContainable
  Operations:
    description: >-
      An operation currently running on this Resource.
    properties:
      OperationName:
        type: string
        description: >-
          The name of the operation.
        required: false
      PercentageComplete:
        type: integer
        description: >-
          The percentage of the operation that has been completed.
        required: false
    requirements:
    - AssociatedTask:
        node: task:Task
        capability: taskcaps:TaskContainable
        relationship: core:Contains
        count_range:
        - 0
        - 1
        description: >-
          The link to the task associated with the operation, if any.
    capabilities:
      containable:
        type: drvcps:OperationsContainable
