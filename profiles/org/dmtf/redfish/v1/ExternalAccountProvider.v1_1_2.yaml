tosca_definitions_version: tosca_2_0
description: >-
  Types generated from JSON Schema by any2tosca
imports:
- url: Resource.yaml
  namespace: resource
- url: Core.yaml
  namespace: core
- url: CertificateCollection.yaml
  namespace: crtfcllc
- url: CertificateCollection_caps.yaml
  namespace: crtcllcp
- url: ExternalAccountProvider_caps.yaml
  namespace: exacprcp
data_types:
  AccountProviderTypes:
    derived_from: string
    validation:
      $valid_values:
      - $value
      - - RedfishService
        - ActiveDirectoryService
        - LDAPService
        - OEM
  Authentication:
    description: >-
      The information required to authenticate to the external service.
    properties:
      AuthenticationType:
        type: AuthenticationTypes
        description: >-
          The type of authentication used to connect to the external account provider.
        required: false
      KerberosKeytab:
        type: string
        description: >-
          The Base64-encoded version of the Kerberos keytab for this Service.  A PATCH
          or PUT operation writes the keytab.  This property is `null` in responses.
        required: false
      Oem:
        type: resource:Oem
        description: >-
          The OEM extension property.
        required: false
      Password:
        type: string
        description: >-
          The password for this Service.  A PATCH or PUT request writes the password.  This
          property is `null` in responses.
        required: false
      Token:
        type: string
        description: >-
          The token for this Service.  A PATCH or PUT operation writes the token.  This
          property is `null` in responses.
        required: false
      Username:
        type: string
        description: >-
          The user name for the Service.
        required: false
  AuthenticationTypes:
    derived_from: string
    validation:
      $valid_values:
      - $value
      - - Token
        - KerberosKeytab
        - UsernameAndPassword
        - OEM
  LDAPSearchSettings:
    description: >-
      The settings to search a generic LDAP service.
    properties:
      BaseDistinguishedNames:
        type: list
        description: >-
          The base distinguished names to search an external LDAP service.
        required: false
        entry_schema:
          type: string
      GroupNameAttribute:
        type: string
        description: >-
          The attribute name that contains the LDAP group name entry.
        required: false
      GroupsAttribute:
        type: string
        description: >-
          The attribute name that contains the groups for a user on the LDAP user
          entry.
        required: false
      UsernameAttribute:
        type: string
        description: >-
          The attribute name that contains the LDAP user name entry.
        required: false
  LDAPService:
    description: >-
      The settings required to parse a generic LDAP service.
    properties:
      Oem:
        type: resource:Oem
        description: >-
          The OEM extension property.
        required: false
      SearchSettings:
        type: LDAPSearchSettings
        description: >-
          The required settings to search an external LDAP service.
        required: false
  RoleMapping:
    description: >-
      The mapping rules to convert the external account providers account information
      to the local Redfish Role.
    properties:
      LocalRole:
        type: string
        description: >-
          The name of the local Redfish Role to which to map the remote user or group.
        required: false
      Oem:
        type: resource:Oem
        description: >-
          The OEM extension property.
        required: false
      RemoteGroup:
        type: string
        description: >-
          The name of the remote group, or the remote role in the case of a Redfish
          Service, that maps to the local Redfish Role to which this entity links.
        required: false
      RemoteUser:
        type: string
        description: >-
          The name of the remote user that maps to the local Redfish Role to which
          this entity links.
        required: false
node_types:
  ExternalAccountProvider:
    description: >-
      The remote service that provides accounts for this manager to use for authentication.
    properties:
      AccountProviderType:
        type: AccountProviderTypes
        description: >-
          The type of external account provider to which this Service connects.
        required: false
      Authentication:
        type: Authentication
        description: >-
          The authentication information for the external account provider.
        required: false
      Description:
        type: resource:Description
        description: >-
          The description of this resource.  Used for commonality in the schema definitions.
        required: false
      Id:
        type: resource:Id
        description: >-
          The unique identifier for this resource within the collection of similar
          resources.
        required: true
      LDAPService:
        type: LDAPService
        description: >-
          The additional mapping information needed to parse a generic LDAP service.
        required: false
      Name:
        type: resource:Name
        description: >-
          The name of the resource or array member.
        required: true
      Oem:
        type: resource:Oem
        description: >-
          The OEM extension property.
        required: false
      RemoteRoleMapping:
        type: list
        description: >-
          The mapping rules to convert the external account providers account information
          to the local Redfish Role.
        required: false
        entry_schema:
          type: RoleMapping
      ServiceAddresses:
        type: list
        description: >-
          The addresses of the user account providers to which this external account
          provider links.  The format of this field depends on the type of external
          account provider.
        required: false
        entry_schema:
          type: string
      ServiceEnabled:
        type: boolean
        description: >-
          An indication of whether this service is enabled.
        required: false
    requirements:
    - Certificates:
        node: crtfcllc:CertificateCollection
        capability: crtcllcp:CertificateCollectionContainable
        relationship: core:Contains
        count_range:
        - 0
        - 1
        description: >-
          The link to a collection of certificates that the external account provider
          uses.
    capabilities:
      feature:
        type: exacprcp:ExternalAccountProviderFeature
      containable:
        type: exacprcp:ExternalAccountProviderContainable
