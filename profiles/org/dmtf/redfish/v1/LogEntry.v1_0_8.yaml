tosca_definitions_version: tosca_2_0
description: >-
  Types generated from JSON Schema by any2tosca
imports:
- url: Resource.yaml
  namespace: resource
- url: odata-v4.yaml
  namespace: odatav4
- url: Core.yaml
  namespace: core
- url: LogEntry_caps.yaml
  namespace: lgentcp
data_types:
  EventSeverity:
    derived_from: string
    validation:
      $valid_values:
      - $value
      - - OK
        - Warning
        - Critical
  LogEntryCode:
    derived_from: string
    validation:
      $valid_values:
      - $value
      - - Assert
        - Deassert
        - Lower Non-critical - going low
        - Lower Non-critical - going high
        - Lower Critical - going low
        - Lower Critical - going high
        - Lower Non-recoverable - going low
        - Lower Non-recoverable - going high
        - Upper Non-critical - going low
        - Upper Non-critical - going high
        - Upper Critical - going low
        - Upper Critical - going high
        - Upper Non-recoverable - going low
        - Upper Non-recoverable - going high
        - Transition to Idle
        - Transition to Active
        - Transition to Busy
        - State Deasserted
        - State Asserted
        - Predictive Failure deasserted
        - Predictive Failure asserted
        - Limit Not Exceeded
        - Limit Exceeded
        - Performance Met
        - Performance Lags
        - Transition to OK
        - Transition to Non-Critical from OK
        - Transition to Critical from less severe
        - Transition to Non-recoverable from less severe
        - Transition to Non-Critical from more severe
        - Transition to Critical from Non-recoverable
        - Transition to Non-recoverable
        - Monitor
        - Informational
        - Device Removed / Device Absent
        - Device Inserted / Device Present
        - Device Disabled
        - Device Enabled
        - Transition to Running
        - Transition to In Test
        - Transition to Power Off
        - Transition to On Line
        - Transition to Off Line
        - Transition to Off Duty
        - Transition to Degraded
        - Transition to Power Save
        - Install Error
        - Fully Redundant
        - Redundancy Lost
        - Redundancy Degraded
        - Non-redundant:Sufficient Resources from Redundant
        - Non-redundant:Sufficient Resources from Insufficient Resources
        - Non-redundant:Insufficient Resources
        - Redundancy Degraded from Fully Redundant
        - Redundancy Degraded from Non-redundant
        - D0 Power State
        - D1 Power State
        - D2 Power State
        - D3 Power State
  LogEntryType:
    derived_from: string
    validation:
      $valid_values:
      - $value
      - - Event
        - SEL
        - Oem
  SensorType:
    derived_from: string
    validation:
      $valid_values:
      - $value
      - - Platform Security Violation Attempt
        - Temperature
        - Voltage
        - Current
        - Fan
        - Physical Chassis Security
        - Processor
        - Power Supply / Converter
        - PowerUnit
        - CoolingDevice
        - Other Units-based Sensor
        - Memory
        - Drive Slot/Bay
        - POST Memory Resize
        - System Firmware Progress
        - Event Logging Disabled
        - System Event
        - Critical Interrupt
        - Button/Switch
        - Module/Board
        - Microcontroller/Coprocessor
        - Add-in Card
        - Chassis
        - ChipSet
        - Other FRU
        - Cable/Interconnect
        - Terminator
        - SystemBoot/Restart
        - Boot Error
        - BaseOSBoot/InstallationStatus
        - OS Stop/Shutdown
        - Slot/Connector
        - System ACPI PowerState
        - Watchdog
        - Platform Alert
        - Entity Presence
        - Monitor ASIC/IC
        - LAN
        - Management Subsystem Health
        - Battery
        - Session Audit
        - Version Change
        - FRUState
node_types:
  LogEntry:
    description: >-
      This resource defines the record format for a log.  It is designed to be used
      for SEL logs (from IPMI) as well as Event Logs and OEM-specific log formats.  The
      EntryType field indicates the type of log and the resource includes several
      additional properties dependent on the EntryType.
    properties:
      Created:
        type: string
        description: >-
          The time the log entry was created.
        required: false
      Description:
        type: resource:Description
        description: >-
          The description of this resource.  Used for commonality in the schema definitions.
        required: false
      EntryCode:
        type: LogEntryCode
        description: >-
          If the EntryType is SEL, this will have the entry code for the log entry.
        required: false
      EntryType:
        type: LogEntryType
        description: >-
          This is the type of log entry.
        required: true
      Id:
        type: resource:Id
        description: >-
          The unique identifier for this resource within the collection of similar
          resources.
        required: true
      Message:
        type: string
        description: >-
          This property decodes from EntryType.  If the EntryType is Event, then it
          is a message string.  Otherwise, it is SEL or OEM specific.  In most cases,
          this will be the actual Log Entry.
        required: false
      MessageArgs:
        type: list
        description: >-
          The values of this property shall be any arguments for the message.
        required: false
        entry_schema:
          type: string
      MessageId:
        type: string
        description: >-
          This property decodes from EntryType.  If the EntryType is Event, then it
          is a message id.  If the EntryType is SEL, then it contains the Event Data.  Otherwise,
          it is OEM specific.  This value is only used for registries - for more information,
          see the specification.
        required: false
      Name:
        type: resource:Name
        description: >-
          The name of the resource or array member.
        required: true
      Oem:
        type: resource:Oem
        description: >-
          This is the manufacturer/provider specific extension moniker used to divide
          the Oem object into sections.
        required: false
      OemRecordFormat:
        type: string
        description: >-
          If the EntryType is Oem, this will contain more information about the record
          format from the Oem.
        required: false
      SensorNumber:
        type: integer
        description: >-
          This property decodes from EntryType.  If the EntryType is SEL, it is the
          sensor number.  If the EntryType is Event, then the count of events.  Otherwise,
          it is OEM specific.
        required: false
      SensorType:
        type: SensorType
        description: >-
          If the EntryType is SEL, this will have the sensor type that the log entry
          pertains to.
        required: false
      Severity:
        type: EventSeverity
        description: >-
          This is the severity of the log entry.
        required: false
    capabilities:
      feature:
        type: lgentcp:LogEntryFeature
      containable:
        type: lgentcp:LogEntryContainable
