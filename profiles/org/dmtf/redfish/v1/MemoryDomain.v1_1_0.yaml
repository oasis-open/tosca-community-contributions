node_types:
  MemoryDomain:
    description: >-
      This is the schema definition of a Memory Domain and its configuration. Memory
      Domains are used to indicate to the client which Memory (DIMMs) can be grouped
      together in Memory Chunks to form interleave sets or otherwise grouped together.
    properties:
      Oem:
        type: resource:Oem
        description: >-
          This is the manufacturer/provider specific extension moniker used to divide
          the Oem object into sections.
        required: false
      Id:
        type: resource:Id
        description: >-
          The unique identifier for this resource within the collection of similar
          resources.
        required: true
      Description:
        type: resource:Description
        description: >-
          The description of this resource.  Used for commonality in the schema definitions.
        required: false
      Name:
        type: resource:Name
        description: >-
          The name of the resource or array member.
        required: true
      AllowsMemoryChunkCreation:
        type: boolean
        description: >-
          Indicates if this Memory Domain supports the creation of Memory Chunks.
        required: false
      AllowsBlockProvisioning:
        type: boolean
        description: >-
          Indicates if this Memory Domain supports the provisioning of blocks of memory.
        required: false
      InterleavableMemorySets:
        type: list
        description: >-
          This is the interleave sets for the memory chunk.
        required: false
        entry_schema:
          type: MemorySet
      AllowsMirroring:
        type: boolean
        description: >-
          Indicates if this Memory Domain supports the creation of Memory Chunks with
          mirroring enabled.
        required: false
      AllowsSparing:
        type: boolean
        description: >-
          Indicates if this Memory Domain supports the creation of Memory Chunks with
          sparing enabled.
        required: false
