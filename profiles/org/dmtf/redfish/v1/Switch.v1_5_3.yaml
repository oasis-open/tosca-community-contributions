        - 1
        description: >-
          The link to the collection of log services associated with this switch.
    - Ports:
        node: prtcllc:PortCollection
        capability: prtcllcp:PortCollectionContainable
        relationship: core:Contains
        count_range:
        - 0
        - 1
        description: >-
          The link to the collection ports for this switch.
    - Redundancy:
        node: rdndncy:Redundancy
        capability: rdndcps:RedundancyContainable
        relationship: core:Contains
        count_range:
        - 0
        - UNBOUNDED
        description: >-
          Redundancy information for the switches.
    - SupportedProtocols:
        node: protocol:Protocol
        capability: prtclcps:ProtocolContainable
        relationship: core:Contains
        count_range:
        - 0
        - UNBOUNDED
        description: >-
          The protocols this switch supports.
    - SwitchType:
        node: protocol:Protocol
        capability: prtclcps:ProtocolContainable
        relationship: core:Contains
        count_range:
        - 0
        - 1
        description: >-
          The protocol being sent over this switch.
    - Chassis:
        node: chassis:Chassis
        capability: chssscps:ChassisFeature
        relationship: SwitchDependsOn
        count_range:
        - 0
        - 1
        description: >-
          The link to the chassis that contains this switch.
    - Endpoints:
        node: endpoint:Endpoint
        capability: endpcps:EndpointFeature
        relationship: SwitchDependsOn
        count_range:
        - 0
        - UNBOUNDED
        description: >-
          An array of links to the endpoints that connect to this switch.
    - ManagedBy:
        node: manager:Manager
        capability: mngrcps:ManagerFeature
        relationship: SwitchDependsOn
        count_range:
        - 0
        - UNBOUNDED
        description: >-
          An array of links to the managers that manage this switch.
    - PCIeDevice:
        node: pcdvc:PCIeDevice
        capability: pcdvccps:PCIeDeviceFeature
        relationship: SwitchDependsOn
        count_range:
        - 0
        - 1
        description: >-
          The link to the PCIe device providing this switch.
    interfaces:
      Actions:
        type: SwitchActions
    capabilities:
      feature:
        type: swtchcps:SwitchFeature
      containable:
        type: swtchcps:SwitchContainable
