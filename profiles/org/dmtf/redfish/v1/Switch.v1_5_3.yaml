        description: >-
          The number of items in a collection.
        required: false
      SKU:
        type: string
        description: >-
          The SKU for this switch.
        required: false
      SerialNumber:
        type: string
        description: >-
          The serial number for this switch.
        required: false
      Status:
        type: resource:Status
        description: >-
          The status and health of the resource and its subordinate or dependent resources.
        required: false
      TotalSwitchWidth:
