          The user-assigned asset tag for this switch.
        required: false
      CurrentBandwidthGbps:
        type: float
        description: >-
          The current internal bandwidth of this switch.
        required: false
      Description:
        type: resource:Description
        description: >-
          The description of this resource.  Used for commonality in the schema definitions.
        required: false
      DomainID:
        type: integer
        description: >-
          The domain ID for this switch.
        required: false
      FirmwareVersion:
        type: string
        description: >-
          The firmware version of this switch.
        required: false
      Id:
        type: resource:Id
        description: >-
          The unique identifier for this resource within the collection of similar
          resources.
        required: true
      IndicatorLED:
        type: resource:IndicatorLED
        description: >-
          The state of the indicator LED, which identifies the switch.
        required: false
      IsManaged:
        type: boolean
        description: >-
          An indication of whether the switch is in a managed or unmanaged state.
        required: false
      Location:
        type: resource:Location
        description: >-
          The location of the switch.
        required: false
      LocationIndicatorActive:
        type: boolean
        description: >-
          An indicator allowing an operator to physically locate this resource.
        required: false
      Manufacturer:
        type: string
        description: >-
          The manufacturer of this switch.
        required: false
      MaxBandwidthGbps:
        type: float
        description: >-
          The maximum internal bandwidth of this switch as currently configured.
        required: false
      Measurements:
        type: list
        description: >-
          An array of DSP0274-defined measurement blocks.
        required: false
        entry_schema:
          type: sftwinvn:MeasurementBlock
      Model:
        type: string
        description: >-
          The product model number of this switch.
        required: false
      Name:
        type: resource:Name
        description: >-
          The name of the resource or array member.
        required: true
      Oem:
        type: resource:Oem
        description: >-
          The OEM extension property.
        required: false
      PartNumber:
        type: string
