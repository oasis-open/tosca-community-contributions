tosca_definitions_version: tosca_2_0
description: >-
  Types generated from JSON Schema by any2tosca
imports:
- url: Resource.yaml
  namespace: resource
- url: PCIeDevice.yaml
  namespace: pcdvc
- url: odata-v4.yaml
  namespace: odatav4
- url: Core.yaml
  namespace: core
- url: PCIeDevice_caps.yaml
  namespace: pcdvccps
- url: Processor_caps.yaml
  namespace: prcscps
- url: PortCollection.yaml
  namespace: prtcllc
- url: PortCollection_caps.yaml
  namespace: prtcllcp
- url: GraphicsController_caps.yaml
  namespace: grpcntcp
relationship_types:
  GraphicsControllerDependsOn:
    derived_from: core:DependsOn
    properties:
      Oem:
        type: resource:Oem
        description: >-
          The OEM extension property.
        required: false
      Processors@odata_count:
        type: odatav4:count
        description: >-
          The number of items in a collection.
        required: false
node_types:
  GraphicsController:
    description: >-
      The GraphicsController schema defines a graphics controller that can be used
      to drive one or more display devices.
    properties:
      AssetTag:
        type: string
        description: >-
          The user-assigned asset tag for this graphics controller.
        required: false
      BiosVersion:
        type: string
        description: >-
          The version of the graphics controller BIOS or primary graphics controller
          firmware.
        required: false
      Description:
        type: resource:Description
        description: >-
          The description of this resource.  Used for commonality in the schema definitions.
        required: false
      DriverVersion:
        type: string
        description: >-
          The version of the graphics controller driver loaded in the operating system.
        required: false
      Id:
        type: resource:Id
        description: >-
          The unique identifier for this resource within the collection of similar
          resources.
        required: true
      Location:
        type: resource:Location
        description: >-
          The location of the graphics controller.
        required: false
      Manufacturer:
        type: string
        description: >-
          The manufacturer of this graphics controller.
        required: false
      Model:
        type: string
        description: >-
          The product model number of this graphics controller.
        required: false
      Name:
        type: resource:Name
        description: >-
          The name of the resource or array member.
        required: true
      Oem:
        type: resource:Oem
        description: >-
          The OEM extension property.
        required: false
      PartNumber:
        type: string
        description: >-
          The part number for this graphics controller.
        required: false
      SKU:
        type: string
        description: >-
          The SKU for this graphics controller.
        required: false
      SerialNumber:
        type: string
        description: >-
          The serial number for this graphics controller.
        required: false
      SparePartNumber:
        type: string
        description: >-
          The spare part number of the graphics controller.
        required: false
      Status:
        type: resource:Status
        description: >-
          The status and health of the resource and its subordinate or dependent resources.
        required: false
    requirements:
    - Ports:
        node: prtcllc:PortCollection
        capability: prtcllcp:PortCollectionContainable
        relationship: core:Contains
        count_range:
        - 0
        - 1
        description: >-
          The ports of the graphics controller.
    - PCIeDevice:
        node: pcdvc:PCIeDevice
        capability: pcdvccps:PCIeDeviceFeature
        relationship: GraphicsControllerDependsOn
        count_range:
        - 0
        - 1
        description: >-
          A link to the PCIe device that represents this graphics controller.
    - Processors:
        node: Processor
        capability: prcscps:ProcessorFeature
        relationship: GraphicsControllerDependsOn
        count_range:
        - 0
        - UNBOUNDED
        description: >-
          An array of links to the processors that are a part of this graphics controller.
    capabilities:
      feature:
        type: grpcntcp:GraphicsControllerFeature
      containable:
        type: grpcntcp:GraphicsControllerContainable
