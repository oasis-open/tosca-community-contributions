    - ManagedBy:
        # node: manager:Manager
        capability: core:Feature
        relationship: FabricDependsOn
        count_range:
        - 0
        - UNBOUNDED
        description: >-
          An array of links to the managers responsible for managing this fabric.
    capabilities:
      feature:
