        - 1
        description: >-
          The collection of links to the endpoint groups that this fabric contains.
    - Endpoints:
        node: endpcllc:EndpointCollection
        capability: endcllcp:EndpointCollectionContainable
        relationship: core:Contains
        count_range:
        - 0
        - 1
        description: >-
          The collection of links to the endpoints that this fabric contains.
    - FabricType:
        node: protocol:Protocol
        capability: prtclcps:ProtocolContainable
        relationship: core:Contains
        count_range:
        - 0
        - 1
        description: >-
          The protocol being sent over this fabric.
    - Switches:
        node: swtccllc:SwitchCollection
        capability: swtcllcp:SwitchCollectionContainable
