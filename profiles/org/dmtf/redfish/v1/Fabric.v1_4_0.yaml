        description: >-
          The number of items in a collection.
        required: false
      Oem:
        type: resource:Oem
        description: >-
          The OEM extension property.
        required: false
node_types:
  Fabric:
    description: >-
      The `Fabric` schema represents a simple fabric consisting of one or more switches,
      zero or more endpoints, and zero or more zones.
    properties:
      Description:
        type: resource:Description
        description: >-
          The description of this resource.  Used for commonality in the schema definitions.
        required: false
      Id:
        type: resource:Id
        description: >-
          The unique identifier for this resource within the collection of similar
          resources.
        required: true
      MaxZones:
        type: integer
        description: >-
          The maximum number of zones the switch can currently configure.
        required: false
      Name:
        type: resource:Name
        description: >-
          The name of the resource or array member.
        required: true
      Oem:
        type: resource:Oem
        description: >-
          The OEM extension property.
        required: false
      Status:
        type: resource:Status
        description: >-
          The status and health of the resource and its subordinate or dependent resources.
        required: false
      UUID:
        type: resource:UUID
        description: >-
          The UUID for this fabric.
        required: false
    requirements:
    - AddressPools:
        node: addplcl:AddressPoolCollection
        capability: adplclcp:AddressPoolCollectionContainable
        relationship: core:Contains
        count_range:
        - 0
        - 1
        description: >-
          The collection of links to the address pools that this fabric contains.
    - Connections:
        node: cnnccllc:ConnectionCollection
        capability: cnncllcp:ConnectionCollectionContainable
        relationship: core:Contains
        count_range:
