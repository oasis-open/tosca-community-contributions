data_types:
  CommandShell:
    description: >-
      The manager's command line user interface or command shell service.
    properties:
      ConnectTypesSupported:
        type: list
        description: >-
          This property enumerates the command shell connection types that the implementation
          allows.
        required: false
        entry_schema:
          type: string
      MaxConcurrentSessions:
        type: integer
        description: >-
          The maximum number of service sessions, regardless of protocol, that this
          manager can support.
        required: false
        validation:
          $greater_or_equal:
          - $value
          - 0
      ServiceEnabled:
        type: boolean
        description: >-
          An indication of whether the service is enabled for this manager.
        required: false
  GraphicalConsole:
    description: >-
      The manager's graphical console service.
    properties:
      ConnectTypesSupported:
        type: list
        description: >-
          This property enumerates the graphical console connection types that the
          implementation allows.
        required: false
        entry_schema:
          type: string
      MaxConcurrentSessions:
        type: integer
        description: >-
          The maximum number of service sessions, regardless of protocol, that this
          manager can support.
        required: false
        validation:
          $greater_or_equal:
          - $value
          - 0
      ServiceEnabled:
        type: boolean
        description: >-
          An indication of whether the service is enabled for this manager.
        required: false
  SerialConsole:
    description: >-
      The serial console service that this manager provides.
    properties:
      ConnectTypesSupported:
        type: list
        description: >-
          This property enumerates the serial console connection types that the implementation
          allows.
        required: false
        entry_schema:
          type: string
      MaxConcurrentSessions:
        type: integer
        description: >-
          The maximum number of service sessions, regardless of protocol, that this
          manager can support.
        required: false
        validation:
          $greater_or_equal:
          - $value
          - 0
      ServiceEnabled:
        type: boolean
        description: >-
          An indication of whether the service is enabled for this manager.
        required: false
  DaylightSavingTime:
    description: >-
      The daylight saving time settings for this manager.
    properties:
      EndDateTime:
        type: string
        description: >-
          The end date and time with UTC offset of daylight saving time.
        required: false
      OffsetMinutes:
        type: integer
        description: >-
          The daylight saving time offset in minutes.
        required: false
      StartDateTime:
        type: string
        description: >-
          The start date and time with UTC offset of daylight saving time.
        required: false
      TimeZoneName:
        type: string
        description: >-
          The time zone of the manager when daylight saving time is in effect.
        required: false
relationship_types:
  ManagerDependsOn:
    derived_from: core:DependsOn
    properties:
      ManagedBy@odata_count:
        type: odatav4:count
        description: >-
          The number of items in a collection.
        required: false
      ManagerForChassis@odata_count:
        type: odatav4:count
        description: >-
          The number of items in a collection.
        required: false
      ManagerForFabrics@odata_count:
        type: odatav4:count
        description: >-
          The number of items in a collection.
        required: false
      ManagerForManagers@odata_count:
        type: odatav4:count
        description: >-
          The number of items in a collection.
        required: false
      ManagerForServers@odata_count:
        type: odatav4:count
        description: >-
          The number of items in a collection.
        required: false
      ManagerForSwitches@odata_count:
        type: odatav4:count
        description: >-
          The number of items in a collection.
        required: false
      Oem:
        type: resource:Oem
        description: >-
          The OEM extension property.
        required: false
      SelectedNetworkPort:
        type: string
        description: >-
          The network port currently used by this manager.  This allows selection
          of shared or dedicated ports for managers that support one or the other.  For
          managers that always have their dedicated port enabled, this allows the
          selection of which shared port to use.
        required: false
      SoftwareImages@odata_count:
        type: odatav4:count
        description: >-
          The number of items in a collection.
        required: false
interface_types:
  ManagerActions:
    operations:
      ForceFailover:
        description: >-
          The `ForceFailover` action forces a failover of this manager to the manager
          used in the parameter.
        inputs:
          NewManager:
            type: Manager
            description: >-
              The manager to which to fail over.
            required: true
      ModifyRedundancySet:
        description: >-
          The `ModifyRedundancySet` operation adds members to or removes members from
          a redundant group of managers.
        inputs:
          Add:
            type: list
            description: >-
              An array of managers to add to the redundancy set.
            required: false
          Remove:
            type: list
            description: >-
              An array of managers to remove from the redundancy set.
            required: false
      Reset:
        description: >-
          The reset action resets/reboots the manager.
        inputs:
          ResetType:
            type: resource:ResetType
            description: >-
              The type of reset.
            required: false
      ResetToDefaults:
        description: >-
          The reset action resets the manager settings to factory defaults.  This
          can cause the manager to reset.
        inputs:
          ResetType:
            type: ResetToDefaultsType
            description: >-
              The type of reset to defaults.
            required: true
      UpdateSecurityMode:
        description: >-
          The update security mode action updates the security mode for the manager.  This
          can cause the manager to reset and reset other settings to factory defaults.  Services
          might require the `ResetToDefaults` action to clear the security mode.
        inputs:
          OEMSecurityMode:
            type: string
            description: >-
              The OEM-specific security mode to apply to the manager.
            required: false
          SecurityMode:
            type: SecurityModeTypes
            description: >-
              The security mode to apply to the manager.
            required: true
node_types:
  Manager:
    description: >-
      In Redfish, a manager is a systems management entity that can implement or provide
      access to a Redfish service.  Examples of managers are BMCs (baseboard management
      controllers), enclosure managers, management controllers, and other subsystems
      that are assigned manageability functions.  An implementation can have multiple
      managers, which might be directly accessible through a Redfish-defined interface.
    properties:
      '@odata_id':
        type: odatav4:id
        description: >-
          The unique identifier for a resource.
        required: true
      '@odata_context':
        type: odatav4:context
        description: >-
          The OData description of a payload.
        required: false
      '@odata_etag':
        type: odatav4:etag
        description: >-
          The current ETag of the resource.
        required: false
      '@odata_type':
        type: odatav4:type
        description: >-
          The type of a resource.
        required: true
      CommandShell:
        type: CommandShell
        description: >-
          The manager's command line user interface or command shell service.
        required: false
      DateTime:
        type: string
        description: >-
          The current date and time with UTC offset of the manager.
        required: false
      DateTimeLocalOffset:
        type: string
        description: >-
          The time offset from UTC that the `DateTime` property is in `+HH:MM` format.
        required: false
        validation:
          $matches:
          - $value
          - ^([-+][0-1][0-9]:[0-5][0-9])$
      Description:
        type: string
        required: false
      FirmwareVersion:
        type: string
        description: >-
          The firmware version of this manager.
        required: false
      GraphicalConsole:
        type: GraphicalConsole
        description: >-
          The manager's graphical console service.
        required: false
      Id:
        type: resource:Id
        description: >-
          The unique identifier for this resource within the collection of similar
          resources.
        required: true
      ManagerType:
        type: string
        description: >-
          The type of manager that this resource represents.
        required: false
        validation:
          $valid_values:
          - $value
          - - ManagementController
            - EnclosureManager
            - BMC
            - RackManager
            - AuxiliaryController
            - Service
            - FabricManager
      Model:
        type: string
        description: >-
          The model information of this manager, as defined by the manufacturer.
        required: false
      Name:
        type: resource:Name
        description: >-
          The name of the resource or array member.
        required: true
      Oem:
        type: resource:Oem
        description: >-
          The OEM extension property.
        required: false
      Redundancy@odata_count:
        type: odatav4:count
        description: >-
          The number of items in a collection.
        required: false
      SerialConsole:
        type: SerialConsole
        description: >-
          The serial console service that this manager provides.
        required: false
      ServiceEntryPointUUID:
        type: string
        description: >-
          The UUID of the Redfish service that is hosted by this manager.
        required: false
      Status:
        type: resource:Status
        description: >-
          The status and health of the resource and its subordinate or dependent resources.
        required: false
      UUID:
        type: string
        description: >-
          The UUID for this manager.
        required: false
      PowerState:
        type: string
        description: >-
          The current power state of the manager.
        required: false
      AutoDSTEnabled:
        type: boolean
        description: >-
          An indication of whether the manager is configured for automatic Daylight
          Saving Time (DST) adjustment.
        required: false
      RemoteRedfishServiceUri:
        type: string
        description: >-
          The URI of the Redfish service root for the remote manager that this resource
          represents.
        required: false
      Manufacturer:
        type: string
        description: >-
          The manufacturer of this manager.
        required: false
      PartNumber:
        type: string
        description: >-
          The part number of the manager.
        required: false
      SerialNumber:
        type: string
        description: >-
          The serial number of the manager.
        required: false
      LastResetTime:
        type: string
        description: >-
          The date and time when the manager was last reset or rebooted.
        required: false
      TimeZoneName:
        type: string
        description: >-
          The time zone of the manager.
        required: false
      Location:
        type: resource:Location
        description: >-
          The location of the manager.
        required: false
      LocationIndicatorActive:
        type: boolean
        description: >-
          An indicator allowing an operator to physically locate this resource.
        required: false
      SparePartNumber:
        type: string
        description: >-
          The spare part number of the manager.
        required: false
      Measurements:
        type: list
        description: >-
          An array of DSP0274-defined measurement blocks.
        required: false
        entry_schema:
          type: sftwinvn:MeasurementBlock
      ManagerDiagnosticData:
        type: string
        description: >-
          The diagnostic data for this manager.
        required: false
      AdditionalFirmwareVersions:
        type: sftwinvn:AdditionalVersions
        description: >-
          The additional firmware versions of the manager.
        required: false
      ServiceIdentification:
        type: string
        description: >-
          A product instance identifier displayed in the Redfish service root.
        required: false
      SecurityPolicy:
        type: string
        description: >-
          The security policy settings for this manager.
        required: false
      Version:
        type: string
        description: >-
          The hardware version of this manager.
        required: false
      DaylightSavingTime:
        type: DaylightSavingTime
        description: >-
          The daylight saving time settings for this manager.
        required: false
      DateTimeSource:
        type: string
        description: >-
          The source of the date and time of this manager, such as NTP, RTC, or firmware.
        required: false
      OEMSecurityMode:
        type: string
        description: >-
          The OEM-specific security compliance mode(s) that the manager is currently
          configured to enforce.
        required: false
      SecurityMode:
        type: string
        description: >-
          The security compliance mode that the manager is currently configured to
          enforce.
        required: false
        validation:
          $valid_values:
          - $value
          - - FIPS_140_2
            - FIPS_140_3
            - CNSA_1_0
            - CNSA_2_0
            - SuiteB
            - OEM
            - Default
      ReadyToRemove:
        type: boolean
        description: >-
          An indication of whether the manager is prepared by the system for removal.
        required: false
      ServiceUseNotification:
        type: string
        description: >-
          The usage notification message displayed in the Redfish service root.
        required: false
    requirements:
    - EthernetInterfaces:
        # node: ethintcl:EthernetInterfaceCollection
        capability: core:Containable
        relationship: core:Contains
        count_range:
        - 0
        - 1
        description: >-
          The link to a collection of NICs that this manager uses for network communication.
    - LogServices:
        node: lgsrvcl:LogServiceCollection
        capability: lgsrclcp:LogServiceCollectionContainable
        relationship: core:Contains
        count_range:
        - 0
        - 1
        description: >-
          The link to a collection of logs that the manager uses.
    - NetworkProtocol:
        node: mngntwpr:ManagerNetworkProtocol
        capability: mnntprcp:ManagerNetworkProtocolContainable
        relationship: core:Contains
        count_range:
        - 0
        - 1
        description: >-
          The link to the network services and their settings that the manager controls.
    - Redundancy:
        node: rdndncy:Redundancy
        capability: rdndcps:RedundancyContainable
        relationship: core:Contains
        count_range:
        - 0
        - UNBOUNDED
        description: >-
          The redundancy information for the managers of this system.
    - SerialInterfaces:
        node: srlintcl:SerialInterfaceCollection
        capability: srinclcp:SerialInterfaceCollectionContainable
        relationship: core:Contains
        count_range:
        - 0
        - 1
        description: >-
          The link to a collection of serial interfaces that this manager uses for
          serial and console communication.
    - VirtualMedia:
        node: vrtmdcl:VirtualMediaCollection
        capability: vrmdclcp:VirtualMediaCollectionContainable
        relationship: core:Contains
        count_range:
        - 0
        - 1
        description: >-
          The link to the virtual media services for this particular manager.
    - HostInterfaces:
        # node: hstintcl:HostInterfaceCollection
        capability: core:Containable
        relationship: core:Contains
        count_range:
        - 0
        - 1
        description: >-
          The link to a collection of host interfaces that this manager uses for local
          host communication.  Clients can find host interface configuration options
          and settings in this navigation property.
    - RemoteAccountService:
        node: accnsrvc:AccountService
        capability: accsrvcp:AccountServiceContainable
        relationship: core:Contains
        count_range:
        - 0
        - 1
        description: >-
          The link to the account service resource for the remote manager that this
          resource represents.
    - USBPorts:
        # node: prtcllc:PortCollection
        capability: prtcllcp:PortCollectionContainable
        relationship: core:Contains
        count_range:
        - 0
        - 1
        description: >-
          The USB ports of the manager.
    - Certificates:
        node: crtfcllc:CertificateCollection
        capability: crtcllcp:CertificateCollectionContainable
        relationship: core:Contains
        count_range:
        - 0
        - 1
        description: >-
          The link to a collection of certificates for device identity and attestation.
    - DedicatedNetworkPorts:
        node: prtcllc:PortCollection
        capability: prtcllcp:PortCollectionContainable
        relationship: core:Contains
        count_range:
        - 0
        - 1
        description: >-
          The dedicated network ports of the manager.
    - SharedNetworkPorts:
        node: prtcllc:PortCollection
        capability: prtcllcp:PortCollectionContainable
        relationship: core:Contains
        count_range:
        - 0
        - 1
        description: >-
          The shared network ports of the manager.
    - ActiveSoftwareImage:
        node: sftwinvn:SoftwareInventory
        capability: sftinvcp:SoftwareInventoryFeature
        relationship: ManagerDependsOn
        count_range:
        - 0
        - 1
        description: >-
          The link to the software inventory resource that represents the active firmware
          image for this manager.
    - ManagedBy:
        node: Manager
        capability: mngrcps:ManagerFeature
        relationship: ManagerDependsOn
        count_range:
        - 0
        - UNBOUNDED
        description: >-
          The array of links to the managers responsible for managing this manager.
    - ManagerForChassis:
        # node: chassis:Chassis
        capability: chssscps:ChassisFeature
        relationship: ManagerDependsOn
        count_range:
        - 0
        - UNBOUNDED
        description: >-
          An array of links to the chassis this manager controls.
    - ManagerForFabrics:
        # node: fabric:Fabric
        capability: core:Feature
        relationship: ManagerDependsOn
        count_range:
        - 0
        - UNBOUNDED
        description: >-
          An array of links to the fabrics that this manager controls.
    - ManagerForManagers:
        node: Manager
        capability: mngrcps:ManagerFeature
        relationship: ManagerDependsOn
        count_range:
        - 0
        - UNBOUNDED
        description: >-
          An array of links to the managers that are managed by this manager.
    - ManagerForServers:
        # node: cmptsyst:ComputerSystem
        capability: core:Feature
        relationship: ManagerDependsOn
        count_range:
        - 0
        - UNBOUNDED
        description: >-
          An array of links to the systems that this manager controls.
    - ManagerForSwitches:
        # node: switch:Switch
        capability: core:Feature
        relationship: ManagerDependsOn
        count_range:
        - 0
        - UNBOUNDED
        description: >-
          An array of links to the switches that this manager controls.
    - ManagerInChassis:
        node: chassis:Chassis
        capability: chssscps:ChassisFeature
        relationship: ManagerDependsOn
        count_range:
        - 0
        - 1
        description: >-
          The link to the chassis where this manager is located.
    - SoftwareImages:
        node: sftwinvn:SoftwareInventory
        capability: sftinvcp:SoftwareInventoryFeature
        relationship: ManagerDependsOn
        count_range:
        - 0
        - UNBOUNDED
        description: >-
          The images that are associated with this manager.
    interfaces:
      Actions:
        type: ManagerActions
    capabilities:
      feature:
        type: mngrcps:ManagerFeature
      containable:
        type: mngrcps:ManagerContainable
