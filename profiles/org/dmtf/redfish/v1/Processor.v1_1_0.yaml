tosca_definitions_version: tosca_2_0
description: >-
  Types generated from JSON Schema by any2tosca
imports:
- url: Resource.yaml
  namespace: resource
- url: Chassis.yaml
  namespace: chassis
- url: Core.yaml
  namespace: core
- url: Processor_caps.yaml
  namespace: prcscps
- url: Chassis_caps.yaml
  namespace: chssscps
data_types:
  InstructionSet:
    derived_from: string
    validation:
      $valid_values:
      - $value
      - - x86
        - x86-64
        - IA-64
        - ARM-A32
        - ARM-A64
        - MIPS32
        - MIPS64
        - OEM
  ProcessorArchitecture:
    derived_from: string
    validation:
      $valid_values:
      - $value
      - - x86
        - IA-64
        - ARM
        - MIPS
        - OEM
  ProcessorId:
    description: >-
      This type describes the Identification information for a processor.
    properties:
      VendorId:
        type: string
        description: >-
          The Vendor Identification for this processor.
        required: false
      IdentificationRegisters:
        type: string
        description: >-
          The contents of the Identification Registers (CPUID) for this processor.
        required: false
      EffectiveFamily:
        type: string
        description: >-
          The effective Family for this processor.
        required: false
      EffectiveModel:
        type: string
        description: >-
          The effective Model for this processor.
        required: false
      Step:
        type: string
        description: >-
          The Step value for this processor.
        required: false
      MicrocodeInfo:
        type: string
        description: >-
          The Microcode Information for this processor.
        required: false
  ProcessorType:
    derived_from: string
    validation:
      $valid_values:
      - $value
      - - CPU
        - GPU
        - FPGA
        - DSP
        - Accelerator
        - OEM
  Actions:
    description: >-
      The available actions for this resource.
    properties:
      Oem:
        type: map
        description: >-
          The available OEM specific actions for this resource.
        required: false
node_types:
  Processor:
    description: >-
      This is the schema definition for the Processor resource.  It represents the
      properties of a processor attached to a System.
    properties:
      Oem:
        type: resource:Oem
        description: >-
          This is the manufacturer/provider specific extension moniker used to divide
          the Oem object into sections.
        required: false
      Id:
        type: resource:Id
        description: >-
          The unique identifier for this resource within the collection of similar
          resources.
        required: true
      Description:
        type: resource:Description
        description: >-
          The description of this resource.  Used for commonality in the schema definitions.
        required: false
      Name:
        type: resource:Name
        description: >-
          The name of the resource or array member.
        required: true
      Socket:
        type: string
        description: >-
          The socket or location of the processor.
        required: false
      ProcessorType:
        type: ProcessorType
        description: >-
          The type of processor.
        required: false
      ProcessorArchitecture:
        type: ProcessorArchitecture
        description: >-
          The architecture of the processor.
        required: false
      InstructionSet:
        type: InstructionSet
        description: >-
          The instruction set of the processor.
        required: false
      ProcessorId:
        type: ProcessorId
        description: >-
          Identification information for this processor.
        required: false
      Status:
        type: resource:Status
        description: >-
          The status and health of a resource and its children.
        required: false
      Manufacturer:
        type: string
        description: >-
          The processor manufacturer.
        required: false
      Model:
        type: string
        description: >-
          The product model number of this device.
        required: false
      MaxSpeedMHz:
        type: float
        description: >-
          The maximum clock speed of the processor.
        required: false
      TotalCores:
        type: float
        description: >-
          The total number of cores contained in this processor.
        required: false
      TotalThreads:
        type: float
        description: >-
          The total number of execution threads supported by this processor.
        required: false
      Links:
        type: Links
        description: >-
          Contains references to other resources that are related to this resource.
        required: false
      Actions:
        type: Actions
        description: >-
          The available actions for this resource.
        required: false
    capabilities:
      feature:
        type: prcscps:ProcessorFeature
      containable:
        type: prcscps:ProcessorContainable
  Links:
    description: >-
      Contains references to other resources that are related to this resource.
    properties:
      Oem:
        type: resource:Oem
        description: >-
          Oem extension object.
        required: false
    requirements:
    - Chassis:
        node: chassis:Chassis
        capability: chssscps:ChassisContainable
        relationship: core:Contains
        count_range:
        - 0
        - 1
        description: >-
          A reference to the Chassis which contains this Processor.
    capabilities:
      containable:
        type: prcscps:LinksContainable
