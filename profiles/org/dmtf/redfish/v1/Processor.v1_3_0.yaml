tosca_definitions_version: tosca_2_0
description: >-
  Types generated from JSON Schema by any2tosca
imports:
- url: Chassis.yaml
  namespace: chassis
- url: Resource.yaml
  namespace: resource
- url: Core.yaml
  namespace: core
- url: Chassis_caps.yaml
  namespace: chssscps
- url: Assembly.yaml
  namespace: assembly
- url: ProcessorCollection.yaml
  namespace: prcscllc
- url: Assembly_caps.yaml
  namespace: assmcps
- url: ProcessorCollection_caps.yaml
  namespace: prccllcp
- url: Processor_caps.yaml
  namespace: prcscps
data_types:
  InstructionSet:
    derived_from: string
    validation:
      $valid_values:
      - $value
      - - x86
        - x86-64
        - IA-64
        - ARM-A32
        - ARM-A64
        - MIPS32
        - MIPS64
        - OEM
  ProcessorArchitecture:
    derived_from: string
    validation:
      $valid_values:
      - $value
      - - x86
        - IA-64
        - ARM
        - MIPS
        - OEM
  ProcessorId:
    description: >-
      This type describes the Identification information for a processor.
    properties:
      EffectiveFamily:
        type: string
        description: >-
          The effective Family for this processor.
        required: false
      EffectiveModel:
        type: string
        description: >-
          The effective Model for this processor.
        required: false
      IdentificationRegisters:
        type: string
        description: >-
          The contents of the Identification Registers (CPUID) for this processor.
        required: false
      MicrocodeInfo:
        type: string
        description: >-
          The Microcode Information for this processor.
        required: false
      Step:
        type: string
        description: >-
          The Step value for this processor.
        required: false
      VendorId:
        type: string
        description: >-
          The Vendor Identification for this processor.
        required: false
  ProcessorType:
    derived_from: string
    validation:
      $valid_values:
      - $value
      - - CPU
        - GPU
        - FPGA
        - DSP
        - Accelerator
        - Core
        - Thread
        - OEM
relationship_types:
  ProcessorDependsOn:
    derived_from: core:DependsOn
    properties:
      Oem:
        type: resource:Oem
        description: >-
          Oem extension object.
        required: false
node_types:
  Processor:
    description: >-
      This is the schema definition for the Processor resource.  It represents the
      properties of a processor attached to a System.
    properties:
      Description:
        type: resource:Description
        description: >-
          The description of this resource.  Used for commonality in the schema definitions.
        required: false
      Id:
        type: resource:Id
        description: >-
          The unique identifier for this resource within the collection of similar
          resources.
        required: true
      InstructionSet:
        type: InstructionSet
        description: >-
          The instruction set of the processor.
        required: false
      Location:
        type: resource:Location
        description: >-
          The location of a resource.
        required: false
      Manufacturer:
        type: string
        description: >-
          The processor manufacturer.
        required: false
      MaxSpeedMHz:
        type: float
        description: >-
          The maximum clock speed of the processor.
        required: false
      Model:
        type: string
        description: >-
          The product model number of this device.
        required: false
      Name:
        type: resource:Name
        description: >-
          The name of the resource or array member.
        required: true
      Oem:
        type: resource:Oem
        description: >-
          This is the manufacturer/provider specific extension moniker used to divide
          the Oem object into sections.
        required: false
      ProcessorArchitecture:
        type: ProcessorArchitecture
        description: >-
          The architecture of the processor.
        required: false
      ProcessorId:
        type: ProcessorId
        description: >-
          Identification information for this processor.
        required: false
      ProcessorType:
        type: ProcessorType
        description: >-
          The type of processor.
        required: false
      Socket:
        type: string
        description: >-
          The socket or location of the processor.
        required: false
      Status:
        type: resource:Status
        description: >-
          The status and health of a resource and its children.
        required: false
      TotalCores:
        type: float
        description: >-
          The total number of cores contained in this processor.
        required: false
      TotalThreads:
        type: float
        description: >-
          The total number of execution threads supported by this processor.
        required: false
    requirements:
    - Assembly:
        node: assembly:Assembly
        capability: assmcps:AssemblyContainable
        relationship: core:Contains
        count_range:
        - 0
        - 1
        description: >-
          A reference to the Assembly resource associated with this processor.
    - SubProcessors:
        node: prcscllc:ProcessorCollection
        capability: prccllcp:ProcessorCollectionContainable
        relationship: core:Contains
        count_range:
        - 0
        - 1
        description: >-
          A reference to the collection of Sub-Processors associated with this system,
          such as cores or threads that are part of a processor.
    - Chassis:
        node: chassis:Chassis
        capability: chssscps:ChassisFeature
        relationship: ProcessorDependsOn
        count_range:
        - 0
        - 1
        description: >-
          A reference to the Chassis which contains this Processor.
    capabilities:
      feature:
        type: prcscps:ProcessorFeature
      containable:
        type: prcscps:ProcessorContainable
