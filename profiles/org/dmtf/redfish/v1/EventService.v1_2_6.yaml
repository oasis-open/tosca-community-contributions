        required: false
      MessageId:
        type: boolean
        description: >-
          An indication of whether the service supports filtering by the MessageId
          property.
        required: false
      MetricReportDefinition:
        type: boolean
        description: >-
          An indication of whether the service supports filtering by the MetricReportDefinition
          property.
        required: false
      OriginResource:
        type: boolean
        description: >-
          An indication of whether the service supports filtering by the OriginResource
          property.
        required: false
      RegistryPrefix:
        type: boolean
        description: >-
          An indication of whether the service supports filtering by the RegistryPrefix
          property.
        required: false
      ResourceType:
        type: boolean
        description: >-
          An indication of whether the service supports filtering by the ResourceType
