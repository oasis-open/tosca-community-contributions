        required: false
interface_types:
  EventServiceActions:
    operations:
      SubmitTestEvent:
        description: >-
          This action generates a test event.
        inputs:
          EventId:
            type: string
            description: >-
              The ID for the event to add.
            required: false
          EventTimestamp:
            type: string
            description: >-
              The date and time for the event to add.
            required: false
          EventType:
            type: event:EventType
            description: >-
              The type for the event to add.
            required: false
          Message:
            type: string
            description: >-
              The human-readable message for the event to add.
            required: false
          MessageArgs:
            type: list
            description: >-
              An array of message arguments for the event to add.
            required: false
          MessageId:
            type: string
            description: >-
              The MessageId for the event to add.
            required: true
          OriginOfCondition:
            type: string
            description: >-
              The URL in the OriginOfCondition property of the event to add.  It is
              not a reference object.
            required: false
          Severity:
            type: string
            description: >-
              The severity for the event to add.
            required: false
node_types:
  EventService:
    description: >-
      The EventService schema contains properties for managing event subscriptions
      and generates the events sent to subscribers.  The resource has links to the
      actual collection of subscriptions, which are called event destinations.
    properties:
      DeliveryRetryAttempts:
        type: integer
        description: >-
          The number of times that the POST of an event is retried before the subscription
          terminates.  This retry occurs at the service level, which means that the
          HTTP POST to the event destination fails with an HTTP `4XX` or `5XX` status
          code or an HTTP timeout occurs this many times before the event destination
          subscription terminates.
        required: false
      DeliveryRetryIntervalSeconds:
        type: integer
        description: >-
          The interval, in seconds, between retry attempts for sending any event.
        required: false
      Description:
        type: resource:Description
        description: >-
          The description of this resource.  Used for commonality in the schema definitions.
        required: false
      EventFormatTypes:
        type: list
        description: >-
          The content types of the message that this service can send to the event
          destination.
        required: false
        entry_schema:
          type: evntdstn:EventFormatType
      EventTypesForSubscription:
        type: list
        description: >-
          The types of events to which a client can subscribe.
        required: false
        entry_schema:
          type: event:EventType
      Id:
        type: resource:Id
        description: >-
          The unique identifier for this resource within the collection of similar
          resources.
        required: true
      Name:
        type: resource:Name
        description: >-
          The name of the resource or array member.
        required: true
      Oem:
        type: resource:Oem
        description: >-
          The OEM extension property.
        required: false
      RegistryPrefixes:
        type: list
        description: >-
          The list of the prefixes of the message registries that can be used for
          the RegistryPrefix property on a subscription.  If this property is absent
          or contains an empty array, the service does not support RegistryPrefix-based
          subscriptions.
        required: false
        entry_schema:
          type: string
      ResourceTypes:
        type: list
        description: >-
          The list of @odata.type values, or schema names, that can be specified in
          the ResourceTypes array in a subscription.  If this property is absent or
          contains an empty array, the service does not support resource type-based
          subscriptions.
        required: false
        entry_schema:
          type: string
      SSEFilterPropertiesSupported:
        type: SSEFilterPropertiesSupported
        description: >-
          The set of properties that are supported in the `$filter` query parameter
          for the ServerSentEventUri.
        required: false
      ServerSentEventUri:
        type: string
        description: >-
          The link to a URI for receiving Server-Sent Event representations for the
          events that this service generates.
        required: false
      ServiceEnabled:
        type: boolean
        description: >-
          An indication of whether this service is enabled.  If `false`, events are
          no longer published, new SSE connections cannot be established, and existing
          SSE connections are terminated.
        required: false
      Status:
        type: resource:Status
        description: >-
          The status and health of the resource and its subordinate or dependent resources.
        required: false
      SubordinateResourcesSupported:
        type: boolean
        description: >-
          An indication of whether the service supports the SubordinateResources property
          on both event subscriptions and generated events.
        required: false
    requirements:
    - Subscriptions:
        node: evndstcl:EventDestinationCollection
        capability: evdsclcp:EventDestinationCollectionContainable
        relationship: core:Contains
        count_range:
        - 0
        - 1
        description: >-
          The link to a collection of event destinations.
    interfaces:
      Actions:
        type: EventServiceActions
    capabilities:
      feature:
        type: evnsrvcp:EventServiceFeature
      containable:
        type: evnsrvcp:EventServiceContainable
