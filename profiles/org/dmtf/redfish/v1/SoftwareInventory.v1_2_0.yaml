tosca_definitions_version: tosca_2_0
description: >-
  Types generated from JSON Schema by any2tosca
imports:
- url: Resource.yaml
  namespace: resource
- url: odata.v4_0_2.yaml
  namespace: odata
- url: Core.yaml
  namespace: core
- url: SoftwareInventory_caps.yaml
  namespace: sftinvcp
node_types:
  SoftwareInventory:
    description: >-
      This schema defines an inventory of software components.
    properties:
      Description:
        type: resource:Description
        description: >-
          The description of this resource.  Used for commonality in the schema definitions.
        required: false
      Id:
        type: resource:Id
        description: >-
          The unique identifier for this resource within the collection of similar
          resources.
        required: true
      LowestSupportedVersion:
        type: string
        description: >-
          A string representing the lowest supported version of this software.
        required: false
      Manufacturer:
        type: string
        description: >-
          A string representing the manufacturer/producer of this software.
        required: false
      Name:
        type: resource:Name
        description: >-
          The name of the resource or array member.
        required: true
      Oem:
        type: resource:Oem
        description: >-
          This is the manufacturer/provider specific extension moniker used to divide
          the Oem object into sections.
        required: false
      RelatedItem:
        type: list
        description: >-
          The ID(s) of the resources associated with this software inventory item.
        required: false
        entry_schema:
          type: odata:idRef
      RelatedItem@odata_count:
        type: odata:count
        description: >-
          The number of items in a collection.
        required: false
      ReleaseDate:
        type: string
        description: >-
          Release date of this software.
        required: false
      SoftwareId:
        type: string
        description: >-
          A string representing the implementation-specific ID for identifying this
          software.
        required: false
      Status:
        type: resource:Status
        description: >-
          The status and health of a resource and its children.
        required: false
      UefiDevicePaths:
        type: list
        description: >-
          A list of strings representing the UEFI Device Path(s) of the component(s)
          associated with this software inventory item.
        required: false
        entry_schema:
          type: string
      Updateable:
        type: boolean
        description: >-
          Indicates whether this software can be updated by the update service.
        required: false
      Version:
        type: string
        description: >-
          A string representing the version of this software.
        required: false
    capabilities:
      feature:
        type: sftinvcp:SoftwareInventoryFeature
      containable:
        type: sftinvcp:SoftwareInventoryContainable
