tosca_definitions_version: tosca_2_0
description: >-
  Types generated from JSON Schema by any2tosca
imports:
- url: odata-v4.yaml
  namespace: odatav4
- url: CXLLogicalDevice.yaml
  namespace: cxlldvc
- url: Endpoint.yaml
  namespace: endpoint
- url: Resource.yaml
  namespace: resource
- url: Core.yaml
  namespace: core
- url: CXLLogicalDevice_caps.yaml
  namespace: cxldvccp
- url: Endpoint_caps.yaml
  namespace: endpcps
- url: MemoryChunks_caps.yaml
  namespace: mmrchncp
data_types:
  AddressRangeType:
    derived_from: string
    validation:
      $valid_values:
      - $value
      - - Volatile
        - PMEM
        - Block
  InterleaveSet:
    description: >-
      This an interleave set for a memory chunk.
    properties:
      Memory:
        type: odatav4:idRef
        description: >-
          Describes a memory device of the interleave set.
        required: false
      MemoryLevel:
        type: integer
        description: >-
          Level of the interleave set for multi-level tiered memory.
        required: false
      OffsetMiB:
        type: integer
        description: >-
          Offset within the DIMM that corresponds to the start of this memory region,
          measured in mebibytes (MiB).
        required: false
      RegionId:
        type: string
        description: >-
          DIMM region identifier.
        required: false
      SizeMiB:
        type: integer
        description: >-
          Size of this memory region measured in mebibytes (MiB).
        required: false
  MediaLocation:
    derived_from: string
    validation:
      $valid_values:
      - $value
      - - Local
        - Remote
        - Mixed
  OperationalState:
    derived_from: string
    validation:
      $valid_values:
      - $value
      - - Online
        - Offline
relationship_types:
  MemoryChunksDependsOn:
    derived_from: core:DependsOn
    properties:
      CXLLogicalDevices@odata_count:
        type: odatav4:count
        description: >-
          The number of items in a collection.
        required: false
      Endpoints@odata_count:
        type: odatav4:count
        description: >-
          The number of items in a collection.
        required: false
      MemoryRegions@odata_count:
        type: odatav4:count
        description: >-
          The number of items in a collection.
        required: false
      Oem:
        type: resource:Oem
        description: >-
          The OEM extension property.
        required: false
node_types:
  MemoryChunks:
    description: >-
      The `MemoryChunks` schema contains the definition of a memory chunk and its
      configuration.
    properties:
      AddressRangeOffsetMiB:
        type: integer
        description: >-
          Offset of the memory chunk in the address range in MiB.
        required: false
      AddressRangeType:
        type: AddressRangeType
        description: >-
          Memory type of this memory chunk.
        required: true
      Description:
        type: resource:Description
        description: >-
          The description of this resource.  Used for commonality in the schema definitions.
        required: false
      DisplayName:
        type: string
        description: >-
          A user-configurable string to name the memory chunk.
        required: false
      Id:
        type: resource:Id
        description: >-
          The unique identifier for this resource within the collection of similar
          resources.
        required: true
      InterleaveSets:
        type: list
        description: >-
          The interleave sets for the memory chunk.
        required: false
        entry_schema:
          type: InterleaveSet
      IsMirrorEnabled:
        type: boolean
        description: >-
          An indication of whether memory mirroring is enabled for this memory chunk.
        required: false
      IsSpare:
        type: boolean
        description: >-
          An indication of whether sparing is enabled for this memory chunk.
        required: false
      MediaLocation:
        type: MediaLocation
        description: >-
          The location of the memory media for this memory chunk.
        required: false
      MemoryChunkSizeMiB:
        type: integer
        description: >-
          Size of the memory chunk measured in mebibytes (MiB).
        required: false
      Name:
        type: resource:Name
        description: >-
          The name of the resource or array member.
        required: true
      Oem:
        type: resource:Oem
        description: >-
          The OEM extension property.
        required: false
      RequestedOperationalState:
        type: OperationalState
        description: >-
          The requested operational state of this memory chunk.
        required: false
      Status:
        type: resource:Status
        description: >-
          The status and health of the resource and its subordinate or dependent resources.
        required: false
    requirements:
    - CXLLogicalDevices:
        node: cxlldvc:CXLLogicalDevice
        capability: cxldvccp:CXLLogicalDeviceFeature
        relationship: MemoryChunksDependsOn
        count_range:
        - 0
        - UNBOUNDED
        description: >-
          An array of links to the CXL logical devices associated with this memory
          chunk.
    - Endpoints:
        node: endpoint:Endpoint
        capability: endpcps:EndpointFeature
        relationship: MemoryChunksDependsOn
        count_range:
        - 0
        - UNBOUNDED
        description: >-
          An array of links to the endpoints that connect to this memory chunk.
    - MemoryRegions:
        # node: mmryrgn:MemoryRegion
        capability: core:Feature
        relationship: MemoryChunksDependsOn
        count_range:
        - 0
        - UNBOUNDED
        description: >-
          An array of links to the memory regions for which this memory chunk provides
          capacity.
    capabilities:
      feature:
        type: mmrchncp:MemoryChunksFeature
      containable:
        type: mmrchncp:MemoryChunksContainable
