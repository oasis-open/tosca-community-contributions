tosca_definitions_version: tosca_2_0
description: >-
  Types generated from JSON Schema by any2tosca
imports:
- url: SoftwareInventory.yaml
  namespace: sftwinvn
- url: NetworkDeviceFunction.yaml
  namespace: ntwdvcfn
- url: odata-v4.yaml
  namespace: odatav4
- url: NetworkPort.yaml
  namespace: ntwrkprt
- url: Resource.yaml
  namespace: resource
- url: PCIeDevice.yaml
  namespace: pcdvc
- url: Port.yaml
  namespace: port
- url: Assembly.yaml
  namespace: assembly
- url: CertificateCollection.yaml
  namespace: crtfcllc
- url: EnvironmentMetrics.yaml
  namespace: envrmtrc
- url: NetworkAdapterMetrics.yaml
  namespace: ntwadpmt
- url: NetworkDeviceFunctionCollection.yaml
  namespace: ntdvfncl
- url: NetworkPortCollection.yaml
  namespace: ntwprtcl
- url: PortCollection.yaml
  namespace: prtcllc
- url: ProcessorCollection.yaml
  namespace: prcscllc
- url: Core.yaml
  namespace: core
