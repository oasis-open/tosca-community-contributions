  namespace: ntwadpcp
- url: SoftwareInventory_caps.yaml
  namespace: sftinvcp
- url: NetworkDeviceFunction_caps.yaml
  namespace: ntdvfncp
- url: NetworkPort_caps.yaml
  namespace: ntwprtcp
- url: PCIeDevice_caps.yaml
  namespace: pcdvccps
- url: Port_caps.yaml
  namespace: portcaps
data_types:
  ControllerCapabilities:
    description: >-
      The capabilities of a controller.
    properties:
      DataCenterBridging:
        type: DataCenterBridging
        description: >-
          Data center bridging (DCB) for this controller.
        required: false
      NPAR:
        type: NicPartitioning
        description: >-
          NIC Partitioning (NPAR) capabilities for this controller.
        required: false
      NPIV:
        type: NPIV
        description: >-
          N_Port ID Virtualization (NPIV) capabilities for this controller.
        required: false
      NetworkDeviceFunctionCount:
        type: integer
        description: >-
          The maximum number of physical functions available on this controller.
        required: false
      NetworkPortCount:
        type: integer
        description: >-
          The number of physical ports on this controller.
        required: false
      VirtualizationOffload:
        type: VirtualizationOffload
        description: >-
          Virtualization offload for this controller.
        required: false
  Controllers:
    description: >-
      A network controller ASIC that makes up part of a network adapter.
    properties:
      ControllerCapabilities:
        type: ControllerCapabilities
        description: >-
          The capabilities of this controller.
        required: false
      FirmwarePackageVersion:
        type: string
        description: >-
          The version of the user-facing firmware package.
        required: false
      Identifiers:
        type: list
        description: >-
          The durable names for the network adapter controller.
        required: false
        entry_schema:
          type: resource:Identifier
      Links:
        type: ControllerLinks
        description: >-
          The links to other resources that are related to this resource.
        required: false
      Location:
        type: resource:Location
        description: >-
          The location of the network adapter controller.
        required: false
      PCIeInterface:
        type: string
        description: >-
          The PCIe interface details for this controller.
        required: false
  DataCenterBridging:
    description: >-
      Data center bridging (DCB) for capabilities of a controller.
    properties:
      Capable:
        type: boolean
        description: >-
          An indication of whether this controller is capable of data center bridging
          (DCB).
        required: false
  NPIV:
    description: >-
      N_Port ID Virtualization (NPIV) capabilities for a controller.
    properties:
      MaxDeviceLogins:
        type: integer
        description: >-
          The maximum number of N_Port ID Virtualization (NPIV) logins allowed simultaneously
          from all ports on this controller.
        required: false
      MaxPortLogins:
        type: integer
        description: >-
          The maximum number of N_Port ID Virtualization (NPIV) logins allowed per
          physical port on this controller.
        required: false
  NicPartitioning:
    description: >-
      NIC Partitioning capability, status, and configuration for a controller.
    properties:
      NparCapable:
        type: boolean
        description: >-
          An indication of whether the controller supports NIC function partitioning.
        required: false
      NparEnabled:
        type: boolean
        description: >-
          An indication of whether NIC function partitioning is active on this controller.
        required: false
  PortSplitting:
    description: >-
      The port splitting capabilities for a controller.
    properties:
      CurrentConfiguration:
        type: list
        description: >-
          The current port splitting configuration for this controller.
        required: false
        entry_schema:
          type: PortSplittingSubconfiguration
      MaximumSubports:
        type: integer
        description: >-
          The maximum number of subdivided ports that this controller supports.
        required: false
      MaximumSubportsPerPort:
        type: integer
        description: >-
          The maximum number of subdivided ports split from a single physical port
          that this controller supports.
        required: false
      SupportedConfigurations:
        type: list
        description: >-
          The port splitting configurations this controller supports.
        required: false
        entry_schema:
          type: PortSplittingSubconfigurationList
  PortSplittingSubconfiguration:
    description: >-
      A port splitting subconfiguration for one or more physical ports on a controller.
    properties:
      EndingPhysicalPort:
        type: integer
        description: >-
          The last physical port to which this subconfiguration applies.
        required: false
      FirstSubportId:
        type: integer
        description: >-
          The first identifier to assign to subports in this subconfiguration.  Subport
          identifiers are assigned sequentially to the subports starting with those
          for `StartPort` and working through to those for `EndPort`.
        required: false
      Lanes:
        type: list
        description: >-
          The number of lanes for each subport.
        required: false
        entry_schema:
          type: integer
      LinkSpeedGbps:
        type: list
        description: >-
          The configured link speed for each subport.
        required: false
        entry_schema:
          type: integer
      StartingPhysicalPort:
        type: integer
        description: >-
          The first physical port to which this subconfiguration applies.
        required: false
      SubportsPerPort:
        type: integer
        description: >-
          The number of subports created from each port in this subconfiguration.
        required: false
  PortSplittingSubconfigurationList:
    description: >-
      A port splitting configuration for a controller.
    properties:
      Subconfigurations:
        type: list
        description: >-
          The set of subconfigurations that collectively define a port splitting configuration
          for this controller.
        required: false
        entry_schema:
          type: PortSplittingSubconfiguration
  SRIOV:
    description: >-
      Single-root input/output virtualization (SR-IOV) capabilities.
    properties:
      SRIOVEnabled:
        type: boolean
        description: >-
          An indication of whether single root input/output virtualization (SR-IOV)
          is enabled for this controller.
        required: false
      SRIOVVEPACapable:
        type: boolean
        description: >-
          An indication of whether this controller supports single root input/output
          virtualization (SR-IOV) in Virtual Ethernet Port Aggregator (VEPA) mode.
        required: false
  VirtualFunction:
    description: >-
      A virtual function of a controller.
    properties:
      DeviceMaxCount:
        type: integer
        description: >-
          The maximum number of virtual functions supported by this controller.
        required: false
      MinAssignmentGroupSize:
        type: integer
        description: >-
          The minimum number of virtual functions that can be allocated or moved between
          physical functions for this controller.
        required: false
      NetworkPortMaxCount:
        type: integer
        description: >-
          The maximum number of virtual functions supported per network port for this
          controller.
        required: false
  VirtualizationOffload:
    description: >-
      A Virtualization offload capability of a controller.
    properties:
      SRIOV:
        type: SRIOV
        description: >-
          Single-root input/output virtualization (SR-IOV) capabilities.
        required: false
      VirtualFunction:
        type: VirtualFunction
        description: >-
          The virtual function of the controller.
        required: false
interface_types:
  NetworkAdapterActions:
    operations:
      Reset:
        description: >-
          This action resets the network adapter.
        inputs:
          ResetType:
            type: resource:ResetType
            description: >-
              The type of reset.
            required: false
      ResetSettingsToDefault:
        description: >-
          This action is to clear the settings back to factory defaults.
node_types:
  NetworkAdapter:
    description: >-
      The `NetworkAdapter` schema represents a physical network adapter capable of
      connecting to a computer network.  Examples include but are not limited to Ethernet,
      Fibre Channel, and converged network adapters.
    properties:
      Controllers:
        type: list
        description: >-
          The set of network controllers ASICs that make up this NetworkAdapter.
        required: false
        entry_schema:
          type: Controllers
      Description:
        type: resource:Description
        description: >-
          The description of this resource.  Used for commonality in the schema definitions.
        required: false
      Id:
        type: resource:Id
        description: >-
          The unique identifier for this resource within the collection of similar
          resources.
        required: true
      Identifiers:
        type: list
        description: >-
          The durable names for the network adapter.
        required: false
        entry_schema:
          type: resource:Identifier
      LLDPEnabled:
        type: boolean
        description: >-
          Enable or disable LLDP globally for an adapter.
        required: false
      Location:
        type: resource:Location
        description: >-
          The location of the network adapter.
        required: false
      Manufacturer:
        type: string
        description: >-
          The manufacturer or OEM of this network adapter.
        required: false
      Measurements:
        type: list
        description: >-
          An array of DSP0274-defined measurement blocks.
        required: false
        entry_schema:
          type: sftwinvn:MeasurementBlock
      Model:
        type: string
        description: >-
          The model string for this network adapter.
        required: false
      Name:
        type: resource:Name
        description: >-
          The name of the resource or array member.
        required: true
      Oem:
        type: resource:Oem
        description: >-
          The OEM extension property.
        required: false
      PartNumber:
        type: string
        description: >-
          Part number for this network adapter.
        required: false
      PortSplitting:
        type: PortSplitting
        description: >-
          The port splitting capabilities for this controller.
        required: false
      SKU:
        type: string
        description: >-
          The manufacturer SKU for this network adapter.
        required: false
      SerialNumber:
        type: string
        description: >-
          The serial number for this network adapter.
        required: false
      Status:
        type: resource:Status
        description: >-
          The status and health of the resource and its subordinate or dependent resources.
        required: false
    requirements:
    - Assembly:
        node: assembly:Assembly
        capability: assmcps:AssemblyContainable
        relationship: core:Contains
        count_range:
        - 0
        - 1
        description: >-
          The link to the assembly resource associated with this adapter.
    - Certificates:
        node: crtfcllc:CertificateCollection
        capability: crtcllcp:CertificateCollectionContainable
        relationship: core:Contains
        count_range:
        - 0
        - 1
        description: >-
          The link to a collection of certificates for device identity and attestation.
    - EnvironmentMetrics:
        node: envrmtrc:EnvironmentMetrics
        capability: envmtrcp:EnvironmentMetricsContainable
        relationship: core:Contains
        count_range:
        - 0
        - 1
        description: >-
          The link to the environment metrics for this network adapter.
    - Metrics:
        node: ntwadpmt:NetworkAdapterMetrics
        capability: ntadmtcp:NetworkAdapterMetricsContainable
        relationship: core:Contains
        count_range:
        - 0
        - 1
        description: >-
          The link to the metrics associated with this adapter.
    - NetworkDeviceFunctions:
        node: ntdvfncl:NetworkDeviceFunctionCollection
        capability: ntdvfncc:NetworkDeviceFunctionCollectionContainable
        relationship: core:Contains
        count_range:
        - 0
        - 1
        description: >-
          The link to the collection of network device functions associated with this
          network adapter.
    - NetworkPorts:
        node: ntwprtcl:NetworkPortCollection
        capability: ntprclcp:NetworkPortCollectionContainable
        relationship: core:Contains
        count_range:
        - 0
        - 1
        description: >-
          The link to the collection of network ports associated with this network
          adapter.
    - Ports:
        node: prtcllc:PortCollection
        capability: prtcllcp:PortCollectionContainable
        relationship: core:Contains
        count_range:
        - 0
        - 1
        description: >-
          The link to the collection of ports associated with this network adapter.
    - Processors:
        node: prcscllc:ProcessorCollection
        capability: prccllcp:ProcessorCollectionContainable
        relationship: core:Contains
        count_range:
        - 0
        - 1
        description: >-
          The link to the collection of offload processors contained in this network
          adapter.
    interfaces:
      Actions:
        type: NetworkAdapterActions
    capabilities:
      feature:
        type: ntwadpcp:NetworkAdapterFeature
      containable:
        type: ntwadpcp:NetworkAdapterContainable
  ControllerLinks:
    description: >-
      The links to other resources that are related to this resource.
    properties:
      NetworkDeviceFunctions@odata_count:
        type: odatav4:count
        description: >-
          The number of items in a collection.
        required: false
      NetworkPorts@odata_count:
        type: odatav4:count
        description: >-
          The number of items in a collection.
        required: false
      Oem:
        type: resource:Oem
        description: >-
          The OEM extension property.
        required: false
      PCIeDevices@odata_count:
        type: odatav4:count
        description: >-
          The number of items in a collection.
        required: false
      Ports@odata_count:
        type: odatav4:count
        description: >-
          The number of items in a collection.
        required: false
      SoftwareImages@odata_count:
        type: odatav4:count
        description: >-
          The number of items in a collection.
        required: false
    requirements:
    - ActiveSoftwareImage:
        node: sftwinvn:SoftwareInventory
        capability: sftinvcp:SoftwareInventoryContainable
        relationship: core:Contains
        count_range:
        - 0
        - 1
        description: >-
          The link to the software inventory resource that represents the active firmware
          image for this controller.
    - NetworkDeviceFunctions:
        node: ntwdvcfn:NetworkDeviceFunction
        capability: ntdvfncp:NetworkDeviceFunctionContainable
        relationship: core:Contains
        count_range:
        - 0
        - UNBOUNDED
        description: >-
          An array of links to the network device functions associated with this network
          controller.
    - NetworkPorts:
        node: ntwrkprt:NetworkPort
        capability: ntwprtcp:NetworkPortContainable
        relationship: core:Contains
        count_range:
        - 0
        - UNBOUNDED
        description: >-
          An array of links to the network ports associated with this network controller.
    - PCIeDevices:
        node: pcdvc:PCIeDevice
        capability: pcdvccps:PCIeDeviceContainable
        relationship: core:Contains
        count_range:
        - 0
        - UNBOUNDED
        description: >-
          An array of links to the PCIe devices associated with this network controller.
    - Ports:
        node: port:Port
        capability: portcaps:PortContainable
        relationship: core:Contains
        count_range:
        - 0
        - UNBOUNDED
        description: >-
          An array of links to the ports associated with this network controller.
    - SoftwareImages:
        node: sftwinvn:SoftwareInventory
        capability: sftinvcp:SoftwareInventoryContainable
        relationship: core:Contains
        count_range:
        - 0
        - UNBOUNDED
        description: >-
          The images that are associated with this controller.
    capabilities:
      containable:
        type: ntwadpcp:ControllerLinksContainable
