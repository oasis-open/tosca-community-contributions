  namespace: hststrsr
- url: HostedStorageServices_caps.yaml
  namespace: hsstsrcp
data_types:
  Boot:
    description: >-
      The boot information for this resource.
    properties:
      BootSourceOverrideEnabled:
        type: BootSourceOverrideEnabled
        description: >-
          The state of the boot source override feature.
        required: false
      BootSourceOverrideMode:
        type: BootSourceOverrideMode
        description: >-
          The BIOS boot mode to use when the system boots from the `BootSourceOverrideTarget`
          boot source.
        required: false
      BootSourceOverrideTarget:
        type: string
        description: >-
          The current boot source to use at the next boot instead of the normal boot
          device, if `BootSourceOverrideEnabled` does not contain `Disabled`.
        required: false
        validation:
          $valid_values:
          - $value
          - - None
            - Pxe
            - Floppy
            - Cd
            - Usb
            - Hdd
            - BiosSetup
            - Utilities
            - Diags
            - UefiShell
            - UefiTarget
            - SDCard
            - UefiHttp
            - RemoteDrive
            - UefiBootNext
            - Recovery
      UefiTargetBootSourceOverride:
        type: string
        description: >-
          The UEFI device path of the device from which to boot when `BootSourceOverrideTarget`
          is `UefiTarget`.
        required: false
  BootSourceOverrideEnabled:
    derived_from: string
    validation:
      $valid_values:
      - $value
      - - Disabled
        - Once
        - Continuous
  BootSourceOverrideMode:
    derived_from: string
    validation:
      $valid_values:
      - $value
      - - Legacy
        - UEFI
  HostingRole:
    description: >-
      The enumerations of `HostingRole` specify different features that the hosting
      computer system supports.
    derived_from: string
    validation:
      $valid_values:
      - $value
      - - ApplicationServer
        - StorageServer
        - Switch
  IndicatorLED:
    derived_from: string
    validation:
      $valid_values:
      - $value
      - - Unknown
        - Lit
        - Blinking
        - 'Off'
  InterfaceType:
    derived_from: string
    validation:
      $valid_values:
      - $value
      - - TPM1_2
        - TPM2_0
        - TCM1_0
  InterfaceTypeSelection:
    description: >-
      The enumerations of `InterfaceTypeSelection` specify the method for switching
      the TrustedModule InterfaceType, for instance between TPM1_2 and TPM2_0, if
      supported.
    derived_from: string
    validation:
      $valid_values:
      - $value
      - - None
        - FirmwareUpdate
        - BiosSetting
        - OemMethod
  MemoryMirroring:
    derived_from: string
    validation:
      $valid_values:
      - $value
      - - System
        - DIMM
        - Hybrid
        - None
  MemorySummary:
    description: >-
      The memory of the system in general detail.
    properties:
      MemoryMirroring:
        type: MemoryMirroring
        description: >-
          The ability and type of memory mirroring that this computer system supports.
        required: false
      Status:
        type: resource:Status
        description: >-
          The status and health of the resource and its subordinate or dependent resources.
        required: false
      TotalSystemMemoryGiB:
        type: float
        description: >-
          The total configured operating system-accessible memory (RAM), measured
          in GiB.
        required: false
        validation:
          $greater_or_equal:
          - $value
          - 0
  ProcessorSummary:
    description: >-
      The central processors of the system in general detail.
    properties:
      Count:
        type: integer
        description: >-
          The number of physical processors in the system.
        required: false
        validation:
          $greater_or_equal:
          - $value
          - 0
      Model:
        type: string
        description: >-
          The processor model for the primary or majority of processors in this system.
        required: false
      Status:
        type: resource:Status
        description: >-
          The status and health of the resource and its subordinate or dependent resources.
        required: false
  SystemType:
    derived_from: string
    validation:
      $valid_values:
      - $value
      - - Physical
        - Virtual
        - OS
        - PhysicallyPartitioned
        - VirtuallyPartitioned
  TrustedModules:
    description: >-
      The Trusted Module installed in the system.
    properties:
      FirmwareVersion:
        type: string
        description: >-
          The firmware version of this Trusted Module.
        required: false
      FirmwareVersion2:
        type: string
        description: >-
          The second firmware version of this Trusted Module, if applicable.
        required: false
      InterfaceType:
        type: InterfaceType
        description: >-
          The interface type of the Trusted Module.
        required: false
      InterfaceTypeSelection:
        type: InterfaceTypeSelection
        description: >-
          The interface type selection supported by this Trusted Module.
        required: false
      Oem:
        type: resource:Oem
        description: >-
          The OEM extension property.
        required: false
      Status:
        type: resource:Status
        description: >-
          The status and health of the resource and its subordinate or dependent resources.
        required: false
relationship_types:
  ComputerSystemDependsOn:
    derived_from: core:DependsOn
    properties:
      Chassis@odata_count:
        type: odatav4:count
        description: >-
          The number of items in a collection.
        required: false
      CooledBy:
        type: list
        description: >-
          An array of links to resources or objects that cool this computer system.  Normally,
          the link is for either a chassis or a specific set of fans.
        required: false
        entry_schema:
          type: odatav4:idRef
      CooledBy@odata_count:
        type: odatav4:count
        description: >-
          The number of items in a collection.
        required: false
      Endpoints@odata_count:
        type: odatav4:count
        description: >-
          The number of items in a collection.
        required: false
      ManagedBy@odata_count:
        type: odatav4:count
        description: >-
          The number of items in a collection.
        required: false
      Oem:
        type: resource:Oem
        description: >-
          The OEM extension property.
        required: false
      PoweredBy:
        type: list
        description: >-
          An array of links to resources or objects that power this computer system.  Normally,
          the link is for either a chassis or a specific set of power supplies.
        required: false
        entry_schema:
          type: odatav4:idRef
      PoweredBy@odata_count:
        type: odatav4:count
        description: >-
          The number of items in a collection.
        required: false
interface_types:
  ComputerSystemActions:
    operations:
      Reset:
        description: >-
          This action resets the system.
        inputs:
          ResetType:
            type: resource:ResetType
            description: >-
              The type of reset.
            required: false
node_types:
  ComputerSystem:
    description: >-
      The `ComputerSystem` schema represents a computer or system instance and the
      software-visible resources, or items within the data plane, such as memory,
      CPU, and other devices that it can access.  Details of those resources or subsystems
      are also linked through this resource.
    properties:
      AssetTag:
        type: string
        description: >-
          The user-definable tag that can track this computer system for inventory
          or other client purposes.
        required: false
      BiosVersion:
        type: string
        description: >-
          The version of the system BIOS or primary system firmware.
        required: false
      Boot:
        type: Boot
        description: >-
          The boot settings for this system.
        required: false
      Description:
        type: resource:Description
        description: >-
          The description of this resource.  Used for commonality in the schema definitions.
        required: false
      HostName:
        type: string
        description: >-
          The DNS host name, without any domain information.
        required: false
      HostedServices:
        type: HostedServices
        description: >-
          The services that this computer system supports.
        required: false
      HostingRoles:
        type: list
        description: >-
          The hosting roles that this computer system supports.
        required: false
        entry_schema:
          type: HostingRole
      Id:
        type: resource:Id
        description: >-
          The unique identifier for this resource within the collection of similar
          resources.
        required: true
      IndicatorLED:
        type: IndicatorLED
        description: >-
          The state of the indicator LED, which identifies the system.
        required: false
      Manufacturer:
        type: string
        description: >-
          The manufacturer or OEM of this system.
        required: false
      MemorySummary:
        type: MemorySummary
        description: >-
          The central memory of the system in general detail.
        required: false
      Model:
        type: string
        description: >-
          The product name for this system, without the manufacturer name.
        required: false
      Name:
        type: resource:Name
        description: >-
          The name of the resource or array member.
        required: true
      Oem:
        type: resource:Oem
        description: >-
          The OEM extension property.
        required: false
      PCIeDevices@odata_count:
        type: odatav4:count
        description: >-
          The number of items in a collection.
        required: false
      PCIeFunctions@odata_count:
        type: odatav4:count
        description: >-
          The number of items in a collection.
        required: false
      PartNumber:
        type: string
        description: >-
          The part number for this system.
        required: false
      PowerState:
        type: resource:PowerState
        description: >-
          The current power state of the system.
        required: false
      ProcessorSummary:
        type: ProcessorSummary
        description: >-
          The central processors of the system in general detail.
        required: false
      SKU:
        type: string
        description: >-
          The manufacturer SKU for this system.
        required: false
      SerialNumber:
        type: string
        description: >-
          The serial number for this system.
        required: false
      Status:
        type: resource:Status
        description: >-
          The status and health of the resource and its subordinate or dependent resources.
        required: false
      SystemType:
        type: SystemType
        description: >-
          The type of computer system that this resource represents.
        required: false
      TrustedModules:
        type: list
        description: >-
          An array of trusted modules in the system.
        required: false
        entry_schema:
          type: TrustedModules
      UUID:
        type: resource:UUID
        description: >-
          The UUID for this system.
        required: false
    requirements:
    - Bios:
        node: bios:Bios
        capability: bioscaps:BiosContainable
        relationship: core:Contains
        count_range:
        - 0
        - 1
        description: >-
          The link to the BIOS settings associated with this system.
    - EthernetInterfaces:
        node: ethintcl:EthernetInterfaceCollection
        capability: etinclcp:EthernetInterfaceCollectionContainable
        relationship: core:Contains
        count_range:
        - 0
        - 1
        description: >-
          The link to the collection of Ethernet interfaces associated with this system.
    - LogServices:
        node: lgsrvcl:LogServiceCollection
        capability: lgsrclcp:LogServiceCollectionContainable
        relationship: core:Contains
        count_range:
        - 0
        - 1
        description: >-
          The link to the collection of log services associated with this system.
    - Memory:
        node: mmrycllc:MemoryCollection
        capability: mmrcllcp:MemoryCollectionContainable
        relationship: core:Contains
        count_range:
        - 0
        - 1
        description: >-
          The link to the collection of memory associated with this system.
    - MemoryDomains:
        node: mmrdmncl:MemoryDomainCollection
        capability: mmdmclcp:MemoryDomainCollectionContainable
        relationship: core:Contains
        count_range:
        - 0
        - 1
        description: >-
          The link to the collection of memory domains associated with this system.
    - NetworkInterfaces:
        node: ntwintcl:NetworkInterfaceCollection
        capability: ntinclcp:NetworkInterfaceCollectionContainable
        relationship: core:Contains
        count_range:
        - 0
        - 1
        description: >-
          The link to the collection of Network Interfaces associated with this system.
    - PCIeDevices:
        node: pcdvc:PCIeDevice
        capability: pcdvccps:PCIeDeviceContainable
        relationship: core:Contains
        count_range:
        - 0
        - UNBOUNDED
        description: >-
          The link to a collection of PCIe devices that this computer system uses.
    - PCIeFunctions:
        node: pcfnctn:PCIeFunction
        capability: pcfnccp:PCIeFunctionContainable
        relationship: core:Contains
        count_range:
        - 0
        - UNBOUNDED
        description: >-
          The link to a collection of PCIe functions that this computer system uses.
    - Processors:
        node: prcscllc:ProcessorCollection
        capability: prccllcp:ProcessorCollectionContainable
        relationship: core:Contains
        count_range:
        - 0
        - 1
        description: >-
          The link to the collection of processors associated with this system.
    - SecureBoot:
        node: scrbt:SecureBoot
        capability: scrbtcps:SecureBootContainable
        relationship: core:Contains
        count_range:
        - 0
        - 1
        description: >-
          The link to the UEFI Secure Boot associated with this system.
    - SimpleStorage:
        node: smpstrcl:SimpleStorageCollection
        capability: smstclcp:SimpleStorageCollectionContainable
        relationship: core:Contains
        count_range:
        - 0
        - 1
        description: >-
          The link to the collection of storage devices associated with this system.
    - Storage:
        node: strgcllc:StorageCollection
        capability: strcllcp:StorageCollectionContainable
        relationship: core:Contains
        count_range:
        - 0
        - 1
        description: >-
          The link to the collection of storage devices associated with this system.
    - Chassis:
        node: chassis:Chassis
        capability: chssscps:ChassisFeature
        relationship: ComputerSystemDependsOn
        count_range:
        - 0
        - UNBOUNDED
        description: >-
          An array of links to the chassis that contains this system.
    - Endpoints:
        node: endpoint:Endpoint
        capability: endpcps:EndpointFeature
        relationship: ComputerSystemDependsOn
        count_range:
        - 0
        - UNBOUNDED
        description: >-
          An array of links to the endpoints that connect to this system.
    - ManagedBy:
        # node: manager:Manager
        capability: core:Feature
        relationship: ComputerSystemDependsOn
        count_range:
        - 0
        - UNBOUNDED
        description: >-
          An array of links to the managers responsible for this system.
    interfaces:
      Actions:
        type: ComputerSystemActions
    capabilities:
      feature:
        type: cmpsyscp:ComputerSystemFeature
      containable:
        type: cmpsyscp:ComputerSystemContainable
  HostedServices:
    description: >-
      The services that might be running or installed on the system.
    properties:
      Oem:
        type: resource:Oem
        description: >-
          The OEM extension property.
        required: false
    requirements:
    - StorageServices:
        node: hststrsr:HostedStorageServices
        capability: hsstsrcp:HostedStorageServicesContainable
        relationship: core:Contains
        count_range:
        - 0
        - 1
        description: >-
          The link to a collection of storage services that this computer system supports.
    capabilities:
      containable:
        type: cmpsyscp:HostedServicesContainable
