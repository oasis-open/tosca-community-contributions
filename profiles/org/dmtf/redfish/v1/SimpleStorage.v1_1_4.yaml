tosca_definitions_version: tosca_2_0
description: >-
  Types generated from JSON Schema by any2tosca
imports:
- url: Resource.yaml
  namespace: resource
- url: Core.yaml
  namespace: core
- url: SimpleStorage_caps.yaml
  namespace: smpstrcp
data_types:
  Device:
    description: >-
      A storage device such as a disk drive or optical media device.
    properties:
      CapacityBytes:
        type: integer
        description: >-
          The size of the storage device.
        required: false
        validation:
          $greater_or_equal:
          - $value
          - 0
      Manufacturer:
        type: string
        description: >-
          The name of the manufacturer of this device.
        required: false
      Model:
        type: string
        description: >-
          The product model number of this device.
        required: false
      Name:
        type: string
        description: >-
          The name of the resource or array element.
        required: true
      Oem:
        type: resource:Oem
        description: >-
          Oem extension object.
        required: false
      Status:
        type: resource:Status
        description: >-
          This property describes the status and health of the resource and its children.
        required: false
node_types:
  SimpleStorage:
    description: >-
      This is the schema definition for the Simple Storage resource.  It represents
      the properties of a storage controller and its directly-attached devices.
    properties:
      Description:
        type: resource:Description
        description: >-
          The description of this resource.  Used for commonality in the schema definitions.
        required: false
      Devices:
        type: list
        description: >-
          The storage devices associated with this resource.
        required: false
        entry_schema:
          type: Device
      Id:
        type: resource:Id
        description: >-
          The unique identifier for this resource within the collection of similar
          resources.
        required: true
      Name:
        type: resource:Name
        description: >-
          The name of the resource or array member.
        required: true
      Oem:
        type: resource:Oem
        description: >-
          This is the manufacturer/provider specific extension moniker used to divide
          the Oem object into sections.
        required: false
      Status:
        type: resource:Status
        description: >-
          This property describes the status and health of the resource and its children.
        required: false
      UefiDevicePath:
        type: string
        description: >-
          The UEFI device path used to access this storage controller.
        required: false
    capabilities:
      feature:
        type: smpstrcp:SimpleStorageFeature
      containable:
        type: smpstrcp:SimpleStorageContainable
