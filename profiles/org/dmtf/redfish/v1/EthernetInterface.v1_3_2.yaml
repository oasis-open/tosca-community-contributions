tosca_definitions_version: tosca_2_0
description: >-
  Types generated from JSON Schema by any2tosca
imports:
- url: Chassis.yaml
  namespace: chassis
- url: Endpoint.yaml
  namespace: endpoint
- url: odata.v4_0_3.yaml
  namespace: odata
- url: HostInterface.yaml
  namespace: hstintr
- url: Resource.yaml
  namespace: resource
- url: Core.yaml
  namespace: core
- url: Chassis_caps.yaml
  namespace: chssscps
- url: Endpoint_caps.yaml
  namespace: endpcps
- url: HostInterface_caps.yaml
  namespace: hstintcp
- url: IPAddresses.yaml
  namespace: ipddrsss
- url: VLanNetworkInterface.yaml
  namespace: vlnntwin
- url: VLanNetworkInterfaceCollection.yaml
  namespace: vlntincl
- url: VLanNetworkInterfaceCollection_caps.yaml
  namespace: vlntincc
- url: EthernetInterface_caps.yaml
  namespace: ethintcp
data_types:
  IPv6AddressPolicyEntry:
    description: >-
      A entry in the RFC 6724 Address Selection Policy Table.
    properties:
      Label:
        type: integer
        description: >-
          The IPv6 Label (as defined in RFC 6724 section 2.1).
        required: false
        validation:
          $and:
          - $greater_or_equal:
            - $value
            - 0
          - $less_or_equal:
            - $value
            - 100
      Precedence:
        type: integer
        description: >-
          The IPv6 Precedence (as defined in RFC 6724 section 2.1.
        required: false
        validation:
          $and:
          - $greater_or_equal:
            - $value
            - 1
          - $less_or_equal:
            - $value
            - 100
      Prefix:
        type: string
        description: >-
          The IPv6 Address Prefix (as defined in RFC 6724 section 2.1).
        required: false
  LinkStatus:
    derived_from: string
    validation:
      $valid_values:
      - $value
      - - LinkUp
        - NoLink
        - LinkDown
  MACAddress:
    derived_from: string
    validation:
      $matches:
      - $value
      - ^([0-9A-Fa-f]{2}[:-]){5}([0-9A-Fa-f]{2})$
relationship_types:
  EthernetInterfaceDependsOn:
    derived_from: core:DependsOn
    properties:
      Endpoints@odata_count:
        type: odata:count
        description: >-
          The number of items in a collection.
        required: false
      Oem:
        type: resource:Oem
        description: >-
          Oem extension object.
        required: false
node_types:
  EthernetInterface:
    description: >-
      The EthernetInterface schema represents a single, logical ethernet interface
      or network interface controller (NIC).
    properties:
      AutoNeg:
        type: boolean
        description: >-
          This indicates if the speed and duplex are automatically negotiated and
          configured on this interface.
        required: false
      Description:
        type: resource:Description
        description: >-
          The description of this resource.  Used for commonality in the schema definitions.
        required: false
      FQDN:
        type: string
        description: >-
          This is the complete, fully qualified domain name obtained by DNS for this
          interface.
        required: false
      FullDuplex:
        type: boolean
        description: >-
          This indicates if the interface is in Full Duplex mode or not.
        required: false
      HostName:
        type: string
        description: >-
          The DNS Host Name, without any domain information.
        required: false
      IPv4Addresses:
        type: list
        description: >-
          The IPv4 addresses currently assigned to this interface.
        required: false
        entry_schema:
          type: ipddrsss:IPv4Address
      IPv6AddressPolicyTable:
        type: list
        description: >-
          An array representing the RFC 6724 Address Selection Policy Table.
        required: false
        entry_schema:
          type: IPv6AddressPolicyEntry
      IPv6Addresses:
        type: list
        description: >-
          Enumerates in an array all of the currently assigned IPv6 addresses on this
          interface.
        required: false
        entry_schema:
          type: ipddrsss:IPv6Address
      IPv6DefaultGateway:
        type: string
        description: >-
          This is the IPv6 default gateway address that is currently in use on this
          interface.
        required: false
      IPv6StaticAddresses:
        type: list
        description: >-
          Represents in an array all of the IPv6 static addresses to be assigned on
          this interface.
        required: false
        entry_schema:
          type: ipddrsss:IPv6StaticAddress
      Id:
        type: resource:Id
        description: >-
          The unique identifier for this resource within the collection of similar
          resources.
        required: true
      InterfaceEnabled:
        type: boolean
        description: >-
          This indicates whether this interface is enabled.
        required: false
      LinkStatus:
        type: LinkStatus
        description: >-
          The link status of this interface (port).
        required: false
      MACAddress:
        type: MACAddress
        description: >-
          This is the currently configured MAC address of the (logical port) interface.
        required: false
      MTUSize:
        type: integer
        description: >-
          This is the currently configured Maximum Transmission Unit (MTU) in bytes
          on this interface.
        required: false
      MaxIPv6StaticAddresses:
        type: integer
        description: >-
          This indicates the maximum number of Static IPv6 addresses that can be configured
          on this interface.
        required: false
      Name:
        type: resource:Name
        description: >-
          The name of the resource or array member.
        required: true
      NameServers:
        type: list
        description: >-
          This represents DNS name servers that are currently in use on this interface.
        required: false
        entry_schema:
          type: string
      Oem:
        type: resource:Oem
        description: >-
          This is the manufacturer/provider specific extension moniker used to divide
          the Oem object into sections.
        required: false
      PermanentMACAddress:
        type: MACAddress
        description: >-
          This is the permanent MAC address assigned to this interface (port).
        required: false
      SpeedMbps:
        type: integer
        description: >-
          This is the current speed in Mbps of this interface.
        required: false
      Status:
        type: resource:Status
        description: >-
          This property describes the status and health of the resource and its children.
        required: false
      UefiDevicePath:
        type: string
        description: >-
          The UEFI device path for this interface.
        required: false
      VLAN:
        type: vlnntwin:VLAN
        description: >-
          If this Network Interface supports more than one VLAN, this property is
          not present. VLANs collections appear in the Link section of this resource.
        required: false
    requirements:
    - VLANs:
        node: vlntincl:VLanNetworkInterfaceCollection
        capability: vlntincc:VLanNetworkInterfaceCollectionContainable
        relationship: core:Contains
        count_range:
        - 0
        - 1
        description: >-
          This is a reference to a collection of VLANs and is only used if the interface
          supports more than one VLANs.
    - Chassis:
        node: chassis:Chassis
        capability: chssscps:ChassisFeature
        relationship: EthernetInterfaceDependsOn
        count_range:
        - 0
        - 1
        description: >-
          A reference to the Chassis which contains this Ethernet Interface.
    - Endpoints:
        node: endpoint:Endpoint
        capability: endpcps:EndpointFeature
        relationship: EthernetInterfaceDependsOn
        count_range:
        - 0
        - UNBOUNDED
        description: >-
          An array of references to the endpoints that connect to this ethernet interface.
    - HostInterface:
        node: hstintr:HostInterface
        capability: hstintcp:HostInterfaceFeature
        relationship: EthernetInterfaceDependsOn
        count_range:
        - 0
        - 1
        description: >-
          This is a reference to a Host Interface that is associated with this Ethernet
          Interface.
    capabilities:
      feature:
        type: ethintcp:EthernetInterfaceFeature
      containable:
        type: ethintcp:EthernetInterfaceContainable
