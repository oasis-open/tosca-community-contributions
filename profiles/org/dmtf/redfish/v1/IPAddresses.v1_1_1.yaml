tosca_definitions_version: tosca_2_0
description: >-
  Types generated from JSON Schema by any2tosca
imports:
- url: Resource.yaml
  namespace: resource
data_types:
  AddressState:
    derived_from: string
    validation:
      $valid_values:
      - $value
      - - Preferred
        - Deprecated
        - Tentative
        - Failed
  IPv4Address:
    description: >-
      This type describes an IPv4 address.
    properties:
      Address:
        type: string
        description: >-
          The IPv4 address.
        required: false
        validation:
          $matches:
          - $value
          - ^(?:[0-9]{1,3}\.){3}[0-9]{1,3}$
      AddressOrigin:
        type: IPv4AddressOrigin
        description: >-
          This indicates how the address was determined.
        required: false
      Gateway:
        type: string
        description: >-
          The IPv4 gateway for this address.
        required: false
        validation:
          $matches:
          - $value
          - ^(?:[0-9]{1,3}\.){3}[0-9]{1,3}$
      Oem:
        type: resource:Oem
        description: >-
          The OEM extension property.
        required: false
      SubnetMask:
        type: SubnetMask
        description: >-
          The IPv4 subnet mask.
        required: false
  IPv4AddressOrigin:
    derived_from: string
    validation:
      $valid_values:
      - $value
      - - Static
        - DHCP
        - BOOTP
        - IPv4LinkLocal
  IPv6Address:
    description: >-
      This type describes an IPv6 address.
    properties:
      Address:
        type: string
        description: >-
          The IPv6 address.
        required: false
      AddressOrigin:
        type: IPv6AddressOrigin
        description: >-
          This indicates how the address was determined.
        required: false
      AddressState:
        type: AddressState
        description: >-
          The current RFC4862-defined state of this address.
        required: false
      Oem:
        type: resource:Oem
        description: >-
          The OEM extension property.
        required: false
      PrefixLength:
        type: PrefixLength
        description: >-
          The IPv6 address prefix Length.
        required: false
  IPv6AddressOrigin:
    derived_from: string
    validation:
      $valid_values:
      - $value
      - - Static
        - DHCPv6
        - LinkLocal
        - SLAAC
  IPv6GatewayStaticAddress:
    description: >-
      This type represents a single IPv6 static address to be assigned on a network
      interface.
    properties:
      Address:
        type: string
        description: >-
          A valid IPv6 address.
        required: true
      Oem:
        type: resource:Oem
        description: >-
          The OEM extension property.
        required: false
      PrefixLength:
        type: PrefixLength
        description: >-
          The IPv6 network prefix length, in bits, for this address.
        required: false
  IPv6StaticAddress:
    description: >-
      This type represents a single IPv6 static address to be assigned on a network
      interface.
    properties:
      Address:
        type: string
        description: >-
          A valid IPv6 address.
        required: true
      Oem:
        type: resource:Oem
        description: >-
          The OEM extension property.
        required: false
      PrefixLength:
        type: PrefixLength
        description: >-
          The prefix length, in bits, of this IPv6 address.
        required: true
  PrefixLength:
    derived_from: integer
    validation:
      $and:
      - $greater_or_equal:
        - $value
        - 1
      - $less_or_equal:
        - $value
        - 128
  SubnetMask:
    derived_from: string
    validation:
      $matches:
      - $value
      - ^(?:[0-9]{1,3}\.){3}[0-9]{1,3}$
