tosca_definitions_version: tosca_2_0
description: >-
  Types generated from JSON Schema by any2tosca
imports:
- url: Resource.yaml
  namespace: resource
- url: Message.yaml
  namespace: message
- url: Core.yaml
  namespace: core
- url: Message_caps.yaml
  namespace: mssgcps
- url: Task_caps.yaml
  namespace: taskcaps
data_types:
  TaskState:
    derived_from: string
    validation:
      $valid_values:
      - $value
      - - New
        - Starting
        - Running
        - Suspended
        - Interrupted
        - Pending
        - Stopping
        - Completed
        - Killed
        - Exception
        - Service
node_types:
  Task:
    description: >-
      The Task schema contains information about a task that the Redfish task service
      schedules or executes.  Tasks represent operations that take more time than
      a client typically wants to wait.
    properties:
      Description:
        type: resource:Description
        description: >-
          The description of this resource.  Used for commonality in the schema definitions.
        required: false
      EndTime:
        type: string
        description: >-
          The date and time when the task was completed.  This property will only
          appear when the task is complete.
        required: false
      Id:
        type: resource:Id
        description: >-
          The unique identifier for this resource within the collection of similar
          resources.
        required: true
      Name:
        type: resource:Name
        description: >-
          The name of the resource or array member.
        required: true
      Oem:
        type: resource:Oem
        description: >-
          The OEM extension property.
        required: false
      StartTime:
        type: string
        description: >-
          The date and time when the task was started.
        required: false
      TaskState:
        type: TaskState
        description: >-
          The state of the task.
        required: false
      TaskStatus:
        type: resource:Health
        description: >-
          The completion status of the task.
        required: false
    requirements:
    - Messages:
        node: message:Message
        capability: mssgcps:MessageContainable
        relationship: core:Contains
        count_range:
        - 0
        - UNBOUNDED
        description: >-
          An array of messages associated with the task.
    capabilities:
      feature:
        type: taskcaps:TaskFeature
      containable:
        type: taskcaps:TaskContainable
