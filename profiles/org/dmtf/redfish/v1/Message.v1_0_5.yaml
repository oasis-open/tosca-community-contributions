tosca_definitions_version: tosca_2_0
description: >-
  Types generated from JSON Schema by any2tosca
imports:
- url: Resource.yaml
  namespace: resource
- url: Core.yaml
  namespace: core
- url: Message_caps.yaml
  namespace: mssgcps
node_types:
  Message:
    description: >-
      This type describes a Message returned by the Redfish service.
    properties:
      MessageId:
        type: string
        description: >-
          This is the key for this message which can be used to look up the message
          in a message registry.
        required: true
      Message:
        type: string
        description: >-
          This is the human readable message, if provided.
        required: false
      RelatedProperties:
        type: list
        description: >-
          This is an array of properties described by the message.
        required: false
        entry_schema:
          type: string
      MessageArgs:
        type: list
        description: >-
          This array of message arguments are substituted for the arguments in the
          message when looked up in the message registry.
        required: false
        entry_schema:
          type: string
      Severity:
        type: string
        description: >-
          This is the severity of the errors.
        required: false
      Resolution:
        type: string
        description: >-
          Used to provide suggestions on how to resolve the situation that caused
          the error.
        required: false
      Oem:
        type: resource:Oem
        description: >-
          Oem extension object.
        required: false
    capabilities:
      feature:
        type: mssgcps:MessageFeature
      containable:
        type: mssgcps:MessageContainable
