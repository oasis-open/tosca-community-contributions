tosca_definitions_version: tosca_2_0
description: >-
  Types generated from JSON Schema by any2tosca
imports:
- url: Resource.yaml
  namespace: resource
- url: Core.yaml
  namespace: core
- url: SecureBoot_caps.yaml
  namespace: scrbtcps
data_types:
  ResetKeysType:
    derived_from: string
    validation:
      $valid_values:
      - $value
      - - ResetAllKeysToDefault
        - DeleteAllKeys
        - DeletePK
  SecureBootCurrentBootType:
    derived_from: string
    validation:
      $valid_values:
      - $value
      - - Enabled
        - Disabled
  SecureBootModeType:
    derived_from: string
    validation:
      $valid_values:
      - $value
      - - SetupMode
        - UserMode
        - AuditMode
        - DeployedMode
interface_types:
  SecureBootActions:
    operations:
      ResetKeys:
        description: >-
          This action is used to reset the Secure Boot keys.
        inputs:
          ResetKeysType:
            type: ResetKeysType
            description: >-
              The type of keys to reset or delete.
            required: true
node_types:
  SecureBoot:
    description: >-
      This resource contains UEFI Secure Boot information. It represents properties
      for managing the UEFI Secure Boot functionality of a system.
    properties:
      Description:
        type: resource:Description
        description: >-
          The description of this resource.  Used for commonality in the schema definitions.
        required: false
      Id:
        type: resource:Id
        description: >-
          The unique identifier for this resource within the collection of similar
          resources.
        required: true
      Name:
        type: resource:Name
        description: >-
          The name of the resource or array member.
        required: true
      Oem:
        type: resource:Oem
        description: >-
          This is the manufacturer/provider specific extension moniker used to divide
          the Oem object into sections.
        required: false
      SecureBootCurrentBoot:
        type: SecureBootCurrentBootType
        description: >-
          Secure Boot state during the current boot cycle.
        required: false
      SecureBootEnable:
        type: boolean
        description: >-
          Enable or disable UEFI Secure Boot (takes effect on next boot).
        required: false
      SecureBootMode:
        type: SecureBootModeType
        description: >-
          Current Secure Boot Mode.
        required: false
    interfaces:
      Actions:
        type: SecureBootActions
    capabilities:
      feature:
        type: scrbtcps:SecureBootFeature
      containable:
        type: scrbtcps:SecureBootContainable
