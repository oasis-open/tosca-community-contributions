tosca_definitions_version: tosca_2_0
description: >-
  Types generated from JSON Schema by any2tosca
imports:
- url: Container.yaml
  namespace: cntnr
- url: odata-v4.yaml
  namespace: odatav4
- url: Resource.yaml
  namespace: resource
- url: SoftwareInventory.yaml
  namespace: sftwinvn
- url: Core.yaml
  namespace: core
- url: Container_caps.yaml
  namespace: cntnrcps
- url: SoftwareInventory_caps.yaml
  namespace: sftinvcp
- url: ContainerImage_caps.yaml
  namespace: cntimgcp
relationship_types:
  ContainerImageDependsOn:
    derived_from: core:DependsOn
    properties:
      Containers@odata_count:
        type: odatav4:count
        description: >-
          The number of items in a collection.
        required: false
      Oem:
        type: resource:Oem
        description: >-
          The OEM extension property.
        required: false
node_types:
  ContainerImage:
    description: >-
      The `ContainerImage` schema represents a container image available to a computer
      system.
    properties:
      CreateTime:
        type: string
        description: >-
          The date and time when the container image was created.
        required: false
      Description:
        type: resource:Description
        description: >-
          The description of this resource.  Used for commonality in the schema definitions.
        required: false
      Id:
        type: resource:Id
        description: >-
          The unique identifier for this resource within the collection of similar
          resources.
        required: true
      Name:
        type: resource:Name
        description: >-
          The name of the resource or array member.
        required: true
      Oem:
        type: resource:Oem
        description: >-
          The OEM extension property.
        required: false
      ProgrammaticId:
        type: string
        description: >-
          The programmatic identifier for this container image.
        required: false
      SizeBytes:
        type: integer
        description: >-
          The size of this container image in bytes.
        required: false
      Status:
        type: resource:Status
        description: >-
          The status and health of the resource and its subordinate or dependent resources.
        required: false
      Type:
        type: string
        description: >-
          The image type of this container image.
        required: false
        validation:
          $valid_values:
          - $value
          - - DockerV1
            - DockerV2
            - OCI
      Version:
        type: string
        description: >-
          The version of this application.
        required: false
    requirements:
    - Containers:
        node: cntnr:Container
        capability: cntnrcps:ContainerFeature
        relationship: ContainerImageDependsOn
        count_range:
        - 0
        - UNBOUNDED
        description: >-
          The array of links to the containers running from this container image.
    - SoftwareImage:
        node: sftwinvn:SoftwareInventory
        capability: sftinvcp:SoftwareInventoryFeature
        relationship: ContainerImageDependsOn
        count_range:
        - 0
        - 1
        description: >-
          The link to the software image for this container image.
    capabilities:
      feature:
        type: cntimgcp:ContainerImageFeature
      containable:
        type: cntimgcp:ContainerImageContainable
