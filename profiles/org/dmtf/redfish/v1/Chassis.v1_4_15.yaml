tosca_definitions_version: tosca_2_0
description: >-
  Types generated from JSON Schema by any2tosca
imports:
- url: Resource.yaml
  namespace: resource
- url: odata-v4.yaml
  namespace: odatav4
- url: Core.yaml
  namespace: core
- url: LogServiceCollection.yaml
  namespace: lgsrvcl
- url: NetworkAdapterCollection.yaml
  namespace: ntwadpcl
- url: Power.yaml
  namespace: power
- url: Thermal.yaml
  namespace: thermal
- url: LogServiceCollection_caps.yaml
  namespace: lgsrclcp
- url: NetworkAdapterCollection_caps.yaml
  namespace: ntadclcp
- url: Power_caps.yaml
  namespace: pwrcps
- url: Thermal_caps.yaml
  namespace: thrmlcps
- url: Chassis_caps.yaml
  namespace: chssscps
data_types:
  ChassisType:
    derived_from: string
    validation:
      $valid_values:
      - $value
      - - Rack
        - Blade
        - Enclosure
        - StandAlone
        - RackMount
        - Card
        - Cartridge
        - Row
        - Pod
        - Expansion
        - Sidecar
        - Zone
        - Sled
        - Shelf
        - Drawer
        - Module
        - Component
        - IPBasedDrive
        - RackGroup
        - Other
  IndicatorLED:
    derived_from: string
    validation:
      $valid_values:
      - $value
      - - Unknown
        - Lit
        - Blinking
        - 'Off'
  IntrusionSensor:
    derived_from: string
    validation:
      $valid_values:
      - $value
      - - Normal
        - HardwareIntrusion
        - TamperingDetected
  IntrusionSensorReArm:
    derived_from: string
    validation:
      $valid_values:
      - $value
      - - Manual
        - Automatic
  PhysicalSecurity:
    description: >-
      The physical security state of the chassis.
    properties:
      IntrusionSensor:
        type: IntrusionSensor
        description: >-
          The physical security state of the chassis, such as if hardware intrusion
          is detected.
        required: false
      IntrusionSensorNumber:
        type: integer
        description: >-
          A numerical identifier to represent the physical security sensor.
        required: false
      IntrusionSensorReArm:
        type: IntrusionSensorReArm
        description: >-
          The policy that describes how the physical security state of the chassis
          returns to a normal state.
        required: false
relationship_types:
  ChassisDependsOn:
    derived_from: core:DependsOn
    properties:
      ComputerSystems@odata_count:
        type: odatav4:count
        description: >-
          The number of items in a collection.
        required: false
      Contains@odata_count:
        type: odatav4:count
        description: >-
          The number of items in a collection.
        required: false
      CooledBy:
        type: list
        description: >-
          An array of links to resources or objects that cool this chassis.  Normally,
          the link is for either a chassis or a specific set of fans.
        required: false
        entry_schema:
          type: odatav4:idRef
      CooledBy@odata_count:
        type: odatav4:count
        description: >-
          The number of items in a collection.
        required: false
      Drives@odata_count:
        type: odatav4:count
        description: >-
          The number of items in a collection.
        required: false
      ManagedBy@odata_count:
        type: odatav4:count
        description: >-
          The number of items in a collection.
        required: false
      ManagersInChassis@odata_count:
        type: odatav4:count
        description: >-
          The number of items in a collection.
        required: false
      Oem:
        type: resource:Oem
        description: >-
          The OEM extension property.
        required: false
      PCIeDevices@odata_count:
        type: odatav4:count
        description: >-
          The number of items in a collection.
        required: false
      PoweredBy:
        type: list
        description: >-
          An array of links to resources or objects that power this chassis.  Normally,
          the link is for either a chassis or a specific set of power supplies.
        required: false
        entry_schema:
          type: odatav4:idRef
      PoweredBy@odata_count:
        type: odatav4:count
        description: >-
          The number of items in a collection.
        required: false
      Storage@odata_count:
        type: odatav4:count
        description: >-
          The number of items in a collection.
        required: false
interface_types:
  ChassisActions:
    operations:
      Reset:
        description: >-
          This action resets the chassis.  Additionally, it could reset systems or
          other contained resources depending on the `ResetType` used to invoke this
          action.
        inputs:
          ResetType:
            type: resource:ResetType
            description: >-
              The type of reset.
            required: false
node_types:
  Chassis:
    description: >-
      The `Chassis` schema represents the physical components of a system.  This resource
      represents the sheet-metal confined spaces and logical zones such as racks,
      enclosures, chassis and all other containers.  Subsystems, such as sensors,
      that operate outside of a system's data plane are linked either directly or
      indirectly through this resource.  A subsystem that operates outside of a system's
      data plane are not accessible to software that runs on the system.  It also
      describes the location, such as a slot, socket, or bay, where a unit can be
      installed, by populating a resource instance with an absent state if a unit
      is not present.
    properties:
      AssetTag:
        type: string
        description: >-
          The user-assigned asset tag of this chassis.
        required: false
      ChassisType:
        type: ChassisType
        description: >-
          The type of physical form factor of the chassis.
        required: true
      DepthMm:
        type: float
        description: >-
          The depth of the chassis.
        required: false
        validation:
          $greater_or_equal:
          - $value
          - 0
      Description:
        type: resource:Description
        description: >-
          The description of this resource.  Used for commonality in the schema definitions.
        required: false
      HeightMm:
        type: float
        description: >-
          The height of the chassis.
        required: false
        validation:
          $greater_or_equal:
          - $value
          - 0
      Id:
        type: resource:Id
        description: >-
          The unique identifier for this resource within the collection of similar
          resources.
        required: true
      IndicatorLED:
        type: IndicatorLED
        description: >-
          The state of the indicator LED, which identifies the chassis.
        required: false
      Location:
        type: resource:Location
        description: >-
          The location of the chassis.
        required: false
      Manufacturer:
        type: string
        description: >-
          The manufacturer of this chassis.
        required: false
      Model:
        type: string
        description: >-
          The model number of the chassis.
        required: false
      Name:
        type: resource:Name
        description: >-
          The name of the resource or array member.
        required: true
      Oem:
        type: resource:Oem
        description: >-
          The OEM extension property.
        required: false
      PartNumber:
        type: string
        description: >-
          The part number of the chassis.
        required: false
      PhysicalSecurity:
        type: PhysicalSecurity
        description: >-
          The physical security state of the chassis.
        required: false
      PowerState:
        type: resource:PowerState
        description: >-
          The current power state of the chassis.
        required: false
      SKU:
        type: string
        description: >-
          The SKU of the chassis.
        required: false
      SerialNumber:
        type: string
        description: >-
          The serial number of the chassis.
        required: false
      Status:
        type: resource:Status
        description: >-
          The status and health of the resource and its subordinate or dependent resources.
        required: false
      WeightKg:
        type: float
        description: >-
          The weight of the chassis.
        required: false
        validation:
          $greater_or_equal:
          - $value
          - 0
      WidthMm:
        type: float
        description: >-
          The width of the chassis.
        required: false
        validation:
          $greater_or_equal:
          - $value
          - 0
    requirements:
    - LogServices:
        node: lgsrvcl:LogServiceCollection
        capability: lgsrclcp:LogServiceCollectionContainable
        relationship: core:Contains
        count_range:
        - 0
        - 1
        description: >-
          The link to the logs for this chassis.
    - NetworkAdapters:
        node: ntwadpcl:NetworkAdapterCollection
        capability: ntadclcp:NetworkAdapterCollectionContainable
        relationship: core:Contains
        count_range:
        - 0
        - 1
        description: >-
          The link to the collection of network adapters associated with this chassis.
    - Power:
        node: power:Power
        capability: pwrcps:PowerContainable
        relationship: core:Contains
        count_range:
        - 0
        - 1
        description: >-
          The link to the power properties, or power supplies, power policies, and
          sensors, for this chassis.
    - Thermal:
        node: thermal:Thermal
        capability: thrmlcps:ThermalContainable
        relationship: core:Contains
        count_range:
        - 0
        - 1
        description: >-
          The link to the thermal properties, such as fans, cooling, and sensors,
          for this chassis.
    - ComputerSystems:
        # node: cmptsyst:ComputerSystem
        capability: core:Feature
        relationship: ChassisDependsOn
        count_range:
        - 0
        - UNBOUNDED
        description: >-
          An array of links to the computer systems that this chassis directly and
          wholly contains.
    - ContainedBy:
        # node: chassis:Chassis
        capability: core:Feature
        relationship: ChassisDependsOn
        count_range:
        - 0
        - 1
        description: >-
          The link to the chassis that contains this chassis.
    - Contains:
        # node: chassis:Chassis
        capability: core:Feature
        relationship: ChassisDependsOn
        count_range:
        - 0
        - UNBOUNDED
        description: >-
          An array of links to any other chassis that this chassis has in it.
    - Drives:
        # node: drive:Drive
        capability: core:Feature
        relationship: ChassisDependsOn
        count_range:
        - 0
        - UNBOUNDED
        description: >-
          An array of links to the drives located in this chassis.
    - ManagedBy:
        # node: manager:Manager
        capability: core:Feature
        relationship: ChassisDependsOn
        count_range:
        - 0
        - UNBOUNDED
        description: >-
          An array of links to the managers responsible for managing this chassis.
    - ManagersInChassis:
        # node: manager:Manager
        capability: core:Feature
        relationship: ChassisDependsOn
        count_range:
        - 0
        - UNBOUNDED
        description: >-
          An array of links to the managers located in this chassis.
    - PCIeDevices:
        # node: pcdvc:PCIeDevice
        capability: core:Feature
        relationship: ChassisDependsOn
        count_range:
        - 0
        - UNBOUNDED
        description: >-
          An array of links to the PCIe devices located in this chassis.
    - Storage:
        # node: storage:Storage
        capability: core:Feature
        relationship: ChassisDependsOn
        count_range:
        - 0
        - UNBOUNDED
        description: >-
          An array of links to the storage subsystems connected to or inside this
          chassis.
    interfaces:
      Actions:
        type: ChassisActions
    capabilities:
      feature:
        type: chssscps:ChassisFeature
      containable:
        type: chssscps:ChassisContainable
