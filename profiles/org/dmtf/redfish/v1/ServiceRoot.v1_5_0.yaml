        required: false
node_types:
  ServiceRoot:
    description: >-
      This object represents the root Redfish service.
    properties:
      Description:
        type: resource:Description
        description: >-
          The description of this resource.  Used for commonality in the schema definitions.
        required: false
      Id:
        type: resource:Id
        description: >-
          The unique identifier for this resource within the collection of similar
          resources.
        required: true
      Name:
        type: resource:Name
        description: >-
          The name of the resource or array member.
        required: true
      Oem:
        type: resource:Oem
        description: >-
          This is the manufacturer/provider specific extension moniker used to divide
          the Oem object into sections.
        required: false
      Product:
        type: string
        description: >-
          The product associated with this Redfish service.
        required: false
      ProtocolFeaturesSupported:
        type: ProtocolFeaturesSupported
        description: >-
          Contains information about protocol features supported by the service.
        required: false
      RedfishVersion:
        type: string
        description: >-
          The version of the Redfish service.
        required: false
        validation:
          $matches:
          - $value
          - ^\d+\.\d+\.\d+$
      UUID:
        type: resource:UUID
        description: >-
          Unique identifier for a service instance. When SSDP is used, this value
          should be an exact match of the UUID value returned in a 200OK from an SSDP
          M-SEARCH request during discovery.
        required: false
      Vendor:
        type: string
        description: >-
          The vendor or manufacturer associated with this Redfish service.
        required: false
