data_types:
  Expand:
    description: >-
      Contains information about the use of $expand in the service.
    properties:
      ExpandAll:
        type: boolean
        description: >-
          This indicates whether the $expand support of asterisk (expand all entries)
          is supported.
        required: false
      Levels:
        type: boolean
        description: >-
          This indicates whether the expand support of the $levels qualifier is supported
          by the service.
        required: false
      Links:
        type: boolean
        description: >-
          This indicates whether the $expand support of tilde (expand only entries
          in the Links section) is supported.
        required: false
      MaxLevels:
        type: integer
        description: >-
          This indicates the maximum number value of the $levels qualifier in $expand
          operations.
        required: false
        validation:
          $and:
          - $greater_or_equal:
            - $value
            - 1
          - $less_or_equal:
            - $value
            - 6
      NoLinks:
        type: boolean
        description: >-
          This indicates whether the $expand support of period (expand only entries
          not in the Links section) is supported.
        required: false
  ProtocolFeaturesSupported:
    description: >-
      Contains information about protocol features supported by the service.
    properties:
      ExcerptQuery:
        type: boolean
        description: >-
          This indicates whether the 'excerpt' query parameter is supported.
        required: false
      ExpandQuery:
        type: Expand
        description: >-
          Contains information about the use of $expand in the service.
        required: false
      FilterQuery:
        type: boolean
        description: >-
          This indicates whether the $filter query parameter is supported.
        required: false
      OnlyMemberQuery:
        type: boolean
        description: >-
          This indicates whether the 'only' query parameter is supported.
        required: false
      SelectQuery:
        type: boolean
        description: >-
          This indicates whether the $select query parameter is supported.
        required: false
relationship_types:
