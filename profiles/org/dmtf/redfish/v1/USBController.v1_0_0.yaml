          The ports of the USB controller.
    - PCIeDevice:
        node: pcdvc:PCIeDevice
        capability: pcdvccps:PCIeDeviceFeature
        relationship: USBControllerDependsOn
        count_range:
        - 0
        - 1
        description: >-
          A link to the PCIe device that represents this USB controller.
