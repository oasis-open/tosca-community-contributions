        description: >-
          The number of items in a collection.
        required: false
node_types:
  USBController:
    description: >-
      The USBController schema defines a Universal Serial Bus controller.
    properties:
      Description:
        type: resource:Description
        description: >-
          The description of this resource.  Used for commonality in the schema definitions.
        required: false
      Id:
        type: resource:Id
        description: >-
          The unique identifier for this resource within the collection of similar
          resources.
        required: true
      Manufacturer:
        type: string
        description: >-
          The manufacturer of this USB controller.
        required: false
      Model:
        type: string
        description: >-
          The product model number of this USB controller.
        required: false
      Name:
        type: resource:Name
        description: >-
          The name of the resource or array member.
        required: true
      Oem:
        type: resource:Oem
        description: >-
          The OEM extension property.
        required: false
      PartNumber:
        type: string
        description: >-
          The part number for this USB controller.
        required: false
      SKU:
        type: string
        description: >-
          The SKU for this USB controller.
        required: false
      SerialNumber:
        type: string
        description: >-
          The serial number for this USB controller.
        required: false
      SparePartNumber:
        type: string
