tosca_definitions_version: tosca_2_0
description: >-
  Types generated from JSON Schema by any2tosca
imports:
- url: Resource.yaml
  namespace: resource
- url: Core.yaml
  namespace: core
- url: CertificateCollection.yaml
  namespace: crtfcllc
- url: CertificateCollection_caps.yaml
  namespace: crtcllcp
- url: ExternalAccountProvider_caps.yaml
  namespace: exacprcp
data_types:
  AccountProviderTypes:
    derived_from: string
    validation:
      $valid_values:
      - $value
      - - RedfishService
        - ActiveDirectoryService
        - LDAPService
        - OEM
  Authentication:
    description: >-
      Contains the authentication information for the external service.
    properties:
      AuthenticationType:
        type: AuthenticationTypes
        description: >-
          This property contains the type of authentication used to connect to the
          external account provider.
        required: false
      KerberosKeytab:
        type: string
        description: >-
          This property is used with a PATCH or PUT to write a base64 encoded version
          of the kerberos keytab for the account.  This property is null on a GET.
        required: false
      Oem:
        type: resource:Oem
        description: >-
          Oem extension object.
        required: false
      Password:
        type: string
        description: >-
          This property is used with a PATCH or PUT to write the password for the
          account service.  This property is null on a GET.
        required: false
      Token:
        type: string
        description: >-
          This property is used with a PATCH or PUT to write the token for the account.  This
          property is null on a GET.
        required: false
      Username:
        type: string
        description: >-
          This property contains the user name for the account service.
        required: false
  AuthenticationTypes:
    derived_from: string
    validation:
      $valid_values:
      - $value
      - - Token
        - KerberosKeytab
        - UsernameAndPassword
        - OEM
  LDAPSearchSettings:
    description: >-
      Contains settings for searching a generic LDAP service.
    properties:
      BaseDistinguishedNames:
        type: list
        description: >-
          The base distinguished names to use when searching the LDAP service.
        required: false
        entry_schema:
          type: string
      GroupNameAttribute:
        type: string
        description: >-
          The attribute name that contains the name of the Group on the group LDAP
          entry.
        required: false
      GroupsAttribute:
        type: string
        description: >-
          The attribute name that contains the Groups for a user on the user LDAP
          entry.
        required: false
      UsernameAttribute:
        type: string
        description: >-
          The attribute name that contains the Username on the user LDAP entry.
        required: false
  LDAPService:
    description: >-
      Contains settings for parsing a generic LDAP service.
    properties:
      Oem:
        type: resource:Oem
        description: >-
          Oem extension object.
        required: false
      SearchSettings:
        type: LDAPSearchSettings
        description: >-
          This property contains the settings needed to search an external LDAP service.
        required: false
  RoleMapping:
    description: >-
      Contains mapping rules to convert the external account providers account information
      to the local Redfish Role.
    properties:
      LocalRole:
        type: string
        description: >-
          The name of the local role in which to map the remote user or group.
        required: false
      Oem:
        type: resource:Oem
        description: >-
          Oem extension object.
        required: false
      RemoteGroup:
        type: string
        description: >-
          This property is the name of the remote group (or in the case of a Redfish
          Service, remote role) that will be mapped to the local role referenced by
          this entity.
        required: false
      RemoteUser:
        type: string
        description: >-
          This property is the name of the remote user that will be mapped to the
          local role referenced by this entity.
        required: false
node_types:
  ExternalAccountProvider:
    description: >-
      A remote service that can provide accounts for this manager to utilize for authentication.
    properties:
      AccountProviderType:
        type: AccountProviderTypes
        description: >-
          This property contains the type of external account provider this resource
          references.
        required: false
      Authentication:
        type: Authentication
        description: >-
          This property contains the authentication information for the external account
          provider.
        required: false
      Description:
        type: resource:Description
        description: >-
          The description of this resource.  Used for commonality in the schema definitions.
        required: false
      Id:
        type: resource:Id
        description: >-
          The unique identifier for this resource within the collection of similar
          resources.
        required: true
      LDAPService:
        type: LDAPService
        description: >-
          This property contains additional mapping information needed to parse a
          generic LDAP service.
        required: false
      Name:
        type: resource:Name
        description: >-
          The name of the resource or array member.
        required: true
      Oem:
        type: resource:Oem
        description: >-
          This is the manufacturer/provider specific extension moniker used to divide
          the Oem object into sections.
        required: false
      RemoteRoleMapping:
        type: list
        description: >-
          This property contains a collection of the mapping rules to convert the
          external account providers account information to the local Redfish Role.
        required: false
        entry_schema:
          type: RoleMapping
      ServiceAddresses:
        type: list
        description: >-
          This property contains the addresses of the user account providers this
          resource references. The format of this field depends on the Type.
        required: false
        entry_schema:
          type: string
      ServiceEnabled:
        type: boolean
        description: >-
          This indicates whether this service is enabled.
        required: false
    requirements:
    - Certificates:
        node: crtfcllc:CertificateCollection
        capability: crtcllcp:CertificateCollectionContainable
        relationship: core:Contains
        count_range:
        - 0
        - 1
        description: >-
          This is a reference to a collection of certificates used for the external
          account provider.
    capabilities:
      feature:
        type: exacprcp:ExternalAccountProviderFeature
      containable:
        type: exacprcp:ExternalAccountProviderContainable
