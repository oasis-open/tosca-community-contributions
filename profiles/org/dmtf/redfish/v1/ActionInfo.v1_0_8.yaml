tosca_definitions_version: tosca_2_0
description: >-
  Types generated from JSON Schema by any2tosca
imports:
- url: Core.yaml
  namespace: core
- url: ActionInfo_caps.yaml
  namespace: actinfcp
data_types:
  ParameterTypes:
    derived_from: string
    validation:
      $valid_values:
      - $value
      - - Boolean
        - Number
        - NumberArray
        - String
        - StringArray
        - Object
        - ObjectArray
  Parameters:
    description: >-
      The information about a parameter included in a Redfish action for this resource.
    properties:
      AllowableValues:
        type: list
        description: >-
          The allowable values for this parameter as applied to this action target.
        required: false
        entry_schema:
          type: string
      DataType:
        type: ParameterTypes
        description: >-
          The JSON property type for this parameter.
        required: false
      Name:
        type: string
        description: >-
          The name of the parameter for this action.
        required: true
      ObjectDataType:
        type: string
        description: >-
          The data type of an object-based parameter.
        required: false
      Required:
        type: boolean
        description: >-
          An indication of whether the parameter is required to complete this action.
        required: false
node_types:
  ActionInfo:
    description: >-
      The `ActionInfo` schema defines the supported parameters and other information
      for a Redfish action.  Supported parameters can differ among vendors and even
      among resource instances.  This data can ensure that action requests from applications
      contain supported parameters.
    properties:
      Description:
        type: string
        description: >-
          The description of this resource.  Used for commonality in the schema definitions.
        required: false
      Id:
        type: string
        description: >-
          The unique identifier for this resource within the collection of similar
          resources.
        required: true
      Name:
        type: string
        description: >-
          The name of the resource or array member.
        required: true
      Oem:
        type: map
        description: >-
          The OEM extension property.
        required: false
      Parameters:
        type: list
        description: >-
          The list of parameters included in the specified Redfish action.
        required: false
        entry_schema:
          type: Parameters
    capabilities:
      feature:
        type: actinfcp:ActionInfoFeature
      containable:
        type: actinfcp:ActionInfoContainable
