tosca_definitions_version: tosca_2_0
description: >-
  Types generated from JSON Schema by any2tosca
imports:
- url: Resource.yaml
  namespace: resource
- url: odata-v4.yaml
  namespace: odatav4
- url: TrustedComponent.yaml
  namespace: trstcmpn
- url: Core.yaml
  namespace: core
- url: ComputerSystem_caps.yaml
  namespace: cmpsyscp
- url: TrustedComponent_caps.yaml
  namespace: trscmpcp
- url: CertificateCollection.yaml
  namespace: crtfcllc
- url: LogServiceCollection.yaml
  namespace: lgsrvcl
- url: MemoryMetrics.yaml
  namespace: mmrymtrc
- url: Bios.yaml
  namespace: bios
- url: SecureBoot.yaml
  namespace: scrbt
- url: Redundancy.yaml
  namespace: rdndncy
- url: VirtualMediaCollection.yaml
  namespace: vrtmdcl
- url: SoftwareInventory.yaml
  namespace: sftwinvn
- url: LogServiceCollection_caps.yaml
  namespace: lgsrclcp
- url: Bios_caps.yaml
  namespace: bioscaps
- url: SecureBoot_caps.yaml
  namespace: scrbtcps
- url: Redundancy_caps.yaml
  namespace: rdndcps
- url: VirtualMediaCollection_caps.yaml
  namespace: vrmdclcp
- url: CertificateCollection_caps.yaml
  namespace: crtcllcp
- url: MemoryMetrics_caps.yaml
  namespace: mmrmtrcp
data_types:
  BootSource:
    derived_from: string
    validation:
      $valid_values:
      - $value
      - - None
        - Pxe
        - Floppy
        - Cd
        - Usb
        - Hdd
        - BiosSetup
        - Utilities
        - Diags
        - UefiShell
        - UefiTarget
        - SDCard
        - UefiHttp
        - RemoteDrive
        - UefiBootNext
        - Recovery
  TrustedModules:
    description: >-
      The Trusted Module installed in the system.
    properties:
      FirmwareVersion:
        type: string
        description: >-
          The firmware version of this Trusted Module.
        required: false
      FirmwareVersion2:
        type: string
        description: >-
          The second firmware version of this Trusted Module, if applicable.
        required: false
      InterfaceType:
        type: string
        description: >-
          The interface type of the Trusted Module.
        required: false
      InterfaceTypeSelection:
        type: string
        description: >-
          The interface type selection supported by this Trusted Module.
        required: false
      Oem:
        type: resource:Oem
        description: >-
          The OEM extension property.
        required: false
      Status:
        type: resource:Status
        description: >-
          The status and health of the resource and its subordinate or dependent resources.
        required: false
  HostWatchdogTimer:
    description: >-
      The host watchdog timer functionality for this system.
    properties:
      FunctionEnabled:
        type: boolean
        description: >-
          An indication of whether a user has enabled the host watchdog timer functionality.  This
          property indicates only that a user has enabled the timer.  To activate
          the timer, installation of additional host-based software is necessary;
          an update to this property does not initiate the timer.
        required: true
      Oem:
        type: resource:Oem
        description: >-
          The OEM extension property.
        required: false
      Status:
        type: resource:Status
        description: >-
          The status and health of the resource and its subordinate or dependent resources.
        required: false
      TimeoutAction:
        type: string
        description: >-
          The action to perform when the watchdog timer reaches its timeout value.
        required: true
      WarningAction:
        type: string
        description: >-
          The action to perform when the watchdog timer is close to reaching its timeout
          value.  This action typically occurs from three to ten seconds before to
          the timeout value, but the exact timing is dependent on the implementation.
        required: false
  BootProgress:
    description: >-
      This object describes the last boot progress state.
    properties:
      LastBootTimeSeconds:
        type: float
        description: >-
          The number of seconds the system spent booting to the operating system during
          the last boot.
        required: false
      LastState:
        type: string
        description: >-
          The last boot progress state.
        required: false
      LastStateTime:
        type: string
        description: >-
          The date and time when the last boot state was updated.
        required: false
      Oem:
        type: resource:Oem
        description: >-
          The OEM extension property.
        required: false
      OemLastState:
        type: string
        description: >-
          The OEM-specific last state, if the LastState type is `OEM`.
        required: false
  GraphicalConsole:
    description: >-
      The information about the graphical console (KVM-IP) service of this system.
    properties:
      ConnectTypesSupported:
        type: list
        description: >-
          This property enumerates the graphical console connection types that the
          implementation allows.
        required: false
        entry_schema:
          type: string
      MaxConcurrentSessions:
        type: integer
        description: >-
          The maximum number of service sessions, regardless of protocol, that this
          system can support.
        required: false
        validation:
          $greater_or_equal:
          - $value
          - 0
      Port:
        type: integer
        description: >-
          The protocol port.
        required: false
        validation:
          $greater_or_equal:
          - $value
          - 0
      ServiceEnabled:
        type: boolean
        description: >-
          An indication of whether the service is enabled for this system.
        required: false
  SerialConsole:
    description: >-
      The serial console services that this system provides.
    properties:
      IPMI:
        type: IPMI
        description: >-
          The connection details for an IPMI Serial-over-LAN service.
        required: false
      MaxConcurrentSessions:
        type: integer
        description: >-
          The maximum number of service sessions, regardless of protocol, that this
          system can support.
        required: false
        validation:
          $greater_or_equal:
          - $value
          - 0
      SSH:
        type: SSH
        description: >-
          The connection details for an SSH serial console service.
        required: false
      Telnet:
        type: Telnet
        description: >-
          The connection details for a Telnet serial console service.
        required: false
      WebSocket:
        type: WebSocket
        description: >-
          The connection details for a WebSocket serial console service.
        required: false
  IPMI:
    description: >-
      The connection details for an IPMI Serial-over-LAN service.
    properties:
      ConsoleEntryCommand:
        type: string
        description: >-
          The command string passed to the service to select or enter the system's
          serial console.
        required: false
      HotKeySequenceDisplay:
        type: string
        description: >-
          The hotkey sequence available for the user to exit the serial console session.
        required: false
      Port:
        type: integer
        description: >-
          The protocol port.
        required: false
        validation:
          $greater_or_equal:
          - $value
          - 0
      ServiceEnabled:
        type: boolean
        description: >-
          An indication of whether the service is enabled for this system.
        required: false
      SharedWithManagerCLI:
        type: boolean
        description: >-
          Indicates whether the serial console service is shared with access to the
          manager's command-line interface (CLI).
        required: false
  SSH:
    description: >-
      The connection details for an SSH serial console service.
    properties:
      ConsoleEntryCommand:
        type: string
        description: >-
          The command string passed to the service to select or enter the system's
          serial console.
        required: false
      HotKeySequenceDisplay:
        type: string
        description: >-
          The hotkey sequence available for the user to exit the serial console session.
        required: false
      Port:
        type: integer
        description: >-
          The protocol port.
        required: false
        validation:
          $greater_or_equal:
          - $value
          - 0
      ServiceEnabled:
        type: boolean
        description: >-
          An indication of whether the service is enabled for this system.
        required: false
      SharedWithManagerCLI:
        type: boolean
        description: >-
          Indicates whether the serial console service is shared with access to the
          manager's command-line interface (CLI).
        required: false
  Telnet:
    description: >-
      The connection details for a Telnet serial console service.
    properties:
      ConsoleEntryCommand:
        type: string
        description: >-
          The command string passed to the service to select or enter the system's
          serial console.
        required: false
      HotKeySequenceDisplay:
        type: string
        description: >-
          The hotkey sequence available for the user to exit the serial console session.
        required: false
      Port:
        type: integer
        description: >-
          The protocol port.
        required: false
        validation:
          $greater_or_equal:
          - $value
          - 0
      ServiceEnabled:
        type: boolean
        description: >-
          An indication of whether the service is enabled for this system.
        required: false
      SharedWithManagerCLI:
        type: boolean
        description: >-
          Indicates whether the serial console service is shared with access to the
          manager's command-line interface (CLI).
        required: false
  WebSocket:
    description: >-
      The connection details for a WebSocket serial console service.
    properties:
      ConsoleURI:
        type: string
        description: >-
          The URI at which to access the WebSocket serial console.
        required: false
      Interactive:
        type: boolean
        description: >-
          Indicates if the WebSocket serial console allows interactive input.
        required: false
      ServiceEnabled:
        type: boolean
        description: >-
          An indication of whether the service is enabled for this system.
        required: false
  VirtualMediaConfig:
    description: >-
      The information about the virtual media service of this system.
    properties:
      Port:
        type: integer
        description: >-
          The protocol port.
        required: false
        validation:
          $greater_or_equal:
          - $value
          - 0
      ServiceEnabled:
        type: boolean
        description: >-
          An indication of whether the service is enabled for this system.
        required: false
  IdlePowerSaver:
    description: >-
      The idle power saver settings of the computer system.
    properties:
      Enabled:
        type: boolean
        description: >-
          An indication of whether idle power saver is enabled.
        required: false
      EnterDwellTimeSeconds:
        type: integer
        description: >-
          The duration in seconds the computer system is below the `EnterUtilizationPercent`
          value before the idle power save is activated.
        required: false
        validation:
          $greater_or_equal:
          - $value
          - 0
      EnterUtilizationPercent:
        type: float
        description: >-
          The percentage of utilization when the computer system enters idle power
          save.  If the computer system's utilization goes below this value, it enters
          idle power save.
        required: false
        validation:
          $greater_or_equal:
          - $value
          - 0
      ExitDwellTimeSeconds:
        type: integer
        description: >-
          The duration in seconds the computer system is above the `ExitUtilizationPercent`
          value before the idle power save is stopped.
        required: false
        validation:
          $greater_or_equal:
          - $value
          - 0
      ExitUtilizationPercent:
        type: float
        description: >-
          The percentage of utilization when the computer system exits idle power
          save.  If the computer system's utilization goes above this value, it exits
          idle power save.
        required: false
        validation:
          $greater_or_equal:
          - $value
          - 0
  Composition:
    description: >-
      Information about the composition capabilities and state of the computer system.
    properties:
      UseCases:
        type: list
        description: >-
          The composition use cases in which this computer system can participate.
        required: false
        entry_schema:
          type: string
  IPMIHostInterface:
    description: >-
      The information about the in-band IPMI service of this system.
    properties:
      ServiceEnabled:
        type: boolean
        description: >-
          An indication of whether the service is enabled for this system.
        required: false
relationship_types:
  ComputerSystemDependsOn:
    derived_from: core:DependsOn
    properties:
      Chassis@odata_count:
        type: odatav4:count
        description: >-
          The number of items in a collection.
        required: false
      ConsumingComputerSystems@odata_count:
        type: odatav4:count
        description: >-
          The number of items in a collection.
        required: false
      CooledBy:
        type: list
        description: >-
          An array of links to resources or objects that cool this computer system.  Normally,
          the link is for either a chassis or a specific set of fans.
        required: false
        entry_schema:
          type: odatav4:idRef
      CooledBy@odata_count:
        type: odatav4:count
        description: >-
          The number of items in a collection.
        required: false
      Endpoints@odata_count:
        type: odatav4:count
        description: >-
          The number of items in a collection.
        required: false
      HostingComputerSystem:
        type: string
        description: >-
          The link to the system that is hosting this virtual machine.
        required: false
      ManagedBy@odata_count:
        type: odatav4:count
        description: >-
          The number of items in a collection.
        required: false
      Oem:
        type: resource:Oem
        description: >-
          The OEM extension property.
        required: false
      OffloadedNetworkDeviceFunctions@odata_count:
        type: odatav4:count
        description: >-
          The number of items in a collection.
        required: false
      PoweredBy:
        type: list
        description: >-
          An array of links to resources or objects that power this computer system.  Normally,
          the link is for either a chassis or a specific set of power supplies.
        required: false
        entry_schema:
          type: odatav4:idRef
      PoweredBy@odata_count:
        type: odatav4:count
        description: >-
          The number of items in a collection.
        required: false
      ResourceBlocks@odata_count:
        type: odatav4:count
        description: >-
          The number of items in a collection.
        required: false
      SupplyingComputerSystems@odata_count:
        type: odatav4:count
        description: >-
          The number of items in a collection.
        required: false
      TrustedComponents@odata_count:
        type: odatav4:count
        description: >-
          The number of items in a collection.
        required: false
      VirtualMachines@odata_count:
        type: odatav4:count
        description: >-
          The number of items in a collection.
        required: false
interface_types:
  ComputerSystemActions:
    operations:
      AddResourceBlock:
        description: >-
          This action adds a resource block to a system.
        inputs:
          ComputerSystemETag:
            type: string
            description: >-
              The current ETag of the system.
            required: false
          ResourceBlock:
            type: ResourceBlock
            description: >-
              The resource block to add to the system.
            required: true
          ResourceBlockETag:
            type: string
            description: >-
              The current ETag of the resource block to add to the system.
            required: false
      Decommission:
        description: >-
          This action decommissions a system.
        inputs:
          ComputerSystemETag:
            type: string
            description: >-
              The current ETag of the system.
            required: false
          DecommissionTypes:
            type: list
            description: >-
              The types of data to remove from the system.
            required: true
          OEMDecommissionTypes:
            type: list
            description: >-
              The OEM-specific types of data to remove from the system.
            required: false
          RequireSecureErase:
            type: boolean
            description: >-
              Ensure secure erasure of all devices and fail the request if not possible.
            required: false
      ExportConfiguration:
        description: >-
          This action exports the configuration of a system in a vendor-specific format.
        inputs:
          Components:
            type: list
            description: >-
              The components of the system for which to export configuration data.
            required: true
          EncryptionPassphrase:
            type: string
            description: >-
              The encryption passphrase for the exported file.
            required: false
          ExportType:
            type: ExportType
            description: >-
              The types of export to perform.
            required: true
          OEMComponents:
            type: list
            description: >-
              The OEM-specific components of the system for which to export configuration
              data.
            required: false
          Security:
            type: ExportSecurity
            description: >-
              The policy to apply when exporting secure information.
            required: false
      RemoveResourceBlock:
        description: >-
          This action removes a resource block from a system.
        inputs:
          ComputerSystemETag:
            type: string
            description: >-
              The current ETag of the system.
            required: false
          ResourceBlock:
            type: ResourceBlock
            description: >-
              The resource block to remove from the system.
            required: true
          ResourceBlockETag:
            type: string
            description: >-
              The current ETag of the resource block to remove from the system.
            required: false
      Reset:
        description: >-
          This action resets the system.
        inputs:
          ResetType:
            type: resource:ResetType
            description: >-
              The type of reset.
            required: false
      SetDefaultBootOrder:
        description: >-
          This action sets the `BootOrder` property to the default settings.
node_types:
  ComputerSystem:
    description: >-
      The `ComputerSystem` schema represents a computer or system instance and the
      software-visible resources, or items within the data plane, such as memory,
      CPU, and other devices that it can access.  Details of those resources or subsystems
      are also linked through this resource.
    properties:
      '@odata_id':
        type: odatav4:id
        description: >-
          The unique identifier for a resource.
        required: true
      '@odata_context':
        type: odatav4:context
        description: >-
          The OData description of a payload.
        required: false
      '@odata_etag':
        type: odatav4:etag
        description: >-
          The current ETag of the resource.
        required: false
      '@odata_type':
        type: odatav4:type
        description: >-
          The type of a resource.
        required: true
      AssetTag:
        type: string
        description: >-
          The user-definable tag that can track this computer system for inventory
          or other client purposes.
        required: false
      BiosVersion:
        type: string
        description: >-
          The version of the system BIOS or primary system firmware.
        required: false
      Boot:
        type: Boot
        description: >-
          The boot settings for this system.
        required: false
      Description:
        type: string
        required: false
      HostName:
        type: string
        description: >-
          The DNS host name, without any domain information.
        required: false
      Id:
        type: resource:Id
        description: >-
          The unique identifier for this resource within the collection of similar
          resources.
        required: true
      IndicatorLED:
        type: string
        description: >-
          The state of the indicator LED, which identifies the system.
        required: false
      Manufacturer:
        type: string
        description: >-
          The manufacturer or OEM of this system.
        required: false
      MemorySummary:
        type: MemorySummary
        description: >-
          The central memory of the system in general detail.
        required: false
      Model:
        type: string
        description: >-
          The product name for this system, without the manufacturer name.
        required: false
      Name:
        type: resource:Name
        description: >-
          The name of the resource or array member.
        required: true
      Oem:
        type: resource:Oem
        description: >-
          The OEM extension property.
        required: false
      PartNumber:
        type: string
        description: >-
          The part number for this system.
        required: false
      PowerState:
        type: string
        description: >-
          The current power state of the system.
        required: false
      ProcessorSummary:
        type: ProcessorSummary
        description: >-
          The central processors of the system in general detail.
        required: false
      SKU:
        type: string
        description: >-
          The manufacturer SKU for this system.
        required: false
      SerialNumber:
        type: string
        description: >-
          The serial number for this system.
        required: false
      Status:
        type: resource:Status
        description: >-
          The status and health of the resource and its subordinate or dependent resources.
        required: false
      SystemType:
        type: string
        description: >-
          The type of computer system that this resource represents.
        required: false
        validation:
          $valid_values:
          - $value
          - - Physical
            - Virtual
            - OS
            - PhysicallyPartitioned
            - VirtuallyPartitioned
            - Composed
            - DPU
      UUID:
        type: string
        description: >-
          The UUID for this system.
        required: false
      TrustedModules:
        type: list
        description: >-
          An array of trusted modules in the system.
        required: false
        entry_schema:
          type: TrustedModules
      HostedServices:
        type: HostedServices
        description: >-
          The services that this computer system supports.
        required: false
      HostingRoles:
        type: list
        description: >-
          The hosting roles that this computer system supports.
        required: false
        entry_schema:
          type: string
      PCIeDevices@odata_count:
        type: odatav4:count
        description: >-
          The number of items in a collection.
        required: false
      PCIeFunctions@odata_count:
        type: odatav4:count
        description: >-
          The number of items in a collection.
        required: false
      HostWatchdogTimer:
        type: HostWatchdogTimer
        description: >-
          The host watchdog timer functionality for this system.
        required: false
      Redundancy@odata_count:
        type: odatav4:count
        description: >-
          The number of items in a collection.
        required: false
      SubModel:
        type: string
        description: >-
          The sub-model for this system.
        required: false
      PowerRestorePolicy:
        type: string
        description: >-
          The desired power state of the system when power is restored after a power
          loss.
        required: false
        validation:
          $valid_values:
          - $value
          - - AlwaysOn
            - AlwaysOff
            - LastState
      LastResetTime:
        type: string
        description: >-
          The date and time when the system was last reset or rebooted.
        required: false
      BootProgress:
        type: BootProgress
        description: >-
          This object describes the last boot progress state.
        required: false
      GraphicalConsole:
        type: GraphicalConsole
        description: >-
          The information about the graphical console (KVM-IP) service of this system.
        required: false
      LocationIndicatorActive:
        type: boolean
        description: >-
          An indicator allowing an operator to physically locate this resource.
        required: false
      PowerCycleDelaySeconds:
        type: float
        description: >-
          The number of seconds to delay power on after a `Reset` action requesting
          `PowerCycle` or `FullPowerCycle`.  Zero seconds indicates no delay.
        required: false
      PowerOffDelaySeconds:
        type: float
        description: >-
          The number of seconds to delay power off during a reset.  Zero seconds indicates
          no delay to power off.
        required: false
      PowerOnDelaySeconds:
        type: float
        description: >-
          The number of seconds to delay power on after an externally performed power
          cycle or during a reset.  Zero seconds indicates no delay to power up.
        required: false
      SerialConsole:
        type: SerialConsole
        description: >-
          The serial console services that this system provides.
        required: false
      VirtualMediaConfig:
        type: VirtualMediaConfig
        description: >-
          The information about the virtual media service of this system.
        required: false
      Measurements:
        type: list
        description: >-
          An array of DSP0274-defined measurement blocks.
        required: false
        entry_schema:
          type: sftwinvn:MeasurementBlock
      PowerMode:
        type: string
        description: >-
          The power mode setting of the computer system.
        required: false
      IdlePowerSaver:
        type: IdlePowerSaver
        description: >-
          The idle power saver settings of the computer system.
        required: false
      KeyManagement:
        type: KeyManagement
        description: >-
          The key management settings of the computer system.
        required: false
      Composition:
        type: Composition
        description: >-
          Information about the composition capabilities and state of the computer
          system.
        required: false
      ManufacturingMode:
        type: boolean
        description: >-
          An indication of whether the system is in manufacturing mode.  Manufacturing
          mode is a special boot mode, not normally available to end users, that modifies
          features and settings for use while the system is being manufactured and
          tested.
        required: false
      LastResetCause:
        type: string
        description: >-
          The last reset cause of the system.
        required: false
        validation:
          $valid_values:
          - $value
          - - PowerButtonPress
            - ManagementCommand
            - PowerRestorePolicy
            - RTCWakeup
            - WatchdogExpiration
            - OSSoftRestart
            - SystemCrash
            - ThermalEvent
            - PowerEvent
            - Unknown
      IPMIHostInterface:
        type: IPMIHostInterface
        description: >-
          The information about the in-band IPMI service of this system.
        required: false
      MultipartImportConfigurationPushURI:
        type: string
        description: >-
          The URI used to perform a Redfish Specification-defined multipart HTTP or
          HTTPS push import of a vendor-specific configuration file.
        required: false
    requirements:
    - EthernetInterfaces:
        # node: ethintcl:EthernetInterfaceCollection
        capability: core:Containable
        relationship: core:Contains
        count_range:
        - 0
        - 1
        description: >-
          The link to the collection of Ethernet interfaces associated with this system.
    - LogServices:
        node: lgsrvcl:LogServiceCollection
        capability: lgsrclcp:LogServiceCollectionContainable
        relationship: core:Contains
        count_range:
        - 0
        - 1
        description: >-
          The link to the collection of log services associated with this system.
    - Processors:
        # node: prcscllc:ProcessorCollection
        capability: core:Containable
        relationship: core:Contains
        count_range:
        - 0
        - 1
        description: >-
          The link to the collection of processors associated with this system.
    - SimpleStorage:
        # node: smpstrcl:SimpleStorageCollection
        capability: core:Containable
        relationship: core:Contains
        count_range:
        - 0
        - 1
        description: >-
          The link to the collection of storage devices associated with this system.
