data_types:
  AutomaticRetryConfig:
    derived_from: string
    validation:
      $valid_values:
      - $value
      - - Disabled
        - RetryAttempts
        - RetryAlways
  BootOrderTypes:
    description: >-
      The enumerations of BootOrderTypes specify the choice of boot order property
      to use when controller the persistent boot order for this computer system.
    derived_from: string
    validation:
      $valid_values:
      - $value
      - - BootOrder
        - AliasBootOrder
  BootProgress:
    description: >-
      This object describes the last boot progress state.
    properties:
      LastBootTimeSeconds:
        type: float
        description: >-
          The number of seconds the system spent booting to the operating system during
          the last boot.
        required: false
      LastState:
        type: BootProgressTypes
        description: >-
          The last boot progress state.
        required: false
      LastStateTime:
        type: string
        description: >-
          The date and time when the last boot state was updated.
        required: false
      Oem:
        type: resource:Oem
        description: >-
          The OEM extension property.
        required: false
      OemLastState:
        type: string
        description: >-
          The OEM-specific last state, if the LastState type is `OEM`.
        required: false
  BootProgressTypes:
    derived_from: string
    validation:
      $valid_values:
      - $value
      - - None
        - PrimaryProcessorInitializationStarted
        - BusInitializationStarted
        - MemoryInitializationStarted
        - SecondaryProcessorInitializationStarted
        - PCIResourceConfigStarted
        - SystemHardwareInitializationComplete
        - SetupEntered
        - OSBootStarted
        - OSRunning
        - OEM
  BootSourceOverrideEnabled:
    derived_from: string
    validation:
      $valid_values:
      - $value
      - - Disabled
        - Once
        - Continuous
  BootSourceOverrideMode:
    derived_from: string
    validation:
      $valid_values:
      - $value
      - - Legacy
        - UEFI
  Composition:
    description: >-
      Information about the composition capabilities and state of a computer system.
    properties:
      UseCases:
        type: list
        description: >-
          The composition use cases in which this computer system can participate.
        required: false
        entry_schema:
          type: CompositionUseCase
  CompositionUseCase:
    derived_from: string
    validation:
      $valid_values:
      - $value
      - - ResourceBlockCapable
        - ExpandableSystem
  GraphicalConnectTypesSupported:
    derived_from: string
    validation:
      $valid_values:
      - $value
      - - KVMIP
        - OEM
  HostGraphicalConsole:
    description: >-
      The information about a graphical console service for this system.
    properties:
      ConnectTypesSupported:
        type: list
        description: >-
          This property enumerates the graphical console connection types that the
          implementation allows.
        required: false
        entry_schema:
          type: GraphicalConnectTypesSupported
      MaxConcurrentSessions:
        type: integer
        description: >-
          The maximum number of service sessions, regardless of protocol, that this
          system can support.
        required: false
        validation:
          $greater_or_equal:
          - $value
          - 0
      Port:
        type: integer
        description: >-
          The protocol port.
        required: false
        validation:
          $greater_or_equal:
          - $value
          - 0
      ServiceEnabled:
        type: boolean
        description: >-
          An indication of whether the service is enabled for this system.
        required: false
  HostSerialConsole:
    description: >-
      The information about the serial console services that this system provides.
    properties:
      IPMI:
        type: SerialConsoleProtocol
        description: >-
          The connection details for an IPMI Serial-over-LAN service.
        required: false
      MaxConcurrentSessions:
        type: integer
        description: >-
          The maximum number of service sessions, regardless of protocol, that this
          system can support.
        required: false
        validation:
          $greater_or_equal:
          - $value
          - 0
      SSH:
        type: SerialConsoleProtocol
        description: >-
          The connection details for an SSH serial console service.
        required: false
      Telnet:
        type: SerialConsoleProtocol
        description: >-
          The connection details for a Telnet serial console service.
        required: false
  HostingRole:
    description: >-
      The enumerations of HostingRoles specify different features that the hosting
      ComputerSystem supports.
    derived_from: string
    validation:
      $valid_values:
      - $value
      - - ApplicationServer
        - StorageServer
        - Switch
        - Appliance
        - BareMetalServer
        - VirtualMachineServer
        - ContainerServer
  IdlePowerSaver:
    description: >-
      The idle power saver settings of a computer system.
    properties:
      Enabled:
        type: boolean
        description: >-
          An indication of whether idle power saver is enabled.
        required: false
      EnterDwellTimeSeconds:
        type: integer
        description: >-
          The duration in seconds the computer system is below the EnterUtilizationPercent
          value before the idle power save is activated.
        required: false
        validation:
          $greater_or_equal:
          - $value
          - 0
      EnterUtilizationPercent:
        type: float
        description: >-
          The percentage of utilization that the computer system shall be lower than
          to enter idle power save.
        required: false
        validation:
          $greater_or_equal:
          - $value
          - 0
      ExitDwellTimeSeconds:
        type: integer
        description: >-
          The duration in seconds the computer system is above the ExitUtilizationPercent
          value before the idle power save is stopped.
        required: false
        validation:
          $greater_or_equal:
          - $value
          - 0
      ExitUtilizationPercent:
        type: float
        description: >-
          The percentage of utilization that the computer system shall be higher than
          to exit idle power save.
        required: false
        validation:
          $greater_or_equal:
          - $value
          - 0
  IndicatorLED:
    derived_from: string
    validation:
      $valid_values:
      - $value
      - - Unknown
        - Lit
        - Blinking
        - 'Off'
  InterfaceType:
    derived_from: string
    validation:
      $valid_values:
      - $value
      - - TPM1_2
        - TPM2_0
        - TCM1_0
  InterfaceTypeSelection:
    description: >-
      The enumerations of InterfaceTypeSelection specify the method for switching
      the TrustedModule InterfaceType, for instance between TPM1_2 and TPM2_0, if
      supported.
    derived_from: string
    validation:
      $valid_values:
      - $value
      - - None
        - FirmwareUpdate
        - BiosSetting
        - OemMethod
  KMIPServer:
    description: >-
      The KMIP server settings for a computer system.
    properties:
      Address:
        type: string
        description: >-
          The KMIP server address.
        required: false
      Password:
        type: string
        description: >-
          The password to access the KMIP server.  The value is `null` in responses.
        required: false
      Port:
        type: integer
        description: >-
          The KMIP server port.
        required: false
      Username:
        type: string
        description: >-
          The username to access the KMIP server.
        required: false
  MemoryMirroring:
    derived_from: string
    validation:
      $valid_values:
      - $value
      - - System
        - DIMM
        - Hybrid
        - None
  PowerMode:
    derived_from: string
    validation:
      $valid_values:
      - $value
      - - MaximumPerformance
        - BalancedPerformance
        - PowerSaving
        - Static
        - OSControlled
        - OEM
  PowerRestorePolicyTypes:
    description: >-
      The enumerations of PowerRestorePolicyTypes specify the choice of power state
      for the system when power is applied.
    derived_from: string
    validation:
      $valid_values:
      - $value
      - - AlwaysOn
        - AlwaysOff
        - LastState
  SerialConsoleProtocol:
    description: >-
      The information about a serial console service that this system provides.
    properties:
      ConsoleEntryCommand:
        type: string
        description: >-
          The command string passed to the service to select or enter the system's
          serial console.
        required: false
      HotKeySequenceDisplay:
        type: string
        description: >-
          The hotkey sequence available for the user to exit the serial console session.
        required: false
      Port:
        type: integer
        description: >-
          The protocol port.
        required: false
        validation:
          $greater_or_equal:
          - $value
          - 0
      ServiceEnabled:
        type: boolean
        description: >-
          An indication of whether the service is enabled for this system.
        required: false
      SharedWithManagerCLI:
        type: boolean
        description: >-
          Indicates whether the serial console service is shared with access to the
          manager's command-line interface (CLI).
        required: false
  StopBootOnFault:
    derived_from: string
    validation:
      $valid_values:
      - $value
      - - Never
        - AnyFault
  SystemType:
    derived_from: string
    validation:
      $valid_values:
      - $value
      - - Physical
        - Virtual
        - OS
        - PhysicallyPartitioned
        - VirtuallyPartitioned
        - Composed
        - DPU
  TrustedModuleRequiredToBoot:
    derived_from: string
    validation:
      $valid_values:
      - $value
      - - Disabled
        - Required
  TrustedModules:
    description: >-
      The Trusted Module installed in the system.
    properties:
      FirmwareVersion:
        type: string
        description: >-
          The firmware version of this Trusted Module.
        required: false
      FirmwareVersion2:
        type: string
        description: >-
          The second firmware version of this Trusted Module, if applicable.
        required: false
      InterfaceType:
        type: InterfaceType
        description: >-
          The interface type of the Trusted Module.
        required: false
      InterfaceTypeSelection:
        type: InterfaceTypeSelection
        description: >-
          The interface type selection supported by this Trusted Module.
        required: false
      Oem:
        type: resource:Oem
        description: >-
          The OEM extension property.
        required: false
      Status:
        type: resource:Status
        description: >-
          The status and health of the resource and its subordinate or dependent resources.
        required: false
  VirtualMediaConfig:
    description: >-
      The information about virtual media service for this system.
    properties:
      Port:
        type: integer
        description: >-
          The protocol port.
        required: false
        validation:
          $greater_or_equal:
          - $value
          - 0
      ServiceEnabled:
        type: boolean
        description: >-
          An indication of whether the service is enabled for this system.
        required: false
  WatchdogTimeoutActions:
    description: >-
      The enumerations of WatchdogTimeoutActions specify the choice of action to take
      when the host watchdog timer reaches its timeout value.
    derived_from: string
    validation:
      $valid_values:
      - $value
      - - None
        - ResetSystem
        - PowerCycle
        - PowerDown
        - OEM
  WatchdogTimer:
    description: >-
      This type describes the host watchdog timer functionality for this system.
    properties:
      FunctionEnabled:
        type: boolean
        description: >-
          An indication of whether a user has enabled the host watchdog timer functionality.  This
          property indicates only that a user has enabled the timer.  To activate
          the timer, installation of additional host-based software is necessary;
          an update to this property does not initiate the timer.
        required: true
      Oem:
        type: resource:Oem
        description: >-
          The OEM extension property.
        required: false
      Status:
        type: resource:Status
        description: >-
          The status and health of the resource and its subordinate or dependent resources.
        required: false
      TimeoutAction:
        type: WatchdogTimeoutActions
        description: >-
          The action to perform when the watchdog timer reaches its timeout value.
        required: true
      WarningAction:
        type: WatchdogWarningActions
        description: >-
          The action to perform when the watchdog timer is close to reaching its timeout
          value.  This action typically occurs from three to ten seconds before to
          the timeout value, but the exact timing is dependent on the implementation.
        required: false
  WatchdogWarningActions:
    description: >-
      The enumerations of WatchdogWarningActions specify the choice of action to take
      when the host watchdog timer is close (typically 3-10 seconds) to reaching its
      timeout value.
    derived_from: string
    validation:
      $valid_values:
      - $value
      - - None
        - DiagnosticInterrupt
        - SMI
        - MessagingInterrupt
        - SCI
        - OEM
relationship_types:
  ComputerSystemDependsOn:
    derived_from: core:DependsOn
    properties:
      Chassis@odata_count:
        type: odatav4:count
        description: >-
          The number of items in a collection.
        required: false
      ConsumingComputerSystems@odata_count:
        type: odatav4:count
        description: >-
          The number of items in a collection.
        required: false
      CooledBy:
        type: list
        description: >-
          An array of links to resources or objects that that cool this computer system.  Normally,
          the link is for either a chassis or a specific set of fans.
        required: false
        entry_schema:
          type: odatav4:idRef
      CooledBy@odata_count:
        type: odatav4:count
        description: >-
          The number of items in a collection.
        required: false
      Endpoints@odata_count:
        type: odatav4:count
        description: >-
          The number of items in a collection.
        required: false
      ManagedBy@odata_count:
        type: odatav4:count
        description: >-
          The number of items in a collection.
        required: false
      Oem:
        type: resource:Oem
        description: >-
          The OEM extension property.
        required: false
      OffloadedNetworkDeviceFunctions@odata_count:
        type: odatav4:count
        description: >-
          The number of items in a collection.
        required: false
      PoweredBy:
        type: list
        description: >-
          An array of links to resources or objects that power this computer system.  Normally,
          the link is for either a chassis or a specific set of power supplies.
        required: false
        entry_schema:
          type: odatav4:idRef
      PoweredBy@odata_count:
        type: odatav4:count
        description: >-
          The number of items in a collection.
        required: false
      ResourceBlocks@odata_count:
        type: odatav4:count
        description: >-
          The number of items in a collection.
        required: false
      SupplyingComputerSystems@odata_count:
        type: odatav4:count
        description: >-
          The number of items in a collection.
        required: false
      TrustedComponents@odata_count:
        type: odatav4:count
        description: >-
          The number of items in a collection.
        required: false
interface_types:
  ComputerSystemActions:
    operations:
      AddResourceBlock:
        description: >-
          This action adds a resource block to a system.
        inputs:
          ComputerSystemETag:
            type: string
            description: >-
              The current ETag of the system.
            required: false
          ResourceBlock:
            type: ResourceBlock
            description: >-
              The resource block to add to the system.
            required: true
          ResourceBlockETag:
            type: string
            description: >-
              The current ETag of the resource block to add to the system.
            required: false
      RemoveResourceBlock:
        description: >-
          This action removes a resource block from a system.
        inputs:
          ComputerSystemETag:
            type: string
            description: >-
              The current ETag of the system.
            required: false
          ResourceBlock:
            type: ResourceBlock
            description: >-
              The resource block to remove from the system.
            required: true
          ResourceBlockETag:
            type: string
            description: >-
              The current ETag of the resource block to remove from the system.
            required: false
      Reset:
        description: >-
          This action resets the system.
        inputs:
          ResetType:
            type: resource:ResetType
            description: >-
              The type of reset.
            required: false
      SetDefaultBootOrder:
        description: >-
          This action sets the BootOrder to the default settings.
node_types:
  ComputerSystem:
    description: >-
      The ComputerSystem schema represents a computer or system instance and the software-visible
      resources, or items within the data plane, such as memory, CPU, and other devices
      that it can access.  Details of those resources or subsystems are also linked
      through this resource.
    properties:
      AssetTag:
        type: string
        description: >-
          The user-definable tag that can track this computer system for inventory
          or other client purposes.
        required: false
      BiosVersion:
        type: string
        description: >-
          The version of the system BIOS or primary system firmware.
        required: false
      Boot:
        type: Boot
        description: >-
          The boot settings for this system.
        required: false
      BootProgress:
        type: BootProgress
        description: >-
          This object describes the last boot progress state.
        required: false
      Composition:
        type: Composition
        description: >-
          Information about the composition capabilities and state of the computer
          system.
        required: false
      Description:
        type: resource:Description
        description: >-
          The description of this resource.  Used for commonality in the schema definitions.
        required: false
      GraphicalConsole:
        type: HostGraphicalConsole
        description: >-
          The information about the graphical console (KVM-IP) service of this system.
        required: false
      HostName:
        type: string
        description: >-
          The DNS host name, without any domain information.
        required: false
      HostWatchdogTimer:
        type: WatchdogTimer
        description: >-
          The host watchdog timer functionality for this system.
        required: false
      HostedServices:
        type: HostedServices
        description: >-
          The services that this computer system supports.
        required: false
      HostingRoles:
        type: list
        description: >-
          The hosting roles that this computer system supports.
        required: false
        entry_schema:
          type: HostingRole
      Id:
        type: resource:Id
        description: >-
          The unique identifier for this resource within the collection of similar
          resources.
        required: true
      IdlePowerSaver:
        type: IdlePowerSaver
        description: >-
          The idle power saver settings of the computer system.
        required: false
      IndicatorLED:
        type: IndicatorLED
        description: >-
          The state of the indicator LED, which identifies the system.
        required: false
      KeyManagement:
        type: KeyManagement
        description: >-
          The key management settings of the computer system.
        required: false
      LastResetTime:
        type: string
        description: >-
          The date and time when the system was last reset or rebooted.
        required: false
      LocationIndicatorActive:
        type: boolean
        description: >-
          An indicator allowing an operator to physically locate this resource.
        required: false
      Manufacturer:
        type: string
        description: >-
          The manufacturer or OEM of this system.
        required: false
      ManufacturingMode:
        type: boolean
        description: >-
          An indication of whether the system is in manufacturing mode.  Manufacturing
          mode is a special boot mode, not normally available to end users, that modifies
          features and settings for use while the system is being manufactured and
          tested.
        required: false
      Measurements:
        type: list
        description: >-
          An array of DSP0274-defined measurement blocks.
        required: false
        entry_schema:
          type: sftwinvn:MeasurementBlock
      MemorySummary:
        type: MemorySummary
        description: >-
          The central memory of the system in general detail.
        required: false
      Model:
        type: string
        description: >-
          The product name for this system, without the manufacturer name.
        required: false
      Name:
        type: resource:Name
        description: >-
          The name of the resource or array member.
        required: true
      Oem:
        type: resource:Oem
        description: >-
          The OEM extension property.
        required: false
      PCIeDevices@odata_count:
        type: odatav4:count
        description: >-
          The number of items in a collection.
        required: false
      PCIeFunctions@odata_count:
        type: odatav4:count
        description: >-
          The number of items in a collection.
        required: false
      PartNumber:
        type: string
        description: >-
          The part number for this system.
        required: false
      PowerCycleDelaySeconds:
        type: float
        description: >-
          The number of seconds to delay power on after a `Reset` action requesting
          `PowerCycle`.  Zero seconds indicates no delay.
        required: false
      PowerMode:
        type: PowerMode
        description: >-
          The power mode setting of the computer system.
        required: false
      PowerOffDelaySeconds:
        type: float
        description: >-
          The number of seconds to delay power off during a reset.  Zero seconds indicates
          no delay to power off.
        required: false
      PowerOnDelaySeconds:
        type: float
        description: >-
          The number of seconds to delay power on after a power cycle or during a
          reset.  Zero seconds indicates no delay to power up.
        required: false
      PowerRestorePolicy:
        type: PowerRestorePolicyTypes
        description: >-
          The desired power state of the system when power is restored after a power
          loss.
        required: false
      PowerState:
        type: resource:PowerState
        description: >-
          The current power state of the system.
        required: false
      ProcessorSummary:
        type: ProcessorSummary
        description: >-
          The central processors of the system in general detail.
        required: false
      Redundancy@odata_count:
        type: odatav4:count
        description: >-
          The number of items in a collection.
        required: false
      SKU:
        type: string
        description: >-
          The manufacturer SKU for this system.
        required: false
      SerialConsole:
        type: HostSerialConsole
        description: >-
          The serial console services that this system provides.
        required: false
      SerialNumber:
        type: string
        description: >-
          The serial number for this system.
        required: false
      Status:
        type: resource:Status
        description: >-
          The status and health of the resource and its subordinate or dependent resources.
        required: false
      SubModel:
        type: string
        description: >-
          The sub-model for this system.
        required: false
      SystemType:
        type: SystemType
        description: >-
          The type of computer system that this resource represents.
        required: false
      TrustedModules:
        type: list
        description: >-
          An array of trusted modules in the system.
        required: false
        entry_schema:
          type: TrustedModules
      UUID:
        type: resource:UUID
        description: >-
          The UUID for this system.
        required: false
      VirtualMediaConfig:
