  Boot:
    description: >-
      The boot information for this resource.
    properties:
      AliasBootOrder:
        type: list
        description: >-
          Ordered array of boot source aliases representing the persistent boot order
          associated with this computer system.
        required: false
        entry_schema:
          type: cmptsyst:BootSource
      AutomaticRetryAttempts:
        type: integer
        description: >-
          The number of attempts the system will automatically retry booting.
        required: false
        validation:
          $greater_or_equal:
          - $value
          - 0
      AutomaticRetryConfig:
        type: AutomaticRetryConfig
        description: >-
          The configuration of how the system retries booting automatically.
        required: false
      BootNext:
        type: string
        description: >-
          The BootOptionReference of the Boot Option to perform a one-time boot from
          when BootSourceOverrideTarget is `UefiBootNext`.
        required: false
      BootOrder:
        type: list
        description: >-
          An array of BootOptionReference strings that represent the persistent boot
          order for with this computer system.  Changes to the boot order typically
          require a system reset before they take effect.  It is likely that a client
          finds the `@Redfish.Settings` term in this resource, and if it is found,
          the client makes requests to change boot order settings by modifying the
          resource identified by the `@Redfish.Settings` term.
        required: false
        entry_schema:
          type: string
      BootOrderPropertySelection:
        type: BootOrderTypes
        description: >-
          The name of the boot order property that the system uses for the persistent
          boot order.
        required: false
      BootSourceOverrideEnabled:
        type: BootSourceOverrideEnabled
        description: >-
          The state of the boot source override feature.
        required: false
      BootSourceOverrideMode:
        type: BootSourceOverrideMode
        description: >-
          The BIOS boot mode to use when the system boots from the BootSourceOverrideTarget
          boot source.
        required: false
      BootSourceOverrideTarget:
        type: cmptsyst:BootSource
        description: >-
          The current boot source to use at the next boot instead of the normal boot
          device, if BootSourceOverrideEnabled does not contain `Disabled`.
        required: false
      HttpBootUri:
        type: string
        description: >-
          The URI to boot from when BootSourceOverrideTarget is set to `UefiHttp`.
        required: false
      RemainingAutomaticRetryAttempts:
        type: integer
        description: >-
          The number of remaining automatic retry boots.
        required: false
        validation:
          $greater_or_equal:
          - $value
          - 0
      StopBootOnFault:
        type: StopBootOnFault
        description: >-
          If the boot should stop on a fault.
        required: false
      TrustedModuleRequiredToBoot:
        type: TrustedModuleRequiredToBoot
        description: >-
          The Trusted Module boot requirement.
        required: false
      UefiTargetBootSourceOverride:
        type: string
        description: >-
          The UEFI device path of the device from which to boot when BootSourceOverrideTarget
          is `UefiTarget`.
        required: false
    requirements:
    - BootOptions:
        node: btoptcl:BootOptionCollection
        capability: btopclcp:BootOptionCollectionContainable
        relationship: core:Contains
        count_range:
        - 0
        - 1
        description: >-
          The link to the collection of the UEFI boot options associated with this
          computer system.
    - Certificates:
        node: crtfcllc:CertificateCollection
        capability: crtcllcp:CertificateCollectionContainable
        relationship: core:Contains
        count_range:
        - 0
        - 1
        description: >-
          The link to a collection of certificates used for booting through HTTPS
          by this computer system.
    capabilities:
      containable:
        type: cmpsyscp:BootContainable
  HostedServices:
    description: >-
      The services that might be running or installed on the system.
    properties:
      Oem:
        type: resource:Oem
        description: >-
          The OEM extension property.
        required: false
    requirements:
    - StorageServices:
        node: hststrsr:HostedStorageServices
        capability: hsstsrcp:HostedStorageServicesContainable
        relationship: core:Contains
        count_range:
        - 0
        - 1
        description: >-
          The link to a collection of storage services that this computer system supports.
    capabilities:
      containable:
        type: cmpsyscp:HostedServicesContainable
  KeyManagement:
    description: >-
      The key management settings of a computer system.
    properties:
      KMIPServers:
        type: list
        description: >-
          The KMIP servers to which this computer system is subscribed.
        required: false
        entry_schema:
          type: KMIPServer
    requirements:
    - KMIPCertificates:
        node: crtfcllc:CertificateCollection
        capability: crtcllcp:CertificateCollectionContainable
        relationship: core:Contains
        count_range:
        - 0
        - 1
        description: >-
          The link to a collection of server certificates for the servers referenced
          by the KMIPServers property.
    capabilities:
      containable:
        type: cmpsyscp:KeyManagementContainable
  MemorySummary:
    description: >-
      The memory of the system in general detail.
    properties:
      MemoryMirroring:
        type: MemoryMirroring
        description: >-
          The ability and type of memory mirroring that this computer system supports.
        required: false
      Status:
        type: resource:Status
        description: >-
          The status and health of the resource and its subordinate or dependent resources.
        required: false
      TotalSystemMemoryGiB:
        type: float
        description: >-
          The total configured operating system-accessible memory (RAM), measured
          in GiB.
        required: false
        validation:
          $greater_or_equal:
          - $value
          - 0
      TotalSystemPersistentMemoryGiB:
        type: float
        description: >-
          The total configured, system-accessible persistent memory, measured in GiB.
        required: false
        validation:
          $greater_or_equal:
          - $value
          - 0
    requirements:
    - Metrics:
        node: mmrymtrc:MemoryMetrics
        capability: mmrmtrcp:MemoryMetricsContainable
        relationship: core:Contains
        count_range:
        - 0
        - 1
        description: >-
          The link to the metrics associated with all memory in this system.
    capabilities:
      containable:
        type: cmpsyscp:MemorySummaryContainable
  ProcessorSummary:
    description: >-
      The central processors of the system in general detail.
    properties:
      CoreCount:
        type: integer
        description: >-
          The number of processor cores in the system.
        required: false
        validation:
          $greater_or_equal:
          - $value
          - 0
      Count:
        type: integer
        description: >-
          The number of physical processors in the system.
        required: false
        validation:
          $greater_or_equal:
          - $value
          - 0
      LogicalProcessorCount:
        type: integer
        description: >-
          The number of logical processors in the system.
        required: false
        validation:
          $greater_or_equal:
          - $value
          - 0
      Model:
        type: string
        description: >-
          The processor model for the primary or majority of processors in this system.
        required: false
      Status:
        type: resource:Status
        description: >-
          The status and health of the resource and its subordinate or dependent resources.
        required: false
      ThreadingEnabled:
        type: boolean
        description: >-
          An indication of whether threading is enabled on all processors in this
          system.
        required: false
    requirements:
    - Metrics:
        node: prcsmtrc:ProcessorMetrics
        capability: prcmtrcp:ProcessorMetricsContainable
        relationship: core:Contains
        count_range:
        - 0
        - 1
        description: >-
          The link to the metrics associated with all processors in this system.
    capabilities:
      containable:
        type: cmpsyscp:ProcessorSummaryContainable
