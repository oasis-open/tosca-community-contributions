tosca_definitions_version: tosca_2_0
description: >-
  Types generated from JSON Schema by any2tosca
imports:
- url: NetworkDeviceFunction.yaml
  namespace: ntwdvcfn
- url: Resource.yaml
  namespace: resource
- url: Core.yaml
  namespace: core
- url: NetworkPort_caps.yaml
  namespace: ntwprtcp
- url: NetworkDeviceFunction_caps.yaml
  namespace: ntdvfncp
data_types:
  FlowControl:
    derived_from: string
    validation:
      $valid_values:
      - $value
      - - None
        - TX
        - RX
        - TX_RX
  LinkNetworkTechnology:
    derived_from: string
    validation:
      $valid_values:
      - $value
      - - Ethernet
        - InfiniBand
        - FibreChannel
  LinkStatus:
    derived_from: string
    validation:
      $valid_values:
      - $value
      - - Down
        - Up
  PortConnectionType:
    derived_from: string
    validation:
      $valid_values:
      - $value
      - - NotConnected
        - NPort
        - PointToPoint
        - PrivateLoop
        - PublicLoop
        - Generic
        - ExtenderFabric
  SupportedEthernetCapabilities:
    derived_from: string
    validation:
      $valid_values:
      - $value
      - - WakeOnLAN
        - EEE
  SupportedLinkCapabilities:
    description: >-
      The self-described link capabilities of an assocaited port.
    properties:
      AutoSpeedNegotiation:
        type: boolean
        description: >-
          Indicates whether the port has the capability to auto negotiate speed.
        required: false
      CapableLinkSpeedMbps:
        type: list
        description: >-
          The self-described link network speed capabilities of this port. Note: Should
          this be a new enumerated type of link speeds?.
        required: false
        entry_schema:
          type: integer
      LinkNetworkTechnology:
        type: LinkNetworkTechnology
        description: >-
          The self-described link network technology capabilities of this port.
        required: false
      LinkSpeedMbps:
        type: integer
        description: >-
          The speed of the link in Mbps when this link network technology is active.
        required: false
node_types:
  NetworkPort:
    description: >-
      A Network Port represents a discrete physical port capable of connecting to
      a network.
    properties:
      ActiveLinkTechnology:
        type: LinkNetworkTechnology
        description: >-
          Network Port Active Link Technology.
        required: false
      AssociatedNetworkAddresses:
        type: list
        description: >-
          The array of configured network addresses (MAC or WWN) that are associated
          with this Network Port, including the programmed address of the lowest numbered
          Network Device Function, the configured but not active address if applicable,
          the address for hardware port teaming, or other network addresses.
        required: false
        entry_schema:
          type: string
      CurrentLinkSpeedMbps:
        type: integer
        description: >-
          Network Port Current Link Speed.
        required: false
      Description:
        type: resource:Description
        description: >-
          The description of this resource.  Used for commonality in the schema definitions.
        required: false
      EEEEnabled:
        type: boolean
        description: >-
          Whether IEEE 802.3az Energy Efficient Ethernet (EEE) is enabled for this
          network port.
        required: false
      FCFabricName:
        type: string
        description: >-
          The FC Fabric Name provided by the switch.
        required: false
      FCPortConnectionType:
        type: PortConnectionType
        description: >-
          This is the connection type of this port.
        required: false
      FlowControlConfiguration:
        type: FlowControl
        description: >-
          The locally configured 802.3x flow control setting for this network port.
        required: false
      FlowControlStatus:
        type: FlowControl
        description: >-
          The 802.3x flow control behavior negotiated with the link partner for this
          network port (Ethernet-only).
        required: false
      Id:
        type: resource:Id
        description: >-
          The unique identifier for this resource within the collection of similar
          resources.
        required: true
      LinkStatus:
        type: LinkStatus
        description: >-
          The status of the link between this port and its link partner.
        required: false
      MaxFrameSize:
        type: integer
        description: >-
          The maximum frame size supported by the port.
        required: false
      Name:
        type: resource:Name
        description: >-
          The name of the resource or array member.
        required: true
      NetDevFuncMaxBWAlloc:
        type: list
        description: >-
          The array of maximum bandwidth allocation percentages for the Network Device
          Functions associated with this port.
        required: false
        entry_schema:
          type: NetDevFuncMaxBWAlloc
      NetDevFuncMinBWAlloc:
        type: list
        description: >-
          The array of minimum bandwidth allocation percentages for the Network Device
          Functions associated with this port.
        required: false
        entry_schema:
          type: NetDevFuncMinBWAlloc
      NumberDiscoveredRemotePorts:
        type: integer
        description: >-
          The number of ports not on this adapter that this port has discovered.
        required: false
      Oem:
        type: resource:Oem
        description: >-
          This is the manufacturer/provider specific extension moniker used to divide
          the Oem object into sections.
        required: false
      PhysicalPortNumber:
        type: string
        description: >-
          The physical port number label for this port.
        required: false
      PortMaximumMTU:
        type: integer
        description: >-
          The largest maximum transmission unit (MTU) that can be configured for this
          network port.
        required: false
      SignalDetected:
        type: boolean
        description: >-
          Whether or not the port has detected enough signal on enough lanes to establish
          link.
        required: false
      Status:
        type: resource:Status
        description: >-
          This property describes the status and health of the resource and its children.
        required: false
      SupportedEthernetCapabilities:
        type: list
        description: >-
          The set of Ethernet capabilities that this port supports.
        required: false
        entry_schema:
          type: SupportedEthernetCapabilities
      SupportedLinkCapabilities:
        type: list
        description: >-
          The self-described link capabilities of this port.
        required: false
        entry_schema:
          type: SupportedLinkCapabilities
      VendorId:
        type: string
        description: >-
          The Vendor Identification for this port.
        required: false
      WakeOnLANEnabled:
        type: boolean
        description: >-
          Whether Wake on LAN (WoL) is enabled for this network port.
        required: false
    capabilities:
      feature:
        type: ntwprtcp:NetworkPortFeature
      containable:
        type: ntwprtcp:NetworkPortContainable
  NetDevFuncMaxBWAlloc:
    description: >-
      A maximum bandwidth allocation percentage for a Network Device Functions associated
      a port.
    properties:
      MaxBWAllocPercent:
        type: integer
        description: >-
          The maximum bandwidth allocation percentage allocated to the corresponding
          network device function instance.
        required: false
    requirements:
    - NetworkDeviceFunction:
        node: ntwdvcfn:NetworkDeviceFunction
        capability: ntdvfncp:NetworkDeviceFunctionContainable
        relationship: core:Contains
        count_range:
        - 0
        - 1
        description: >-
          A reference to the NetworkDeviceFunction associated with this bandwidth
          setting of this Network Port.
    capabilities:
      containable:
        type: ntwprtcp:NetDevFuncMaxBWAllocContainable
  NetDevFuncMinBWAlloc:
    description: >-
      A minimum bandwidth allocation percentage for a Network Device Functions associated
      a port.
    properties:
      MinBWAllocPercent:
        type: integer
        description: >-
          The minimum bandwidth allocation percentage allocated to the corresponding
          network device function instance.
        required: false
    requirements:
    - NetworkDeviceFunction:
        node: ntwdvcfn:NetworkDeviceFunction
        capability: ntdvfncp:NetworkDeviceFunctionContainable
        relationship: core:Contains
        count_range:
        - 0
        - 1
        description: >-
          A reference to the NetworkDeviceFunction associated with this bandwidth
          setting of this Network Port.
    capabilities:
      containable:
        type: ntwprtcp:NetDevFuncMinBWAllocContainable
