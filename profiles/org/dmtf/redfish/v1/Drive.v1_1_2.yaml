tosca_definitions_version: tosca_2_0
description: >-
  Types generated from JSON Schema by any2tosca
imports:
- url: Resource.yaml
  namespace: resource
- url: Storage.v1_0_0.yaml
  namespace: storage
- url: odata.4.0.0.yaml
  namespace: odata400
- url: Endpoint.yaml
  namespace: endpoint
- url: Core.yaml
  namespace: core
- url: Drive_caps.yaml
  namespace: drvcps
- url: Volume_caps.yaml
  namespace: vlmcps
- url: Endpoint_caps.yaml
  namespace: endpcps
data_types:
  SecureErase:
    description: >-
      This action is used to securely erase the contents of the drive.
    properties:
      title:
        type: string
        description: >-
          Friendly action name
        required: false
      target:
        type: string
        description: >-
          Link to invoke action
        required: false
  EncryptionAbility:
    derived_from: string
    validation:
      $valid_values:
      - $value
      - - None
        - SelfEncryptingDrive
        - Other
  EncryptionStatus:
    derived_from: string
    validation:
      $valid_values:
      - $value
      - - Unecrypted
        - Unlocked
        - Locked
        - Foreign
        - Unencrypted
  HotspareType:
    derived_from: string
    validation:
      $valid_values:
      - $value
      - - None
        - Global
        - Chassis
        - Dedicated
  MediaType:
    derived_from: string
    validation:
      $valid_values:
      - $value
      - - HDD
        - SSD
        - SMR
  StatusIndicator:
    derived_from: string
    validation:
      $valid_values:
      - $value
      - - OK
        - Fail
        - Rebuild
        - PredictiveFailureAnalysis
        - Hotspare
        - InACriticalArray
        - InAFailedArray
  Actions:
    description: >-
      The available actions for this resource.
    properties:
      Oem:
        type: map
        description: >-
          The available OEM specific actions for this resource.
        required: false
      '#Drive_SecureErase':
        type: SecureErase
        description: >-
          This action is used to securely erase the contents of the drive.
        required: false
node_types:
  Drive:
    description: >-
      Drive contains properties describing a single physical disk drive for any system,
      along with links to associated Volumes.
    properties:
      Oem:
        type: resource:Oem
        description: >-
          This is the manufacturer/provider specific extension moniker used to divide
          the Oem object into sections.
        required: false
      Id:
        type: resource:Id
        description: >-
          The unique identifier for this resource within the collection of similar
          resources.
        required: true
      Description:
        type: resource:Description
        description: >-
          The description of this resource.  Used for commonality in the schema definitions.
        required: false
      Name:
        type: resource:Name
        description: >-
          The name of the resource or array member.
        required: true
      StatusIndicator:
        type: StatusIndicator
        description: >-
          The state of the status indicator, used to communicate status information
          about this drive.
        required: false
      IndicatorLED:
        type: resource:IndicatorLED
        description: >-
          The state of the indicator LED, used to identify the drive.
        required: false
      Model:
        type: string
        description: >-
          This is the model number for the drive.
        required: false
      Revision:
        type: string
        description: >-
          The revision of this Drive. This is typically the firmware/hardware version
          of the drive.
        required: false
      Status:
        type: resource:Status
        description: >-
          The status and health of a resource and its children.
        required: false
      CapacityBytes:
        type: float
        description: >-
          The size in bytes of this Drive.
        required: false
      FailurePredicted:
        type: boolean
        description: >-
          Is this drive currently predicting a failure in the near future.
        required: false
      Protocol:
        type: storage:Protocol
        description: >-
          The protocol this drive is using to communicate to the storage controller.
        required: false
      MediaType:
        type: MediaType
        description: >-
          The type of media contained in this drive.
        required: false
      Manufacturer:
        type: string
        description: >-
          This is the manufacturer of this drive.
        required: false
      SKU:
        type: string
        description: >-
          This is the SKU for this drive.
        required: false
      SerialNumber:
        type: string
        description: >-
          The serial number for this drive.
        required: false
      PartNumber:
        type: string
        description: >-
          The part number for this drive.
        required: false
      AssetTag:
        type: string
        description: >-
          The user assigned asset tag for this drive.
        required: false
      Identifiers:
        type: list
        description: >-
          The Durable names for the drive.
        required: false
        entry_schema:
          type: resource:Identifier
      Location:
        type: list
        description: >-
          The Location of the drive.
        required: false
        entry_schema:
          type: resource:Location
      HotspareType:
        type: HotspareType
        description: >-
          The type of hotspare this drive is currently serving as.
        required: false
      EncryptionAbility:
        type: EncryptionAbility
        description: >-
          The encryption abilities of this drive.
        required: false
      EncryptionStatus:
        type: EncryptionStatus
        description: >-
          The status of the encrytion of this drive.
        required: false
      RotationSpeedRPM:
        type: float
        description: >-
          The rotation speed of this Drive in Revolutions per Minute (RPM).
        required: false
      BlockSizeBytes:
        type: float
        description: >-
          The size of the smallest addressible unit (Block) of this drive in bytes.
        required: false
      CapableSpeedGbs:
        type: float
        description: >-
          The speed which this drive can communicate to a storage controller in ideal
          conditions in Gigabits per second.
        required: false
      NegotiatedSpeedGbs:
        type: float
        description: >-
          The speed which this drive is currently communicating to the storage controller
          in Gigabits per second.
        required: false
      PredictedMediaLifeLeftPercent:
        type: float
        description: >-
          The percentage of reads and writes that are predicted to still be available
          for the media.
        required: false
      Links:
        type: Links
        description: >-
          Contains references to other resources that are related to this resource.
        required: false
      Actions:
        type: Actions
        description: >-
          The available actions for this resource.
        required: false
      Operations:
        type: list
        description: >-
          The operations currently running on the Drive.
        required: false
        entry_schema:
          type: Operations
    capabilities:
      feature:
        type: drvcps:DriveFeature
      containable:
        type: drvcps:DriveContainable
  Links:
    description: >-
      Contains references to other resources that are related to this resource.
    properties:
      Oem:
        type: resource:Oem
        description: >-
          Oem extension object.
        required: false
      Volumes@odata_count:
        type: odata400:count
        description: >-
          The number of items in a collection.
        required: false
      Volumes@odata_navigationLink:
        type: string
        required: false
      Endpoints@odata_count:
        type: odata400:count
        description: >-
          The number of items in a collection.
        required: false
      Endpoints@odata_navigationLink:
        type: string
        required: false
    requirements:
    - Volumes:
        node: Volume
        capability: vlmcps:VolumeContainable
        relationship: core:Contains
        count_range:
        - 0
        - UNBOUNDED
        description: >-
          An array of references to the volumes contained in this drive. This will
          reference Volumes that are either wholly or only partly contained by this
          drive.
    - Endpoints:
        node: endpoint:Endpoint
        capability: endpcps:EndpointContainable
        relationship: core:Contains
        count_range:
        - 0
        - UNBOUNDED
        description: >-
          An array of references to the endpoints that connect to this drive.
    capabilities:
      containable:
        type: drvcps:LinksContainable
