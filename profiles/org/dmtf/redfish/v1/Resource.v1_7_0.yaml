tosca_definitions_version: tosca_2_0
description: >-
  Types generated from JSON Schema by any2tosca
imports:
- url: Resource.yaml
  namespace: resource
- url: Core.yaml
  namespace: core
- url: Resource_caps.yaml
  namespace: rsrccps
data_types:
  ContactInfo:
    description: >-
      Contact information for this resource.
    properties:
      ContactName:
        type: string
        description: >-
          Name of this contact.
        required: false
      EmailAddress:
        type: string
        description: >-
          Email address for this contact.
        required: false
      PhoneNumber:
        type: string
        description: >-
          Phone number for this contact.
        required: false
  DurableNameFormat:
    derived_from: string
    validation:
      $valid_values:
      - $value
      - - NAA
        - iQN
        - FC_WWN
        - UUID
        - EUI
        - NQN
        - NSID
  Health:
    derived_from: string
    validation:
      $valid_values:
      - $value
      - - OK
        - Warning
        - Critical
  Identifier:
    description: >-
      This type describes any additional identifiers for a resource.
    properties:
      DurableName:
        type: string
        description: >-
          This indicates the world wide, persistent name of the resource.
        required: false
      DurableNameFormat:
        type: DurableNameFormat
        description: >-
          This represents the format of the DurableName property.
        required: false
  IndicatorLED:
    derived_from: string
    validation:
      $valid_values:
      - $value
      - - Lit
        - Blinking
        - 'Off'
  Location:
    description: >-
      This type describes the location of a resource.
    properties:
      AltitudeMeters:
        type: float
        description: >-
          The altitude of the resource in meters.
        required: false
      Contacts:
        type: list
        description: >-
          Array of contact information.
        required: false
        entry_schema:
          type: ContactInfo
      Info:
        type: string
        description: >-
          This indicates the location of the resource.
        required: false
      InfoFormat:
        type: string
        description: >-
          This represents the format of the Info property.
        required: false
      Latitude:
        type: float
        description: >-
          The latitude resource.
        required: false
      Longitude:
        type: float
        description: >-
          The longitude resource in degrees.
        required: false
      Oem:
        type: resource:Oem
        description: >-
          Oem extension object.
        required: false
      PartLocation:
        type: PartLocation
        description: >-
          The part location within the placement.
        required: false
      Placement:
        type: Placement
        description: >-
          A place within the addressed location.
        required: false
      PostalAddress:
        type: PostalAddress
        description: >-
          Postal address of the addressed resource.
        required: false
  LocationType:
    description: >-
      Defines the location types for PartLocation.
    derived_from: string
    validation:
      $valid_values:
      - $value
      - - Slot
        - Bay
        - Connector
        - Socket
  Orientation:
    description: >-
      Defines a orientation for the ordering of the ordinal value of the part location.
    derived_from: string
    validation:
      $valid_values:
      - $value
      - - FrontToBack
        - BackToFront
        - TopToBottom
        - BottomToTop
        - LeftToRight
        - RightToLeft
  PartLocation:
    description: >-
      The part location within the placement.
    properties:
      LocationOrdinalValue:
        type: integer
        description: >-
          The number that represents the location of the part.  If LocationType is
          slot and this unit is in slot 2 then the LocationOrdinalValue will be 2.
        required: false
      LocationType:
        type: LocationType
        description: >-
          The type of location of the part, such as slot, bay, socket and slot.
        required: false
      Orientation:
        type: Orientation
        description: >-
          The orientation for the ordering of the slot enumeration used by the LocationOrdinalValue
          property.
        required: false
      Reference:
        type: Reference
        description: >-
          The reference point for the part location.  This is used to give guidance
          as to the general location of the part.
        required: false
      ServiceLabel:
        type: string
        description: >-
          This is the label of the part location, such as a silk screened name or
          a printed label.
        required: false
  Placement:
    description: >-
      The placement within the addressed location.
    properties:
      AdditionalInfo:
        type: string
        description: >-
          Area designation or other additional info.
        required: false
      Rack:
        type: string
        description: >-
          Name of a rack location within a row.
        required: false
      RackOffset:
        type: integer
        description: >-
          Vertical location of the item in terms of RackOffsetUnits.
        required: false
      RackOffsetUnits:
        type: RackUnits
        description: >-
          The type of Rack Units in use.
        required: false
      Row:
        type: string
        description: >-
          Name of row.
        required: false
  PostalAddress:
    description: >-
      The PostalAddress for a resource.
    properties:
      AdditionalCode:
        type: string
        description: >-
          Additional code.
        required: false
      AdditionalInfo:
        type: string
        description: >-
          Room designation or other additional info.
        required: false
      Building:
        type: string
        description: >-
          Name of the building.
        required: false
      City:
        type: string
        description: >-
          City, township, or shi (JP).
        required: false
      Community:
        type: string
        description: >-
          Postal community name.
        required: false
      Country:
        type: string
        description: >-
          Country.
        required: false
      District:
        type: string
        description: >-
          A county, parish, gun (JP), or  district (IN).
        required: false
      Division:
        type: string
        description: >-
          City division, borough, dity district, ward, chou (JP).
        required: false
      Floor:
        type: string
        description: >-
          Floor.
        required: false
      GPSCoords:
        type: string
        description: >-
          The GPS coordinates of the part.
        required: false
      HouseNumber:
        type: integer
        description: >-
          Numeric portion of house number.
        required: false
      HouseNumberSuffix:
        type: string
        description: >-
          House number suffix.
        required: false
      Landmark:
        type: string
        description: >-
          Landmark.
        required: false
      LeadingStreetDirection:
        type: string
        description: >-
          A leading street direction.
        required: false
      Location:
        type: string
        description: >-
          Room designation or other additional info.
        required: false
      Name:
        type: string
        description: >-
          Name.
        required: false
      Neighborhood:
        type: string
        description: >-
          Neighborhood or block.
        required: false
      POBox:
        type: string
        description: >-
          Post office box (P.O. box).
        required: false
      PlaceType:
        type: string
        description: >-
          A description of the type of place that is addressed.
        required: false
      PostalCode:
        type: string
        description: >-
          Postal code (or zip code).
        required: false
      Road:
        type: string
        description: >-
          A primary road or street.
        required: false
      RoadBranch:
        type: string
        description: >-
          Road branch.
        required: false
      RoadPostModifier:
        type: string
        description: >-
          Road post-modifier.
        required: false
      RoadPreModifier:
        type: string
        description: >-
          Road pre-modifier.
        required: false
      RoadSection:
        type: string
        description: >-
          Road Section.
        required: false
      RoadSubBranch:
        type: string
        description: >-
          Road sub branch.
        required: false
      Room:
        type: string
        description: >-
          Name or number of the room.
        required: false
      Seat:
        type: string
        description: >-
          Seat (desk, cubicle, workstation).
        required: false
      Street:
        type: string
        description: >-
          Street name.
        required: false
      StreetSuffix:
        type: string
        description: >-
          Avenue, Platz, Street, Circle.
        required: false
      Territory:
        type: string
        description: >-
          A top-level subdivision within a country.
        required: false
      TrailingStreetSuffix:
        type: string
        description: >-
          A trailing street suffix.
        required: false
      Unit:
        type: string
        description: >-
          Name or number of the unit (apartment, suite).
        required: false
  PowerState:
    derived_from: string
    validation:
      $valid_values:
      - $value
      - - 'On'
        - 'Off'
        - PoweringOn
        - PoweringOff
  RackUnits:
    description: >-
      Defines a rack unit.
    derived_from: string
    validation:
      $valid_values:
      - $value
      - - OpenU
        - EIA_310
  Reference:
    description: >-
      Defines a reference area for the location of the part.
    derived_from: string
    validation:
      $valid_values:
      - $value
      - - Top
        - Bottom
        - Front
        - Rear
        - Left
        - Right
        - Middle
  ReferenceableMember:
    description: >-
      This is the base type for addressable members of an array.
    properties:
      MemberId:
        type: string
        description: >-
          This is the identifier for the member within the collection.
        required: true
      Oem:
        type: resource:Oem
        description: >-
          This is the manufacturer/provider specific extension moniker used to divide
          the Oem object into sections.
        required: false
  ResetType:
    derived_from: string
    validation:
      $valid_values:
      - $value
      - - 'On'
        - ForceOff
        - GracefulShutdown
        - GracefulRestart
        - ForceRestart
        - Nmi
        - ForceOn
        - PushPowerButton
        - PowerCycle
  ResourceCollection:
    properties:
      Description:
        type: resource:Description
        description: >-
          The description of this resource.  Used for commonality in the schema definitions.
        required: false
      Name:
        type: resource:Name
        description: >-
          The name of the resource or array member.
        required: true
      Oem:
        type: resource:Oem
        description: >-
          This is the manufacturer/provider specific extension moniker used to divide
          the Oem object into sections.
        required: false
  State:
    derived_from: string
    validation:
      $valid_values:
      - $value
      - - Enabled
        - Disabled
        - StandbyOffline
        - StandbySpare
        - InTest
        - Starting
        - Absent
        - UnavailableOffline
        - Deferring
        - Quiesced
        - Updating
node_types:
  Resource:
    description: >-
      This is the base type for resources and referenceable members.
    properties:
      Description:
        type: resource:Description
        description: >-
          The description of this resource.  Used for commonality in the schema definitions.
        required: false
      Id:
        type: resource:Id
        description: >-
          The unique identifier for this resource within the collection of similar
          resources.
        required: true
      Name:
        type: resource:Name
        description: >-
          The name of the resource or array member.
        required: true
      Oem:
        type: resource:Oem
        description: >-
          This is the manufacturer/provider specific extension moniker used to divide
          the Oem object into sections.
        required: false
    capabilities:
      feature:
        type: rsrccps:ResourceFeature
      containable:
        type: rsrccps:ResourceContainable
