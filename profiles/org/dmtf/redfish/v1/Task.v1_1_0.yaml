tosca_definitions_version: tosca_2_0
description: >-
  Types generated from JSON Schema by any2tosca
imports:
- url: Resource.yaml
  namespace: resource
- url: Message.yaml
  namespace: message
- url: Core.yaml
  namespace: core
- url: Message_caps.yaml
  namespace: mssgcps
- url: Task_caps.yaml
  namespace: taskcaps
data_types:
  TaskState:
    derived_from: string
    validation:
      $valid_values:
      - $value
      - - New
        - Starting
        - Running
        - Suspended
        - Interrupted
        - Pending
        - Stopping
        - Completed
        - Killed
        - Exception
        - Service
  Actions:
    description: >-
      The available actions for this resource.
    properties:
      Oem:
        type: map
        description: >-
          The available OEM specific actions for this resource.
        required: false
node_types:
  Task:
    description: >-
      This resource contains information about a specific Task scheduled by or being
      executed by a Redfish service's Task Service.
    properties:
      Oem:
        type: resource:Oem
        description: >-
          This is the manufacturer/provider specific extension moniker used to divide
          the Oem object into sections.
        required: false
      Id:
        type: resource:Id
        description: >-
          The unique identifier for this resource within the collection of similar
          resources.
        required: true
      Description:
        type: resource:Description
        description: >-
          The description of this resource.  Used for commonality in the schema definitions.
        required: false
      Name:
        type: resource:Name
        description: >-
          The name of the resource or array member.
        required: true
      TaskState:
        type: TaskState
        description: >-
          The state of the task.
        required: false
      StartTime:
        type: string
        description: >-
          The date-time stamp that the task was last started.
        required: false
      EndTime:
        type: string
        description: >-
          The date-time stamp that the task was last completed.
        required: false
      TaskStatus:
        type: resource:Health
        description: >-
          This is the completion status of the task.
        required: false
      Actions:
        type: Actions
        description: >-
          The available actions for this resource.
        required: false
    requirements:
    - Messages:
        node: message:Message
        capability: mssgcps:MessageContainable
        relationship: core:Contains
        count_range:
        - 0
        - UNBOUNDED
        description: >-
          This is an array of messages associated with the task.
    capabilities:
      feature:
        type: taskcaps:TaskFeature
      containable:
        type: taskcaps:TaskContainable
