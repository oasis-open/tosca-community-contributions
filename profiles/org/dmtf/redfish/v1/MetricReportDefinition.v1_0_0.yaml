tosca_definitions_version: tosca_2_0
description: >-
  Types generated from JSON Schema by any2tosca
imports:
- url: Resource.yaml
  namespace: resource
- url: MetricReport.yaml
  namespace: mtrcrprt
- url: Schedule.yaml
  namespace: schedule
- url: Core.yaml
  namespace: core
- url: MetricReport_caps.yaml
  namespace: mtrrprcp
- url: Schedule_caps.yaml
  namespace: schdlcps
- url: MetricReportDefinition_caps.yaml
  namespace: mtrpdfcp
data_types:
  CalculationAlgorithmEnum:
    description: >-
      Specifies the function to apply to the list of metric properties.
    derived_from: string
    validation:
      $valid_values:
      - $value
      - - Average
        - Maximum
        - Minimum
        - Summation
  CollectionTimeScope:
    description: >-
      The time scope of the related metric values.
    derived_from: string
    validation:
      $valid_values:
      - $value
      - - Point
        - Interval
        - StartupInterval
  Metric:
    description: >-
      Specifies a metric to include in the metric report. The metrics are derived
      by applying a calculation on each of the listed metric properties.
    properties:
      CollectionDuration:
        type: string
        description: >-
          Specifies the duration over which the function is computed.
        required: false
        validation:
          $matches:
          - $value
          - -?P(\d+D)?(T(\d+H)?(\d+M)?(\d+(.\d+)?S)?)?
      CollectionFunction:
        type: CalculationAlgorithmEnum
        description: >-
          Specified the function to perform on each of the metric properties listed
          in the MetricProperties property.
        required: false
      CollectionTimeScope:
        type: CollectionTimeScope
        description: >-
          Specifies the scope of time scope over which the function is applied.
        required: false
      MetricId:
        type: string
        description: >-
          Specifies the label for the metric definition which is derived by applying
          the CollectionFunction to the metric property.
        required: false
      MetricProperties:
        type: list
        description: >-
          A collection of URI for the properties on which this metric is collected.
        required: false
        entry_schema:
          type: string
  MetricReportDefinitionType:
    description: >-
      Indicates when the metric report is generated.
    derived_from: string
    validation:
      $valid_values:
      - $value
      - - Periodic
        - OnChange
        - OnRequest
  ReportActionsEnum:
    description: >-
      Actions to perform when a metric report is generated.
    derived_from: string
    validation:
      $valid_values:
      - $value
      - - LogToMetricReportsCollection
        - RedfishEvent
  ReportUpdatesEnum:
    description: >-
      How to what to do with subsequent metric reports when a metric report already
      exists.
    derived_from: string
    validation:
      $valid_values:
      - $value
      - - Overwrite
        - AppendWrapsWhenFull
        - AppendStopsWhenFull
        - NewReport
  Wildcard:
    description: >-
      Contains a list of wildcards and their substitution values.
    properties:
      Keys:
        type: list
        description: >-
          An array of Key values to substitute for the wildcard.
        required: false
        entry_schema:
          type: string
      Name:
        type: string
        description: >-
          The name of Wildcard.
        required: false
node_types:
  MetricReportDefinition:
    description: >-
      A set of metrics that are collected into a metric report.
    properties:
      AppendLimit:
        type: integer
        description: >-
          Indicates the maximum number of entries that can be appended to a metric
          report.  When the metric report reaches its limit, its behavior is dictated
          by the ReportUpdates property.
        required: false
        validation:
          $greater_or_equal:
          - $value
          - 0
      Description:
        type: resource:Description
        description: >-
          The description of this resource.  Used for commonality in the schema definitions.
        required: false
      Id:
        type: resource:Id
        description: >-
          The unique identifier for this resource within the collection of similar
          resources.
        required: true
      MetricProperties:
        type: list
        description: >-
          Specifies a list of metric properties to include in the metric report.
        required: false
        entry_schema:
          type: string
      MetricReportDefinitionType:
        type: MetricReportDefinitionType
        description: >-
          Specifies when the metric report is generated.
        required: false
      Metrics:
        type: list
        description: >-
          Specifies a list of metrics to include in the metric report.  The metrics
          may include metric properties or calculations applied to a metric property.
        required: false
        entry_schema:
          type: Metric
      Name:
        type: resource:Name
        description: >-
          The name of the resource or array member.
        required: true
      Oem:
        type: resource:Oem
        description: >-
          This is the manufacturer/provider specific extension moniker used to divide
          the Oem object into sections.
        required: false
      ReportActions:
        type: list
        description: >-
          Specifies the actions to perform when a metric report is generated.
        required: false
        entry_schema:
          type: ReportActionsEnum
      ReportUpdates:
        type: ReportUpdatesEnum
        description: >-
          When logging metric reports, specifies how subsequent metric reports are
          handled in relationship to an existing metric report created from the metric
          report definition.  Namely, whether to overwrite, append, or create new
          report resource.
        required: false
      Status:
        type: resource:Status
        description: >-
          This property describes the status and health of the resource and its children.
        required: false
      Wildcards:
        type: list
        description: >-
          Specifies the strings used to replace wildcards in the paths in MetricProperties
          array property.
        required: false
        entry_schema:
          type: Wildcard
    requirements:
    - MetricReport:
        node: mtrcrprt:MetricReport
        capability: mtrrprcp:MetricReportContainable
        relationship: core:Contains
        count_range:
        - 0
        - 1
        description: >-
          Specifies the location where the resultant metric report is placed.
    - Schedule:
        node: schedule:Schedule
        capability: schdlcps:ScheduleContainable
        relationship: core:Contains
        count_range:
        - 0
        - 1
        description: >-
          Specifies the schedule for generating the metric report.
    capabilities:
      feature:
        type: mtrpdfcp:MetricReportDefinitionFeature
      containable:
        type: mtrpdfcp:MetricReportDefinitionContainable
