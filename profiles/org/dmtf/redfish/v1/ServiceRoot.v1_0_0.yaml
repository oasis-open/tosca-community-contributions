node_types:
  ServiceRoot:
    description: >-
      This object represents the root Redfish service.
    properties:
      Oem:
        type: resource:Oem
        description: >-
          This is the manufacturer/provider specific extension moniker used to divide
          the Oem object into sections.
        required: false
      Id:
        type: resource:Id
        description: >-
          The unique identifier for this resource within the collection of similar
          resources.
        required: true
      Description:
        type: resource:Description
        description: >-
          The description of this resource.  Used for commonality in the schema definitions.
        required: false
      Name:
        type: resource:Name
        description: >-
          The name of the resource or array member.
        required: true
      RedfishVersion:
        type: string
        description: >-
          The version of the Redfish service
        required: false
        validation:
          $matches:
          - $value
          - ^\d+\.\d+\.\d+$
      UUID:
        type: resource:UUID
        description: "Unique identifier for a service instance. When SSDP is used,\
          \ this value should be an exact match of the UUID value returned in a 200OK\
          \ from an SSDP M-SEARCH request during discovery. "
        required: false
      Links:
        type: Links
        description: >-
          Contains references to other resources that are related to this resource.
        required: true
