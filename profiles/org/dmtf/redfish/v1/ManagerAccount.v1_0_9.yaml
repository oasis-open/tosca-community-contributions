tosca_definitions_version: tosca_2_0
description: >-
  Types generated from JSON Schema by any2tosca
imports:
- url: Resource.yaml
  namespace: resource
- url: Role.yaml
  namespace: role
- url: Core.yaml
  namespace: core
- url: Role_caps.yaml
  namespace: rolecaps
- url: ManagerAccount_caps.yaml
  namespace: mngacccp
relationship_types:
  ManagerAccountDependsOn:
    derived_from: core:DependsOn
    properties:
      Oem:
        type: resource:Oem
        description: >-
          The OEM extension property.
        required: false
node_types:
  ManagerAccount:
    description: >-
      The user accounts, owned by a manager, are defined in this Resource.  Changes
      to a manager account may affect the current Redfish Service connection if this
      manager is responsible for the Redfish Service.
    properties:
      Description:
        type: resource:Description
        description: >-
          The description of this resource.  Used for commonality in the schema definitions.
        required: false
      Enabled:
        type: boolean
        description: >-
          An indication of whether an account is enabled.  An administrator can disable
          it without deleting the user information.  If `true`, the account is enabled
          and the user can log in.  If `false`, the account is disabled and, in the
          future, the user cannot log in.  This property overrides the Locked property.
        required: false
      Id:
        type: resource:Id
        description: >-
          The unique identifier for this resource within the collection of similar
          resources.
        required: true
      Locked:
        type: boolean
        description: >-
          An indication of whether the Account Service automatically locked the account
          because the lockout threshold was exceeded.  To manually unlock the account
          before the lockout duration period, an administrator can change the property
          to `false` to clear the lockout condition.
        required: false
      Name:
        type: resource:Name
        description: >-
          The name of the resource or array member.
        required: true
      Oem:
        type: resource:Oem
        description: >-
          The OEM extension property.
        required: false
      Password:
        type: string
        description: >-
          The password.  Use this property with a PATCH or PUT to write the password
          for the account.  This property is `null` in responses.
        required: false
      RoleId:
        type: string
        description: >-
          The Role for this account.
        required: false
      UserName:
        type: string
        description: >-
          The user name for the account.
        required: false
    requirements:
    - Role:
        node: role:Role
        capability: rolecaps:RoleFeature
        relationship: ManagerAccountDependsOn
        count_range:
        - 0
        - 1
        description: >-
          The link to the Redfish Role that defines the privileges for this account.
    capabilities:
      feature:
        type: mngacccp:ManagerAccountFeature
      containable:
        type: mngacccp:ManagerAccountContainable
