node_types:
  Facility:
    description: >-
      The `Facility` schema represents the physical location containing equipment,
      such as a room, building, or campus.
    properties:
      '@odata_id':
        type: odatav4:id
        description: >-
          The unique identifier for a resource.
        required: true
      '@odata_context':
        type: odatav4:context
        description: >-
          The OData description of a payload.
        required: false
      '@odata_etag':
        type: odatav4:etag
        description: >-
          The current ETag of the resource.
        required: false
      '@odata_type':
        type: odatav4:type
        description: >-
          The type of a resource.
        required: true
      Description:
        type: string
        required: false
      FacilityType:
        type: string
        description: >-
          The type of location this resource represents.
        required: true
        validation:
          $valid_values:
          - $value
          - - Room
            - Floor
            - Building
            - Site
      Id:
        type: resource:Id
        description: >-
          The unique identifier for this resource within the collection of similar
          resources.
        required: true
      Location:
        type: resource:Location
        description: >-
          The location of the facility.
        required: false
      Name:
        type: resource:Name
        description: >-
          The name of the resource or array member.
        required: true
      Oem:
        type: resource:Oem
        description: >-
          The OEM extension property.
        required: false
      Status:
        type: resource:Status
        description: >-
          The status and health of the resource and its subordinate or dependent resources.
        required: false
