tosca_definitions_version: tosca_2_0
description: >-
  Types generated from JSON Schema by any2tosca
imports:
- url: Resource.yaml
  namespace: resource
- url: odata.4.0.0.yaml
  namespace: odata400
- url: Event.v1_0_0.yaml
  namespace: event
- url: Core.yaml
  namespace: core
- url: LogEntry_caps.yaml
  namespace: lgentcp
data_types:
  EventSeverity:
    derived_from: string
    validation:
      $valid_values:
      - $value
      - - OK
        - Warning
        - Critical
  LogEntryCode:
    derived_from: string
    validation:
      $valid_values:
      - $value
      - - Assert
        - Deassert
        - Lower Non-critical - going low
        - Lower Non-critical - going high
        - Lower Critical - going low
        - Lower Critical - going high
        - Lower Non-recoverable - going low
        - Lower Non-recoverable - going high
        - Upper Non-critical - going low
        - Upper Non-critical - going high
        - Upper Critical - going low
        - Upper Critical - going high
        - Upper Non-recoverable - going low
        - Upper Non-recoverable - going high
        - Transition to Idle
        - Transition to Active
        - Transition to Busy
        - State Deasserted
        - State Asserted
        - Predictive Failure deasserted
        - Predictive Failure asserted
        - Limit Not Exceeded
        - Limit Exceeded
        - Performance Met
        - Performance Lags
        - Transition to OK
        - Transition to Non-Critical from OK
        - Transition to Critical from less severe
        - Transition to Non-recoverable from less severe
        - Transition to Non-Critical from more severe
        - Transition to Critical from Non-recoverable
        - Transition to Non-recoverable
        - Monitor
        - Informational
        - Device Removed / Device Absent
        - Device Inserted / Device Present
        - Device Disabled
        - Device Enabled
        - Transition to Running
        - Transition to In Test
        - Transition to Power Off
        - Transition to On Line
        - Transition to Off Line
        - Transition to Off Duty
        - Transition to Degraded
        - Transition to Power Save
        - Install Error
        - Fully Redundant
        - Redundancy Lost
        - Redundancy Degraded
        - Non-redundant:Sufficient Resources from Redundant
        - Non-redundant:Sufficient Resources from Insufficient Resources
        - Non-redundant:Insufficient Resources
        - Redundancy Degraded from Fully Redundant
        - Redundancy Degraded from Non-redundant
        - D0 Power State
        - D1 Power State
        - D2 Power State
        - D3 Power State
  LogEntryType:
    derived_from: string
    validation:
      $valid_values:
      - $value
      - - Event
        - SEL
        - Oem
  SensorType:
    derived_from: string
    validation:
      $valid_values:
      - $value
      - - Platform Security Violation Attempt
        - Temperature
        - Voltage
        - Current
        - Fan
        - Physical Chassis Security
        - Processor
        - Power Supply / Converter
        - PowerUnit
        - CoolingDevice
        - Other Units-based Sensor
        - Memory
        - Drive Slot/Bay
        - POST Memory Resize
        - System Firmware Progress
        - Event Logging Disabled
        - System Event
        - Critical Interrupt
        - Button/Switch
        - Module/Board
        - Microcontroller/Coprocessor
        - Add-in Card
        - Chassis
        - ChipSet
        - Other FRU
        - Cable/Interconnect
        - Terminator
        - SystemBoot/Restart
        - Boot Error
        - BaseOSBoot/InstallationStatus
        - OS Stop/Shutdown
        - Slot/Connector
        - System ACPI PowerState
        - Watchdog
        - Platform Alert
        - Entity Presence
        - Monitor ASIC/IC
        - LAN
        - Management Subsystem Health
        - Battery
        - Session Audit
        - Version Change
        - FRUState
  Links:
    description: >-
      Contains references to other resources that are related to this resource.
    properties:
      Oem:
        type: resource:Oem
        description: >-
          Oem extension object.
        required: false
      OriginOfCondition:
        type: odata400:idRef
        description: >-
          This is the URI of the resource that caused the log entry
        required: false
node_types:
  LogEntry:
    description: >-
      This resource defines the record format for a log.  It is designed to be used
      for SEL logs (from IPMI) as well as Event Logs and OEM-specific log formats.  The
      EntryType field indicates the type of log and the resource includes several
      additional properties dependent on the EntryType.
    properties:
      Oem:
        type: resource:Oem
        description: >-
          This is the manufacturer/provider specific extension moniker used to divide
          the Oem object into sections.
        required: false
      Id:
        type: resource:Id
        description: >-
          The unique identifier for this resource within the collection of similar
          resources.
        required: true
      Description:
        type: resource:Description
        description: >-
          The description of this resource.  Used for commonality in the schema definitions.
        required: false
      Name:
        type: resource:Name
        description: >-
          The name of the resource or array member.
        required: true
      Severity:
        type: EventSeverity
        description: >-
          This is the severity of the log entry.
        required: false
      Created:
        type: string
        description: >-
          The time the log entry was created.
        required: false
      EntryType:
        type: LogEntryType
        description: >-
          his is the type of log entry.
        required: true
      OemRecordFormat:
        type: string
        description: >-
          If the entry type is Oem, this will contain more information about the record
          format from the Oem.
        required: false
      EntryCode:
        type: LogEntryCode
        description: >-
          If the EntryType is SEL, this will have the entry code for the log entry.
        required: false
      SensorType:
        type: SensorType
        description: >-
          If the EntryType is SEL, this will have the sensor type that the log entry
          pertains to.
        required: false
      SensorNumber:
        type: float
        description: >-
          This property decodes from EntryType:  If it is SEL, it is the sensor number;
          if Event then the count of events.  Otherwise, it is Oem specific.
        required: false
      Message:
        type: string
        description: >-
          This property decodes from EntryType:  If it is Event then it is a message
          string.  Otherwise, it is SEL or Oem specific.  In most cases, this will
          be the actual Log Entry.
        required: false
      MessageId:
        type: string
        description: >-
          This property decodes from EntryType:  If it is Event then it is a message
          id.  Otherwise, it is SEL or Oem specific.  This value is only used for
          registries - for more information, see the specification.
        required: false
      MessageArgs:
        type: list
        description: >-
          The values of this property shall be any arguments for the message.
        required: false
        entry_schema:
          type: string
      Links:
        type: Links
        description: >-
          Contains references to other resources that are related to this resource.
        required: false
      EventType:
        type: event:EventType
        description: >-
          This indicates the type of an event recorded in this log.
        required: false
      EventId:
        type: string
        description: >-
          This is a unique instance identifier of an event.
        required: false
      EventTimestamp:
        type: string
        description: >-
          This is time the event occurred.
        required: false
    capabilities:
      feature:
        type: lgentcp:LogEntryFeature
      containable:
        type: lgentcp:LogEntryContainable
