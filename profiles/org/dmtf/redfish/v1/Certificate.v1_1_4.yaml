tosca_definitions_version: tosca_2_0
description: >-
  Types generated from JSON Schema by any2tosca
imports:
- url: Certificate.yaml
  namespace: crtfct
- url: Resource.yaml
  namespace: resource
- url: Core.yaml
  namespace: core
- url: Certificate_caps.yaml
  namespace: crtfcps
data_types:
  Identifier:
    description: >-
      The identifier information about a certificate.
    properties:
      City:
        type: string
        description: >-
          The city or locality of the organization of the entity.
        required: false
      CommonName:
        type: string
        description: >-
          The common name of the entity.
        required: false
      Country:
        type: string
        description: >-
          The country of the organization of the entity.
        required: false
      Email:
        type: string
        description: >-
          The email address of the contact within the organization of the entity.
        required: false
      Organization:
        type: string
        description: >-
          The name of the organization of the entity.
        required: false
      OrganizationalUnit:
        type: string
        description: >-
          The name of the unit or division of the organization of the entity.
        required: false
      State:
        type: string
        description: >-
          The state, province, or region of the organization of the entity.
        required: false
interface_types:
  CertificateActions:
    operations:
      Rekey:
        description: >-
          This action generates a new key-pair for a certificate and produces a certificate
          signing request.
        inputs:
          ChallengePassword:
            type: string
            description: >-
              The challenge password to apply to the certificate for revocation requests.
            required: false
          KeyBitLength:
            type: integer
            description: >-
              The length of the key, in bits, if needed based on the KeyPairAlgorithm
              parameter value.
            required: false
          KeyCurveId:
            type: string
            description: >-
              The curve ID to use with the key, if needed based on the KeyPairAlgorithm
              parameter value.
            required: false
          KeyPairAlgorithm:
            type: string
            description: >-
              The type of key-pair for use with signing algorithms.
            required: false
      Renew:
        description: >-
          This action generates a certificate signing request by using the existing
          information and key-pair of the certificate.
        inputs:
          ChallengePassword:
            type: string
            description: >-
              The challenge password to apply to the certificate for revocation requests.
            required: false
node_types:
  Certificate:
    description: >-
      The Certificate schema describes a certificate that proves the identify of a
      component, account, or service.
    properties:
      CertificateString:
        type: string
        description: >-
          The string for the certificate.
        required: false
      CertificateType:
        type: crtfct:CertificateType
        description: >-
          The format of the certificate.
        required: false
      Description:
        type: resource:Description
        description: >-
          The description of this resource.  Used for commonality in the schema definitions.
        required: false
      Id:
        type: resource:Id
        description: >-
          The unique identifier for this resource within the collection of similar
          resources.
        required: true
      Issuer:
        type: Identifier
        description: >-
          The issuer of the certificate.
        required: false
      KeyUsage:
        type: list
        description: >-
          The key usage extension, which defines the purpose of the public keys in
          this certificate.
        required: false
        entry_schema:
          type: crtfct:KeyUsage
      Name:
        type: resource:Name
        description: >-
          The name of the resource or array member.
        required: true
      Oem:
        type: resource:Oem
        description: >-
          The OEM extension property.
        required: false
      Subject:
        type: Identifier
        description: >-
          The subject of the certificate.
        required: false
      ValidNotAfter:
        type: string
        description: >-
          The date when the certificate is no longer valid.
        required: false
      ValidNotBefore:
        type: string
        description: >-
          The date when the certificate becomes valid.
        required: false
    interfaces:
      Actions:
        type: CertificateActions
    capabilities:
      feature:
        type: crtfcps:CertificateFeature
      containable:
        type: crtfcps:CertificateContainable
  RekeyResponse:
    description: >-
      The response body for the Rekey action.
    properties:
      CSRString:
        type: string
        description: >-
          The string for the certificate signing request.
        required: true
    requirements:
    - Certificate:
        node: crtfct:Certificate
        capability: crtfcps:CertificateContainable
        relationship: core:Contains
        count_range:
        - 1
        - 1
        description: >-
          The link to the certificate being rekeyed.
    capabilities:
      containable:
        type: crtfcps:RekeyResponseContainable
  RenewResponse:
    description: >-
      The response body for the Renew action.
    properties:
      CSRString:
        type: string
        description: >-
          The string for the certificate signing request.
        required: true
    requirements:
    - Certificate:
        node: crtfct:Certificate
        capability: crtfcps:CertificateContainable
        relationship: core:Contains
        count_range:
        - 1
        - 1
        description: >-
          The link to the certificate being renewed.
    capabilities:
      containable:
        type: crtfcps:RenewResponseContainable
