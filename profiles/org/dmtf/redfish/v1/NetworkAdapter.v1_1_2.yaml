data_types:
  ControllerCapabilities:
    description: >-
      The capabilities of a controller.
    properties:
      DataCenterBridging:
        type: DataCenterBridging
        description: >-
          Data Center Bridging (DCB) for this controller.
        required: false
      NPIV:
        type: NPIV
        description: >-
          N_Port ID Virtualization (NPIV) capabilties for this controller.
        required: false
      NetworkDeviceFunctionCount:
        type: integer
        description: >-
          The maximum number of physical functions available on this controller.
        required: false
      NetworkPortCount:
        type: integer
        description: >-
          The number of physical ports on this controller.
        required: false
      VirtualizationOffload:
        type: VirtualizationOffload
        description: >-
          Virtualization offload for this controller.
        required: false
  Controllers:
    description: >-
      A network controller ASIC that makes up part of a NetworkAdapter.
    properties:
      ControllerCapabilities:
        type: ControllerCapabilities
        description: >-
          The capabilities of this controller.
        required: false
      FirmwarePackageVersion:
        type: string
        description: >-
          The version of the user-facing firmware package.
        required: false
      Links:
        type: ControllerLinks
        description: >-
          Links.
        required: false
      Location:
        type: resource:Location
        description: >-
          The Location of the network adapter controller.
        required: false
  DataCenterBridging:
    description: >-
      Data Center Bridging (DCB) for capabilities of a controller.
    properties:
      Capable:
        type: boolean
        description: >-
          Whether this controller is capable of Data Center Bridging (DCB).
        required: false
  NPIV:
    description: >-
      N_Port ID Virtualization (NPIV) capabilties for a controller.
    properties:
      MaxDeviceLogins:
        type: integer
        description: >-
          The maximum number of N_Port ID Virtualization (NPIV) logins allowed simultaneously
          from all ports on this controller.
        required: false
      MaxPortLogins:
        type: integer
        description: >-
          The maximum number of N_Port ID Virtualization (NPIV) logins allowed per
          physical port on this controller.
        required: false
  SRIOV:
    description: >-
      Single-Root Input/Output Virtualization (SR-IOV) capabilities.
    properties:
      SRIOVVEPACapable:
        type: boolean
        description: >-
          Whether this controller supports Single Root Input/Output Virtualization
          (SR-IOV) in Virtual Ethernet Port Aggregator (VEPA) mode.
        required: false
  VirtualFunction:
    description: >-
      A virtual function of a controller.
    properties:
      DeviceMaxCount:
        type: integer
        description: >-
          The maximum number of Virtual Functions (VFs) supported by this controller.
        required: false
      MinAssignmentGroupSize:
        type: integer
        description: >-
          The minimum number of Virtual Functions (VFs) that can be allocated or moved
          between physical functions for this controller.
        required: false
      NetworkPortMaxCount:
        type: integer
        description: >-
          The maximum number of Virtual Functions (VFs) supported per network port
          for this controller.
        required: false
  VirtualizationOffload:
    description: >-
      A Virtualization offload capability of a controller.
    properties:
      SRIOV:
        type: SRIOV
        description: >-
          Single-Root Input/Output Virtualization (SR-IOV) capabilities.
        required: false
      VirtualFunction:
        type: VirtualFunction
        description: >-
          The virtual function of the controller.
        required: false
interface_types:
  NetworkAdapterActions:
    operations:
      ResetSettingsToDefault:
        description: >-
          This action is to clear the settings back to factory defaults.
node_types:
  NetworkAdapter:
    description: >-
      A NetworkAdapter represents the physical network adapter capable of connecting
      to a computer network.  Examples include but are not limited to Ethernet, Fibre
      Channel, and converged network adapters.
    properties:
      Controllers:
        type: list
        description: >-
          The set of network controllers ASICs that make up this NetworkAdapter.
        required: false
        entry_schema:
          type: Controllers
      Description:
        type: resource:Description
        description: >-
          The description of this resource.  Used for commonality in the schema definitions.
        required: false
      Id:
        type: resource:Id
        description: >-
          The unique identifier for this resource within the collection of similar
          resources.
        required: true
      Manufacturer:
        type: string
        description: >-
          The manufacturer or OEM of this network adapter.
        required: false
      Model:
        type: string
        description: >-
          The model string for this network adapter.
        required: false
      Name:
        type: resource:Name
        description: >-
          The name of the resource or array member.
        required: true
      Oem:
        type: resource:Oem
        description: >-
          This is the manufacturer/provider specific extension moniker used to divide
          the Oem object into sections.
        required: false
      PartNumber:
        type: string
        description: >-
          Part number for this network adapter.
        required: false
      SKU:
        type: string
        description: >-
          The manufacturer SKU for this network adapter.
        required: false
      SerialNumber:
        type: string
        description: >-
          The serial number for this network adapter.
        required: false
      Status:
        type: resource:Status
        description: >-
          This property describes the status and health of the resource and its children.
        required: false
    requirements:
    - Assembly:
        node: assembly:Assembly
        capability: assmcps:AssemblyContainable
        relationship: core:Contains
        count_range:
        - 0
        - 1
        description: >-
          A reference to the Assembly resource associated with this adapter.
    - NetworkDeviceFunctions:
        node: ntdvfncl:NetworkDeviceFunctionCollection
        capability: ntdvfncc:NetworkDeviceFunctionCollectionContainable
        relationship: core:Contains
        count_range:
        - 0
        - 1
        description: >-
          A reference to the collection of NetworkDeviceFunctions associated with
          this NetworkAdapter.
    - NetworkPorts:
        node: ntwprtcl:NetworkPortCollection
        capability: ntprclcp:NetworkPortCollectionContainable
        relationship: core:Contains
        count_range:
        - 0
        - 1
        description: >-
          A reference to the collection of NetworkPorts associated with this NetworkAdapter.
    interfaces:
      Actions:
        type: NetworkAdapterActions
    capabilities:
      feature:
        type: ntwadpcp:NetworkAdapterFeature
      containable:
        type: ntwadpcp:NetworkAdapterContainable
  ControllerLinks:
    description: >-
      Contains references to other resources that are related to this resource.
    properties:
      NetworkDeviceFunctions@odata_count:
        type: odatav4:count
        description: >-
          The number of items in a collection.
        required: false
      NetworkPorts@odata_count:
        type: odatav4:count
        description: >-
          The number of items in a collection.
        required: false
      Oem:
        type: resource:Oem
        description: >-
          Oem extension object.
        required: false
      PCIeDevices@odata_count:
        type: odatav4:count
        description: >-
          The number of items in a collection.
        required: false
    requirements:
    - NetworkDeviceFunctions:
        node: ntwdvcfn:NetworkDeviceFunction
        capability: ntdvfncp:NetworkDeviceFunctionContainable
        relationship: core:Contains
        count_range:
        - 0
        - UNBOUNDED
        description: >-
          An array of references to the NetworkDeviceFunctions associated with this
          Network Controller.
    - NetworkPorts:
        node: ntwrkprt:NetworkPort
        capability: ntwprtcp:NetworkPortContainable
        relationship: core:Contains
        count_range:
        - 0
        - UNBOUNDED
        description: >-
          An array of references to the NetworkPorts associated with this Network
          Controller.
    - PCIeDevices:
        node: pcdvc:PCIeDevice
        capability: pcdvccps:PCIeDeviceContainable
        relationship: core:Contains
        count_range:
        - 0
        - UNBOUNDED
        description: >-
          An array of references to the PCIeDevices associated with this Network Controller.
    capabilities:
      containable:
        type: ntwadpcp:ControllerLinksContainable
