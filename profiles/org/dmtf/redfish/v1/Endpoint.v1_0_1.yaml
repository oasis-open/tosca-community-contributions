tosca_definitions_version: tosca_2_0
description: >-
  Types generated from JSON Schema by any2tosca
imports:
- url: Resource.yaml
  namespace: resource
- url: Storage.v1_0_0.yaml
  namespace: storage
- url: odata.4.0.0.yaml
  namespace: odata400
- url: Endpoint.yaml
  namespace: endpoint
- url: Redundancy.yaml
  namespace: rdndncy
- url: Core.yaml
  namespace: core
- url: Redundancy_caps.yaml
  namespace: rdndcps
- url: Endpoint_caps.yaml
  namespace: endpcps
- url: Resource_caps.yaml
  namespace: rsrccps
- url: Port_caps.yaml
  namespace: portcaps
data_types:
  EntityRole:
    derived_from: string
    validation:
      $valid_values:
      - $value
      - - Initiator
        - Target
        - Both
  EntityType:
    derived_from: string
    validation:
      $valid_values:
      - $value
      - - StorageInitiator
        - RootComplex
        - NetworkController
        - Drive
        - StorageExpander
        - DisplayController
        - Bridge
        - Processor
  PciId:
    properties:
      DeviceId:
        type: string
        description: >-
          The Device ID of this PCIe function.
        required: false
        validation:
          $matches:
          - $value
          - /0[xX](([a-fA-F]|[0-9]){2}){2}
      VendorId:
        type: string
        description: >-
          The Vendor ID of this PCIe function.
        required: false
        validation:
          $matches:
          - $value
          - /0[xX](([a-fA-F]|[0-9]){2}){2}
      SubsystemId:
        type: string
        description: >-
          The Subsystem ID of this PCIe function.
        required: false
        validation:
          $matches:
          - $value
          - /0[xX](([a-fA-F]|[0-9]){2}){2}
      SubsystemVendorId:
        type: string
        description: >-
          The Subsystem Vendor ID of this PCIe function.
        required: false
        validation:
          $matches:
          - $value
          - /0[xX](([a-fA-F]|[0-9]){2}){2}
  Actions:
    description: >-
      The Actions object contains the available custom actions on this resource.
    properties:
      Oem:
        type: map
        required: false
node_types:
  Endpoint:
    description: >-
      This is the schema definition for the Endpoint resource. It represents the properties
      of an entity that sends or receives protocol defined messages over a transport.
    properties:
      Oem:
        type: resource:Oem
        description: >-
          This is the manufacturer/provider specific extension moniker used to divide
          the Oem object into sections.
        required: false
      Id:
        type: resource:Id
        description: >-
          The unique identifier for this resource within the collection of similar
          resources.
        required: true
      Description:
        type: resource:Description
        description: >-
          The description of this resource.  Used for commonality in the schema definitions.
        required: false
      Name:
        type: resource:Name
        description: >-
          The name of the resource or array member.
        required: true
      Status:
        type: resource:Status
        description: >-
          The status and health of a resource and its children.
        required: false
      EndpointProtocol:
        type: storage:Protocol
        description: >-
          The protocol supported by this endpoint.
        required: false
      ConnectedEntities:
        type: list
        description: >-
          All the entities connected to this endpoint.
        required: false
        entry_schema:
          type: ConnectedEntity
      Identifiers:
        type: list
        description: >-
          Identifiers for this endpoint.
        required: false
        entry_schema:
          type: resource:Identifier
      PciId:
        type: PciId
        description: >-
          The PCI ID of the endpoint.
        required: false
      HostReservationMemoryBytes:
        type: float
        description: >-
          The amount of memory in Bytes that the Host should allocate to connect to
          this endpoint.
        required: false
      Links:
        type: Links
        description: >-
          The links object contains the links to other resources that are related
          to this resource.
        required: false
      Actions:
        type: Actions
        description: >-
          The Actions object contains the available custom actions on this resource.
        required: false
      Redundancy@odata_count:
        type: odata400:count
        description: >-
          The number of items in a collection.
        required: false
      Redundancy@odata_navigationLink:
        type: string
        required: false
    requirements:
    - Redundancy:
        node: rdndncy:Redundancy
        capability: rdndcps:RedundancyContainable
        relationship: core:Contains
        count_range:
        - 0
        - UNBOUNDED
        description: >-
          Redundancy information for the lower level endpoints supporting this endpoint.
    capabilities:
      feature:
        type: endpcps:EndpointFeature
      containable:
        type: endpcps:EndpointContainable
  ConnectedEntity:
    description: >-
      Represents a remote resource that is connected to the network accessible to
      this endpoint.
    properties:
      EntityType:
        type: EntityType
        description: >-
          The type of the connected entity.
        required: false
      EntityRole:
        type: EntityRole
        description: >-
          The role of the connected entity.
        required: false
      EntityPciId:
        type: PciId
        description: >-
          The PCI ID of the connected entity.
        required: false
      PciFunctionNumber:
        type: float
        description: >-
          The PCI ID of the connected entity.
        required: false
      PciClassCode:
        type: string
        description: >-
          The Class Code and Subclass code of this PCIe function.
        required: false
        validation:
          $matches:
          - $value
          - /0[xX](([a-fA-F]|[0-9]){2}){2}
      Identifiers:
        type: list
        description: >-
          Identifiers for the remote entity.
        required: false
        entry_schema:
          type: resource:Identifier
      Oem:
        type: resource:Oem
        description: >-
          The OEM extension.
        required: false
    requirements:
    - EntityLink:
        node: resource:Resource
        capability: rsrccps:ResourceContainable
        relationship: core:Contains
        count_range:
        - 0
        - 1
        description: >-
          A link to the associated entity.
    capabilities:
      containable:
        type: endpcps:ConnectedEntityContainable
  Links:
    description: >-
      The links object contains the links to other resources that are related to this
      resource.
    properties:
      Oem:
        type: resource:Oem
        description: >-
          Oem extension object.
        required: false
      MutuallyExclusiveEndpoints@odata_count:
        type: odata400:count
        description: >-
          The number of items in a collection.
        required: false
      MutuallyExclusiveEndpoints@odata_navigationLink:
        type: string
        required: false
      Ports@odata_count:
        type: odata400:count
        description: >-
          The number of items in a collection.
        required: false
      Ports@odata_navigationLink:
        type: string
        required: false
    requirements:
    - MutuallyExclusiveEndpoints:
        node: endpoint:Endpoint
        capability: endpcps:EndpointContainable
        relationship: core:Contains
        count_range:
        - 0
        - UNBOUNDED
        description: >-
          An array of references to the endpoints that may not be used in zones if
          this endpoint is used in a zone.
    - Ports:
        node: Port
        capability: portcaps:PortContainable
        relationship: core:Contains
        count_range:
        - 0
        - UNBOUNDED
        description: >-
          An array of references to the the physical ports associated with this endpoint.
    capabilities:
      containable:
        type: endpcps:LinksContainable
