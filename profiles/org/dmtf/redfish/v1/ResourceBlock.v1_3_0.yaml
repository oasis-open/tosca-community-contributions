data_types:
  CompositionState:
    derived_from: string
    validation:
      $valid_values:
      - $value
      - - Composing
        - ComposedAndAvailable
        - Composed
        - Unused
        - Failed
        - Unavailable
  CompositionStatus:
    description: >-
      Composition status of the Resource Block.
    properties:
      CompositionState:
        type: CompositionState
        description: >-
          This property represents the current state of the Resource Block from a
          composition perspective.
        required: true
      MaxCompositions:
        type: integer
        description: >-
          The maximum number of compositions in which this Resource Block is capable
          of participating simultaneously.
        required: false
        validation:
          $greater_or_equal:
          - $value
          - 1
      NumberOfCompositions:
        type: integer
        description: >-
          The number of compositions in which this Resource Block is currently participating.
        required: false
        validation:
          $greater_or_equal:
          - $value
          - 0
      Reserved:
        type: boolean
        description: >-
          This represents if the Resource Block is reserved by any client.
        required: false
      SharingCapable:
        type: boolean
        description: >-
          Indicates if this Resource Block is capable of participating in multiple
          compositions simultaneously.
        required: false
      SharingEnabled:
        type: boolean
        description: >-
          Indicates if this Resource Block is allowed to participate in multiple compositions
          simultaneously.
        required: false
  ResourceBlockLimits:
    description: >-
      This object specifies the allowable quantities of types of Resource Blocks for
      a given composition request.
    properties:
      MaxCompute:
        type: integer
        description: >-
          The minimum number of Resource Blocks of type Compute required for the composition
          request.
        required: false
        validation:
          $greater_or_equal:
          - $value
          - 1
      MaxComputerSystem:
        type: integer
        description: >-
          The minimum number of Resource Blocks of type ComputerSystem required for
          the composition request.
        required: false
        validation:
          $greater_or_equal:
          - $value
          - 1
      MaxExpansion:
        type: integer
        description: >-
          The minimum number of Resource Blocks of type Expansion required for the
          composition request.
        required: false
        validation:
          $greater_or_equal:
          - $value
          - 1
      MaxMemory:
        type: integer
        description: >-
          The minimum number of Resource Blocks of type Memory required for the composition
          request.
        required: false
        validation:
          $greater_or_equal:
          - $value
          - 1
      MaxNetwork:
        type: integer
        description: >-
          The minimum number of Resource Blocks of type Network required for the composition
          request.
        required: false
        validation:
          $greater_or_equal:
          - $value
          - 1
      MaxProcessor:
        type: integer
        description: >-
          The minimum number of Resource Blocks of type Processor required for the
          composition request.
        required: false
        validation:
          $greater_or_equal:
          - $value
          - 1
      MaxStorage:
        type: integer
        description: >-
          The minimum number of Resource Blocks of type Storage required for the composition
          request.
        required: false
        validation:
          $greater_or_equal:
          - $value
          - 1
      MinCompute:
        type: integer
        description: >-
          The minimum number of Resource Blocks of type Compute required for the composition
          request.
        required: false
        validation:
          $greater_or_equal:
          - $value
          - 0
      MinComputerSystem:
        type: integer
        description: >-
          The minimum number of Resource Blocks of type ComputerSystem required for
          the composition request.
        required: false
        validation:
          $greater_or_equal:
          - $value
          - 0
      MinExpansion:
        type: integer
        description: >-
          The minimum number of Resource Blocks of type Expansion required for the
          composition request.
        required: false
        validation:
          $greater_or_equal:
          - $value
          - 0
      MinMemory:
        type: integer
        description: >-
          The minimum number of Resource Blocks of type Memory required for the composition
          request.
        required: false
        validation:
          $greater_or_equal:
          - $value
          - 0
      MinNetwork:
        type: integer
        description: >-
          The minimum number of Resource Blocks of type Network required for the composition
          request.
        required: false
        validation:
          $greater_or_equal:
          - $value
          - 0
      MinProcessor:
        type: integer
        description: >-
          The minimum number of Resource Blocks of type Processor required for the
          composition request.
        required: false
        validation:
          $greater_or_equal:
          - $value
          - 0
      MinStorage:
        type: integer
        description: >-
          The minimum number of Resource Blocks of type Storage required for the composition
          request.
        required: false
        validation:
          $greater_or_equal:
          - $value
          - 0
  ResourceBlockType:
    derived_from: string
    validation:
      $valid_values:
      - $value
      - - Compute
        - Processor
        - Memory
        - Network
        - Storage
        - ComputerSystem
        - Expansion
relationship_types:
  ResourceBlockDependsOn:
    derived_from: core:DependsOn
    properties:
      Chassis@odata_count:
        type: odata:count
        description: >-
          The number of items in a collection.
        required: false
      ComputerSystems@odata_count:
        type: odata:count
        description: >-
          The number of items in a collection.
        required: false
      Oem:
        type: resource:Oem
        description: >-
          Oem extension object.
        required: false
      Zones@odata_count:
        type: odata:count
        description: >-
          The number of items in a collection.
        required: false
node_types:
  ResourceBlock:
    description: >-
      This schema defines a Resource Block resource.
    properties:
      CompositionStatus:
        type: CompositionStatus
        description: >-
          This property describes the composition status details for this Resource
          Block.
        required: true
      ComputerSystems@odata_count:
        type: odata:count
        description: >-
          The number of items in a collection.
        required: false
      Description:
        type: resource:Description
        description: >-
          The description of this resource.  Used for commonality in the schema definitions.
        required: false
      Drives@odata_count:
        type: odata:count
        description: >-
          The number of items in a collection.
        required: false
      EthernetInterfaces@odata_count:
        type: odata:count
        description: >-
          The number of items in a collection.
        required: false
      Id:
        type: resource:Id
        description: >-
          The unique identifier for this resource within the collection of similar
          resources.
        required: true
      Memory@odata_count:
        type: odata:count
        description: >-
          The number of items in a collection.
        required: false
      Name:
        type: resource:Name
        description: >-
          The name of the resource or array member.
        required: true
      NetworkInterfaces@odata_count:
        type: odata:count
        description: >-
          The number of items in a collection.
        required: false
      Oem:
        type: resource:Oem
        description: >-
          This is the manufacturer/provider specific extension moniker used to divide
          the Oem object into sections.
        required: false
      Processors@odata_count:
        type: odata:count
        description: >-
          The number of items in a collection.
        required: false
      ResourceBlockType:
        type: list
        description: >-
          This property represents the types of resources available on this Resource
          Block.
        required: true
        entry_schema:
          type: ResourceBlockType
      SimpleStorage@odata_count:
        type: odata:count
        description: >-
          The number of items in a collection.
        required: false
      Status:
        type: resource:Status
        description: >-
          This property describes the status and health of the resource and its children.
        required: false
      Storage@odata_count:
        type: odata:count
        description: >-
          The number of items in a collection.
        required: false
    requirements:
    - ComputerSystems:
        node: cmptsyst:ComputerSystem
        capability: cmpsyscp:ComputerSystemContainable
        relationship: core:Contains
        count_range:
        - 0
        - UNBOUNDED
        description: >-
          An array of references to the Computer Systems available in this Resource
          Block.
    - Drives:
        node: drive:Drive
        capability: drvcps:DriveContainable
        relationship: core:Contains
        count_range:
        - 0
        - UNBOUNDED
        description: >-
          An array of references to the Drives available in this Resource Block.
    - EthernetInterfaces:
        node: ethrintr:EthernetInterface
        capability: ethintcp:EthernetInterfaceContainable
        relationship: core:Contains
        count_range:
        - 0
        - UNBOUNDED
        description: >-
          An array of references to the Ethernet Interfaces available in this Resource
          Block.
    - Memory:
        node: memory:Memory
        capability: mmrycps:MemoryContainable
        relationship: core:Contains
        count_range:
        - 0
        - UNBOUNDED
        description: >-
          An array of references to the Memory available in this Resource Block.
    - NetworkInterfaces:
        node: ntwrintr:NetworkInterface
        capability: ntwintcp:NetworkInterfaceContainable
        relationship: core:Contains
        count_range:
        - 0
        - UNBOUNDED
        description: >-
          An array of references to the Network Interfaces available in this Resource
          Block.
    - Processors:
        node: prcssr:Processor
        capability: prcscps:ProcessorContainable
        relationship: core:Contains
        count_range:
        - 0
        - UNBOUNDED
        description: >-
          An array of references to the Processors available in this Resource Block.
    - SimpleStorage:
        node: smplstrg:SimpleStorage
        capability: smpstrcp:SimpleStorageContainable
        relationship: core:Contains
        count_range:
        - 0
        - UNBOUNDED
        description: >-
          An array of references to the Simple Storage available in this Resource
          Block.
    - Storage:
        node: storage:Storage
        capability: strgcps:StorageContainable
        relationship: core:Contains
        count_range:
        - 0
        - UNBOUNDED
        description: >-
          An array of references to the Storage available in this Resource Block.
    - Chassis:
        node: chassis:Chassis
        capability: chssscps:ChassisFeature
        relationship: ResourceBlockDependsOn
        count_range:
        - 0
        - UNBOUNDED
        description: >-
          An array of references to the Chassis in which this Resource Block is contained.
    - ComputerSystems:
        node: cmptsyst:ComputerSystem
        capability: cmpsyscp:ComputerSystemFeature
        relationship: ResourceBlockDependsOn
        count_range:
        - 0
        - UNBOUNDED
        description: >-
          An array of references to the Computer Systems that are composed from this
          Resource Block.
    - Zones:
        # node: zone:Zone
        capability: core:Feature
        relationship: ResourceBlockDependsOn
        count_range:
        - 0
        - UNBOUNDED
        description: >-
          An array of references to the Zones in which this Resource Block is bound.
    capabilities:
      feature:
        type: rsrblccp:ResourceBlockFeature
      containable:
        type: rsrblccp:ResourceBlockContainable
