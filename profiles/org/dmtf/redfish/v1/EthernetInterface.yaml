tosca_definitions_version: tosca_2_0
description: >-
  Types generated from JSON Schema by any2tosca
imports:
- url: odata-v4.yaml
  namespace: odatav4
- url: Resource.yaml
  namespace: resource
- url: Core.yaml
  namespace: core
- url: EthernetInterface_caps.yaml
  namespace: ethintcp
- url: IPAddresses.yaml
  namespace: ipddrsss
- url: VLanNetworkInterface.yaml
  namespace: vlnntwin
- url: VLanNetworkInterfaceCollection.yaml
  namespace: vlntincl
- url: VLanNetworkInterfaceCollection_caps.yaml
  namespace: vlntincc
data_types:
  DHCPv4:
    description: >-
      DHCPv4 configuration for this interface.
    properties:
      DHCPEnabled:
        type: boolean
        description: >-
          An indication of whether DHCP v4 is enabled on this Ethernet interface.
        required: false
      FallbackAddress:
        type: string
        description: >-
          DHCPv4 fallback address method for this interface.
        required: false
      UseDNSServers:
        type: boolean
        description: >-
          An indication of whether this interface uses DHCP v4-supplied DNS servers.
        required: false
      UseDomainName:
        type: boolean
        description: >-
          An indication of whether this interface uses a DHCP v4-supplied domain name.
        required: false
      UseGateway:
        type: boolean
        description: >-
          An indication of whether this interface uses a DHCP v4-supplied gateway.
        required: false
      UseNTPServers:
        type: boolean
        description: >-
          An indication of whether the interface uses DHCP v4-supplied NTP servers.
        required: false
      UseStaticRoutes:
        type: boolean
        description: >-
          An indication of whether the interface uses DHCP v4-supplied static routes.
        required: false
  DHCPv6:
    description: >-
      DHCPv6 configuration for this interface.
    properties:
      OperatingMode:
        type: string
        description: >-
          Determines the DHCPv6 operating mode for this interface.
        required: false
      UseDNSServers:
        type: boolean
        description: >-
          An indication of whether the interface uses DHCP v6-supplied DNS servers.
        required: false
      UseDomainName:
        type: boolean
        description: >-
          An indication of whether this interface uses a DHCP v6-supplied domain name.
        required: false
      UseNTPServers:
        type: boolean
        description: >-
          An indication of whether the interface uses DHCP v6-supplied NTP servers.
        required: false
      UseRapidCommit:
        type: boolean
        description: >-
          An indication of whether the interface uses DHCP v6 rapid commit mode for
          stateful mode address assignments.  Do not enable this option in networks
          where more than one DHCP v6 server is configured to provide address assignments.
        required: false
  StatelessAddressAutoConfig:
    description: >-
      Stateless address autoconfiguration (SLAAC) parameters for this interface.
    properties:
      IPv4AutoConfigEnabled:
        type: boolean
        description: >-
          An indication of whether IPv4 stateless address autoconfiguration (SLAAC)
          is enabled for this interface.
        required: false
      IPv6AutoConfigEnabled:
        type: boolean
        description: >-
          An indication of whether IPv6 stateless address autoconfiguration (SLAAC)
          is enabled for this interface.
        required: false
relationship_types:
  EthernetInterfaceDependsOn:
    derived_from: core:DependsOn
    properties:
      AffiliatedInterfaces@odata_count:
        type: odatav4:count
        description: >-
          The number of items in a collection.
        required: false
      Endpoints@odata_count:
        type: odatav4:count
        description: >-
          The number of items in a collection.
        required: false
      NetworkDeviceFunction:
        type: string
        description: >-
          The link to the parent network device function and is only used when representing
          one of the VLANs on that network device function, such as is done in Unix.
        required: false
      NetworkDeviceFunctions@odata_count:
        type: odatav4:count
        description: >-
          The number of items in a collection.
        required: false
      Oem:
        type: resource:Oem
        description: >-
          The OEM extension property.
        required: false
      Ports@odata_count:
        type: odatav4:count
        description: >-
          The number of items in a collection.
        required: false
      RelatedInterfaces@odata_count:
        type: odatav4:count
        description: >-
          The number of items in a collection.
        required: false
node_types:
  EthernetInterface:
    description: >-
      The `EthernetInterface` schema represents a single, logical Ethernet interface
      or network interface controller (NIC).
    properties:
      '@odata_id':
        type: odatav4:id
        description: >-
          The unique identifier for a resource.
        required: true
      '@odata_context':
        type: odatav4:context
        description: >-
          The OData description of a payload.
        required: false
      '@odata_etag':
        type: odatav4:etag
        description: >-
          The current ETag of the resource.
        required: false
      '@odata_type':
        type: odatav4:type
        description: >-
          The type of a resource.
        required: true
      AutoNeg:
        type: boolean
        description: >-
          An indication of whether the speed and duplex are automatically negotiated
          and configured on this interface.
        required: false
      Description:
        type: string
        required: false
      FQDN:
        type: string
        description: >-
          The complete, fully qualified domain name that DNS obtains for this interface.
        required: false
      FullDuplex:
        type: boolean
        description: >-
          An indication of whether full-duplex mode is enabled on the Ethernet connection
          for this interface.
        required: false
      HostName:
        type: string
        description: >-
          The DNS host name, without any domain information.
        required: false
      IPv4Addresses:
        type: list
        description: >-
          The IPv4 addresses currently in use by this interface.
        required: false
        entry_schema:
          type: ipddrsss:IPv4Address
      IPv6AddressPolicyTable:
        type: list
        description: >-
          An array that represents the RFC6724-defined address selection policy table.
        required: false
        entry_schema:
          type: string
      IPv6Addresses:
        type: list
        description: >-
          The IPv6 addresses currently in use by this interface.
        required: false
        entry_schema:
          type: ipddrsss:IPv6Address
      IPv6DefaultGateway:
        type: string
        description: >-
          The IPv6 default gateway address in use on this interface.
        required: false
      IPv6StaticAddresses:
        type: list
        description: >-
          The IPv6 static addresses assigned to this interface.  See `IPv6Addresses`
          for the addresses in use by this interface.
        required: false
        entry_schema:
          type: string
      Id:
        type: resource:Id
        description: >-
          The unique identifier for this resource within the collection of similar
          resources.
        required: true
      InterfaceEnabled:
        type: boolean
        description: >-
          An indication of whether this interface is enabled.
        required: false
      MACAddress:
        type: string
        description: >-
          The currently configured MAC address of the interface, or logical port.
        required: false
      MTUSize:
        type: integer
        description: >-
          The currently configured maximum transmission unit (MTU), in bytes, on this
          interface.
        required: false
      MaxIPv6StaticAddresses:
        type: integer
        description: >-
          The maximum number of static IPv6 addresses that can be configured on this
          interface.
        required: false
      Name:
        type: resource:Name
        description: >-
          The name of the resource or array member.
        required: true
      NameServers:
        type: list
        description: >-
          The DNS servers in use on this interface.
        required: false
        entry_schema:
          type: string
      Oem:
        type: resource:Oem
        description: >-
          The OEM extension property.
        required: false
      PermanentMACAddress:
        type: string
        description: >-
          The permanent MAC address assigned to this interface, or port.
        required: false
      SpeedMbps:
        type: integer
        description: >-
          The current speed, in Mbit/s, of this interface.
        required: false
      Status:
        type: resource:Status
        description: >-
          The status and health of the resource and its subordinate or dependent resources.
        required: false
      UefiDevicePath:
        type: string
        description: >-
          The UEFI device path for this interface.
        required: false
      VLAN:
        type: vlnntwin:VLAN
        description: >-
          If this network interface supports more than one VLAN, this property is
          absent.  VLAN collections appear in the `Links` property of this resource.
        required: false
      LinkStatus:
        type: string
        description: >-
          The link status of this interface, or port.
        required: false
      DHCPv4:
        type: DHCPv4
        description: >-
          DHCPv4 configuration for this interface.
        required: false
      DHCPv6:
        type: DHCPv6
        description: >-
          DHCPv6 configuration for this interface.
        required: false
      IPv4StaticAddresses:
        type: list
        description: >-
          The IPv4 static addresses assigned to this interface.  See `IPv4Addresses`
          for the addresses in use by this interface.
        required: false
        entry_schema:
          type: string
      IPv6StaticDefaultGateways:
        type: list
        description: >-
          The IPv6 static default gateways for this interface.
        required: false
        entry_schema:
          type: string
      StatelessAddressAutoConfig:
        type: StatelessAddressAutoConfig
        description: >-
          Stateless address autoconfiguration (SLAAC) parameters for this interface.
        required: false
      StaticNameServers:
        type: list
        description: >-
          The statically-defined set of DNS server IPv4 and IPv6 addresses.
        required: false
        entry_schema:
          type: string
      EthernetInterfaceType:
        type: string
        description: >-
          The type of interface.
        required: false
      TeamMode:
        type: string
        description: >-
          The team mode for this interface.
        required: false
      RoutingScope:
        type: string
        description: >-
          The routing scope for this interface.
        required: false
      IPv6Enabled:
        type: boolean
        description: >-
          An indication of whether IPv6 is enabled on this interface.
        required: false
    requirements:
    - VLANs:
        node: vlntincl:VLanNetworkInterfaceCollection
        capability: vlntincc:VLanNetworkInterfaceCollectionContainable
        relationship: core:Contains
        count_range:
        - 0
        - 1
        description: >-
          The link to a collection of VLANs, which applies only if the interface supports
          more than one VLAN.  If this property applies, the `VLANEnabled` and `VLANId`
          properties do not apply.
    - AffiliatedInterfaces:
        node: EthernetInterface
        capability: ethintcp:EthernetInterfaceFeature
        relationship: EthernetInterfaceDependsOn
        count_range:
        - 0
        - UNBOUNDED
        description: >-
          The links to the Ethernet interfaces that are affiliated with this interface,
          such as a VLAN or a team that uses this interface.
    - Chassis:
        # node: chassis:Chassis
        capability: core:Feature
        relationship: EthernetInterfaceDependsOn
        count_range:
        - 0
        - 1
        description: >-
          The link to the chassis that contains this Ethernet interface.
    - Endpoints:
        # node: endpoint:Endpoint
        capability: core:Feature
        relationship: EthernetInterfaceDependsOn
        count_range:
        - 0
        - UNBOUNDED
        description: >-
          An array of links to the endpoints that connect to this Ethernet interface.
    - HostInterface:
        # node: hstintr:HostInterface
        capability: core:Feature
        relationship: EthernetInterfaceDependsOn
        count_range:
        - 0
        - 1
        description: >-
          The link to a Host Interface that is associated with this Ethernet interface.
    - NetworkDeviceFunctions:
        # node: ntwdvcfn:NetworkDeviceFunction
        capability: core:Feature
        relationship: EthernetInterfaceDependsOn
        count_range:
        - 0
        - UNBOUNDED
        description: >-
          The link to the network device functions that constitute this Ethernet interface.
    - Ports:
        # node: port:Port
        capability: core:Feature
        relationship: EthernetInterfaceDependsOn
        count_range:
        - 0
        - UNBOUNDED
        description: >-
          The links to the ports providing this Ethernet interface.
    - RelatedInterfaces:
        node: EthernetInterface
        capability: ethintcp:EthernetInterfaceFeature
        relationship: EthernetInterfaceDependsOn
        count_range:
        - 0
        - UNBOUNDED
        description: >-
          The links to the Ethernet interfaces that constitute this Ethernet interface.
    capabilities:
      feature:
        type: ethintcp:EthernetInterfaceFeature
      containable:
        type: ethintcp:EthernetInterfaceContainable
