tosca_definitions_version: tosca_2_0
description: >-
  Types generated from JSON Schema by any2tosca
data_types:
  readonly:
    description: >-
      This property shall designate a property to be readonly when set to true.
    derived_from: boolean
  requiredOnCreate:
    description: >-
      This property is required to be specified in the body of a POST request to create
      the resource.
    derived_from: list
  requiredParameter:
    description: >-
      This property specifies that an action parameter is required to be provided
      by the client as part of the action request when set to true.  Parameters not
      containing this property with the value of true can be left out of the client's
      action request.
    derived_from: boolean
  longDescription:
    description: >-
      This attribute shall contain normative language relating to the Redfish Specification
      and documentation.
    derived_from: string
  copyright:
    description: >-
      This attribute shall contain the copyright notice for the schema.
    derived_from: string
  deprecated:
    description: >-
      The term shall be applied to a property in order to specify that the property
      is deprecated.  The value of the string should explain the deprecation, including
      new property or properties to be used. The property can be supported in new
      and existing implementations, but usage in new implementations is discouraged.  Deprecated
      properties are likely to be removed in a future major version of the schema.
    derived_from: string
  enumDescriptions:
    description: >-
      This attribute shall contain informative language related to the enumeration
      values of the property.
  enumLongDescriptions:
    description: >-
      This attribute shall contain normative language relating to the enumeration
      values of the property.
  enumDeprecated:
    description: >-
      The term shall be applied to a value in order to specify that the value is deprecated.  The
      value of the string should explain the deprecation, including new value to be
      used.  The value can be supported in new and existing implementations, but usage
      in new implementations is discouraged.  Deprecated values are likely to be removed
      in a future major version of the schema.
  units:
    description: >-
      This attribute shall contain the units of measure used by the value of the property.
    derived_from: string
  owningEntity:
    description: >-
      Indicates the name of the entity responsible for development, publication and
      maintenance of a given schema.  Possible values include DMTF, SNIA or an OEM
      label such as is used in a Redfish OEM extension section.
    derived_from: string
  excerpt:
    description: >-
      The term specifies that the property is a Excerpt data element that shall appear
      in objects marked as a Excerpt Copy when the value of the term matches the type
      specified by the ExcerptCopy term. If the value of the term is unspecified,
      the property shall appear in all ExcerptCopy instances.
    derived_from: string
  excerptCopy:
    description: >-
      The term specifies that the object or property definition is a copy of data
      from a source elsewhere in the data model, and that only properties marked as
      Excerpt in that referenced definition shall be included. The value of the term
      shall contain the name and value of a key property used to construct the Excerpt
      subset of properties from the referenced definition. If the value of the term
      is not defined, then all Excerpt properties shall be copied from the referenced
      definition.
    derived_from: string
  excerptCopyOnly:
    description: >-
      The term specifies that the property is a data element that shall appear only
      when the resource definition is used as a copy (using the ExcerptCopy term),
      and shall not appear in the original data resource.
    derived_from: string
  insertable:
    description: >-
      The term specifies if new members can be added to the resource using the POST
      method.
    derived_from: boolean
  updatable:
    description: >-
      The term specifies whether or not the resource is able to be updated using the
      PATCH or PUT methods.
    derived_from: boolean
  deletable:
    description: >-
      The term specifies whether or not the resource is able to be removed using the
      DELETE methods.
    derived_from: boolean
  uris:
    description: >-
      The term specifies the URIs a service is allowed to use for the given resource.
    derived_from: list
  autoExpand:
    description: >-
      The term specifies if the resource referenced by the hyperlink shall be expanded
      in the response body as specified in the 'Expanded resources' clause of the
      Redfish Specification.
    derived_from: boolean
