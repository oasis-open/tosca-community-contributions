tosca_definitions_version: tosca_2_0
description: >-
  Types generated from JSON Schema by any2tosca
imports:
- url: Resource.yaml
  namespace: resource
- url: Core.yaml
  namespace: core
- url: Resource_caps.yaml
  namespace: rsrccps
data_types:
  DurableNameFormat:
    derived_from: string
    validation:
      $valid_values:
      - $value
      - - NAA
        - iQN
        - FC_WWN
        - UUID
        - EUI
  Identifier:
    description: >-
      Any additional identifiers for a resource.
    properties:
      DurableName:
        type: string
        description: >-
          The world-wide, persistent name of the resource.
        required: false
      DurableNameFormat:
        type: DurableNameFormat
        description: >-
          The format of the durable name property.
        required: false
  Location:
    description: >-
      The location of a resource.
    properties:
      Info:
        type: string
        description: >-
          The location of the resource.
        required: false
      InfoFormat:
        type: string
        description: >-
          The format of the Info property.
        required: false
      Oem:
        type: resource:Oem
        description: >-
          The OEM extension property.
        required: false
  ReferenceableMember:
    description: >-
      The base type for addressable members of an array.
    properties:
      MemberId:
        type: string
        description: >-
          The unique identifier for the member within an array.
        required: true
      Oem:
        type: resource:Oem
        description: >-
          The OEM extension property.
        required: false
  ResourceCollection:
    properties:
      Description:
        type: resource:Description
        description: >-
          The description of this resource.  Used for commonality in the schema definitions.
        required: false
      Name:
        type: resource:Name
        description: >-
          The name of the resource or array member.
        required: true
      Oem:
        type: resource:Oem
        description: >-
          The OEM extension property.
        required: false
node_types:
  Resource:
    description: >-
      The base type for resources and members that can be linked to.
    properties:
      Description:
        type: resource:Description
        description: >-
          The description of this resource.  Used for commonality in the schema definitions.
        required: false
      Id:
        type: resource:Id
        description: >-
          The unique identifier for this resource within the collection of similar
          resources.
        required: true
      Name:
        type: resource:Name
        description: >-
          The name of the resource or array member.
        required: true
      Oem:
        type: resource:Oem
        description: >-
          The OEM extension property.
        required: false
    capabilities:
      feature:
        type: rsrccps:ResourceFeature
      containable:
        type: rsrccps:ResourceContainable
