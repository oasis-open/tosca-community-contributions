data_types:
  ChassisType:
    derived_from: string
    validation:
      $valid_values:
      - $value
      - - Rack
        - Blade
        - Enclosure
        - StandAlone
        - RackMount
        - Card
        - Cartridge
        - Row
        - Pod
        - Expansion
        - Sidecar
        - Zone
        - Sled
        - Shelf
        - Drawer
        - Module
        - Component
        - IPBasedDrive
        - RackGroup
        - StorageEnclosure
        - ImmersionTank
        - HeatExchanger
        - PowerStrip
        - Other
  Door:
    description: >-
      A door or access panel on the chassis.
    properties:
      DoorState:
        type: DoorState
        description: >-
          The state of the door.
        required: false
      Locked:
        type: boolean
        description: >-
          Indicates if the door is locked.
        required: false
      UserLabel:
        type: string
        description: >-
          A user-assigned label.
        required: false
  DoorState:
    derived_from: string
    validation:
      $valid_values:
      - $value
      - - Locked
        - Closed
        - LockedAndOpen
        - Open
  Doors:
    description: >-
      The doors or access panels of the chassis.
    properties:
      Front:
        type: Door
        description: >-
          The front door of the chassis.
        required: false
      Rear:
        type: Door
        description: >-
          The rear door of the chassis.
        required: false
  EnvironmentalClass:
    derived_from: string
    validation:
      $valid_values:
      - $value
      - - A1
        - A2
        - A3
        - A4
  IndicatorLED:
    derived_from: string
    validation:
      $valid_values:
      - $value
      - - Unknown
        - Lit
        - Blinking
        - 'Off'
  IntrusionSensor:
    derived_from: string
    validation:
      $valid_values:
      - $value
      - - Normal
        - HardwareIntrusion
        - TamperingDetected
  IntrusionSensorReArm:
    derived_from: string
    validation:
      $valid_values:
      - $value
      - - Manual
        - Automatic
  PhysicalSecurity:
    description: >-
      The physical security state of the chassis.
    properties:
      IntrusionSensor:
        type: IntrusionSensor
        description: >-
          The physical security state of the chassis, such as if hardware intrusion
          is detected.
        required: false
      IntrusionSensorNumber:
        type: integer
        description: >-
          A numerical identifier to represent the physical security sensor.
        required: false
      IntrusionSensorReArm:
        type: IntrusionSensorReArm
        description: >-
          The policy that describes how the physical security state of the chassis
          returns to a normal state.
        required: false
  ThermalDirection:
    derived_from: string
    validation:
      $valid_values:
      - $value
      - - FrontToBack
        - BackToFront
        - TopExhaust
        - Sealed
