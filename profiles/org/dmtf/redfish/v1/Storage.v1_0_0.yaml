tosca_definitions_version: tosca_2_0
description: >-
  Types generated from JSON Schema by any2tosca
imports:
- url: Resource.yaml
  namespace: resource
- url: odata.4.0.0.yaml
  namespace: odata400
- url: Chassis.yaml
  namespace: chassis
- url: Drive.yaml
  namespace: drive
- url: Redundancy.yaml
  namespace: rdndncy
- url: Core.yaml
  namespace: core
- url: Drive_caps.yaml
  namespace: drvcps
- url: Volume_caps.yaml
  namespace: vlmcps
- url: Redundancy_caps.yaml
  namespace: rdndcps
- url: Storage_caps.yaml
  namespace: strgcps
- url: Chassis_caps.yaml
  namespace: chssscps
data_types:
  SetEncryptionKey:
    description: >-
      This action is used to set the encryption key for the storage subsystem.
    properties:
      title:
        type: string
        description: >-
          Friendly action name
        required: false
      target:
        type: string
        description: >-
          Link to invoke action
        required: false
  Protocol:
    derived_from: string
    validation:
      $valid_values:
      - $value
      - - PCIe
        - AHCI
        - UHCI
        - SAS
        - SATA
        - USB
        - NVMe
        - FC
        - iSCSI
        - FCoE
        - NVMeOverFabrics
        - SMB
        - NFSv3
        - NFSv4
        - HTTP
        - HTTPS
        - FTP
        - SFTP
  Actions:
    description: >-
      The available actions for this resource.
    properties:
      Oem:
        type: map
        required: false
      '#Storage_SetEncryptionKey':
        type: SetEncryptionKey
        description: >-
          This action is used to set the encryption key for the storage subsystem.
        required: false
  StorageController:
    properties:
      '@odata_id':
        type: odata400:id
        description: >-
          The unique identifier for a resource.
        required: false
node_types:
  Storage:
    description: >-
      This schema defines a storage subsystem and its respective properties.  A storage
      subsystem represents a set of storage controllers (physical or virtual) and
      the resources such as volumes that can be accessed from that subsystem.
    properties:
      Oem:
        type: resource:Oem
        description: >-
          This is the manufacturer/provider specific extension moniker used to divide
          the Oem object into sections.
        required: false
      Id:
        type: resource:Id
        description: >-
          The unique identifier for this resource within the collection of similar
          resources.
        required: true
      Description:
        type: resource:Description
        description: >-
          The description of this resource.  Used for commonality in the schema definitions.
        required: false
      Name:
        type: resource:Name
        description: >-
          The name of the resource or array member.
        required: true
      Links:
        type: Links
        description: >-
          Contains references to other resources that are related to this resource.
        required: false
      Actions:
        type: Actions
        description: >-
          The available actions for this resource.
        required: false
      Status:
        type: resource:Status
        description: >-
          The status and health of a resource and its children.
        required: false
      StorageControllers@odata_count:
        type: odata400:count
        description: >-
          The number of items in a collection.
        required: false
      StorageControllers@odata_navigationLink:
        type: string
        required: false
      StorageControllers:
        type: list
        description: >-
          The set of storage controllers represented by this resource.
        required: false
        entry_schema:
          type: StorageController
      Drives@odata_count:
        type: odata400:count
        description: >-
          The number of items in a collection.
        required: false
      Drives@odata_navigationLink:
        type: string
        required: false
      Volumes@odata_count:
        type: odata400:count
        description: >-
          The number of items in a collection.
        required: false
      Volumes@odata_navigationLink:
        type: string
        required: false
      Redundancy@odata_count:
        type: odata400:count
        description: >-
          The number of items in a collection.
        required: false
      Redundancy@odata_navigationLink:
        type: string
        required: false
    requirements:
    - Drives:
        node: drive:Drive
        capability: drvcps:DriveContainable
        relationship: core:Contains
        count_range:
        - 0
        - UNBOUNDED
        description: >-
          The set of drives attached to the storage controllers represented by this
          resource.
    - Volumes:
        node: Volume
        capability: vlmcps:VolumeContainable
        relationship: core:Contains
        count_range:
        - 0
        - UNBOUNDED
        description: >-
          The set of volumes produced by the storage controllers represented by this
          resource.
    - Redundancy:
        node: rdndncy:Redundancy
        capability: rdndcps:RedundancyContainable
        relationship: core:Contains
        count_range:
        - 0
        - UNBOUNDED
        description: >-
          Redundancy information for the storage subsystem
    capabilities:
      feature:
        type: strgcps:StorageFeature
      containable:
        type: strgcps:StorageContainable
  Links:
    description: >-
      Contains references to other resources that are related to this resource.
    properties:
      Oem:
        type: resource:Oem
        description: >-
          Oem extension object.
        required: false
      Enclosures@odata_count:
        type: odata400:count
        description: >-
          The number of items in a collection.
        required: false
      Enclosures@odata_navigationLink:
        type: string
        required: false
    requirements:
    - Enclosures:
        node: chassis:Chassis
        capability: chssscps:ChassisContainable
        relationship: core:Contains
        count_range:
        - 0
        - UNBOUNDED
        description: >-
          An array of references to the chassis to which this storage subsystem is
          attached
    capabilities:
      containable:
        type: strgcps:LinksContainable
