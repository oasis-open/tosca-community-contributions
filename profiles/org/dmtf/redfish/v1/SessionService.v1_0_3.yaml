tosca_definitions_version: tosca_2_0
description: >-
  Types generated from JSON Schema by any2tosca
imports:
- url: Resource.yaml
  namespace: resource
- url: SessionCollection.yaml
  namespace: sssncllc
- url: Core.yaml
  namespace: core
- url: SessionCollection_caps.yaml
  namespace: ssscllcp
- url: SessionService_caps.yaml
  namespace: ssssrvcp
node_types:
  SessionService:
    description: >-
      This is the schema definition for the Session Service.  It represents the properties
      for the service itself and has links to the actual list of sessions.
    properties:
      Oem:
        type: resource:Oem
        description: >-
          This is the manufacturer/provider specific extension moniker used to divide
          the Oem object into sections.
        required: false
      Id:
        type: resource:Id
        description: >-
          The unique identifier for this resource within the collection of similar
          resources.
        required: true
      Description:
        type: resource:Description
        description: >-
          The description of this resource.  Used for commonality in the schema definitions.
        required: false
      Name:
        type: resource:Name
        description: >-
          The name of the resource or array member.
        required: true
      Status:
        type: resource:Status
        description: >-
          The status and health of a resource and its children.
        required: false
      ServiceEnabled:
        type: boolean
        description: >-
          This indicates whether this service is enabled.
        required: false
      SessionTimeout:
        type: float
        description: >-
          This is the number of seconds of inactivity that a session may have before
          the session service closes the session due to inactivity.
        required: false
        validation:
          $and:
          - $greater_or_equal:
            - $value
            - 30
          - $less_or_equal:
            - $value
            - 86400
    requirements:
    - Sessions:
        node: sssncllc:SessionCollection
        capability: ssscllcp:SessionCollectionContainable
        relationship: core:Contains
        count_range:
        - 0
        - 1
        description: >-
          Link to a collection of Sessions.
    capabilities:
      feature:
        type: ssssrvcp:SessionServiceFeature
      containable:
        type: ssssrvcp:SessionServiceContainable
