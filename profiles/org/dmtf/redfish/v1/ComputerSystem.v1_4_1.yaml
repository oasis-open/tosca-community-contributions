tosca_definitions_version: tosca_2_0
description: >-
  Types generated from JSON Schema by any2tosca
imports:
- url: Resource.yaml
  namespace: resource
- url: HostedStorageServices.yaml
  namespace: hststrsr
- url: odata.4.0.0.yaml
  namespace: odata400
- url: Chassis.yaml
  namespace: chassis
- url: Endpoint.yaml
  namespace: endpoint
- url: ProcessorCollection.yaml
  namespace: prcscllc
- url: EthernetInterfaceCollection.yaml
  namespace: ethintcl
- url: SimpleStorageCollection.yaml
  namespace: smpstrcl
- url: LogServiceCollection.yaml
  namespace: lgsrvcl
- url: SecureBoot.yaml
  namespace: scrbt
- url: Bios.yaml
  namespace: bios
- url: MemoryCollection.yaml
  namespace: mmrycllc
- url: StorageCollection.yaml
  namespace: strgcllc
- url: PCIeDevice.yaml
  namespace: pcdvc
- url: PCIeFunction.yaml
  namespace: pcfnctn
- url: MemoryDomainCollection.yaml
  namespace: mmrdmncl
- url: NetworkInterfaceCollection.yaml
  namespace: ntwintcl
- url: Core.yaml
  namespace: core
- url: ProcessorCollection_caps.yaml
  namespace: prccllcp
- url: EthernetInterfaceCollection_caps.yaml
  namespace: etinclcp
- url: SimpleStorageCollection_caps.yaml
  namespace: smstclcp
- url: LogServiceCollection_caps.yaml
  namespace: lgsrclcp
- url: SecureBoot_caps.yaml
  namespace: scrbtcps
- url: Bios_caps.yaml
  namespace: bioscaps
- url: MemoryCollection_caps.yaml
  namespace: mmrcllcp
- url: StorageCollection_caps.yaml
  namespace: strcllcp
- url: PCIeDevice_caps.yaml
  namespace: pcdvccps
- url: PCIeFunction_caps.yaml
  namespace: pcfnccp
- url: MemoryDomainCollection_caps.yaml
  namespace: mmdmclcp
- url: NetworkInterfaceCollection_caps.yaml
  namespace: ntinclcp
- url: ComputerSystem_caps.yaml
  namespace: cmpsyscp
- url: HostedStorageServices_caps.yaml
  namespace: hsstsrcp
- url: Chassis_caps.yaml
  namespace: chssscps
- url: Manager_caps.yaml
  namespace: mngrcps
- url: Endpoint_caps.yaml
  namespace: endpcps
- url: ResourceBlock_caps.yaml
  namespace: rsrblccp
data_types:
  Reset:
    description: >-
      This action is used to reset the system.
    properties:
      title:
        type: string
        description: >-
          Friendly action name
        required: false
      target:
        type: string
        description: >-
          Link to invoke action
        required: false
  BootSource:
    derived_from: string
    validation:
      $valid_values:
      - $value
      - - None
        - Pxe
        - Floppy
        - Cd
        - Usb
        - Hdd
        - BiosSetup
        - Utilities
        - Diags
        - UefiShell
        - UefiTarget
        - SDCard
        - UefiHttp
        - RemoteDrive
  BootSourceOverrideEnabled:
    derived_from: string
    validation:
      $valid_values:
      - $value
      - - Disabled
        - Once
        - Continuous
  IndicatorLED:
    derived_from: string
    validation:
      $valid_values:
      - $value
      - - Unknown
        - Lit
        - Blinking
        - 'Off'
  PowerState:
    derived_from: string
    validation:
      $valid_values:
      - $value
      - - 'On'
        - 'Off'
        - PoweringOn
        - PoweringOff
  ProcessorSummary:
    description: >-
      This object describes the central processors of the system in general detail.
    properties:
      Count:
        type: float
        description: >-
          The number of processors in the system.
        required: false
        validation:
          $greater_or_equal:
          - $value
          - 0
      Model:
        type: string
        description: >-
          The processor model for the primary or majority of processors in this system.
        required: false
      Status:
        type: resource:Status
        description: >-
          The status and health of a resource and its children.
        required: false
  SystemType:
    derived_from: string
    validation:
      $valid_values:
      - $value
      - - Physical
        - Virtual
        - OS
        - PhysicallyPartitioned
        - VirtuallyPartitioned
        - Composed
  Boot:
    description: >-
      This object contains the boot information for the current resource.
    properties:
      BootSourceOverrideTarget:
        type: BootSource
        description: >-
          The current boot source to be used at next boot instead of the normal boot
          device, if BootSourceOverrideEnabled is true.
        required: false
      BootSourceOverrideEnabled:
        type: BootSourceOverrideEnabled
        description: >-
          Describes the state of the Boot Source Override feature.
        required: false
      UefiTargetBootSourceOverride:
        type: string
        description: >-
          This property is the UEFI Device Path of the device to boot from when BootSourceOverrideSupported
          is UefiTarget.
        required: false
      BootSourceOverrideMode:
        type: BootSourceOverrideMode
        description: >-
          The BIOS Boot Mode (either Legacy or UEFI) to be used when BootSourceOverrideTarget
          boot source is booted from.
        required: false
  BootSourceOverrideMode:
    derived_from: string
    validation:
      $valid_values:
      - $value
      - - Legacy
        - UEFI
  InterfaceType:
    derived_from: string
    validation:
      $valid_values:
      - $value
      - - TPM1_2
        - TPM2_0
        - TCM1_0
  MemoryMirroring:
    derived_from: string
    validation:
      $valid_values:
      - $value
      - - System
        - DIMM
        - Hybrid
        - None
  HostingRole:
    description: >-
      The enumerations of HostingRoles specify different features that the hosting
      ComputerSystem supports.
    derived_from: string
    validation:
      $valid_values:
      - $value
      - - ApplicationServer
        - StorageServer
        - Switch
  InterfaceTypeSelection:
    description: >-
      The enumerations of InterfaceTypeSelection specify the method for switching
      the TrustedModule InterfaceType, for instance between TPM1_2 and TPM2_0, if
      supported.
    derived_from: string
    validation:
      $valid_values:
      - $value
      - - None
        - FirmwareUpdate
        - BiosSetting
        - OemMethod
  TrustedModules:
    description: >-
      This object describes the inventory of a Trusted Modules installed in the system.
    properties:
      FirmwareVersion:
        type: string
        description: >-
          The firmware version of this Trusted Module.
        required: false
      InterfaceType:
        type: InterfaceType
        description: >-
          This property indicates the interface type of the Trusted Module.
        required: false
      Status:
        type: resource:Status
        description: >-
          The status and health of a resource and its children.
        required: false
      Oem:
        type: resource:Oem
        description: >-
          The OEM extension.
        required: false
      FirmwareVersion2:
        type: string
        description: >-
          The 2nd firmware version of this Trusted Module, if applicable.
        required: false
      InterfaceTypeSelection:
        type: InterfaceTypeSelection
        description: >-
          The Interface Type selection supported by this Trusted Module.
        required: false
  MemorySummary:
    description: >-
      This object describes the memory of the system in general detail.
    properties:
      TotalSystemMemoryGiB:
        type: float
        description: >-
          The total configured operating system-accessible memory (RAM), measured
          in GiB.
        required: false
        validation:
          $greater_or_equal:
          - $value
          - 0
      Status:
        type: resource:Status
        description: >-
          The status and health of a resource and its children.
        required: false
      MemoryMirroring:
        type: MemoryMirroring
        description: >-
          The ability and type of memory mirroring supported by this system.
        required: false
      TotalSystemPersistentMemoryGiB:
        type: float
        description: >-
          The total configured, system-accessible persistent memory, measured in GiB.
        required: false
        validation:
          $greater_or_equal:
          - $value
          - 0
  Actions:
    description: >-
      The available actions for this resource.
    properties:
      Oem:
        type: map
        description: >-
          The available OEM specific actions for this resource.
        required: false
      '#ComputerSystem_Reset':
        type: Reset
        description: >-
          This action is used to reset the system.
        required: false
node_types:
  ComputerSystem:
    description: >-
      This schema defines a computer system and its respective properties.  A computer
      system represents a machine (physical or virtual) and the local resources such
      as memory, cpu and other devices that can be accessed from that machine.
    properties:
      Oem:
        type: resource:Oem
        description: >-
          This is the manufacturer/provider specific extension moniker used to divide
          the Oem object into sections.
        required: false
      Id:
        type: resource:Id
        description: >-
          The unique identifier for this resource within the collection of similar
          resources.
        required: true
      Description:
        type: resource:Description
        description: >-
          The description of this resource.  Used for commonality in the schema definitions.
        required: false
      Name:
        type: resource:Name
        description: >-
          The name of the resource or array member.
        required: true
      SystemType:
        type: SystemType
        description: >-
          The type of computer system represented by this resource.
        required: false
      Links:
        type: Links
        description: >-
          Contains references to other resources that are related to this resource.
        required: false
      AssetTag:
        type: string
        description: >-
          The user definable tag that can be used to track this computer system for
          inventory or other client purposes.
        required: false
      Manufacturer:
        type: string
        description: >-
          The manufacturer or OEM of this system.
        required: false
      Model:
        type: string
        description: >-
          The model number for this system.
        required: false
      SKU:
        type: string
        description: >-
          The manufacturer SKU for this system.
        required: false
      SerialNumber:
        type: string
        description: >-
          The serial number for this system.
        required: false
      PartNumber:
        type: string
        description: >-
          The part number for this system.
        required: false
      UUID:
        type: resource:UUID
        description: >-
          The universal unique identifier (UUID) for this system.
        required: false
      HostName:
        type: string
        description: >-
          The DNS Host Name, without any domain information.
        required: false
      IndicatorLED:
        type: IndicatorLED
        description: >-
          The state of the indicator LED, used to identify the system.
        required: false
      PowerState:
        type: PowerState
        description: >-
          This is the current power state of the system.
        required: false
      Boot:
        type: Boot
        description: >-
          Information about the boot settings for this system.
        required: false
      BiosVersion:
        type: string
        description: >-
          The version of the system BIOS or primary system firmware.
        required: false
      ProcessorSummary:
        type: ProcessorSummary
        description: >-
          This object describes the central processors of the system in general detail.
        required: false
      MemorySummary:
        type: MemorySummary
        description: >-
          This object describes the central memory of the system in general detail.
        required: false
      Actions:
        type: Actions
        description: >-
          The available actions for this resource.
        required: false
      Status:
        type: resource:Status
        description: >-
          The status and health of a resource and its children.
        required: false
      TrustedModules:
        type: list
        description: >-
          This object describes the array of Trusted Modules in the system.
        required: false
        entry_schema:
          type: TrustedModules
      HostingRoles:
        type: list
        description: >-
          The hosing roles that this computer system supports.
        required: false
        entry_schema:
          type: HostingRole
      HostedServices:
        type: HostedServices
        description: >-
          The services that this computer system supports.
        required: false
      PCIeDevices@odata_count:
        type: odata400:count
        description: >-
          The number of items in a collection.
        required: false
      PCIeDevices@odata_navigationLink:
        type: string
        required: false
      PCIeFunctions@odata_count:
        type: odata400:count
        description: >-
          The number of items in a collection.
        required: false
      PCIeFunctions@odata_navigationLink:
        type: string
        required: false
    requirements:
    - Processors:
        node: prcscllc:ProcessorCollection
        capability: prccllcp:ProcessorCollectionContainable
        relationship: core:Contains
        count_range:
        - 0
        - 1
        description: >-
          A reference to the collection of Processors associated with this system.
    - EthernetInterfaces:
        node: ethintcl:EthernetInterfaceCollection
        capability: etinclcp:EthernetInterfaceCollectionContainable
        relationship: core:Contains
        count_range:
        - 0
        - 1
        description: >-
          A reference to the collection of Ethernet interfaces associated with this
          system.
    - SimpleStorage:
        node: smpstrcl:SimpleStorageCollection
        capability: smstclcp:SimpleStorageCollectionContainable
        relationship: core:Contains
        count_range:
        - 0
        - 1
        description: >-
          A reference to the collection of storage devices associated with this system.
    - LogServices:
        node: lgsrvcl:LogServiceCollection
        capability: lgsrclcp:LogServiceCollectionContainable
        relationship: core:Contains
        count_range:
        - 0
        - 1
        description: >-
          A reference to the collection of Log Services associated with this system.
    - SecureBoot:
        node: scrbt:SecureBoot
        capability: scrbtcps:SecureBootContainable
        relationship: core:Contains
        count_range:
        - 0
        - 1
        description: >-
          A reference to the UEFI SecureBoot resource associated with this system.
    - Bios:
        node: bios:Bios
        capability: bioscaps:BiosContainable
        relationship: core:Contains
        count_range:
        - 0
        - 1
        description: >-
          A reference to the BIOS settings associated with this system.
    - Memory:
        node: mmrycllc:MemoryCollection
        capability: mmrcllcp:MemoryCollectionContainable
        relationship: core:Contains
        count_range:
        - 0
        - 1
        description: >-
          A reference to the collection of Memory associated with this system.
    - Storage:
        node: strgcllc:StorageCollection
        capability: strcllcp:StorageCollectionContainable
        relationship: core:Contains
        count_range:
        - 0
        - 1
        description: >-
          A reference to the collection of storage devices associated with this system.
    - PCIeDevices:
        node: pcdvc:PCIeDevice
        capability: pcdvccps:PCIeDeviceContainable
        relationship: core:Contains
        count_range:
        - 0
        - UNBOUNDED
        description: >-
          A reference to a collection of PCIe Devices used by this computer system.
    - PCIeFunctions:
        node: pcfnctn:PCIeFunction
        capability: pcfnccp:PCIeFunctionContainable
        relationship: core:Contains
        count_range:
        - 0
        - UNBOUNDED
        description: >-
          A reference to a collection of PCIe Functions used by this computer system.
    - MemoryDomains:
        node: mmrdmncl:MemoryDomainCollection
        capability: mmdmclcp:MemoryDomainCollectionContainable
        relationship: core:Contains
        count_range:
        - 0
        - 1
        description: >-
          A reference to the collection of Memory Domains associated with this system.
    - NetworkInterfaces:
        node: ntwintcl:NetworkInterfaceCollection
        capability: ntinclcp:NetworkInterfaceCollectionContainable
        relationship: core:Contains
        count_range:
        - 0
        - 1
        description: >-
          A reference to the collection of Network Interfaces associated with this
          system.
    capabilities:
      feature:
        type: cmpsyscp:ComputerSystemFeature
      containable:
        type: cmpsyscp:ComputerSystemContainable
  HostedServices:
    description: >-
      This object describes services that may be running or installed on the system.
    properties:
      Oem:
        type: resource:Oem
        description: >-
          The OEM extension.
        required: false
    requirements:
    - StorageServices:
        node: hststrsr:HostedStorageServices
        capability: hsstsrcp:HostedStorageServicesContainable
        relationship: core:Contains
        count_range:
        - 0
        - 1
        description: >-
          A reference to a collection of storage services supported by this computer
          system.
    capabilities:
      containable:
        type: cmpsyscp:HostedServicesContainable
  Links:
    description: >-
      Contains references to other resources that are related to this resource.
    properties:
      Oem:
        type: resource:Oem
        description: >-
          Oem extension object.
        required: false
      Chassis@odata_count:
        type: odata400:count
        description: >-
          The number of items in a collection.
        required: false
      Chassis@odata_navigationLink:
        type: string
        required: false
      ManagedBy@odata_count:
        type: odata400:count
        description: >-
          The number of items in a collection.
        required: false
      ManagedBy@odata_navigationLink:
        type: string
        required: false
      PoweredBy@odata_count:
        type: odata400:count
        description: >-
          The number of items in a collection.
        required: false
      PoweredBy@odata_navigationLink:
        type: string
        required: false
      PoweredBy:
        type: list
        description: >-
          An array of ID[s] of resources that power this computer system. Normally
          the ID will be a chassis or a specific set of Power Supplies.
        required: false
        entry_schema:
          type: odata400:idRef
      CooledBy@odata_count:
        type: odata400:count
        description: >-
          The number of items in a collection.
        required: false
      CooledBy@odata_navigationLink:
        type: string
        required: false
      CooledBy:
        type: list
        description: >-
          An array of ID[s] of resources that cool this computer system. Normally
          the ID will be a chassis or a specific set of fans.
        required: false
        entry_schema:
          type: odata400:idRef
      Endpoints@odata_count:
        type: odata400:count
        description: >-
          The number of items in a collection.
        required: false
      Endpoints@odata_navigationLink:
        type: string
        required: false
      ResourceBlocks@odata_count:
        type: odata400:count
        description: >-
          The number of items in a collection.
        required: false
      ResourceBlocks@odata_navigationLink:
        type: string
        required: false
    requirements:
    - Chassis:
        node: chassis:Chassis
        capability: chssscps:ChassisContainable
        relationship: core:Contains
        count_range:
        - 0
        - UNBOUNDED
        description: >-
          An array of references to the chassis in which this system is contained.
    - ManagedBy:
        node: Manager
        capability: mngrcps:ManagerContainable
        relationship: core:Contains
        count_range:
        - 0
        - UNBOUNDED
        description: >-
          An array of references to the Managers responsible for this system.
    - Endpoints:
        node: endpoint:Endpoint
        capability: endpcps:EndpointContainable
        relationship: core:Contains
        count_range:
        - 0
        - UNBOUNDED
        description: >-
          An array of references to the endpoints that connect to this system.
    - ResourceBlocks:
        node: ResourceBlock
        capability: rsrblccp:ResourceBlockContainable
        relationship: core:Contains
        count_range:
        - 0
        - UNBOUNDED
        description: >-
          An array of references to the Resource Blocks that are used in this Computer
          System.
    capabilities:
      containable:
        type: cmpsyscp:LinksContainable
