tosca_definitions_version: tosca_2_0
description: >-
  Types generated from JSON Schema by any2tosca
imports:
- url: Resource.yaml
  namespace: resource
- url: Sensor.yaml
  namespace: sensor
- url: odata-v4.yaml
  namespace: odatav4
- url: Core.yaml
  namespace: core
- url: HeaterMetrics_caps.yaml
  namespace: htrmtrcp
interface_types:
  HeaterMetricsActions:
    operations:
      ResetMetrics:
        description: >-
          This action resets the summary metrics related to this equipment.
node_types:
  HeaterMetrics:
    description: >-
      The `HeaterMetrics` schema contains definitions for the metrics of a heater.
    properties:
      Description:
        type: resource:Description
        description: >-
          The description of this resource.  Used for commonality in the schema definitions.
        required: false
      Id:
        type: resource:Id
        description: >-
          The unique identifier for this resource within the collection of similar
          resources.
        required: true
      Name:
        type: resource:Name
        description: >-
          The name of the resource or array member.
        required: true
      Oem:
        type: resource:Oem
        description: >-
          The OEM extension property.
        required: false
      PowerWatts:
        type: sensor:SensorPowerExcerpt
        description: >-
          Power consumption (W).
        required: false
      PrePowerOnHeatingTimeSeconds:
        type: integer
        description: >-
          The total number of seconds the heater was active while the device it heats
          was powered off.
        required: false
      RuntimeHeatingTimeSeconds:
        type: integer
        description: >-
          The total number of seconds the heater was active while the device it heats
          was powered on.
        required: false
      TemperatureReadingsCelsius:
        type: list
        description: >-
          The temperatures (in degree Celsius units) from all related sensors for
          this device.
        required: false
        entry_schema:
          type: sensor:SensorArrayExcerpt
      TemperatureReadingsCelsius@odata_count:
        type: odatav4:count
        description: >-
          The number of items in a collection.
        required: false
    interfaces:
      Actions:
        type: HeaterMetricsActions
    capabilities:
      feature:
        type: htrmtrcp:HeaterMetricsFeature
      containable:
        type: htrmtrcp:HeaterMetricsContainable
