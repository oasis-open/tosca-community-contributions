node_types:
  MemoryDomain:
    description: >-
      The `MemoryDomain` schema describes a memory domain and its configuration.  Memory
      domains indicate to the client which memory, or DIMMs, can be grouped together
      in memory chunks to represent addressable memory.
    properties:
      AllowsBlockProvisioning:
        type: boolean
        description: >-
          An indication of whether this memory domain supports the provisioning of
          blocks of memory.
        required: false
      AllowsMemoryChunkCreation:
        type: boolean
        description: >-
          An indication of whether this memory domain supports the creation of memory
          chunks.
        required: false
      AllowsMirroring:
        type: boolean
        description: >-
          An indication of whether this memory domain supports the creation of memory
          chunks with mirroring enabled.
        required: false
      AllowsSparing:
        type: boolean
        description: >-
          An indication of whether this memory domain supports the creation of memory
          chunks with sparing enabled.
        required: false
      Description:
        type: resource:Description
