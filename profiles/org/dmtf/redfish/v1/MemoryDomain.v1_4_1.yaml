        description: >-
          The unique identifier for this resource within the collection of similar
          resources.
        required: true
      InterleavableMemorySets:
        type: list
        description: >-
          The interleave sets for the memory chunk.
        required: false
        entry_schema:
          type: MemorySet
      Name:
        type: resource:Name
        description: >-
          The name of the resource or array member.
        required: true
      Oem:
        type: resource:Oem
        description: >-
          The OEM extension property.
        required: false
