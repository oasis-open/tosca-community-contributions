tosca_definitions_version: tosca_2_0
description: >-
  Types generated from JSON Schema by any2tosca
imports:
- url: CertificateCollection.yaml
  namespace: crtfcllc
- url: Resource.yaml
  namespace: resource
- url: SignatureCollection.yaml
  namespace: sgntcllc
- url: Core.yaml
  namespace: core
- url: CertificateCollection_caps.yaml
  namespace: crtcllcp
- url: SignatureCollection_caps.yaml
  namespace: sgncllcp
- url: SecureBootDatabase_caps.yaml
  namespace: scbtdtcp
data_types:
  ResetKeysType:
    derived_from: string
    validation:
      $valid_values:
      - $value
      - - ResetAllKeysToDefault
        - DeleteAllKeys
interface_types:
  SecureBootDatabaseActions:
    operations:
      ResetKeys:
        description: >-
          This action is used to reset the UEFI Secure Boot keys of this database.
        inputs:
          ResetKeysType:
            type: ResetKeysType
            description: >-
              The type of reset or delete to perform on this UEFI Secure Boot database.
            required: true
node_types:
  SecureBootDatabase:
    description: >-
      The SecureBootDatabase schema describes a UEFI Secure Boot database used to
      store certificates or hashes.
    properties:
      DatabaseId:
        type: string
        description: >-
          This property contains the name of the UEFI Secure Boot database.
        required: false
      Description:
        type: resource:Description
        description: >-
          The description of this resource.  Used for commonality in the schema definitions.
        required: false
      Id:
        type: resource:Id
        description: >-
          The unique identifier for this resource within the collection of similar
          resources.
        required: true
      Name:
        type: resource:Name
        description: >-
          The name of the resource or array member.
        required: true
      Oem:
        type: resource:Oem
        description: >-
          The OEM extension property.
        required: false
    requirements:
    - Certificates:
        node: crtfcllc:CertificateCollection
        capability: crtcllcp:CertificateCollectionContainable
        relationship: core:Contains
        count_range:
        - 0
        - 1
        description: >-
          A link to the collection of certificates contained in this UEFI Secure Boot
          database.
    - Signatures:
        node: sgntcllc:SignatureCollection
        capability: sgncllcp:SignatureCollectionContainable
        relationship: core:Contains
        count_range:
        - 0
        - 1
        description: >-
          A link to the collection of signatures contained in this UEFI Secure Boot
          database.
    interfaces:
      Actions:
        type: SecureBootDatabaseActions
    capabilities:
      feature:
        type: scbtdtcp:SecureBootDatabaseFeature
      containable:
        type: scbtdtcp:SecureBootDatabaseContainable
