- url: PhysicalContext_caps.yaml
  namespace: phycntcp
data_types:
  AssemblyDataActions:
    description: >-
      The available actions for this resource.
    properties:
      Oem:
        type: AssemblyDataOemActions
        description: >-
          The available OEM-specific actions for this resource.
        required: false
  AssemblyDataOemActions:
    description: >-
      The available OEM-specific actions for this resource.
node_types:
  Assembly:
    description: >-
      The `Assembly` schema defines an assembly.  Assembly information contains details
      about a device, such as part number, serial number, manufacturer, and production
      date.  It also provides access to the original data for the assembly.
    properties:
      Assemblies:
        type: list
        description: >-
          The assembly records.
        required: false
        entry_schema:
          type: AssemblyData
      Assemblies@odata_count:
        type: odatav4:count
        description: >-
          The number of items in a collection.
        required: false
      Description:
        type: resource:Description
        description: >-
          The description of this resource.  Used for commonality in the schema definitions.
        required: false
      Id:
        type: resource:Id
        description: >-
          The unique identifier for this resource within the collection of similar
          resources.
        required: true
      Name:
        type: resource:Name
        description: >-
          The name of the resource or array member.
        required: true
      Oem:
        type: resource:Oem
        description: >-
          The OEM extension property.
        required: false
    capabilities:
      feature:
        type: assmcps:AssemblyFeature
      containable:
        type: assmcps:AssemblyContainable
  AssemblyData:
    properties:
      Actions:
        type: AssemblyDataActions
        description: >-
          The available actions for this resource.
        required: false
      BinaryDataURI:
        type: string
        description: >-
          The URI at which to access an image of the assembly information.
        required: false
      Description:
        type: string
        description: >-
          The description of the assembly.
        required: false
      EngineeringChangeLevel:
        type: string
        description: >-
          The engineering change level of the assembly.
        required: false
      ISOCountryCodeOfOrigin:
        type: string
        description: >-
          The manufacturing country of origin, using the ISO 3166-1 country code.
        required: false
        validation:
          $matches:
          - $value
          - ^([A-Z]{2}|[A-Z]{3})$
      Location:
        type: resource:Location
        description: >-
          The location of the assembly.
        required: false
      LocationIndicatorActive:
        type: boolean
        description: >-
          An indicator allowing an operator to physically locate this resource.
        required: false
      MemberId:
        type: string
        description: >-
          The unique identifier for the member within an array.
        required: true
      Model:
        type: string
        description: >-
          The model number of the assembly.
        required: false
      Name:
        type: string
        description: >-
          The name of the assembly.
        required: false
      Oem:
        type: resource:Oem
        description: >-
          The OEM extension property.
        required: false
      PartNumber:
        type: string
        description: >-
          The part number of the assembly.
        required: false
      Producer:
        type: string
        description: >-
          The producer or manufacturer of the assembly.
        required: false
      ProductionDate:
        type: string
        description: >-
          The production date of the assembly.
        required: false
      ReadyToRemove:
        type: boolean
        description: >-
          An indication of whether the assembly is prepared by the system for removal.
        required: false
      Replaceable:
        type: boolean
        description: >-
          An indication of whether the component associated this assembly can be independently
          replaced as allowed by the vendor's replacement policy.
        required: false
      SKU:
        type: string
        description: >-
          The SKU of the assembly.
        required: false
      SerialNumber:
        type: string
        description: >-
          The serial number of the assembly.
        required: false
      SparePartNumber:
        type: string
        description: >-
          The spare part number of the assembly.
        required: false
      Status:
        type: resource:Status
        description: >-
