tosca_definitions_version: tosca_2_0
description: >-
  Types generated from JSON Schema by any2tosca
imports:
- url: Resource.yaml
  namespace: resource
- url: Core.yaml
  namespace: core
- url: ManagerNetworkProtocol_caps.yaml
  namespace: mnntprcp
data_types:
  NotifyIPv6Scope:
    derived_from: string
    validation:
      $valid_values:
      - $value
      - - Link
        - Site
        - Organization
  Protocol:
    properties:
      ProtocolEnabled:
        type: boolean
        description: >-
          Indicates if the protocol is enabled or disabled.
        required: false
      Port:
        type: float
        description: >-
          Indicates the protocol port.
        required: false
        validation:
          $greater_or_equal:
          - $value
          - 0
  SSDProtocol:
    properties:
      ProtocolEnabled:
        type: boolean
        description: >-
          Indicates if the protocol is enabled or disabled.
        required: false
      Port:
        type: float
        description: >-
          Indicates the protocol port.
        required: false
        validation:
          $greater_or_equal:
          - $value
          - 0
      NotifyMulticastIntervalSeconds:
        type: float
        description: >-
          Indicates how often the Multicast is done from this service for SSDP.
        required: false
        validation:
          $greater_or_equal:
          - $value
          - 0
      NotifyTTL:
        type: float
        description: >-
          Indicates the time to live hop count for SSDPs Notify messages.
        required: false
        validation:
          $greater_or_equal:
          - $value
          - 1
      NotifyIPv6Scope:
        type: NotifyIPv6Scope
        description: >-
          Indicates the scope for the IPv6 Notify messages for SSDP.
        required: false
node_types:
  ManagerNetworkProtocol:
    description: >-
      This resource is used to obtain or modify the network services managed by a
      given manager.
    properties:
      Oem:
        type: resource:Oem
        description: >-
          This is the manufacturer/provider specific extension moniker used to divide
          the Oem object into sections.
        required: false
      Id:
        type: resource:Id
        description: >-
          The unique identifier for this resource within the collection of similar
          resources.
        required: true
      Description:
        type: resource:Description
        description: >-
          The description of this resource.  Used for commonality in the schema definitions.
        required: false
      Name:
        type: resource:Name
        description: >-
          The name of the resource or array member.
        required: true
      HostName:
        type: string
        description: >-
          The DNS Host Name of this manager, without any domain information.
        required: false
      FQDN:
        type: string
        description: >-
          This is the fully qualified domain name for the manager obtained by DNS
          including the host name and top-level domain name.
        required: false
      HTTP:
        type: Protocol
        description: >-
          Settings for this Manager's HTTP protocol support.
        required: false
      HTTPS:
        type: Protocol
        description: >-
          Settings for this Manager's HTTPS protocol support.
        required: false
      SNMP:
        type: Protocol
        description: >-
          Settings for this Manager's SNMP support.
        required: false
      VirtualMedia:
        type: Protocol
        description: >-
          Settings for this Manager's Virtual Media support.
        required: false
      Telnet:
        type: Protocol
        description: >-
          Settings for this Manager's Telnet protocol support.
        required: false
      SSDP:
        type: SSDProtocol
        description: >-
          Settings for this Manager's SSDP support.
        required: false
      IPMI:
        type: Protocol
        description: >-
          Settings for this Manager's IPMI-over-LAN protocol support.
        required: false
      SSH:
        type: Protocol
        description: >-
          Settings for this Manager's SSH (Secure Shell) protocol support.
        required: false
      KVMIP:
        type: Protocol
        description: >-
          Settings for this Manager's KVM-IP protocol support.
        required: false
      Status:
        type: resource:Status
        description: >-
          The status and health of a resource and its children.
        required: false
      DHCP:
        type: Protocol
        description: >-
          Settings for this Manager's DHCP protocol support.
        required: false
    capabilities:
      feature:
        type: mnntprcp:ManagerNetworkProtocolFeature
      containable:
        type: mnntprcp:ManagerNetworkProtocolContainable
