tosca_definitions_version: tosca_2_0
description: >-
  Types generated from JSON Schema by any2tosca
imports:
- url: Resource.yaml
  namespace: resource
- url: odata.4.0.0.yaml
  namespace: odata400
- url: Endpoint.yaml
  namespace: endpoint
- url: Switch.yaml
  namespace: switch
- url: Core.yaml
  namespace: core
- url: Zone_caps.yaml
  namespace: zonecaps
- url: Endpoint_caps.yaml
  namespace: endpcps
- url: Switch_caps.yaml
  namespace: swtchcps
node_types:
  Zone:
    description: >-
      Switch contains properties describing a simple fabric zone.
    properties:
      Oem:
        type: resource:Oem
        description: >-
          This is the manufacturer/provider specific extension moniker used to divide
          the Oem object into sections.
        required: false
      Id:
        type: resource:Id
        description: >-
          The unique identifier for this resource within the collection of similar
          resources.
        required: true
      Description:
        type: resource:Description
        description: >-
          The description of this resource.  Used for commonality in the schema definitions.
        required: false
      Name:
        type: resource:Name
        description: >-
          The name of the resource or array member.
        required: true
      Status:
        type: resource:Status
        description: >-
          The status and health of a resource and its children.
        required: false
      Links:
        type: Links
        description: >-
          Contains references to other resources that are related to this resource.
        required: false
    capabilities:
      feature:
        type: zonecaps:ZoneFeature
      containable:
        type: zonecaps:ZoneContainable
  Links:
    description: >-
      Contains references to other resources that are related to this resource.
    properties:
      Oem:
        type: resource:Oem
        description: >-
          Oem extension object.
        required: false
      Endpoints@odata_count:
        type: odata400:count
        description: >-
          The number of items in a collection.
        required: false
      Endpoints@odata_navigationLink:
        type: string
        required: false
      InvolvedSwitches@odata_count:
        type: odata400:count
        description: >-
          The number of items in a collection.
        required: false
      InvolvedSwitches@odata_navigationLink:
        type: string
        required: false
    requirements:
    - Endpoints:
        node: endpoint:Endpoint
        capability: endpcps:EndpointContainable
        relationship: core:Contains
        count_range:
        - 0
        - UNBOUNDED
        description: >-
          An array of references to the endpoints that are contained in this zone.
    - InvolvedSwitches:
        node: switch:Switch
        capability: swtchcps:SwitchContainable
        relationship: core:Contains
        count_range:
        - 0
        - UNBOUNDED
        description: >-
          An array of references to the switchs that are utilized in this zone.
    capabilities:
      containable:
        type: zonecaps:LinksContainable
