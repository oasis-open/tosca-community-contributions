data_types:
  CompositionState:
    derived_from: string
    validation:
      $valid_values:
      - $value
      - - Composing
        - ComposedAndAvailable
        - Composed
        - Unused
        - Failed
        - Unavailable
  CompositionStatus:
    description: >-
      Composition status of the resource block.
    properties:
      CompositionState:
        type: CompositionState
        description: >-
          The current state of the resource block from a composition perspective.
        required: true
      MaxCompositions:
        type: integer
        description: >-
          The maximum number of compositions in which this resource block can participate
          simultaneously.
        required: false
        validation:
          $greater_or_equal:
          - $value
          - 1
      NumberOfCompositions:
        type: integer
        description: >-
          The number of compositions in which this resource block is currently participating.
        required: false
        validation:
          $greater_or_equal:
          - $value
          - 0
      Reserved:
        type: boolean
        description: >-
          An indication of whether any client has reserved the resource block.
        required: false
      SharingCapable:
        type: boolean
        description: >-
          An indication of whether this resource block can participate in multiple
          compositions simultaneously.
        required: false
      SharingEnabled:
        type: boolean
        description: >-
          An indication of whether this resource block is allowed to participate in
          multiple compositions simultaneously.
        required: false
  PoolType:
    derived_from: string
    validation:
      $valid_values:
      - $value
      - - Free
        - Active
        - Unassigned
  ResourceBlockLimits:
    description: >-
      This type specifies the allowable quantities of types of resource blocks for
      a composition request.
    properties:
      MaxCompute:
        type: integer
        description: >-
          The maximum number of resource blocks of type `Compute` allowed for the
          composition request.
        required: false
        validation:
          $greater_or_equal:
          - $value
          - 1
      MaxComputerSystem:
        type: integer
        description: >-
          The maximum number of resource blocks of type `ComputerSystem` allowed for
          the composition request.
        required: false
        validation:
          $greater_or_equal:
          - $value
          - 1
      MaxExpansion:
        type: integer
        description: >-
          The maximum number of resource blocks of type `Expansion` allowed for the
          composition request.
        required: false
        validation:
          $greater_or_equal:
          - $value
          - 1
      MaxMemory:
        type: integer
        description: >-
          The maximum number of resource blocks of type `Memory` allowed for the composition
          request.
        required: false
        validation:
          $greater_or_equal:
          - $value
          - 1
      MaxNetwork:
        type: integer
        description: >-
          The maximum number of resource blocks of type `Network` allowed for the
          composition request.
        required: false
        validation:
          $greater_or_equal:
          - $value
          - 1
      MaxProcessor:
        type: integer
        description: >-
          The maximum number of resource blocks of type `Processor` allowed for the
          composition request.
        required: false
        validation:
          $greater_or_equal:
          - $value
          - 1
      MaxStorage:
        type: integer
        description: >-
          The maximum number of resource blocks of type `Storage` allowed for the
          composition request.
        required: false
        validation:
          $greater_or_equal:
          - $value
          - 1
      MinCompute:
        type: integer
        description: >-
          The minimum number of resource blocks of type `Compute` required for the
          composition request.
        required: false
        validation:
          $greater_or_equal:
          - $value
          - 0
      MinComputerSystem:
        type: integer
        description: >-
          The minimum number of resource blocks of type `ComputerSystem` required
          for the composition request.
        required: false
        validation:
          $greater_or_equal:
          - $value
          - 0
      MinExpansion:
        type: integer
        description: >-
          The minimum number of resource blocks of type `Expansion` required for the
          composition request.
        required: false
        validation:
          $greater_or_equal:
          - $value
          - 0
      MinMemory:
        type: integer
        description: >-
          The minimum number of resource blocks of type `Memory` required for the
          composition request.
        required: false
        validation:
          $greater_or_equal:
          - $value
          - 0
      MinNetwork:
        type: integer
        description: >-
          The minimum number of resource blocks of type `Network` required for the
          composition request.
        required: false
        validation:
          $greater_or_equal:
          - $value
          - 0
      MinProcessor:
        type: integer
        description: >-
          The minimum number of resource blocks of type `Processor` required for the
          composition request.
        required: false
        validation:
          $greater_or_equal:
          - $value
          - 0
      MinStorage:
        type: integer
        description: >-
          The minimum number of resource blocks of type `Storage` required for the
          composition request.
        required: false
        validation:
          $greater_or_equal:
          - $value
          - 0
  ResourceBlockType:
    derived_from: string
    validation:
      $valid_values:
      - $value
      - - Compute
        - Processor
        - Memory
        - Network
        - Storage
        - ComputerSystem
        - Expansion
        - IndependentResource
relationship_types:
