      ComputerSystems@odata_count:
        type: odatav4:count
        description: >-
          The number of items in a collection.
        required: false
      ConsumingResourceBlocks@odata_count:
        type: odatav4:count
        description: >-
          The number of items in a collection.
        required: false
      Oem:
        type: resource:Oem
        description: >-
          The OEM extension property.
        required: false
      SupplyingResourceBlocks@odata_count:
        type: odatav4:count
        description: >-
          The number of items in a collection.
        required: false
      Zones@odata_count:
        type: odatav4:count
        description: >-
          The number of items in a collection.
        required: false
node_types:
  ResourceBlock:
    description: >-
      The ResourceBlock schema contains definitions of a resource block, its components,
      and affinity to composed devices.
    properties:
      Client:
        type: string
        description: >-
          The client to which this resource block is assigned.
        required: false
      CompositionStatus:
        type: CompositionStatus
        description: >-
          The composition status details for this resource block.
        required: true
      ComputerSystems@odata_count:
        type: odatav4:count
        description: >-
          The number of items in a collection.
        required: false
      Description:
        type: resource:Description
        description: >-
          The description of this resource.  Used for commonality in the schema definitions.
        required: false
      Drives@odata_count:
        type: odatav4:count
        description: >-
          The number of items in a collection.
        required: false
      EthernetInterfaces@odata_count:
        type: odatav4:count
        description: >-
          The number of items in a collection.
        required: false
      Id:
        type: resource:Id
        description: >-
          The unique identifier for this resource within the collection of similar
          resources.
        required: true
      Memory@odata_count:
        type: odatav4:count
        description: >-
          The number of items in a collection.
        required: false
      Name:
        type: resource:Name
        description: >-
          The name of the resource or array member.
        required: true
      NetworkInterfaces@odata_count:
        type: odatav4:count
        description: >-
          The number of items in a collection.
        required: false
      Oem:
        type: resource:Oem
        description: >-
          The OEM extension property.
        required: false
      Pool:
        type: PoolType
        description: >-
          The pool to which this resource block belongs.
        required: false
      Processors@odata_count:
        type: odatav4:count
        description: >-
          The number of items in a collection.
        required: false
      ResourceBlockType:
        type: list
        description: >-
          The types of resources available on this resource block.
        required: true
        entry_schema:
          type: ResourceBlockType
      SimpleStorage@odata_count:
        type: odatav4:count
        description: >-
          The number of items in a collection.
        required: false
      Status:
        type: resource:Status
        description: >-
          The status and health of the resource and its subordinate or dependent resources.
        required: false
      Storage@odata_count:
        type: odatav4:count
        description: >-
          The number of items in a collection.
        required: false
    requirements:
    - ComputerSystems:
        node: cmptsyst:ComputerSystem
        capability: cmpsyscp:ComputerSystemContainable
        relationship: core:Contains
        count_range:
        - 0
        - UNBOUNDED
        description: >-
          An array of links to the computer systems available in this resource block.
    - Drives:
        node: drive:Drive
        capability: drvcps:DriveContainable
        relationship: core:Contains
        count_range:
        - 0
        - UNBOUNDED
        description: >-
          An array of links to the drives available in this resource block.
    - EthernetInterfaces:
        node: ethrintr:EthernetInterface
        capability: ethintcp:EthernetInterfaceContainable
        relationship: core:Contains
        count_range:
        - 0
        - UNBOUNDED
        description: >-
          An array of links to the Ethernet interfaces available in this resource
          block.
    - Memory:
        node: memory:Memory
        capability: mmrycps:MemoryContainable
        relationship: core:Contains
        count_range:
        - 0
        - UNBOUNDED
        description: >-
          An array of links to the memory available in this resource block.
    - NetworkInterfaces:
        node: ntwrintr:NetworkInterface
        capability: ntwintcp:NetworkInterfaceContainable
        relationship: core:Contains
        count_range:
        - 0
        - UNBOUNDED
        description: >-
          An array of links to the Network Interfaces available in this resource block.
    - Processors:
        node: prcssr:Processor
        capability: prcscps:ProcessorContainable
        relationship: core:Contains
        count_range:
        - 0
        - UNBOUNDED
        description: >-
          An array of links to the processors available in this resource block.
    - SimpleStorage:
        node: smplstrg:SimpleStorage
        capability: smpstrcp:SimpleStorageContainable
        relationship: core:Contains
        count_range:
        - 0
        - UNBOUNDED
        description: >-
          An array of links to the simple storage available in this resource block.
    - Storage:
        node: storage:Storage
        capability: strgcps:StorageContainable
        relationship: core:Contains
        count_range:
        - 0
        - UNBOUNDED
        description: >-
          An array of links to the storage available in this resource block.
    - Chassis:
        node: chassis:Chassis
        capability: chssscps:ChassisFeature
        relationship: ResourceBlockDependsOn
        count_range:
        - 0
        - UNBOUNDED
        description: >-
          An array of links to the chassis in which this resource block is contained.
    - ComputerSystems:
        node: cmptsyst:ComputerSystem
        capability: cmpsyscp:ComputerSystemFeature
        relationship: ResourceBlockDependsOn
        count_range:
        - 0
        - UNBOUNDED
        description: >-
          An array of links to the computer systems that are composed from this resource
          block.
    - ConsumingResourceBlocks:
        node: rsrcblck:ResourceBlock
        capability: rsrblccp:ResourceBlockFeature
        relationship: ResourceBlockDependsOn
        count_range:
        - 0
        - UNBOUNDED
        description: >-
          An array of links to resource blocks that depend on this resource block.
    - SupplyingResourceBlocks:
        node: rsrcblck:ResourceBlock
        capability: rsrblccp:ResourceBlockFeature
        relationship: ResourceBlockDependsOn
        count_range:
        - 0
        - UNBOUNDED
        description: >-
          An array of links to resource blocks that this resource block depends on.
    - Zones:
        # node: zone:Zone
        capability: core:Feature
        relationship: ResourceBlockDependsOn
        count_range:
        - 0
        - UNBOUNDED
        description: >-
          An array of links to the zones in which this resource block is bound.
    capabilities:
      feature:
        type: rsrblccp:ResourceBlockFeature
      containable:
        type: rsrblccp:ResourceBlockContainable
