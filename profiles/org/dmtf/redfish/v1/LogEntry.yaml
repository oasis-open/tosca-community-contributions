tosca_definitions_version: tosca_2_0
description: >-
  Types generated from JSON Schema by any2tosca
imports:
- url: Resource.yaml
  namespace: resource
- url: odata-v4.yaml
  namespace: odatav4
- url: Core.yaml
  namespace: core
- url: LogEntry_caps.yaml
  namespace: lgentcp
data_types:
  CPER:
    description: >-
      Details for a CPER section or record associated with this log entry.
    properties:
      NotificationType:
        type: string
        description: >-
          The CPER Notification Type for a CPER record.
        required: false
        validation:
          $matches:
          - $value
          - ^[0-9a-fA-F]{8}-[0-9a-fA-F]{4}-[0-9a-fA-F]{4}-[0-9a-fA-F]{4}-[0-9a-fA-F]{12}$
      Oem:
        type: resource:Oem
        description: >-
          The OEM extension property.
        required: false
      SectionType:
        type: string
        description: >-
          The CPER Section Type.
        required: false
        validation:
          $matches:
          - $value
          - ^[0-9a-fA-F]{8}-[0-9a-fA-F]{4}-[0-9a-fA-F]{4}-[0-9a-fA-F]{4}-[0-9a-fA-F]{12}$
relationship_types:
  LogEntryDependsOn:
    derived_from: core:DependsOn
    properties:
      Oem:
        type: resource:Oem
        description: >-
          The OEM extension property.
        required: false
      OriginOfCondition:
        type: odatav4:idRef
        description: >-
          The link to the resource that caused the log entry.
        required: false
      RelatedItem:
        type: list
        description: >-
          An array of links to resources associated with this log entry.
        required: false
        entry_schema:
          type: odatav4:idRef
      RelatedItem@odata_count:
        type: odatav4:count
        description: >-
          The number of items in a collection.
        required: false
      RelatedLogEntries@odata_count:
        type: odatav4:count
        description: >-
          The number of items in a collection.
        required: false
node_types:
  LogEntry:
    description: >-
      The `LogEntry` schema defines the record format for a log.  It is designed for
      Redfish event logs, which utilize messages defined in a Message Registry and
      referenced by a `MessageId`.  For standard message definitions, see DSP2065.  Other
      log formats, including OEM-specific definitions and the IPMI System Event Log
      (SEL) are also supported.  The `EntryType` field indicates the type of log and
      the resource includes several additional properties dependent on the `EntryType`.
    properties:
      '@odata_id':
        type: odatav4:id
        description: >-
          The unique identifier for a resource.
        required: true
      '@odata_context':
        type: odatav4:context
        description: >-
          The OData description of a payload.
        required: false
      '@odata_etag':
        type: odatav4:etag
        description: >-
          The current ETag of the resource.
        required: false
      '@odata_type':
        type: odatav4:type
        description: >-
          The type of a resource.
        required: true
      Created:
        type: string
        description: >-
          The date and time when the log entry was created.
        required: false
      Description:
        type: string
        required: false
      EntryCode:
        type: string
        description: >-
          The entry code for the log entry if the entry type is `SEL`.
        required: false
      EntryType:
        type: string
        description: >-
          The type of log entry.
        required: true
        validation:
          $valid_values:
          - $value
          - - Event
            - SEL
            - Oem
            - CXL
      Id:
        type: resource:Id
        description: >-
          The unique identifier for this resource within the collection of similar
          resources.
        required: true
      Message:
        type: string
        description: >-
          The message of the log entry.  This property decodes from the entry type.  If
          the entry type is `Event`, this property contains a message.  If the entry
          type is `SEL`, this property contains an SEL-specific message.  If the entry
          type is `CXL`, this property contains a CXL event record.  Otherwise, this
          property contains an OEM-specific log entry.  In most cases, this property
          contains the actual log entry.
        required: false
      MessageArgs:
        type: list
        description: >-
          An array of message arguments that are substituted for the arguments in
          the message when looked up in the message registry.
        required: false
        entry_schema:
          type: string
      MessageId:
        type: string
        description: >-
          The `MessageId`, event data, or OEM-specific information.  This property
          decodes from the entry type.  If the entry type is `Event`, this property
          contains a Redfish Specification-defined `MessageId`.  If the entry type
          is `SEL`, this property contains the Event Data.  Otherwise, this property
          contains OEM-specific information.
        required: false
      Name:
        type: resource:Name
        description: >-
          The name of the resource or array member.
        required: true
      Oem:
        type: resource:Oem
        description: >-
          The OEM extension property.
        required: false
      OemRecordFormat:
        type: string
        description: >-
          The OEM-specific format of the entry.  If the entry type is `Oem`, this
          property contains more information about the record format from the OEM.
        required: false
      SensorNumber:
        type: integer
        description: >-
          The IPMI-defined sensor number.
        required: false
      SensorType:
        type: string
        description: >-
          The sensor type to which the log entry pertains if the entry type is `SEL`.
        required: false
      Severity:
        type: string
        description: >-
          The severity of the log entry.
        required: false
      EventId:
        type: string
        description: >-
          The unique instance identifier for an event.
        required: false
      EventTimestamp:
        type: string
        description: >-
          The date and time when the event occurred.
        required: false
      EventType:
        type: string
        description: >-
          The type of event recorded in this log.
        required: false
        validation:
          $valid_values:
          - $value
          - - StatusChange
            - ResourceUpdated
            - ResourceAdded
            - ResourceRemoved
            - Alert
            - MetricReport
            - Other
      OemLogEntryCode:
        type: string
        description: >-
          The OEM-specific entry code, if the `LogEntryCode` type is `OEM`.
        required: false
      OemSensorType:
        type: string
        description: >-
          The OEM-specific sensor type if the sensor type is `OEM`.
        required: false
      EventGroupId:
        type: integer
        description: >-
          An identifier that correlates events with the same cause.
        required: false
      GeneratorId:
        type: string
        description: >-
          An identifier of the device that has generated the IPMI SEL Event Record.
        required: false
        validation:
          $matches:
          - $value
          - ^0[xX](([a-fA-F]|[0-9]){2}){2}$
      Modified:
        type: string
        description: >-
          The date and time when the log entry was last modified.
        required: false
      AdditionalDataSizeBytes:
        type: integer
        description: >-
          The size of the additional data for this log entry.
        required: false
      AdditionalDataURI:
        type: string
        description: >-
          The URI at which to access the additional data for this log entry, such
          as diagnostic data, image captures, or other files.
        required: false
      DiagnosticDataType:
        type: string
        description: >-
          The type of data available in the `DiagnosticData` property or retrieved
          from the URI specified by the `AdditionalDataURI` property.
        required: false
      OEMDiagnosticDataType:
        type: string
        description: >-
          The OEM-defined type of data available in the `DiagnosticData` property
          or retrieved from the URI specified by the `AdditionalDataURI` property.
        required: false
      Resolved:
        type: boolean
        description: >-
          Indicates if the cause of the log entry has been resolved or repaired.
        required: false
      Resolution:
        type: string
        description: >-
          Used to provide suggestions on how to resolve the situation that caused
          the log entry.
        required: false
      ServiceProviderNotified:
        type: boolean
        description: >-
          Indicates if the log entry has been sent to the service provider.
        required: false
      Originator:
        type: string
        description: >-
          The source of the log entry.
        required: false
      OriginatorType:
        type: string
        description: >-
          The type of originator data.
        required: false
        validation:
          $valid_values:
          - $value
          - - Client
            - Internal
            - SupportingService
      SpecificEventExistsInGroup:
        type: boolean
        description: >-
          Indicates this log entry is equivalent to a more specific log entry within
          the same `EventGroupId`.
        required: false
      CXLEntryType:
        type: string
        description: >-
          The specific CXL entry type.
        required: false
        validation:
          $valid_values:
          - $value
          - - DynamicCapacity
            - Informational
            - Warning
            - Failure
            - Fatal
      FirstOverflowTimestamp:
        type: string
        description: >-
          The timestamp of the first overflow captured after this log entry.
        required: false
      LastOverflowTimestamp:
        type: string
        description: >-
          The timestamp of the last overflow captured after this log entry.
        required: false
      OverflowErrorCount:
        type: integer
        description: >-
          The count of overflow errors that occurred after this log entry.
        required: false
      Persistency:
        type: boolean
        description: >-
          Indicates whether the log entry is persistent across a cold reset of the
          device.
        required: false
      CPER:
        type: CPER
        description: >-
          Details for a CPER section or record associated with this log entry.
        required: false
      DiagnosticData:
        type: string
        description: >-
          A Base64-encoded set of diagnostic data associated with this log entry.
        required: false
      UserAuthenticationSource:
        type: string
        description: >-
          The source of authentication for the username property associated with the
          log entry.
        required: false
      Username:
        type: string
        description: >-
          The username of the account associated with the log entry.
        required: false
      PartNumber:
        type: string
        description: >-
          The part number associated with the source of this log entry.
        required: false
      SerialNumber:
        type: string
        description: >-
          The serial number associated with the source of this log entry.
        required: false
      OriginOfConditionUnavailable:
        type: boolean
        description: >-
          Indicates whether the `OriginOfCondition` link is unavailable, such as after
          the deletion of the resource.
        required: false
      OriginAddress:
        type: string
        description: >-
          The IP address, with scheme, of the user associated with the log entry.
        required: false
        validation:
          $matches:
          - $value
          - ^.+:\/\/.+$
    requirements:
    - ResolutionSteps:
        # node: rsltnstp:ResolutionStep
        capability: core:Containable
        relationship: core:Contains
        count_range:
        - 0
        - UNBOUNDED
        description: >-
          The list of recommended steps to resolve the cause of the log entry.
    - RelatedLogEntries:
        node: LogEntry
        capability: lgentcp:LogEntryFeature
        relationship: LogEntryDependsOn
        count_range:
        - 0
        - UNBOUNDED
        description: >-
          An array of links to other log entries that are related to this log entry.
    capabilities:
      feature:
        type: lgentcp:LogEntryFeature
      containable:
        type: lgentcp:LogEntryContainable
