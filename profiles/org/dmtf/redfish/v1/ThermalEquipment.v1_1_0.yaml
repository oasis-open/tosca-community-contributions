          A link to a collection of heat exchanger units.
    - ImmersionUnits:
        node: clnuntcl:CoolingUnitCollection
        capability: clunclcp:CoolingUnitCollectionContainable
        relationship: core:Contains
        count_range:
        - 0
        - 1
        description: >-
          A link to a collection of immersion cooling units.
    capabilities:
      feature:
        type: threqpcp:ThermalEquipmentFeature
      containable:
        type: threqpcp:ThermalEquipmentContainable
