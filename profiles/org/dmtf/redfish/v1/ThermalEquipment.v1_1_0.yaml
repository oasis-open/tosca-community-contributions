      Description:
        type: resource:Description
        description: >-
          The description of this resource.  Used for commonality in the schema definitions.
        required: false
      Id:
        type: resource:Id
        description: >-
          The unique identifier for this resource within the collection of similar
          resources.
        required: true
      Name:
        type: resource:Name
        description: >-
          The name of the resource or array member.
        required: true
      Oem:
        type: resource:Oem
        description: >-
          The OEM extension property.
        required: false
      Status:
        type: resource:Status
        description: >-
          The status and health of the resource and its subordinate or dependent resources.
        required: false
    requirements:
    - CDUs:
        node: clnuntcl:CoolingUnitCollection
        capability: clunclcp:CoolingUnitCollectionContainable
        relationship: core:Contains
        count_range:
        - 0
        - 1
        description: >-
          A link to a collection of cooling distribution units.
    - CoolingLoops:
        node: clnlpcl:CoolingLoopCollection
        capability: cllpclcp:CoolingLoopCollectionContainable
