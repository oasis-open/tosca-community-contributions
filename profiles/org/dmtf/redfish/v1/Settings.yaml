tosca_definitions_version: tosca_2_0
description: >-
  Types generated from JSON Schema by any2tosca
imports:
- url: odata-v4.yaml
  namespace: odatav4
- url: Message.yaml
  namespace: message
- url: Core.yaml
  namespace: core
- url: Message_caps.yaml
  namespace: mssgcps
- url: Settings_caps.yaml
  namespace: sttncps
data_types:
  MaintenanceWindow:
    properties:
      MaintenanceWindowDurationInSeconds:
        type: integer
        description: >-
          The expiry time of maintenance window in seconds.
        required: true
        validation:
          $greater_or_equal:
          - $value
          - 0
      MaintenanceWindowStartTime:
        type: string
        description: >-
          The start time of a maintenance window.
        required: true
  OperationApplyTime:
    derived_from: string
    validation:
      $valid_values:
      - $value
      - - Immediate
        - OnReset
        - AtMaintenanceWindowStart
        - InMaintenanceWindowOnReset
        - OnStartUpdateRequest
        - OnTargetReset
  OperationApplyTimeSupport:
    properties:
      MaintenanceWindowDurationInSeconds:
        type: integer
        description: >-
          The expiry time of maintenance window in seconds.
        required: false
        validation:
          $greater_or_equal:
          - $value
          - 0
      MaintenanceWindowResource:
        type: odatav4:idRef
        description: >-
          The location of the maintenance window settings.
        required: false
      MaintenanceWindowStartTime:
        type: string
        description: >-
          The start time of a maintenance window.
        required: false
      SupportedValues:
        type: list
        description: >-
          The types of apply times that the client can request when performing a create,
          delete, or action operation.
        required: true
        entry_schema:
          type: OperationApplyTime
  PreferredApplyTime:
    properties:
      ApplyTime:
        type: string
        description: >-
          The time when to apply the settings.
        required: false
        validation:
          $valid_values:
          - $value
          - - Immediate
            - OnReset
            - AtMaintenanceWindowStart
            - InMaintenanceWindowOnReset
      MaintenanceWindowDurationInSeconds:
        type: integer
        description: >-
          The expiry time of maintenance window in seconds.
        required: false
        validation:
          $greater_or_equal:
          - $value
          - 0
      MaintenanceWindowStartTime:
        type: string
        description: >-
          The start time of a maintenance window.
        required: false
node_types:
  Settings:
    properties:
      ETag:
        type: string
        description: >-
          The entity tag (ETag) of the resource to which the settings were applied,
          after the application.
        required: false
      SettingsObject:
        type: odatav4:idRef
        description: >-
          The link to the resource that the client can `PUT` or `PATCH` to modify
          the resource.
        required: false
      Time:
        type: string
        description: >-
          The time when the settings were applied.
        required: false
      SupportedApplyTimes:
        type: list
        description: >-
          The time when the settings can be applied.
        required: false
        entry_schema:
          type: string
      MaintenanceWindowResource:
        type: odatav4:idRef
        description: >-
          The location of the maintenance window settings.
        required: false
    requirements:
    - Messages:
        node: message:Message
        capability: mssgcps:MessageContainable
        relationship: core:Contains
        count_range:
        - 0
        - UNBOUNDED
        description: >-
          An array of messages associated with the settings.
    capabilities:
      feature:
        type: sttncps:SettingsFeature
      containable:
        type: sttncps:SettingsContainable
