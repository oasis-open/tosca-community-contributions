tosca_definitions_version: tosca_2_0
description: >-
  Types generated from JSON Schema by any2tosca
imports:
- url: Resource.yaml
  namespace: resource
- url: PhysicalContext.yaml
  namespace: physcntx
- url: Core.yaml
  namespace: core
- url: PhysicalContext_caps.yaml
  namespace: phycntcp
- url: MetricDefinition_caps.yaml
  namespace: mtrdfncp
data_types:
  Calculable:
    description: >-
      The types of calculations that can be applied to the metric reading.  Provides
      information to the client on the suitability of calculation using the metric
      reading.
    derived_from: string
    validation:
      $valid_values:
      - $value
      - - NonCalculatable
        - Summable
        - NonSummable
  CalculationAlgorithmEnum:
    derived_from: string
    validation:
      $valid_values:
      - $value
      - - Average
        - Maximum
        - Minimum
  CalculationParamsType:
    description: >-
      The parameters for a metric calculation.
    properties:
      ResultMetric:
        type: string
        description: >-
          The URI with wildcards and property identifiers of the metric property that
          stores the result of the calculation.  If the URI has wildcards, the wildcards
          are substituted as specified in the `Wildcards` property.
        required: false
      SourceMetric:
        type: string
        description: >-
          The URI with wildcards and property identifiers of the metric property used
          as the input into the calculation.  If the URI has wildcards, the wildcards
          are substituted as specified in the `Wildcards` property.
        required: false
  ImplementationType:
    derived_from: string
    validation:
      $valid_values:
      - $value
      - - PhysicalSensor
        - Calculated
        - Synthesized
        - DigitalMeter
  MetricDataType:
    description: >-
      The data type of the related metric values.  Provides information to the client
      on the nature of the metric reading.
    derived_from: string
    validation:
      $valid_values:
      - $value
      - - Boolean
        - DateTime
        - Decimal
        - Integer
        - String
        - Enumeration
  MetricType:
    description: >-
      The type of metric.  Provides information to the client on how the metric can
      be handled.
    derived_from: string
    validation:
      $valid_values:
      - $value
      - - Numeric
        - Discrete
        - Gauge
        - Counter
        - Countdown
  Wildcard:
    description: >-
      The wildcard and its substitution values.
    properties:
      Name:
        type: string
        description: >-
          The string used as a wildcard.
        required: false
      Values:
        type: list
        description: >-
          An array of values to substitute for the wildcard.  `*` indicates all possible
          values for the wildcard.
        required: false
        entry_schema:
          type: string
node_types:
  MetricDefinition:
    description: >-
      The `MetricDefinition` schema describes the metadata information for a metric.
    properties:
      Accuracy:
        type: float
        description: >-
          The estimated percent error of measured versus actual values.
        required: false
      Calculable:
        type: Calculable
        description: >-
          An indication of whether the metric can be used in a calculation.
        required: false
      CalculationAlgorithm:
        type: CalculationAlgorithmEnum
        description: >-
          The calculation that is performed on a source metric to obtain the metric
          being defined.
        required: false
      CalculationParameters:
        type: list
        description: >-
          The metric properties that are part of a calculation that this metric definition
          defines.
        required: false
        entry_schema:
          type: CalculationParamsType
      CalculationTimeInterval:
        type: string
        description: >-
          The time interval over which the metric calculation is performed.
        required: false
        validation:
          $matches:
          - $value
          - ^P(\d+D)?(T(\d+H)?(\d+M)?(\d+(.\d+)?S)?)?$
      Calibration:
        type: float
        description: >-
          The calibration offset added to the metric reading.
        required: false
      Description:
        type: resource:Description
        description: >-
          The description of this resource.  Used for commonality in the schema definitions.
        required: false
      DiscreteValues:
        type: list
        description: >-
          This array property specifies possible values of a discrete metric.
        required: false
        entry_schema:
          type: string
      Id:
        type: resource:Id
        description: >-
          The unique identifier for this resource within the collection of similar
          resources.
        required: true
      Implementation:
        type: ImplementationType
        description: >-
          The implementation of the metric.
        required: false
      IsLinear:
        type: boolean
        description: >-
          An indication of whether the metric values are linear versus non-linear.
        required: false
      MaxReadingRange:
        type: float
        description: >-
          Maximum value for metric reading.
        required: false
      MetricDataType:
        type: MetricDataType
        description: >-
          The data type of the metric.
        required: false
      MetricProperties:
        type: list
        description: >-
          The list of URIs with wildcards and property identifiers that this metric
          definition defines.  If a URI has wildcards, the wildcards are substituted
          as specified in the `Wildcards` property.
        required: false
        entry_schema:
          type: string
      MetricType:
        type: MetricType
        description: >-
          The type of metric.
        required: false
      MinReadingRange:
        type: float
        description: >-
          Minimum value for metric reading.
        required: false
      Name:
        type: resource:Name
        description: >-
          The name of the resource or array member.
        required: true
      Oem:
        type: resource:Oem
        description: >-
          The OEM extension property.
        required: false
      Precision:
        type: integer
        description: >-
          Number of significant digits in the metric reading.
        required: false
      SensingInterval:
        type: string
        description: >-
          The time interval between when a metric is updated.
        required: false
        validation:
          $matches:
          - $value
          - ^P(\d+D)?(T(\d+H)?(\d+M)?(\d+(.\d+)?S)?)?$
      TimestampAccuracy:
        type: string
        description: >-
          The accuracy of the timestamp.
        required: false
        validation:
          $matches:
          - $value
          - ^P(\d+D)?(T(\d+H)?(\d+M)?(\d+(.\d+)?S)?)?$
      Units:
        type: string
        description: >-
          The units of measure for this metric.
        required: false
      Wildcards:
        type: list
        description: >-
          The wildcards and their substitution values for the entries in the `MetricProperties`
          array property.
        required: false
        entry_schema:
          type: Wildcard
    requirements:
    - PhysicalContext:
        node: physcntx:PhysicalContext
        capability: phycntcp:PhysicalContextContainable
        relationship: core:Contains
        count_range:
        - 0
        - 1
        description: >-
          The physical context of the metric.
    capabilities:
      feature:
        type: mtrdfncp:MetricDefinitionFeature
      containable:
        type: mtrdfncp:MetricDefinitionContainable
