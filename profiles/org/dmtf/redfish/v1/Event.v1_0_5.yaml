tosca_definitions_version: tosca_2_0
description: >-
  Types generated from JSON Schema by any2tosca
imports:
- url: Resource.yaml
  namespace: resource
- url: odata.4.0.0.yaml
  namespace: odata400
- url: Core.yaml
  namespace: core
- url: Event_caps.yaml
  namespace: evntcps
data_types:
  EventRecord:
    description: >-
      This is the base type for addressable members of an array.
    properties:
      Oem:
        type: resource:Oem
        description: >-
          This is the manufacturer/provider specific extension moniker used to divide
          the Oem object into sections.
        required: false
      MemberId:
        type: string
        description: >-
          This is the identifier for the member within the collection.
        required: false
      EventType:
        type: EventType
        description: >-
          This indicates the type of event sent, according to the definitions in the
          EventService.
        required: true
      EventId:
        type: string
        description: >-
          This is a unique instance identifier of an event.
        required: false
      EventTimestamp:
        type: string
        description: >-
          This is time the event occurred.
        required: false
      Severity:
        type: string
        description: >-
          This is the severity of the event.
        required: false
      Message:
        type: string
        description: >-
          This is the human readable message, if provided.
        required: false
      MessageId:
        type: string
        description: >-
          This is the key for this message which can be used to look up the message
          in a message registry.
        required: true
        validation:
          $matches:
          - $value
          - ^[A-Za-z0-9]+\.\d+\.\d+\.[A-Za-z0-9.]+$
      MessageArgs:
        type: list
        description: >-
          This array of message arguments are substituted for the arguments in the
          message when looked up in the message registry.
        required: false
        entry_schema:
          type: string
      Context:
        type: string
        description: >-
          A context can be supplied at subscription time.  This property is the context
          value supplied by the subscriber.
        required: false
      OriginOfCondition:
        type: odata400:idRef
        description: >-
          This indicates the resource that originated the condition that caused the
          event to be generated.
        required: false
  EventType:
    derived_from: string
    validation:
      $valid_values:
      - $value
      - - StatusChange
        - ResourceUpdated
        - ResourceAdded
        - ResourceRemoved
        - Alert
node_types:
  Event:
    description: >-
      The Event schema describes the JSON payload received by an Event Destination
      (which has subscribed to event notification) when events occurs.  This resource
      contains data about event(s), including descriptions, severity and MessageId
      reference to a Message Registry that can be accessed for further information.
    properties:
      Oem:
        type: resource:Oem
        description: >-
          This is the manufacturer/provider specific extension moniker used to divide
          the Oem object into sections.
        required: false
      Id:
        type: resource:Id
        description: >-
          The unique identifier for this resource within the collection of similar
          resources.
        required: true
      Description:
        type: resource:Description
        description: >-
          The description of this resource.  Used for commonality in the schema definitions.
        required: false
      Name:
        type: resource:Name
        description: >-
          The name of the resource or array member.
        required: true
      Events@odata_count:
        type: odata400:count
        description: >-
          The number of items in a collection.
        required: false
      Events@odata_navigationLink:
        type: string
        required: false
      Events:
        type: list
        description: >-
          Each event in this array has a set of properties that describe the event.  Since
          this is an array, more than one event can be sent simultaneously.
        required: true
        entry_schema:
          type: EventRecord
    capabilities:
      feature:
        type: evntcps:EventFeature
      containable:
        type: evntcps:EventContainable
