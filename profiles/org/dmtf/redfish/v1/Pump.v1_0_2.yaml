tosca_definitions_version: tosca_2_0
description: >-
  Types generated from JSON Schema by any2tosca
imports:
- url: Assembly.yaml
  namespace: assembly
- url: Resource.yaml
  namespace: resource
- url: FilterCollection.yaml
  namespace: fltrcllc
- url: PhysicalContext.yaml
  namespace: physcntx
- url: Sensor.yaml
  namespace: sensor
- url: Core.yaml
  namespace: core
- url: Assembly_caps.yaml
  namespace: assmcps
- url: FilterCollection_caps.yaml
  namespace: fltcllcp
- url: PhysicalContext_caps.yaml
  namespace: phycntcp
- url: Pump_caps.yaml
  namespace: pumpcaps
data_types:
  PumpType:
    derived_from: string
    validation:
      $valid_values:
      - $value
      - - Liquid
        - Compressor
node_types:
  Pump:
    description: >-
      The `Pump` schema describes a pump unit for a cooling system or similar device.
    properties:
      AssetTag:
        type: string
        description: >-
          The user-assigned asset tag for this equipment.
        required: false
      Description:
        type: resource:Description
        description: >-
          The description of this resource.  Used for commonality in the schema definitions.
        required: false
      FirmwareVersion:
        type: string
        description: >-
          The firmware version of this equipment.
        required: false
      Id:
        type: resource:Id
        description: >-
          The unique identifier for this resource within the collection of similar
          resources.
        required: true
      Location:
        type: resource:Location
        description: >-
          The location of the pump.
        required: false
      LocationIndicatorActive:
        type: boolean
        description: >-
          An indicator allowing an operator to physically locate this resource.
        required: false
      Manufacturer:
        type: string
        description: >-
          The manufacturer of this pump.
        required: false
      Model:
        type: string
        description: >-
          The model number for this pump.
        required: false
      Name:
        type: resource:Name
        description: >-
          The name of the resource or array member.
        required: true
      Oem:
        type: resource:Oem
        description: >-
          The OEM extension property.
        required: false
      PartNumber:
        type: string
        description: >-
          The part number for this pump.
        required: false
      ProductionDate:
        type: string
        description: >-
          The production or manufacturing date of this equipment.
        required: false
      PumpSpeedPercent:
        type: sensor:SensorPumpExcerpt
        description: >-
          The pump speed (%).
        required: false
      PumpType:
        type: PumpType
        description: >-
          The type of pump.
        required: false
      SerialNumber:
        type: string
        description: >-
          The serial number for this pump.
        required: false
      ServiceHours:
        type: float
        description: >-
          The hours of service this pump has provided.
        required: false
      SparePartNumber:
        type: string
        description: >-
          The spare part number for this pump.
        required: false
      Status:
        type: resource:Status
        description: >-
          The status and health of the resource and its subordinate or dependent resources.
        required: false
      UserLabel:
        type: string
        description: >-
          A user-assigned label.
        required: false
      Version:
        type: string
        description: >-
          The hardware version of this equipment.
        required: false
    requirements:
    - Assembly:
        node: assembly:Assembly
        capability: assmcps:AssemblyContainable
        relationship: core:Contains
        count_range:
        - 0
        - 1
        description: >-
          The link to the assembly associated with this pump.
    - Filters:
        node: fltrcllc:FilterCollection
        capability: fltcllcp:FilterCollectionContainable
        relationship: core:Contains
        count_range:
        - 0
        - 1
        description: >-
          A link to a collection of filters.
    - PhysicalContext:
        node: physcntx:PhysicalContext
        capability: phycntcp:PhysicalContextContainable
        relationship: core:Contains
        count_range:
        - 0
        - 1
        description: >-
          The area or device associated with this pump.
    capabilities:
      feature:
        type: pumpcaps:PumpFeature
      containable:
        type: pumpcaps:PumpContainable
