- url: odata.4.0.0.yaml
  namespace: odata400
- url: ComputerSystem.yaml
  namespace: cmptsyst
- url: Role.yaml
  namespace: role
- url: EthernetInterfaceCollection.yaml
  namespace: ethintcl
- url: EthernetInterface.yaml
  namespace: ethrintr
- url: ManagerNetworkProtocol.yaml
