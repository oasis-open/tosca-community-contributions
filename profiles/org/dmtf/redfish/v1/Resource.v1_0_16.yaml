tosca_definitions_version: tosca_2_0
description: >-
  Types generated from JSON Schema by any2tosca
imports:
- url: Core.yaml
  namespace: core
- url: Resource_caps.yaml
  namespace: rsrccps
data_types:
  ReferenceableMember:
    description: >-
      The base type for addressable members of an array.
    properties:
      MemberId:
        type: string
        description: >-
          The unique identifier for the member within an array.
        required: true
      Oem:
        type: map
        description: >-
          The OEM extension property.
        required: false
  ResourceCollection:
    properties:
      Description:
        type: string
        description: >-
          The description of this resource.  Used for commonality in the schema definitions.
        required: false
      Name:
        type: string
        description: >-
          The name of the resource or array member.
        required: true
      Oem:
        type: map
        description: >-
          The OEM extension property.
        required: false
node_types:
  Resource:
    description: >-
      The base type for resources and members that can be linked to.
    properties:
      Description:
        type: string
        description: >-
          The description of this resource.  Used for commonality in the schema definitions.
        required: false
      Id:
        type: string
        description: >-
          The unique identifier for this resource within the collection of similar
          resources.
        required: true
      Name:
        type: string
        description: >-
          The name of the resource or array member.
        required: true
      Oem:
        type: map
        description: >-
          The OEM extension property.
        required: false
    capabilities:
      feature:
        type: rsrccps:ResourceFeature
      containable:
        type: rsrccps:ResourceContainable
