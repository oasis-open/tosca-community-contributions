tosca_definitions_version: tosca_2_0
description: >-
  Types generated from JSON Schema by any2tosca
imports:
- url: Core.yaml
  namespace: core
- url: PhysicalContext_caps.yaml
  namespace: phycntcp
data_types:
  LogicalContext:
    derived_from: string
    validation:
      $valid_values:
      - $value
      - - Capacity
        - Environment
        - Network
        - Performance
        - Security
        - Storage
  PhysicalSubContext:
    derived_from: string
    validation:
      $valid_values:
      - $value
      - - Input
        - Output
node_types:
  PhysicalContext:
    capabilities:
      feature:
        type: phycntcp:PhysicalContextFeature
      containable:
        type: phycntcp:PhysicalContextContainable
