tosca_definitions_version: tosca_2_0
description: >-
  Types generated from JSON Schema by any2tosca
imports:
- url: Circuit.yaml
  namespace: circuit
- url: Resource.yaml
  namespace: resource
- url: Outlet.yaml
  namespace: outlet
- url: odata-v4.yaml
  namespace: odatav4
- url: PhysicalContext.yaml
  namespace: physcntx
- url: Core.yaml
  namespace: core
- url: Outlet_caps.yaml
  namespace: otltcps
- url: Assembly.yaml
  namespace: assembly
- url: PowerSupplyMetrics.yaml
  namespace: pwrsppmt
- url: Assembly_caps.yaml
  namespace: assmcps
- url: PowerSupplyMetrics_caps.yaml
  namespace: pwspmtcp
- url: PowerSupply_caps.yaml
  namespace: pwrsppcp
- url: PhysicalContext_caps.yaml
  namespace: phycntcp
data_types:
  EfficiencyRating:
    description: >-
      This type describes an efficiency rating for a power supply.
    properties:
      EfficiencyPercent:
        type: float
        description: >-
          The rated efficiency of this power supply at the specified load.
        required: false
        validation:
          $and:
          - $greater_or_equal:
            - $value
            - 0
          - $less_or_equal:
            - $value
            - 100
      LoadPercent:
        type: float
        description: >-
          The electrical load for this rating.
        required: false
        validation:
          $and:
          - $greater_or_equal:
            - $value
            - 0
          - $less_or_equal:
            - $value
            - 100
  InputRange:
    description: >-
      This type describes an input range for a power supply.
    properties:
      CapacityWatts:
        type: float
        description: >-
          The maximum capacity of this power supply when operating in this input range.
        required: false
        validation:
          $greater_or_equal:
          - $value
          - 0
      NominalVoltageType:
        type: circuit:NominalVoltageType
        description: >-
          The input voltage range.
        required: false
  PowerSupplyType:
    derived_from: string
    validation:
      $valid_values:
      - $value
      - - AC
        - DC
        - ACorDC
relationship_types:
  PowerSupplyDependsOn:
    derived_from: core:DependsOn
    properties:
      Oem:
        type: resource:Oem
        description: >-
          The OEM extension property.
        required: false
      PowerOutlets@odata_count:
        type: odatav4:count
        description: >-
          The number of items in a collection.
        required: false
interface_types:
  PowerSupplyActions:
    operations:
      Reset:
        description: >-
          This action resets the power supply.
        inputs:
          ResetType:
            type: resource:ResetType
            description: >-
              The type of reset.
            required: false
node_types:
  PowerSupply:
    description: >-
      The PowerSupply schema describes a power supply unit.  It also describes the
      location, such as a slot, socket, or bay, where a unit can be installed, by
      populating a resource instance with an absent state if a unit is not present.
    properties:
      Description:
        type: resource:Description
        description: >-
          The description of this resource.  Used for commonality in the schema definitions.
        required: false
      EfficiencyRatings:
        type: list
        description: >-
          The efficiency ratings of this power supply.
        required: false
        entry_schema:
          type: EfficiencyRating
      ElectricalSourceManagerURIs:
        type: list
        description: >-
          The URIs of the management interfaces for the upstream electrical source
          connections for this power supply.
        required: false
        entry_schema:
          type: string
      ElectricalSourceNames:
        type: list
        description: >-
          The names of the upstream electrical sources, such as circuits or outlets,
          connected to this power supply.
        required: false
        entry_schema:
          type: string
      FirmwareVersion:
        type: string
        description: >-
          The firmware version for this power supply.
        required: false
      HotPluggable:
        type: boolean
        description: >-
          An indication of whether this device can be inserted or removed while the
          equipment is in operation.
        required: false
      Id:
        type: resource:Id
        description: >-
          The unique identifier for this resource within the collection of similar
          resources.
        required: true
      InputNominalVoltageType:
        type: circuit:NominalVoltageType
        description: >-
          The nominal voltage type that is detected on the line input to this power
          supply.
        required: false
      InputRanges:
        type: list
        description: >-
          The input ranges that the power supply can use.
        required: false
        entry_schema:
          type: InputRange
      Location:
        type: resource:Location
        description: >-
          The location of the power supply.
        required: false
      LocationIndicatorActive:
        type: boolean
        description: >-
          An indicator allowing an operator to physically locate this resource.
        required: false
      Manufacturer:
        type: string
        description: >-
          The manufacturer of this power supply.
        required: false
      Model:
        type: string
        description: >-
          The model number for this power supply.
        required: false
      Name:
        type: resource:Name
        description: >-
          The name of the resource or array member.
        required: true
      Oem:
        type: resource:Oem
        description: >-
          The OEM extension property.
        required: false
      OutputRails:
        type: list
        description: >-
          The output power rails provided by this power supply.
        required: false
        entry_schema:
          type: OutputRail
      PartNumber:
        type: string
        description: >-
          The part number for this power supply.
        required: false
      PhaseWiringType:
        type: circuit:PhaseWiringType
        description: >-
          The number of ungrounded current-carrying conductors (phases) and the total
          number of conductors (wires) provided for the power supply input connector.
        required: false
      PlugType:
        type: circuit:PlugType
        description: >-
          The type of plug according to NEMA, IEC, or regional standards.
        required: false
      PowerCapacityWatts:
        type: float
        description: >-
          The maximum capacity of this power supply.
        required: false
        validation:
          $greater_or_equal:
          - $value
          - 0
      PowerSupplyType:
        type: PowerSupplyType
        description: >-
          The power supply type (AC or DC).
        required: false
      ProductionDate:
        type: string
        description: >-
          The production or manufacturing date of this power supply.
        required: false
      SerialNumber:
        type: string
        description: >-
          The serial number for this power supply.
        required: false
      SparePartNumber:
        type: string
        description: >-
          The spare part number for this power supply.
        required: false
      Status:
        type: resource:Status
        description: >-
          The status and health of the resource and its subordinate or dependent resources.
        required: false
      Version:
        type: string
        description: >-
          The hardware version of this power supply.
        required: false
    requirements:
    - Assembly:
        node: assembly:Assembly
        capability: assmcps:AssemblyContainable
        relationship: core:Contains
        count_range:
        - 0
        - 1
        description: >-
          The link to the assembly associated with this power supply.
    - Metrics:
        node: pwrsppmt:PowerSupplyMetrics
        capability: pwspmtcp:PowerSupplyMetricsContainable
        relationship: core:Contains
        count_range:
        - 0
        - 1
        description: >-
          The link to the power supply metrics resource associated with this power
          supply.
    - Outlet:
        node: outlet:Outlet
        capability: otltcps:OutletFeature
        relationship: PowerSupplyDependsOn
        count_range:
        - 0
        - 1
        description: >-
          A link to the outlet connected to this power supply.
    - PowerOutlets:
        node: outlet:Outlet
        capability: otltcps:OutletFeature
        relationship: PowerSupplyDependsOn
        count_range:
        - 0
        - UNBOUNDED
        description: >-
          An array of links to the outlets that provide power to this power supply.
    interfaces:
      Actions:
        type: PowerSupplyActions
    capabilities:
      feature:
        type: pwrsppcp:PowerSupplyFeature
      containable:
        type: pwrsppcp:PowerSupplyContainable
  OutputRail:
    description: >-
      This type describes an output power rail of a power supply.
    properties:
      NominalVoltage:
        type: float
        description: >-
          The nominal voltage of this output power rail.
        required: false
    requirements:
    - PhysicalContext:
        node: physcntx:PhysicalContext
        capability: phycntcp:PhysicalContextContainable
        relationship: core:Contains
        count_range:
        - 0
        - 1
        description: >-
          The area or device to which this power rail applies.
    capabilities:
      containable:
        type: pwrsppcp:OutputRailContainable
