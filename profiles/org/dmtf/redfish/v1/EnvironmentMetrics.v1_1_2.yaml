tosca_definitions_version: tosca_2_0
description: >-
  Types generated from JSON Schema by any2tosca
imports:
- url: Resource.yaml
  namespace: resource
- url: Sensor.yaml
  namespace: sensor
- url: odata-v4.yaml
  namespace: odatav4
- url: Control.yaml
  namespace: control
- url: Core.yaml
  namespace: core
- url: EnvironmentMetrics_caps.yaml
  namespace: envmtrcp
interface_types:
  EnvironmentMetricsActions:
    operations:
      ResetMetrics:
        description: >-
          This action resets the summary metrics related to this equipment.
node_types:
  EnvironmentMetrics:
    description: >-
      The EnvironmentMetrics schema represents the environmental metrics of a device.
    properties:
      Description:
        type: resource:Description
        description: >-
          The description of this resource.  Used for commonality in the schema definitions.
        required: false
      DewPointCelsius:
        type: sensor:SensorExcerpt
        description: >-
          The dew point temperature (C).
        required: false
      EnergykWh:
        type: sensor:SensorEnergykWhExcerpt
        description: >-
          Energy consumption (kWh).
        required: false
      FanSpeedsPercent:
        type: list
        description: >-
          Fan speeds (percent).
        required: false
        entry_schema:
          type: sensor:SensorFanArrayExcerpt
      FanSpeedsPercent@odata_count:
        type: odatav4:count
        description: >-
          The number of items in a collection.
        required: false
      HumidityPercent:
        type: sensor:SensorExcerpt
        description: >-
          Humidity (percent).
        required: false
      Id:
        type: resource:Id
        description: >-
          The unique identifier for this resource within the collection of similar
          resources.
        required: true
      Name:
        type: resource:Name
        description: >-
          The name of the resource or array member.
        required: true
      Oem:
        type: resource:Oem
        description: >-
          The OEM extension property.
        required: false
      PowerLimitWatts:
        type: control:ControlSingleExcerpt
        description: >-
          Power limit (W).
        required: false
      PowerLoadPercent:
        type: sensor:SensorExcerpt
        description: >-
          The power load (percent) for this device.
        required: false
      PowerWatts:
        type: sensor:SensorPowerExcerpt
        description: >-
          Power consumption (W).
        required: false
      TemperatureCelsius:
        type: sensor:SensorExcerpt
        description: >-
          Temperature (Celsius).
        required: false
    interfaces:
      Actions:
        type: EnvironmentMetricsActions
    capabilities:
      feature:
        type: envmtrcp:EnvironmentMetricsFeature
      containable:
        type: envmtrcp:EnvironmentMetricsContainable
