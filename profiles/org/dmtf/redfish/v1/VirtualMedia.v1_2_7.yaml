tosca_definitions_version: tosca_2_0
description: >-
  Types generated from JSON Schema by any2tosca
imports:
- url: Resource.yaml
  namespace: resource
- url: Core.yaml
  namespace: core
- url: VirtualMedia_caps.yaml
  namespace: vrtmdcp
data_types:
  ConnectedVia:
    derived_from: string
    validation:
      $valid_values:
      - $value
      - - NotConnected
        - URI
        - Applet
        - Oem
  MediaType:
    derived_from: string
    validation:
      $valid_values:
      - $value
      - - CD
        - Floppy
        - USBStick
        - DVD
interface_types:
  VirtualMediaActions:
    operations:
      EjectMedia:
        description: >-
          This action detaches remote media from virtual media.
      InsertMedia:
        description: >-
          This action attaches remote media to virtual media.
        inputs:
          Image:
            type: string
            description: >-
              The URI of the media to attach to the virtual media.
            required: true
          Inserted:
            type: boolean
            description: >-
              An indication of whether the image is treated as inserted upon completion
              of the action.  The default is `true`.
            required: false
          WriteProtected:
            type: boolean
            description: >-
              An indication of whether the remote media is treated as write-protected.  The
              default is `true`.
            required: false
node_types:
  VirtualMedia:
    description: >-
      The `VirtualMedia` schema contains properties related to the monitor and control
      of an instance of virtual media, such as a remote CD, DVD, or USB device.  A
      manager for a system or device provides virtual media functionality.
    properties:
      ConnectedVia:
        type: ConnectedVia
        description: >-
          The current virtual media connection method.
        required: false
      Description:
        type: resource:Description
        description: >-
          The description of this resource.  Used for commonality in the schema definitions.
        required: false
      Id:
        type: resource:Id
        description: >-
          The unique identifier for this resource within the collection of similar
          resources.
        required: true
      Image:
        type: string
        description: >-
          The URI of the location of the selected image.
        required: false
      ImageName:
        type: string
        description: >-
          The current image name.
        required: false
      Inserted:
        type: boolean
        description: >-
          An indication of whether virtual media is inserted into the virtual device.
        required: false
      MediaTypes:
        type: list
        description: >-
          The media types supported as virtual media.
        required: false
        entry_schema:
          type: MediaType
      Name:
        type: resource:Name
        description: >-
          The name of the resource or array member.
        required: true
      Oem:
        type: resource:Oem
        description: >-
          The OEM extension property.
        required: false
      WriteProtected:
        type: boolean
        description: >-
          An indication of whether the media is write-protected.
        required: false
    interfaces:
      Actions:
        type: VirtualMediaActions
    capabilities:
      feature:
        type: vrtmdcp:VirtualMediaFeature
      containable:
        type: vrtmdcp:VirtualMediaContainable
