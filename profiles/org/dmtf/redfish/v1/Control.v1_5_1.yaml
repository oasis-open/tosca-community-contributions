data_types:
  ControlExcerpt:
    description: >-
      The `Control` schema describes a control point and its properties.
    properties:
      AllowableMax:
        type: float
        description: >-
          The maximum possible setting for this control.
        required: false
      AllowableMin:
        type: float
        description: >-
          The minimum possible setting for this control.
        required: false
      ControlMode:
        type: ControlMode
        description: >-
          The current operating mode of the control.
        required: false
      DataSourceUri:
        type: string
        description: >-
          The link to the resource that provides the data for this control.
        required: false
      Reading:
        type: float
        description: >-
          The reading of the sensor associated with this control.
        required: false
      ReadingUnits:
        type: string
        description: >-
          The units of the sensor reading associated with this control.
        required: false
  ControlLoop:
    description: >-
      The details and coefficients used to operate a control loop.
    properties:
      CoefficientUpdateTime:
        type: string
        description: >-
          The date and time that the control loop coefficients were changed.
        required: false
      Differential:
        type: float
        description: >-
          The differential coefficient.
        required: false
      Integral:
        type: float
        description: >-
          The integral coefficient.
        required: false
      Proportional:
        type: float
        description: >-
          The proportional coefficient.
        required: false
  ControlMode:
    derived_from: string
    validation:
      $valid_values:
      - $value
      - - Automatic
        - Override
        - Manual
        - Disabled
