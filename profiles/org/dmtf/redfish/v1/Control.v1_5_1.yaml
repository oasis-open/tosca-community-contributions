interface_types:
  ControlActions:
    operations:
      ResetToDefaults:
        description: >-
          The action resets the values of writable properties to factory defaults.
node_types:
  Control:
    description: >-
      The `Control` schema describes a control point and its properties.
    properties:
      Accuracy:
        type: float
        description: >-
          The estimated percent error of measured versus actual values.
        required: false
      AllowableMax:
        type: float
        description: >-
          The maximum possible setting for this control.
        required: false
      AllowableMin:
        type: float
        description: >-
          The minimum possible setting for this control.
        required: false
      AllowableNumericValues:
        type: list
        description: >-
          The supported values for the set point.
        required: false
        entry_schema:
          type: float
      AssociatedSensors@odata_count:
        type: odatav4:count
        description: >-
          The number of items in a collection.
        required: false
      ControlDelaySeconds:
        type: float
        description: >-
          The time delay in seconds before the control will activate once the value
          has deviated from the set point.
        required: false
      ControlLoop:
        type: ControlLoop
        description: >-
          The control loop details.
        required: false
      ControlMode:
        type: ControlMode
        description: >-
          The current operating mode of the control.
        required: false
      ControlType:
        type: ControlType
        description: >-
          The type of control.
        required: false
      DeadBand:
        type: float
        description: >-
          The maximum deviation from the set point allowed before the control will
          activate.
        required: false
      DefaultSetPoint:
        type: float
        description: >-
          The default set point of the control.
        required: false
      Description:
        type: resource:Description
        description: >-
          The description of this resource.  Used for commonality in the schema definitions.
        required: false
      Id:
        type: resource:Id
        description: >-
          The unique identifier for this resource within the collection of similar
          resources.
        required: true
      Implementation:
        type: ImplementationType
        description: >-
          The implementation of the control.
        required: false
      Increment:
        type: float
        description: >-
          The smallest increment supported for the set point.
        required: false
      Location:
        type: resource:Location
        description: >-
          The location information for this control.
        required: false
      Name:
        type: resource:Name
        description: >-
          The name of the resource or array member.
        required: true
      Oem:
        type: resource:Oem
        description: >-
          The OEM extension property.
        required: false
      PhysicalSubContext:
        type: physcntx:PhysicalSubContext
        description: >-
          The usage or location within a device to which this control applies.
        required: false
      RelatedItem:
        type: list
        description: >-
          An array of links to resources that this control services.
        required: false
        entry_schema:
          type: odatav4:idRef
      RelatedItem@odata_count:
        type: odatav4:count
        description: >-
          The number of items in a collection.
        required: false
      Sensor:
        type: string
        description: >-
          The sensor reading associated with this control.
        required: false
      SetPoint:
        type: float
        description: >-
          The desired set point of the control.
        required: false
      SetPointAccuracy:
        type: float
        description: >-
          Accuracy (+/-) of the set point.
        required: false
      SetPointType:
        type: SetPointType
        description: >-
          The set point type used to operate the control.
        required: false
      SetPointUnits:
        type: string
        description: >-
          The units of the set point.
        required: false
      SetPointUpdateTime:
        type: string
        description: >-
          The date and time that the set point was changed.
        required: false
      SettingMax:
        type: float
        description: >-
          The maximum set point in the allowed range.
        required: false
      SettingMin:
        type: float
        description: >-
          The minimum set point in the allowed range.
        required: false
      Status:
        type: resource:Status
        description: >-
          The status and health of the resource and its subordinate or dependent resources.
        required: false
    requirements:
    - AssociatedSensors:
        node: Sensor
        capability: snsrcps:SensorContainable
        relationship: core:Contains
        count_range:
        - 0
        - UNBOUNDED
        description: >-
          An array of links to the sensors associated with this control.
    - PhysicalContext:
        node: physcntx:PhysicalContext
        capability: phycntcp:PhysicalContextContainable
        relationship: core:Contains
        count_range:
        - 0
        - 1
        description: >-
          The area or device to which this control applies.
    interfaces:
      Actions:
        type: ControlActions
    capabilities:
      feature:
        type: cntrlcps:ControlFeature
      containable:
        type: cntrlcps:ControlContainable
