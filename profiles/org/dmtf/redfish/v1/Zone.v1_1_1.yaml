tosca_definitions_version: tosca_2_0
description: >-
  Types generated from JSON Schema by any2tosca
imports:
- url: Endpoint.yaml
  namespace: endpoint
- url: odata.v4_0_1.yaml
  namespace: odata
- url: Switch.yaml
  namespace: switch
- url: Resource.yaml
  namespace: resource
- url: ResourceBlock.yaml
  namespace: rsrcblck
- url: Core.yaml
  namespace: core
- url: Endpoint_caps.yaml
  namespace: endpcps
- url: Switch_caps.yaml
  namespace: swtchcps
- url: ResourceBlock_caps.yaml
  namespace: rsrblccp
- url: Zone_caps.yaml
  namespace: zonecaps
relationship_types:
  ZoneDependsOn:
    derived_from: core:DependsOn
    properties:
      Endpoints@odata_count:
        type: odata:count
        description: >-
          The number of items in a collection.
        required: false
      InvolvedSwitches@odata_count:
        type: odata:count
        description: >-
          The number of items in a collection.
        required: false
      Oem:
        type: resource:Oem
        description: >-
          Oem extension object.
        required: false
      ResourceBlocks@odata_count:
        type: odata:count
        description: >-
          The number of items in a collection.
        required: false
node_types:
  Zone:
    description: >-
      The Zone schema represents a fabric zone.
    properties:
      Description:
        type: resource:Description
        description: >-
          The description of this resource.  Used for commonality in the schema definitions.
        required: false
      Id:
        type: resource:Id
        description: >-
          The unique identifier for this resource within the collection of similar
          resources.
        required: true
      Name:
        type: resource:Name
        description: >-
          The name of the resource or array member.
        required: true
      Oem:
        type: resource:Oem
        description: >-
          This is the manufacturer/provider specific extension moniker used to divide
          the Oem object into sections.
        required: false
      Status:
        type: resource:Status
        description: >-
          The status and health of a resource and its children.
        required: false
    requirements:
    - Endpoints:
        node: endpoint:Endpoint
        capability: endpcps:EndpointFeature
        relationship: ZoneDependsOn
        count_range:
        - 0
        - UNBOUNDED
        description: >-
          Represents an array of references to the endpoints that are contained in
          this zone.
    - InvolvedSwitches:
        node: switch:Switch
        capability: swtchcps:SwitchFeature
        relationship: ZoneDependsOn
        count_range:
        - 0
        - UNBOUNDED
        description: >-
          Represents an array of references to the switches in this zone.
    - ResourceBlocks:
        node: rsrcblck:ResourceBlock
        capability: rsrblccp:ResourceBlockFeature
        relationship: ZoneDependsOn
        count_range:
        - 0
        - UNBOUNDED
        description: >-
          An array of references to the Resource Blocks that are used in this Zone.
    capabilities:
      feature:
        type: zonecaps:ZoneFeature
      containable:
        type: zonecaps:ZoneContainable
