tosca_definitions_version: tosca_2_0
description: >-
  Types generated from JSON Schema by any2tosca
imports:
- url: Assembly.yaml
  namespace: assembly
- url: Resource.yaml
  namespace: resource
- url: PhysicalContext.yaml
  namespace: physcntx
- url: Sensor.yaml
  namespace: sensor
- url: Core.yaml
  namespace: core
- url: Assembly_caps.yaml
  namespace: assmcps
- url: PhysicalContext_caps.yaml
  namespace: phycntcp
- url: Fan_caps.yaml
  namespace: fancaps
node_types:
  Fan:
    description: >-
      The Fan schema describes a cooling fan unit for a computer system or similar
      devices contained within a chassis.  It also describes the location, such as
      a slot, socket, or bay, where a unit can be installed, by populating a resource
      instance with an absent state if a unit is not present.
    properties:
      Description:
        type: resource:Description
        description: >-
          The description of this resource.  Used for commonality in the schema definitions.
        required: false
      HotPluggable:
        type: boolean
        description: >-
          An indication of whether this device can be inserted or removed while the
          equipment is in operation.
        required: false
      Id:
        type: resource:Id
        description: >-
          The unique identifier for this resource within the collection of similar
          resources.
        required: true
      Location:
        type: resource:Location
        description: >-
          The location of the fan.
        required: false
      LocationIndicatorActive:
        type: boolean
        description: >-
          An indicator allowing an operator to physically locate this resource.
        required: false
      Manufacturer:
        type: string
        description: >-
          The manufacturer of this fan.
        required: false
      Model:
        type: string
        description: >-
          The model number for this fan.
        required: false
      Name:
        type: resource:Name
        description: >-
          The name of the resource or array member.
        required: true
      Oem:
        type: resource:Oem
        description: >-
          The OEM extension property.
        required: false
      PartNumber:
        type: string
        description: >-
          The part number for this fan.
        required: false
      SerialNumber:
        type: string
        description: >-
          The serial number for this fan.
        required: false
      SparePartNumber:
        type: string
        description: >-
          The spare part number for this fan.
        required: false
      SpeedPercent:
        type: sensor:SensorFanExcerpt
        description: >-
          The fan speed (percent).
        required: false
      Status:
        type: resource:Status
        description: >-
          The status and health of the resource and its subordinate or dependent resources.
        required: false
    requirements:
    - Assembly:
        node: assembly:Assembly
        capability: assmcps:AssemblyContainable
        relationship: core:Contains
        count_range:
        - 0
        - 1
        description: >-
          The link to the assembly associated with this fan.
    - PhysicalContext:
        node: physcntx:PhysicalContext
        capability: phycntcp:PhysicalContextContainable
        relationship: core:Contains
        count_range:
        - 0
        - 1
        description: >-
          The area or device associated with this fan.
    capabilities:
      feature:
        type: fancaps:FanFeature
      containable:
        type: fancaps:FanContainable
