data_types:
  Temperature:
    description: >-
      This is the base type for addressable members of an array.
    properties:
      Oem:
        type: resource:Oem
        description: >-
          This is the manufacturer/provider specific extension moniker used to divide
          the Oem object into sections.
        required: false
      MemberId:
        type: string
        description: >-
          This is the identifier for the member within the collection.
        required: false
      Name:
        type: string
        description: >-
          Temperature sensor name.
        required: false
      SensorNumber:
        type: float
        description: >-
          A numerical identifier to represent the temperature sensor.
        required: false
      Status:
        type: resource:Status
        description: >-
          The status and health of a resource and its children.
        required: false
      ReadingCelsius:
        type: float
        description: >-
          Temperature.
        required: false
      UpperThresholdNonCritical:
        type: float
        description: >-
          Above normal range.
        required: false
      UpperThresholdCritical:
        type: float
        description: >-
          Above normal range but not yet fatal.
        required: false
      UpperThresholdFatal:
        type: float
        description: >-
          Above normal range and is fatal.
        required: false
      LowerThresholdNonCritical:
        type: float
        description: >-
          Below normal range.
        required: false
      LowerThresholdCritical:
        type: float
        description: >-
          Below normal range but not yet fatal.
        required: false
      LowerThresholdFatal:
        type: float
        description: >-
          Below normal range and is fatal.
        required: false
      MinReadingRangeTemp:
        type: float
        description: >-
          Minimum value for ReadingCelsius.
        required: false
      MaxReadingRangeTemp:
        type: float
        description: >-
          Maximum value for ReadingCelsius.
        required: false
      PhysicalContext:
        type: string
        description: >-
          Describes the area or device to which this temperature measurement applies.
        required: false
      RelatedItem@odata_count:
        type: odata400:count
        description: >-
          The number of items in a collection.
        required: false
      RelatedItem@odata_navigationLink:
        type: string
        required: false
      RelatedItem:
        type: list
        description: >-
          Describes the areas or devices to which this temperature measurement applies.
        required: false
        entry_schema:
          type: odata400:idRef
  ReadingUnits:
    derived_from: string
    validation:
      $valid_values:
      - $value
      - - RPM
        - Percent
