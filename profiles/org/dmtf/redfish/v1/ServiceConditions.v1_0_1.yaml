tosca_definitions_version: tosca_2_0
description: >-
  Types generated from JSON Schema by any2tosca
imports:
- url: Resource.yaml
  namespace: resource
- url: Core.yaml
  namespace: core
- url: Resource_caps.yaml
  namespace: rsrccps
- url: ServiceConditions_caps.yaml
  namespace: srvcndcp
node_types:
  ServiceConditions:
    description: >-
      The `ServiceConditions` schema contains definitions for reporting the conditions
      present in the service that require attention.
    properties:
      Description:
        type: resource:Description
        description: >-
          The description of this resource.  Used for commonality in the schema definitions.
        required: false
      HealthRollup:
        type: resource:Health
        description: >-
          The health roll-up for all resources.
        required: false
      Id:
        type: resource:Id
        description: >-
          The unique identifier for this resource within the collection of similar
          resources.
        required: true
      Name:
        type: resource:Name
        description: >-
          The name of the resource or array member.
        required: true
      Oem:
        type: resource:Oem
        description: >-
          The OEM extension property.
        required: false
    requirements:
    - Conditions:
        node: resource:Condition
        capability: rsrccps:ConditionContainable
        relationship: core:Contains
        count_range:
        - 0
        - UNBOUNDED
        description: >-
          Conditions reported by this service that require attention.
    capabilities:
      feature:
        type: srvcndcp:ServiceConditionsFeature
      containable:
        type: srvcndcp:ServiceConditionsContainable
