tosca_definitions_version: tosca_2_0
description: >-
  Types generated from JSON Schema by any2tosca
imports:
- url: Resource.yaml
  namespace: resource
- url: odata.4.0.0.yaml
  namespace: odata400
- url: Chassis.yaml
  namespace: chassis
- url: Core.yaml
  namespace: core
- url: PCIeDevice_caps.yaml
  namespace: pcdvccps
- url: Chassis_caps.yaml
  namespace: chssscps
- url: PCIeFunction_caps.yaml
  namespace: pcfnccp
data_types:
  DeviceType:
    derived_from: string
    validation:
      $valid_values:
      - $value
      - - SingleFunction
        - MultiFunction
        - Simulated
node_types:
  PCIeDevice:
    description: >-
      This is the schema definition for the PCIeDevice resource.  It represents the
      properties of a PCIeDevice attached to a System.
    properties:
      Oem:
        type: resource:Oem
        description: >-
          This is the manufacturer/provider specific extension moniker used to divide
          the Oem object into sections.
        required: false
      Id:
        type: resource:Id
        description: >-
          The unique identifier for this resource within the collection of similar
          resources.
        required: true
      Description:
        type: resource:Description
        description: >-
          The description of this resource.  Used for commonality in the schema definitions.
        required: false
      Name:
        type: resource:Name
        description: >-
          The name of the resource or array member.
        required: true
      Manufacturer:
        type: string
        description: >-
          This is the manufacturer of this PCIe device.
        required: false
      Model:
        type: string
        description: >-
          This is the model number for the PCIe device.
        required: false
      SKU:
        type: string
        description: >-
          This is the SKU for this PCIe device.
        required: false
      SerialNumber:
        type: string
        description: >-
          The serial number for this PCIe device.
        required: false
      PartNumber:
        type: string
        description: >-
          The part number for this PCIe device.
        required: false
      AssetTag:
        type: string
        description: >-
          The user assigned asset tag for this PCIe device.
        required: false
      DeviceType:
        type: DeviceType
        description: >-
          The device type for this PCIe device.
        required: false
      FirmwareVersion:
        type: string
        description: >-
          The version of firmware for this PCIe device.
        required: false
      Status:
        type: resource:Status
        description: >-
          The status and health of a resource and its children.
        required: false
      Links:
        type: Links
        description: >-
          The links object contains the links to other resources that are related
          to this resource.
        required: false
    capabilities:
      feature:
        type: pcdvccps:PCIeDeviceFeature
      containable:
        type: pcdvccps:PCIeDeviceContainable
  Links:
    description: >-
      The links object contains the links to other resources that are related to this
      resource.
    properties:
      Oem:
        type: resource:Oem
        description: >-
          Oem extension object.
        required: false
      Chassis@odata_count:
        type: odata400:count
        description: >-
          The number of items in a collection.
        required: false
      Chassis@odata_navigationLink:
        type: string
        required: false
      PCIeFunctions@odata_count:
        type: odata400:count
        description: >-
          The number of items in a collection.
        required: false
      PCIeFunctions@odata_navigationLink:
        type: string
        required: false
    requirements:
    - Chassis:
        node: chassis:Chassis
        capability: chssscps:ChassisContainable
        relationship: core:Contains
        count_range:
        - 0
        - UNBOUNDED
        description: >-
          An array of references to the chassis in which the PCIe device is contained
    - PCIeFunctions:
        node: PCIeFunction
        capability: pcfnccp:PCIeFunctionContainable
        relationship: core:Contains
        count_range:
        - 0
        - UNBOUNDED
        description: >-
          An array of references to PCIeFunctions exposed by this device.
    capabilities:
      containable:
        type: pcdvccps:LinksContainable
