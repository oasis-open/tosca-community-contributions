        description: >-
          The number of items in a collection.
        required: false
      SensorNumber:
        type: integer
        description: >-
          A numerical identifier to represent the temperature sensor.
        required: false
      Status:
        type: resource:Status
        description: >-
          This property describes the status and health of the resource and its children.
        required: false
      UpperThresholdCritical:
        type: float
        description: >-
          Above normal range but not yet fatal.
        required: false
      UpperThresholdFatal:
        type: float
        description: >-
          Above normal range and is fatal.
        required: false
      UpperThresholdNonCritical:
        type: float
        description: >-
          Above normal range.
        required: false
    requirements:
    - PhysicalContext:
        node: physcntx:PhysicalContext
        capability: phycntcp:PhysicalContextContainable
        relationship: core:Contains
        count_range:
        - 0
        - 1
        description: >-
          Describes the area or device to which this temperature measurement applies.
    capabilities:
      containable:
        type: thrmlcps:TemperatureContainable
