tosca_definitions_version: tosca_2_0
description: >-
  Types generated from JSON Schema by any2tosca
imports:
- url: Resource.yaml
  namespace: resource
- url: PhysicalContext.yaml
  namespace: physcntx
- url: Redundancy.yaml
  namespace: rdndncy
- url: odata-v4.yaml
  namespace: odatav4
- url: Core.yaml
  namespace: core
- url: Redundancy_caps.yaml
  namespace: rdndcps
- url: Thermal_caps.yaml
  namespace: thrmlcps
- url: PhysicalContext_caps.yaml
  namespace: phycntcp
data_types:
  FanActions:
    description: >-
      The available actions for this resource.
    properties:
      Oem:
        type: FanOemActions
        description: >-
          This property contains the available OEM specific actions for this resource.
        required: false
  FanOemActions:
    description: >-
      The available OEM specific actions for this resource.
  ReadingUnits:
    derived_from: string
    validation:
      $valid_values:
      - $value
      - - RPM
        - Percent
  TemperatureActions:
    description: >-
      The available actions for this resource.
    properties:
      Oem:
        type: TemperatureOemActions
        description: >-
          This property contains the available OEM specific actions for this resource.
        required: false
  TemperatureOemActions:
    description: >-
      The available OEM specific actions for this resource.
  ThermalActions:
    description: >-
      The available actions for this resource.
    properties:
      Oem:
        type: ThermalOemActions
        description: >-
          This property contains the available OEM specific actions for this resource.
        required: false
  ThermalOemActions:
    description: >-
      The available OEM specific actions for this resource.
node_types:
  Thermal:
    description: >-
      This is the schema definition for the Thermal properties.  It represents the
      properties for Temperature and Cooling.
    properties:
      Actions:
        type: ThermalActions
        description: >-
          The available actions for this resource.
        required: false
      Description:
        type: resource:Description
        description: >-
          The description of this resource.  Used for commonality in the schema definitions.
        required: false
      Fans:
        type: list
        description: >-
          This is the definition for fans.
        required: false
        entry_schema:
          type: Fan
      Fans@odata_count:
        type: odatav4:count
        description: >-
          The number of items in a collection.
        required: false
      Id:
        type: resource:Id
        description: >-
          The unique identifier for this resource within the collection of similar
          resources.
        required: true
      Name:
        type: resource:Name
        description: >-
          The name of the resource or array member.
        required: true
      Oem:
        type: resource:Oem
        description: >-
          This is the manufacturer/provider specific extension moniker used to divide
          the Oem object into sections.
        required: false
      Redundancy@odata_count:
        type: odatav4:count
        description: >-
          The number of items in a collection.
        required: false
      Status:
        type: resource:Status
        description: >-
          This property describes the status and health of the resource and its children.
        required: false
      Temperatures:
        type: list
        description: >-
          This is the definition for temperature sensors.
        required: false
        entry_schema:
          type: Temperature
      Temperatures@odata_count:
        type: odatav4:count
        description: >-
          The number of items in a collection.
        required: false
    requirements:
    - Redundancy:
        node: rdndncy:Redundancy
        capability: rdndcps:RedundancyContainable
        relationship: core:Contains
        count_range:
        - 0
        - UNBOUNDED
        description: >-
          This structure is used to show redundancy for fans.  The Component ids will
          reference the members of the redundancy groups.
    capabilities:
      feature:
        type: thrmlcps:ThermalFeature
      containable:
        type: thrmlcps:ThermalContainable
  Fan:
    properties:
      Actions:
        type: FanActions
        description: >-
          The available actions for this resource.
        required: false
      FanName:
        type: string
        description: >-
          Name of the fan.
        required: false
      IndicatorLED:
        type: resource:IndicatorLED
        description: >-
          The state of the indicator LED, used to identify this Fan.
        required: false
      LowerThresholdCritical:
        type: integer
        description: >-
          Below normal range but not yet fatal.
        required: false
      LowerThresholdFatal:
        type: integer
        description: >-
          Below normal range and is fatal.
        required: false
      LowerThresholdNonCritical:
        type: integer
        description: >-
          Below normal range.
        required: false
      Manufacturer:
        type: string
        description: >-
          This is the manufacturer of this Fan.
        required: false
      MaxReadingRange:
        type: integer
        description: >-
          Maximum value for Reading.
        required: false
      MemberId:
        type: string
        description: >-
          This is the identifier for the member within the collection.
        required: true
      MinReadingRange:
        type: integer
        description: >-
          Minimum value for Reading.
        required: false
      Model:
        type: string
        description: >-
          The model number for this Fan.
        required: false
      Name:
        type: string
        description: >-
          Name of the fan.
        required: false
      Oem:
        type: resource:Oem
        description: >-
          This is the manufacturer/provider specific extension moniker used to divide
          the Oem object into sections.
        required: false
      PartNumber:
        type: string
        description: >-
          The part number for this Fan.
        required: false
      Reading:
        type: integer
        description: >-
          Current fan speed.
        required: false
      ReadingUnits:
        type: ReadingUnits
        description: >-
          Units in which the reading and thresholds are measured.
        required: false
      Redundancy@odata_count:
        type: odatav4:count
        description: >-
          The number of items in a collection.
        required: false
      RelatedItem:
        type: list
        description: >-
          The ID(s) of the resources serviced with this fan.
        required: false
        entry_schema:
          type: odatav4:idRef
      RelatedItem@odata_count:
        type: odatav4:count
        description: >-
          The number of items in a collection.
        required: false
      SerialNumber:
        type: string
        description: >-
          The serial number for this Fan.
        required: false
      SparePartNumber:
        type: string
        description: >-
          The spare part number for this Fan.
        required: false
      Status:
        type: resource:Status
        description: >-
          This property describes the status and health of the resource and its children.
        required: false
      UpperThresholdCritical:
        type: integer
        description: >-
          Above normal range but not yet fatal.
        required: false
      UpperThresholdFatal:
        type: integer
        description: >-
          Above normal range and is fatal.
        required: false
      UpperThresholdNonCritical:
        type: integer
        description: >-
          Above normal range.
        required: false
    requirements:
    - PhysicalContext:
        node: physcntx:PhysicalContext
        capability: phycntcp:PhysicalContextContainable
        relationship: core:Contains
        count_range:
        - 0
        - 1
        description: >-
          Describes the area or device associated with this fan.
    - Redundancy:
        node: rdndncy:Redundancy
        capability: rdndcps:RedundancyContainable
        relationship: core:Contains
        count_range:
        - 0
        - UNBOUNDED
        description: >-
          This structure is used to show redundancy for fans.  The Component ids will
          reference the members of the redundancy groups.
    capabilities:
      containable:
        type: thrmlcps:FanContainable
  Temperature:
    properties:
      Actions:
        type: TemperatureActions
        description: >-
          The available actions for this resource.
        required: false
      LowerThresholdCritical:
        type: float
        description: >-
          Below normal range but not yet fatal.
        required: false
      LowerThresholdFatal:
        type: float
        description: >-
          Below normal range and is fatal.
        required: false
      LowerThresholdNonCritical:
        type: float
        description: >-
          Below normal range.
        required: false
      MaxReadingRangeTemp:
        type: float
        description: >-
          Maximum value for ReadingCelsius.
        required: false
      MemberId:
        type: string
        description: >-
          This is the identifier for the member within the collection.
        required: true
      MinReadingRangeTemp:
