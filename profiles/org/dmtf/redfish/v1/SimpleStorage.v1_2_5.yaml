tosca_definitions_version: tosca_2_0
description: >-
  Types generated from JSON Schema by any2tosca
imports:
- url: Resource.yaml
  namespace: resource
- url: Chassis.yaml
  namespace: chassis
- url: Core.yaml
  namespace: core
- url: Chassis_caps.yaml
  namespace: chssscps
- url: SimpleStorage_caps.yaml
  namespace: smpstrcp
data_types:
  Device:
    description: >-
      A storage device, such as a disk drive or optical media device.
    properties:
      CapacityBytes:
        type: integer
        description: >-
          The size, in bytes, of the storage device.
        required: false
        validation:
          $greater_or_equal:
          - $value
          - 0
      Manufacturer:
        type: string
        description: >-
          The name of the manufacturer of this device.
        required: false
      Model:
        type: string
        description: >-
          The product model number of this device.
        required: false
      Name:
        type: string
        description: >-
          The name of the resource or array member.
        required: true
      Oem:
        type: resource:Oem
        description: >-
          The OEM extension property.
        required: false
      Status:
        type: resource:Status
        description: >-
          The status and health of the resource and its subordinate or dependent resources.
        required: false
relationship_types:
  SimpleStorageDependsOn:
    derived_from: core:DependsOn
    properties:
      Oem:
        type: resource:Oem
        description: >-
          The OEM extension property.
        required: false
node_types:
  SimpleStorage:
    description: >-
      The `SimpleStorage` schema represents the properties of a storage controller
      and its directly-attached devices.
    properties:
      Description:
        type: resource:Description
        description: >-
          The description of this resource.  Used for commonality in the schema definitions.
        required: false
      Devices:
        type: list
        description: >-
          The storage devices.
        required: false
        entry_schema:
          type: Device
      Id:
        type: resource:Id
        description: >-
          The unique identifier for this resource within the collection of similar
          resources.
        required: true
      Name:
        type: resource:Name
        description: >-
          The name of the resource or array member.
        required: true
      Oem:
        type: resource:Oem
        description: >-
          The OEM extension property.
        required: false
      Status:
        type: resource:Status
        description: >-
          The status and health of the resource and its subordinate or dependent resources.
        required: false
      UefiDevicePath:
        type: string
        description: >-
          The UEFI device path to access this storage controller.
        required: false
    requirements:
    - Chassis:
        node: chassis:Chassis
        capability: chssscps:ChassisFeature
        relationship: SimpleStorageDependsOn
        count_range:
        - 0
        - 1
        description: >-
          The link to the chassis that contains this simple storage.
    capabilities:
      feature:
        type: smpstrcp:SimpleStorageFeature
      containable:
        type: smpstrcp:SimpleStorageContainable
