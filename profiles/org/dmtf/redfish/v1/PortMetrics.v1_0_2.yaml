tosca_definitions_version: tosca_2_0
description: >-
  Types generated from JSON Schema by any2tosca
imports:
- url: Resource.yaml
  namespace: resource
- url: Core.yaml
  namespace: core
- url: PortMetrics_caps.yaml
  namespace: prtmtrcp
data_types:
  GenZ:
    description: >-
      The port metrics for a Gen-Z interface.
    properties:
      AccessKeyViolations:
        type: integer
        description: >-
          The total number of Access Key Violations detected.
        required: false
      EndToEndCRCErrors:
        type: integer
        description: >-
          The total number of ECRC transient errors detected.
        required: false
      LLRRecovery:
        type: integer
        description: >-
          The total number of times Link-Level Reliability (LLR) recovery has been
          initiated.
        required: false
      LinkNTE:
        type: integer
        description: >-
          The total number of link-local non-transient errors detected.
        required: false
      MarkedECN:
        type: integer
        description: >-
          The number of packets with the Congestion ECN bit set.
        required: false
      NonCRCTransientErrors:
        type: integer
        description: >-
          The total number transient errors detected that are unrelated to CRC validation.
        required: false
      PacketCRCErrors:
        type: integer
        description: >-
          The total number of PCRC transient errors detected.
        required: false
      PacketDeadlineDiscards:
        type: integer
        description: >-
          The number of packets discarded due to the Congestion Deadline sub-field
          reaching zero.
        required: false
      RXStompedECRC:
        type: integer
        description: >-
          The total number of packets received with a stomped ECRC field.
        required: false
      ReceivedECN:
        type: integer
        description: >-
          The number of packets received on this interface with the Congestion ECN
          bit set.
        required: false
      TXStompedECRC:
        type: integer
        description: >-
          The total number of packets that this interface stomped the ECRC field.
        required: false
node_types:
  PortMetrics:
    description: >-
      The PortMetrics schema contains usage and health statistics for a switch device
      or component port summary.
    properties:
      Description:
        type: resource:Description
        description: >-
          The description of this resource.  Used for commonality in the schema definitions.
        required: false
      GenZ:
        type: GenZ
        description: >-
          The port metrics specific to Gen-Z ports.
        required: false
      Id:
        type: resource:Id
        description: >-
          The unique identifier for this resource within the collection of similar
          resources.
        required: true
      Name:
        type: resource:Name
        description: >-
          The name of the resource or array member.
        required: true
      Oem:
        type: resource:Oem
        description: >-
          The OEM extension property.
        required: false
    capabilities:
      feature:
        type: prtmtrcp:PortMetricsFeature
      containable:
        type: prtmtrcp:PortMetricsContainable
