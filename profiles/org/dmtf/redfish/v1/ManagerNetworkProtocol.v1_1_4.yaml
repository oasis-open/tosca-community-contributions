tosca_definitions_version: tosca_2_0
description: >-
  Types generated from JSON Schema by any2tosca
imports:
- url: Resource.yaml
  namespace: resource
- url: Core.yaml
  namespace: core
- url: ManagerNetworkProtocol_caps.yaml
  namespace: mnntprcp
data_types:
  HTTPSProtocol:
    description: >-
      The settings for a network protocol associated with a manager.
    properties:
      Port:
        type: integer
        description: >-
          The protocol port.
        required: false
        validation:
          $greater_or_equal:
          - $value
          - 0
      ProtocolEnabled:
        type: boolean
        description: >-
          An indication of whether the protocol is enabled.
        required: false
  NotifyIPv6Scope:
    derived_from: string
    validation:
      $valid_values:
      - $value
      - - Link
        - Site
        - Organization
  Protocol:
    description: >-
      The settings for a network protocol associated with a manager.
    properties:
      Port:
        type: integer
        description: >-
          The protocol port.
        required: false
        validation:
          $greater_or_equal:
          - $value
          - 0
      ProtocolEnabled:
        type: boolean
        description: >-
          An indication of whether the protocol is enabled.
        required: false
  SSDProtocol:
    description: >-
      The settings for a network protocol associated with a manager.
    properties:
      NotifyIPv6Scope:
        type: NotifyIPv6Scope
        description: >-
          The IPv6 scope for multicast NOTIFY messages for SSDP.
        required: false
      NotifyMulticastIntervalSeconds:
        type: integer
        description: >-
          The time interval, in seconds, between transmissions of the multicast NOTIFY
          ALIVE message from this service for SSDP.
        required: false
        validation:
          $greater_or_equal:
          - $value
          - 0
      NotifyTTL:
        type: integer
        description: >-
          The time-to-live hop count for SSDP multicast NOTIFY messages.
        required: false
        validation:
          $greater_or_equal:
          - $value
          - 1
      Port:
        type: integer
        description: >-
          The protocol port.
        required: false
        validation:
          $greater_or_equal:
          - $value
          - 0
      ProtocolEnabled:
        type: boolean
        description: >-
          An indication of whether the protocol is enabled.
        required: false
