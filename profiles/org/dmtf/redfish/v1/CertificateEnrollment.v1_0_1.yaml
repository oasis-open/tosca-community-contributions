tosca_definitions_version: tosca_2_0
description: >-
  Types generated from JSON Schema by any2tosca
imports:
- url: Certificate.yaml
  namespace: crtfct
- url: odata-v4.yaml
  namespace: odatav4
- url: CertificateCollection.yaml
  namespace: crtfcllc
- url: Resource.yaml
  namespace: resource
- url: Core.yaml
  namespace: core
- url: Certificate_caps.yaml
  namespace: crtfcps
- url: CertificateCollection_caps.yaml
  namespace: crtcllcp
- url: CertificateEnrollment_caps.yaml
  namespace: crtenrcp
data_types:
  ACMEChallengeType:
    derived_from: string
    validation:
      $valid_values:
      - $value
      - - Http01
        - Dns01
  ACMEConfiguration:
    description: >-
      ACME protocol specific configuration.
    properties:
      ChallengeType:
        type: ACMEChallengeType
        description: >-
          The ACME challenge type used for domain validation.
        required: false
      EABKey:
        type: string
        description: >-
          The external account binding (EAB) key value.
        required: false
      EABKeyId:
        type: string
        description: >-
          The external account binding (EAB) key identifier.
        required: false
      Email:
        type: string
        description: >-
          The email address for ACME account registration.
        required: false
  CSRParameters:
    description: >-
      Certificate signing request parameters.
    properties:
      AlternativeNames:
        type: list
        description: >-
          The additional host names of the component to secure.
        required: false
        entry_schema:
          type: string
      ChallengePassword:
        type: string
        description: >-
          The challenge password to apply to the certificate for revocation requests.
        required: false
      City:
        type: string
        description: >-
          The city or locality of the organization making the request.
        required: false
      CommonName:
        type: string
        description: >-
          The name of the component to secure.
        required: false
      ContactPerson:
        type: string
        description: >-
          The name of the user making the request.
        required: false
      Country:
        type: string
        description: >-
          The two-letter country code of the organization making the request.
        required: false
      Email:
        type: string
        description: >-
          The email address of the contact within the organization making the request.
        required: false
      GivenName:
        type: string
        description: >-
          The given name of the user making the request.
        required: false
      Initials:
        type: string
        description: >-
          The initials of the user making the request.
        required: false
      KeyBitLength:
        type: integer
        description: >-
          The length of the key, in bits, if needed based on the `KeyPairAlgorithm`
          property value.
        required: false
      KeyCurveId:
        type: string
        description: >-
          The curve ID to use with the key, if needed based on the `KeyPairAlgorithm`
          property value.
        required: false
      KeyPairAlgorithm:
        type: string
        description: >-
          The type of key-pair for use with signing algorithms.
        required: false
      KeyUsage:
        type: list
        description: >-
          The usage of the key contained in the certificate.
        required: false
        entry_schema:
          type: crtfct:KeyUsage
      Organization:
        type: string
        description: >-
          The name of the organization making the request.
        required: false
      OrganizationalUnit:
        type: string
        description: >-
          The name of the unit or division of the organization making the request.
        required: false
      State:
        type: string
        description: >-
          The state, province, or region of the organization making the request.
        required: false
      Surname:
        type: string
        description: >-
          The surname of the user making the request.
        required: false
      UnstructuredName:
        type: string
        description: >-
          The unstructured name of the subject.
        required: false
  EnrollmentState:
    description: >-
      The status information for an enrollment.
    properties:
      LastOperation:
        type: LastOperationType
        description: >-
          The last operation performed by the automatic enrollment service.
        required: false
      LastOperationStatus:
        type: OperationStatus
        description: >-
          The status of the last operation performed by automatic enrollment service.
        required: false
      LastOperationTime:
        type: string
        description: >-
          The date and time when the last operation was performed.
        required: false
  LastOperationType:
    derived_from: string
    validation:
      $valid_values:
      - $value
      - - Renew
        - UpdateAcmeEmail
  OperationStatus:
    derived_from: string
    validation:
      $valid_values:
      - $value
      - - Success
        - Failed
        - InProgress
        - Unknown
  SCEPConfiguration:
    description: >-
      SCEP protocol specific configuration.
    properties:
      ChallengePassword:
        type: string
        description: >-
          The challenge password for SCEP enrollment.
        required: false
relationship_types:
  CertificateEnrollmentDependsOn:
    derived_from: core:DependsOn
    properties:
      CACertificates@odata_count:
        type: odatav4:count
        description: >-
          The number of items in a collection.
        required: false
      Oem:
        type: resource:Oem
        description: >-
          The OEM extension property.
        required: false
node_types:
  CertificateEnrollment:
    description: >-
      This resource shall represent an automatic certificate enrollment for a Redfish
      implementation.
    properties:
      ACME:
        type: ACMEConfiguration
        description: >-
          ACME (Automatic Certificate Management Environment) protocol specific configuration
          for automatic certificate enrollment.
        required: false
      CSRParameters:
        type: CSRParameters
        description: >-
          The certificate signing request parameters.
        required: false
      Description:
        type: resource:Description
        description: >-
          The description of this resource.  Used for commonality in the schema definitions.
        required: false
      Enabled:
        type: boolean
        description: >-
          An indication of whether this automatic certificate enrollment is enabled.
        required: false
      EnrollmentState:
        type: EnrollmentState
        description: >-
          The status information for this enrollment.
        required: false
      EnrollmentType:
        type: string
        description: >-
          The configured automatic certificate enrollment protocol.
        required: false
        validation:
          $valid_values:
          - $value
          - - ACME
            - SCEP
            - OEM
      Id:
        type: resource:Id
        description: >-
          The unique identifier for this resource within the collection of similar
          resources.
        required: true
      Name:
        type: resource:Name
        description: >-
          The name of the resource or array member.
        required: true
      Oem:
        type: resource:Oem
        description: >-
          The OEM extension property.
        required: false
      RenewBeforeExpiryDays:
        type: integer
        description: >-
          The number of days before certificate expiry to begin automatic renewal
          of the certificate.
        required: false
        validation:
          $greater_or_equal:
          - $value
          - 1
      SCEP:
        type: SCEPConfiguration
        description: >-
          SCEP (Simple Certificate Enrollment Protocol) protocol specific configuration
          for automatic certificate enrollment.
        required: false
      ServerURI:
        type: string
        description: >-
          The URI of the certificate enrollment server.
        required: false
      VerifyCertificate:
        type: boolean
        description: >-
          An indication of whether the service will verify the certificate of the
          server referenced by the `ServerURI` property.
        required: false
    requirements:
    - CACertificates:
        node: crtfct:Certificate
        capability: crtfcps:CertificateFeature
        relationship: CertificateEnrollmentDependsOn
        count_range:
        - 0
        - UNBOUNDED
        description: >-
          The list of server certificates for the server referenced by the `ServerURI`
          property.
    - EnrolledCertificate:
        node: crtfct:Certificate
        capability: crtfcps:CertificateFeature
        relationship: CertificateEnrollmentDependsOn
        count_range:
        - 0
        - 1
        description: >-
          The link to the enrolled certificate.
    - EnrolledCertificateLocation:
        node: crtfcllc:CertificateCollection
        capability: crtcllcp:CertificateCollectionFeature
        relationship: CertificateEnrollmentDependsOn
        count_range:
        - 0
        - 1
        description: >-
          The link to the certificate collection where the enrolled certificate will
          be installed.
    capabilities:
      feature:
        type: crtenrcp:CertificateEnrollmentFeature
      containable:
        type: crtenrcp:CertificateEnrollmentContainable
