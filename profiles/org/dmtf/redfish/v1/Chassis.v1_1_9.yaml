tosca_definitions_version: tosca_2_0
description: >-
  Types generated from JSON Schema by any2tosca
imports:
- url: Resource.yaml
  namespace: resource
- url: odata-v4.yaml
  namespace: odatav4
- url: Chassis.yaml
  namespace: chassis
- url: Core.yaml
  namespace: core
- url: ComputerSystem_caps.yaml
  namespace: cmpsyscp
- url: Chassis_caps.yaml
  namespace: chssscps
- url: Manager_caps.yaml
  namespace: mngrcps
- url: LogServiceCollection.yaml
  namespace: lgsrvcl
- url: Power.yaml
  namespace: power
- url: Thermal.yaml
  namespace: thermal
- url: LogServiceCollection_caps.yaml
  namespace: lgsrclcp
- url: Power_caps.yaml
  namespace: pwrcps
- url: Thermal_caps.yaml
  namespace: thrmlcps
data_types:
  ChassisType:
    derived_from: string
    validation:
      $valid_values:
      - $value
      - - Rack
        - Blade
        - Enclosure
        - StandAlone
        - RackMount
        - Card
        - Cartridge
        - Row
        - Pod
        - Expansion
        - Sidecar
        - Zone
        - Sled
        - Shelf
        - Drawer
        - Module
        - Component
        - Other
  IndicatorLED:
    derived_from: string
    validation:
      $valid_values:
      - $value
      - - Unknown
        - Lit
        - Blinking
        - 'Off'
  IntrusionSensor:
    derived_from: string
    validation:
      $valid_values:
      - $value
      - - Normal
        - HardwareIntrusion
        - TamperingDetected
  IntrusionSensorReArm:
    derived_from: string
    validation:
      $valid_values:
      - $value
      - - Manual
        - Automatic
  PhysicalSecurity:
    description: >-
      The state of the physical security sensor.
    properties:
      IntrusionSensor:
        type: IntrusionSensor
        description: >-
          This indicates the known state of the physical security sensor, such as
          if it is hardware intrusion detected.
        required: false
      IntrusionSensorNumber:
        type: integer
        description: >-
          A numerical identifier to represent the physical security sensor.
        required: false
      IntrusionSensorReArm:
        type: IntrusionSensorReArm
        description: >-
          This indicates how the Normal state to be restored.
        required: false
  PowerState:
    derived_from: string
    validation:
      $valid_values:
      - $value
      - - 'On'
        - 'Off'
        - PoweringOn
        - PoweringOff
relationship_types:
  ChassisDependsOn:
    derived_from: core:DependsOn
    properties:
      ComputerSystems@odata_count:
        type: odatav4:count
        description: >-
          The number of items in a collection.
        required: false
      Contains@odata_count:
        type: odatav4:count
        description: >-
          The number of items in a collection.
        required: false
      CooledBy:
        type: list
        description: >-
          An array of ID[s] of resources that cool this chassis. Normally the ID will
          be a chassis or a specific set of fans.
        required: false
        entry_schema:
          type: odatav4:idRef
      CooledBy@odata_count:
        type: odatav4:count
        description: >-
          The number of items in a collection.
        required: false
      ManagedBy@odata_count:
        type: odatav4:count
        description: >-
          The number of items in a collection.
        required: false
      Oem:
        type: resource:Oem
        description: >-
          Oem extension object.
        required: false
      PoweredBy:
        type: list
        description: >-
          An array of ID[s] of resources that power this chassis. Normally the ID
          will be a chassis or a specific set of Power Supplies.
        required: false
        entry_schema:
          type: odatav4:idRef
      PoweredBy@odata_count:
        type: odatav4:count
        description: >-
          The number of items in a collection.
        required: false
interface_types:
  ChassisActions:
    operations:
      Reset:
        description: >-
          This action is used to reset the chassis. This action resets the chassis,
          not Systems or other contained resources, although side effects may occur
          which affect those resources.
        inputs:
          ResetType:
            type: resource:ResetType
            description: >-
              The type of reset to be performed.
            required: false
node_types:
  Chassis:
    description: >-
      The Chassis schema represents the physical components of a system.  This resource
      represents the sheet-metal confined spaces and logical zones such as racks,
      enclosures, chassis and all other containers. Subsystems (like sensors) that
      operate outside of a system's data plane (meaning the resources are not accessible
      to software running on the system) are linked either directly or indirectly
      through this resource.
    properties:
      AssetTag:
        type: string
        description: >-
          The user assigned asset tag of this chassis.
        required: false
      ChassisType:
        type: ChassisType
        description: >-
          The type of physical form factor of the chassis.
        required: true
      Description:
        type: resource:Description
        description: >-
          The description of this resource.  Used for commonality in the schema definitions.
        required: false
      Id:
        type: resource:Id
        description: >-
          The unique identifier for this resource within the collection of similar
          resources.
        required: true
      IndicatorLED:
        type: IndicatorLED
        description: >-
          The state of the indicator LED, used to identify the chassis.
        required: false
      Manufacturer:
        type: string
        description: >-
          The manufacturer of this chassis.
        required: false
      Model:
        type: string
        description: >-
          The model number of the chassis.
        required: false
      Name:
        type: resource:Name
        description: >-
          The name of the resource or array member.
        required: true
      Oem:
        type: resource:Oem
        description: >-
          This is the manufacturer/provider specific extension moniker used to divide
          the Oem object into sections.
        required: false
      PartNumber:
        type: string
        description: >-
          The part number of the chassis.
        required: false
      PhysicalSecurity:
        type: PhysicalSecurity
        description: >-
          The state of the physical security sensor.
        required: false
      PowerState:
        type: PowerState
        description: >-
          The current power state of the chassis.
        required: false
      SKU:
        type: string
        description: >-
          The SKU of the chassis.
        required: false
      SerialNumber:
        type: string
        description: >-
          The serial number of the chassis.
        required: false
      Status:
        type: resource:Status
        description: >-
          This property describes the status and health of the resource and its children.
        required: false
    requirements:
    - LogServices:
        node: lgsrvcl:LogServiceCollection
        capability: lgsrclcp:LogServiceCollectionContainable
        relationship: core:Contains
        count_range:
        - 0
        - 1
        description: >-
          A reference to the logs for this chassis.
    - Power:
        node: power:Power
        capability: pwrcps:PowerContainable
        relationship: core:Contains
        count_range:
        - 0
        - 1
        description: >-
          A reference to the power properties (power supplies, power policies, sensors)
          of this chassis.
    - Thermal:
        node: thermal:Thermal
        capability: thrmlcps:ThermalContainable
        relationship: core:Contains
        count_range:
        - 0
        - 1
        description: >-
          A reference to the thermal properties (fans, cooling, sensors) of this chassis.
    - ComputerSystems:
        node: ComputerSystem
        capability: cmpsyscp:ComputerSystemFeature
        relationship: ChassisDependsOn
        count_range:
        - 0
        - UNBOUNDED
        description: >-
          An array of references to the computer systems contained in this chassis.  This
          will only reference ComputerSystems that are directly and wholly contained
          in this chassis.
    - ContainedBy:
        node: chassis:Chassis
        capability: chssscps:ChassisFeature
        relationship: ChassisDependsOn
        count_range:
        - 0
        - 1
        description: >-
          A reference to the chassis that this chassis is contained by.
    - Contains:
        node: chassis:Chassis
        capability: chssscps:ChassisFeature
        relationship: ChassisDependsOn
        count_range:
        - 0
        - UNBOUNDED
        description: >-
          An array of references to any other chassis that this chassis has in it.
    - ManagedBy:
        node: Manager
        capability: mngrcps:ManagerFeature
        relationship: ChassisDependsOn
        count_range:
        - 0
        - UNBOUNDED
        description: >-
          An array of references to the Managers responsible for managing this chassis.
    interfaces:
      Actions:
        type: ChassisActions
    capabilities:
      feature:
        type: chssscps:ChassisFeature
      containable:
        type: chssscps:ChassisContainable
