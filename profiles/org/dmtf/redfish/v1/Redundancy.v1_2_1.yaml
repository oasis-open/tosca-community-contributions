tosca_definitions_version: tosca_2_0
description: >-
  Types generated from JSON Schema by any2tosca
imports:
- url: Resource.yaml
  namespace: resource
- url: odata.v4_0_3.yaml
  namespace: odata
- url: Core.yaml
  namespace: core
- url: Redundancy_caps.yaml
  namespace: rdndcps
data_types:
  RedundancyMode:
    derived_from: string
    validation:
      $valid_values:
      - $value
      - - Failover
        - N+m
        - Sharing
        - Sparing
        - NotRedundant
node_types:
  Redundancy:
    description: >-
      This is the redundancy definition to be used in other resource schemas.
    properties:
      MaxNumSupported:
        type: integer
        description: >-
          This is the maximum number of members allowable for this particular redundancy
          group.
        required: true
      MemberId:
        type: string
        description: >-
          This is the identifier for the member within the collection.
        required: true
      MinNumNeeded:
        type: integer
        description: >-
          This is the minumum number of members needed for this group to be redundant.
        required: true
      Mode:
        type: RedundancyMode
        description: >-
          This is the redundancy mode of the group.
        required: true
      Name:
        type: string
        description: >-
          The name of the resource or array element.
        required: true
      Oem:
        type: resource:Oem
        description: >-
          This is the manufacturer/provider specific extension moniker used to divide
          the Oem object into sections.
        required: false
      RedundancyEnabled:
        type: boolean
        description: >-
          This indicates whether redundancy is enabled.
        required: false
      RedundancySet:
        type: list
        description: >-
          Contains any ids that represent components of this redundancy set.
        required: true
        entry_schema:
          type: odata:idRef
      RedundancySet@odata_count:
        type: odata:count
        description: >-
          The number of items in a collection.
        required: false
      Status:
        type: resource:Status
        description: >-
          This property describes the status and health of the resource and its children.
        required: true
    capabilities:
      feature:
        type: rdndcps:RedundancyFeature
      containable:
        type: rdndcps:RedundancyContainable
