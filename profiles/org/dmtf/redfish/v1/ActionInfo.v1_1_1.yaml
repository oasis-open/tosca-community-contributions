tosca_definitions_version: tosca_2_0
description: >-
  Types generated from JSON Schema by any2tosca
imports:
- url: Resource.yaml
  namespace: resource
- url: Core.yaml
  namespace: core
- url: ActionInfo_caps.yaml
  namespace: actinfcp
data_types:
  ParameterTypes:
    derived_from: string
    validation:
      $valid_values:
      - $value
      - - Boolean
        - Number
        - NumberArray
        - String
        - StringArray
        - Object
        - ObjectArray
  Parameters:
    description: >-
      A parameter associated with the specified Redfish Action.
    properties:
      AllowableValues:
        type: list
        description: >-
          A list of values for this parameter supported by this Action target.
        required: false
        entry_schema:
          type: string
      DataType:
        type: ParameterTypes
        description: >-
          The JSON property type used for this parameter.
        required: false
      MaximumValue:
        type: float
        description: >-
          The maximum supported value of this parameter.
        required: false
      MinimumValue:
        type: float
        description: >-
          The minimum supported value for this parameter.
        required: false
      Name:
        type: string
        description: >-
          The name of the parameter for this Action.
        required: true
      ObjectDataType:
        type: string
        description: >-
          The OData Type of an object-based parameter.
        required: false
      Required:
        type: boolean
        description: >-
          Indicates whether the parameter is required to perform this Action.
        required: false
node_types:
  ActionInfo:
    description: >-
      The ActionInfo schema describes the parameters and other information necessary
      to perform a Redfish Action on a particular Action target. Parameter support
      can differ between vendors and even between instances of a resource. This data
      can be used to ensure Action requests from applications contain supported parameters.
    properties:
      Description:
        type: resource:Description
        description: >-
          The description of this resource.  Used for commonality in the schema definitions.
        required: false
      Id:
        type: resource:Id
        description: >-
          The unique identifier for this resource within the collection of similar
          resources.
        required: true
      Name:
        type: resource:Name
        description: >-
          The name of the resource or array member.
        required: true
      Oem:
        type: resource:Oem
        description: >-
          This is the manufacturer/provider specific extension moniker used to divide
          the Oem object into sections.
        required: false
      Parameters:
        type: list
        description: >-
          The parameters associated with the specified Redfish Action.
        required: false
        entry_schema:
          type: Parameters
    capabilities:
      feature:
        type: actinfcp:ActionInfoFeature
      containable:
        type: actinfcp:ActionInfoContainable
