tosca_definitions_version: tosca_2_0
description: >-
  Types generated from JSON Schema by any2tosca
imports:
- url: Endpoint.yaml
  namespace: endpoint
- url: odata-v4.yaml
  namespace: odatav4
- url: Switch.yaml
  namespace: switch
- url: Resource.yaml
  namespace: resource
- url: Core.yaml
  namespace: core
- url: Endpoint_caps.yaml
  namespace: endpcps
- url: Switch_caps.yaml
  namespace: swtchcps
- url: Zone_caps.yaml
  namespace: zonecaps
relationship_types:
  ZoneDependsOn:
    derived_from: core:DependsOn
    properties:
      Endpoints@odata_count:
        type: odatav4:count
        description: >-
          The number of items in a collection.
        required: false
      InvolvedSwitches@odata_count:
        type: odatav4:count
        description: >-
          The number of items in a collection.
        required: false
      Oem:
        type: resource:Oem
        description: >-
          The OEM extension property.
        required: false
node_types:
  Zone:
    description: >-
      The Zone schema describes a simple fabric zone for a Redfish implementation.
    properties:
      Description:
        type: resource:Description
        description: >-
          The description of this resource.  Used for commonality in the schema definitions.
        required: false
      Id:
        type: resource:Id
        description: >-
          The unique identifier for this resource within the collection of similar
          resources.
        required: true
      Name:
        type: resource:Name
        description: >-
          The name of the resource or array member.
        required: true
      Oem:
        type: resource:Oem
        description: >-
          The OEM extension property.
        required: false
      Status:
        type: resource:Status
        description: >-
          The status and health of the resource and its subordinate or dependent resources.
        required: false
    requirements:
    - Endpoints:
        node: endpoint:Endpoint
        capability: endpcps:EndpointFeature
        relationship: ZoneDependsOn
        count_range:
        - 0
        - UNBOUNDED
        description: >-
          The links to the endpoints that this zone contains.
    - InvolvedSwitches:
        node: switch:Switch
        capability: swtchcps:SwitchFeature
        relationship: ZoneDependsOn
        count_range:
        - 0
        - UNBOUNDED
        description: >-
          The links to the collection of switches in this zone.
    capabilities:
      feature:
        type: zonecaps:ZoneFeature
      containable:
        type: zonecaps:ZoneContainable
