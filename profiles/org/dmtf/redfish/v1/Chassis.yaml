data_types:
  PhysicalSecurity:
    description: >-
      The physical security state of the chassis.
    properties:
      IntrusionSensor:
        type: string
        description: >-
          The physical security state of the chassis, such as if hardware intrusion
          is detected.
        required: false
      IntrusionSensorNumber:
        type: integer
        description: >-
          A numerical identifier to represent the physical security sensor.
        required: false
      IntrusionSensorReArm:
        type: string
        description: >-
          The policy that describes how the physical security state of the chassis
          returns to a normal state.
        required: false
  Doors:
    description: >-
      The doors or access panels of the chassis.
    properties:
      Front:
        type: Front
        description: >-
          The front door of the chassis.
        required: false
      Rear:
        type: Rear
        description: >-
          The rear door of the chassis.
        required: false
  Front:
    description: >-
      The front door of the chassis.
    properties:
      DoorState:
        type: string
        description: >-
          The state of the door.
        required: false
      Locked:
        type: boolean
        description: >-
          Indicates if the door is locked.
        required: false
      UserLabel:
        type: string
        description: >-
          A user-assigned label.
        required: false
  Rear:
    description: >-
      The rear door of the chassis.
    properties:
      DoorState:
        type: string
        description: >-
          The state of the door.
        required: false
      Locked:
        type: boolean
        description: >-
          Indicates if the door is locked.
        required: false
      UserLabel:
        type: string
        description: >-
          A user-assigned label.
        required: false
