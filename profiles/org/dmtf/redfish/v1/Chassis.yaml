interface_types:
  ChassisActions:
    operations:
      Reset:
        description: >-
          This action resets the chassis.  Additionally, it could reset systems or
          other contained resources depending on the `ResetType` used to invoke this
          action.
        inputs:
          ResetType:
            type: resource:ResetType
            description: >-
              The type of reset.
            required: false
node_types:
  Chassis:
    description: >-
      The `Chassis` schema represents the physical components of a system.  This resource
      represents the sheet-metal confined spaces and logical zones such as racks,
      enclosures, chassis and all other containers.  Subsystems, such as sensors,
      that operate outside of a system's data plane are linked either directly or
      indirectly through this resource.  A subsystem that operates outside of a system's
      data plane are not accessible to software that runs on the system.  It also
      describes the location, such as a slot, socket, or bay, where a unit can be
      installed, by populating a resource instance with an absent state if a unit
      is not present.
    properties:
      '@odata_id':
        type: odatav4:id
        description: >-
          The unique identifier for a resource.
        required: true
      '@odata_context':
        type: odatav4:context
        description: >-
          The OData description of a payload.
        required: false
      '@odata_etag':
        type: odatav4:etag
        description: >-
          The current ETag of the resource.
        required: false
      '@odata_type':
        type: odatav4:type
        description: >-
          The type of a resource.
        required: true
      AssetTag:
        type: string
        description: >-
          The user-assigned asset tag of this chassis.
        required: false
      ChassisType:
        type: string
        description: >-
          The type of physical form factor of the chassis.
        required: true
        validation:
          $valid_values:
          - $value
          - - Rack
            - Blade
            - Enclosure
            - StandAlone
            - RackMount
            - Card
            - Cartridge
            - Row
            - Pod
            - Expansion
            - Sidecar
            - Zone
            - Sled
            - Shelf
            - Drawer
            - Module
            - Component
            - IPBasedDrive
            - RackGroup
            - StorageEnclosure
            - ImmersionTank
            - HeatExchanger
            - PowerStrip
            - Other
      Description:
        type: string
        required: false
      Id:
        type: resource:Id
        description: >-
          The unique identifier for this resource within the collection of similar
          resources.
        required: true
      IndicatorLED:
        type: string
        description: >-
          The state of the indicator LED, which identifies the chassis.
        required: false
      Manufacturer:
        type: string
        description: >-
          The manufacturer of this chassis.
        required: false
      Model:
        type: string
        description: >-
          The model number of the chassis.
        required: false
      Name:
        type: resource:Name
        description: >-
          The name of the resource or array member.
        required: true
      Oem:
        type: resource:Oem
        description: >-
          The OEM extension property.
        required: false
      PartNumber:
        type: string
        description: >-
          The part number of the chassis.
        required: false
      PowerState:
        type: string
        description: >-
          The current power state of the chassis.
        required: false
      SKU:
        type: string
        description: >-
          The SKU of the chassis.
        required: false
      SerialNumber:
        type: string
        description: >-
          The serial number of the chassis.
        required: false
      Status:
        type: resource:Status
        description: >-
          The status and health of the resource and its subordinate or dependent resources.
        required: false
      PhysicalSecurity:
        type: PhysicalSecurity
        description: >-
          The physical security state of the chassis.
        required: false
      Location:
        type: resource:Location
        description: >-
          The location of the chassis.
        required: false
      DepthMm:
        type: float
        description: >-
          The depth of the chassis.
        required: false
        validation:
          $greater_or_equal:
          - $value
          - 0
      HeightMm:
        type: float
        description: >-
          The height of the chassis.
        required: false
        validation:
          $greater_or_equal:
          - $value
          - 0
      WeightKg:
        type: float
        description: >-
          The weight of the chassis.
        required: false
        validation:
          $greater_or_equal:
          - $value
          - 0
      WidthMm:
        type: float
        description: >-
          The width of the chassis.
        required: false
        validation:
          $greater_or_equal:
          - $value
          - 0
      UUID:
        type: string
        description: >-
          The UUID for this chassis.
        required: false
      EnvironmentalClass:
        type: string
        description: >-
          The ASHRAE Environmental Class for this chassis.
        required: false
      MaxPowerWatts:
        type: float
        description: >-
          The upper bound of the total power consumed by the chassis.
        required: false
      MinPowerWatts:
        type: float
        description: >-
          The lower bound of the total power consumed by the chassis.
        required: false
      LocationIndicatorActive:
        type: boolean
        description: >-
          An indicator allowing an operator to physically locate this resource.
        required: false
      Measurements:
        type: list
        description: >-
          An array of DSP0274-defined measurement blocks.
        required: false
        entry_schema:
          type: sftwinvn:MeasurementBlock
      SparePartNumber:
        type: string
        description: >-
          The spare part number of the chassis.
        required: false
      ElectricalSourceManagerURIs:
        type: list
        description: >-
          The URIs of the management interfaces for the external electrical source
          connections for this chassis.
        required: false
        entry_schema:
          type: string
      ElectricalSourceNames:
        type: list
        description: >-
          The names of the external electrical sources, such as circuits or outlets,
          connected to this chassis.
        required: false
        entry_schema:
          type: string
      PoweredByParent:
        type: boolean
        description: >-
          Indicates that the chassis receives power from the containing chassis.
        required: false
      ThermalDirection:
        type: string
        description: >-
          Indicates the thermal management path through the chassis.
        required: false
      ThermalManagedByParent:
        type: boolean
        description: >-
          Indicates that the chassis is thermally managed by the parent chassis.
        required: false
      HotPluggable:
        type: boolean
        description: >-
          An indication of whether this component can be inserted or removed while
          the equipment is in operation.
        required: false
      Replaceable:
        type: boolean
        description: >-
          An indication of whether this component can be independently replaced as
          allowed by the vendor's replacement policy.
        required: false
      Version:
        type: string
        description: >-
          The hardware version of this chassis.
        required: false
      Doors:
        type: Doors
        description: >-
          The doors or access panels of the chassis.
        required: false
      HeatingCoolingEquipmentNames:
        type: list
        description: >-
          The names of the external heating or cooling equipment, such as coolant
          distribution units, connected to this chassis.
        required: false
        entry_schema:
          type: string
      HeatingCoolingManagerURIs:
        type: list
        description: >-
          The URIs of the management interfaces for the external heating or cooling
          equipment for this chassis.
        required: false
        entry_schema:
          type: string
      HeightRackUnits:
        type: float
        description: >-
          The height of the rack-mountable chassis in rack units.
        required: false
      RackMountCapacityUnits:
        type: float
        description: >-
          The usable capacity of rack units provided by this chassis.
        required: false
      RackMountDepthMm:
        type: float
        description: >-
          The usable depth of the rack-mountable area of the chassis.
        required: false
        validation:
          $greater_or_equal:
          - $value
          - 0
      RackMountWidth:
        type: string
        description: >-
          The width of the rack-mountable chassis or rack-mounting space.
        required: false
      RackUnits:
        type: string
        description: >-
          The type of rack-mount units.
        required: false
      ReadyToRemove:
        type: boolean
        description: >-
          An indication of whether the chassis is prepared by the system for removal.
        required: false
    requirements:
    - LogServices:
        node: lgsrvcl:LogServiceCollection
        capability: lgsrclcp:LogServiceCollectionContainable
        relationship: core:Contains
        count_range:
        - 0
        - 1
        description: >-
          The link to the logs for this chassis.
    - Power:
        node: power:Power
        capability: pwrcps:PowerContainable
        relationship: core:Contains
        count_range:
        - 0
        - 1
        description: >-
          The link to the power properties, or power supplies, power policies, and
          sensors, for this chassis.
    - Thermal:
        node: thermal:Thermal
        capability: thrmlcps:ThermalContainable
        relationship: core:Contains
        count_range:
        - 0
        - 1
        description: >-
          The link to the thermal properties, such as fans, cooling, and sensors,
          for this chassis.
    - NetworkAdapters:
        # node: ntwadpcl:NetworkAdapterCollection
        capability: core:Containable
        relationship: core:Contains
        count_range:
        - 0
        - 1
        description: >-
          The link to the collection of network adapters associated with this chassis.
    - Assembly:
        node: assembly:Assembly
        capability: assmcps:AssemblyContainable
        relationship: core:Contains
        count_range:
        - 0
        - 1
        description: >-
          The link to the assembly associated with this chassis.
    - PCIeSlots:
        # node: pcslts:PCIeSlots
        capability: core:Containable
        relationship: core:Contains
        count_range:
        - 0
        - 1
        description: >-
          The link to the PCIe slot properties for this chassis.
    - Sensors:
        node: snsrcllc:SensorCollection
        capability: snscllcp:SensorCollectionContainable
        relationship: core:Contains
        count_range:
        - 0
        - 1
        description: >-
          The link to the collection of sensors located in the equipment and sub-components.
    - PCIeDevices:
        # node: pcdvccl:PCIeDeviceCollection
        capability: core:Containable
        relationship: core:Contains
        count_range:
        - 0
        - 1
        description: >-
          The link to the collection of PCIe devices located in this chassis.
    - MediaControllers:
        # node: mdcntcl:MediaControllerCollection
        capability: core:Containable
        relationship: core:Contains
