tosca_definitions_version: tosca_2_0
description: >-
  Types generated from JSON Schema by any2tosca
imports:
- url: Resource.yaml
  namespace: resource
- url: Core.yaml
  namespace: core
- url: DataStorageLineOfService_caps.yaml
  namespace: dtstlosc
node_types:
  DataStorageLineOfService:
    description: >-
      Describe data storage and provisioning capabilities.
    properties:
      AccessCapabilities:
        type: list
        description: >-
          Required access capabilities.
        required: false
        entry_schema:
          type: string
      Description:
        type: resource:Description
        description: >-
          The description of this resource.  Used for commonality in the schema definitions.
        required: false
      Id:
        type: resource:Id
        description: >-
          The unique identifier for this resource within the collection of similar
          resources.
        required: true
      IsSpaceEfficient:
        type: boolean
        description: >-
          True implies compression or deduplication of storage.
        required: false
      Name:
        type: resource:Name
        description: >-
          The name of the resource or array member.
        required: true
      Oem:
        type: resource:Oem
        description: >-
          The OEM extension property.
        required: false
      ProvisioningPolicy:
        type: string
        description: >-
          Provisioning policy for storage.
        required: false
        validation:
          $valid_values:
          - $value
          - - Fixed
            - Thin
      RecoverableCapacitySourceCount:
        type: integer
        description: >-
          Required minimum number of available capacity source resources.
        required: false
      RecoveryTimeObjectives:
        type: string
        description: >-
          Expectations for time to access the primary store after disaster recover.
        required: false
        validation:
          $valid_values:
          - $value
          - - OnlineActive
            - OnlinePassive
            - Nearline
            - Offline
    capabilities:
      feature:
        type: dtstlosc:DataStorageLineOfServiceFeature
      containable:
        type: dtstlosc:DataStorageLineOfServiceContainable
