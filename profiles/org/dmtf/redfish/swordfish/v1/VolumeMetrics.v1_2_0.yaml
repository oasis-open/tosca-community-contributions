tosca_definitions_version: tosca_2_0
description: >-
  Types generated from JSON Schema by any2tosca
imports:
- url: Resource.yaml
  namespace: resource
- url: IOStatistics.yaml
  namespace: isttstcs
- url: Core.yaml
  namespace: core
- url: IOStatistics_caps.yaml
  namespace: isttcps
- url: VolumeMetrics_caps.yaml
  namespace: vlmmtrcp
node_types:
  VolumeMetrics:
    description: >-
      The usage and health statistics for a volume.
    properties:
      CompressionSavingsBytes:
        type: integer
        description: >-
          Current compression savings on the volume in Bytes.
        required: false
      ConsistencyCheckCount:
        type: float
        description: >-
          The number of consistency checks completed over the lifetime of the volume.
        required: false
      ConsistencyCheckErrorCount:
        type: float
        description: >-
          The number of consistency check errors of the volume.
        required: false
      CorrectableIOReadErrorCount:
        type: integer
        description: >-
          The number of the correctable read errors for the lifetime of the volume.
        required: false
      CorrectableIOWriteErrorCount:
        type: integer
        description: >-
          The number of the correctable write errors for the lifetime of the volume.
        required: false
      DeduplicationSavingsBytes:
        type: integer
        description: >-
          Current deduplication savings on the volume in Bytes.
        required: false
      Description:
        type: resource:Description
        description: >-
          The description of this resource.  Used for commonality in the schema definitions.
        required: false
      Id:
        type: resource:Id
        description: >-
          The unique identifier for this resource within the collection of similar
          resources.
        required: true
      Name:
        type: resource:Name
        description: >-
          The name of the resource or array member.
        required: true
      Oem:
        type: resource:Oem
        description: >-
          The OEM extension property.
        required: false
      RebuildErrorCount:
        type: float
        description: >-
          The number of rebuild errors over the lifetime of the volume.
        required: false
      StateChangeCount:
        type: float
        description: >-
          The number of state changes (changes in Status.State) for this volume.
        required: false
      ThinProvisioningSavingsBytes:
        type: integer
        description: >-
          Current thin provisioning savings on the volume in Bytes.
        required: false
      UncorrectableIOReadErrorCount:
        type: integer
        description: >-
          The number of the uncorrectable read errors for the lifetime of the volume.
        required: false
      UncorrectableIOWriteErrorCount:
        type: integer
        description: >-
          The number of the uncorrectable write errors for the lifetime of the volume.
        required: false
    requirements:
    - IOStatistics:
        node: isttstcs:IOStatistics
        capability: isttcps:IOStatisticsContainable
        relationship: core:Contains
        count_range:
        - 0
        - 1
        description: >-
          Statistics for this volume.
    capabilities:
      feature:
        type: vlmmtrcp:VolumeMetricsFeature
      containable:
        type: vlmmtrcp:VolumeMetricsContainable
