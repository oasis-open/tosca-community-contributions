          The description of this resource.  Used for commonality in the schema definitions.
        required: false
      IOOperationsPerSecondIsLimited:
        type: boolean
        description: >-
          Limit the IOPS.
        required: false
      IOWorkload:
        type: iprlsc:IOWorkload
        description: >-
          A description of the expected workload.
        required: false
      Id:
        type: resource:Id
        description: >-
          The unique identifier for this resource within the collection of similar
          resources.
        required: true
      MaxIOOperationsPerSecondPerTerabyte:
        type: integer
        description: >-
          The amount of IOPS a volume of a given committed size can support.
        required: false
      Name:
        type: resource:Name
        description: >-
          The name of the resource or array member.
        required: true
      Oem:
        type: resource:Oem
        description: >-
          The OEM extension property.
        required: false
      SamplePeriod:
        type: string
        description: >-
          Sampling period over which average values are calculated.
        required: false
    capabilities:
      feature:
        type: iplnofsc:IOPerformanceLineOfServiceFeature
      containable:
