tosca_definitions_version: tosca_2_0
description: >-
  Types generated from JSON Schema by any2tosca
imports:
- url: Resource.yaml
  namespace: resource
- url: Core.yaml
  namespace: core
- url: VolumeMetrics_caps.yaml
  namespace: vlmmtrcp
node_types:
  VolumeMetrics:
    description: >-
      The usage and health statistics for a volume.
    properties:
      ConsistencyCheckErrorCount:
        type: float
        description: >-
          The number of consistency check errors of the volume.
        required: false
      CorrectableIOReadErrorCount:
        type: integer
        description: >-
          The number of the correctable read errors for the lifetime of the volume.
        required: false
      CorrectableIOWriteErrorCount:
        type: integer
        description: >-
          The number of the correctable write errors for the lifetime of the volume.
        required: false
      Description:
        type: resource:Description
        description: >-
          The description of this resource.  Used for commonality in the schema definitions.
        required: false
      Id:
        type: resource:Id
        description: >-
          The unique identifier for this resource within the collection of similar
          resources.
        required: true
      Name:
        type: resource:Name
        description: >-
          The name of the resource or array member.
        required: true
      Oem:
        type: resource:Oem
        description: >-
          The OEM extension property.
        required: false
      RebuildErrorCount:
        type: float
        description: >-
          The number of rebuild errors over the lifetime of the volume.
        required: false
      StateChangeCount:
        type: float
        description: >-
          The number of state changes (changes in Status.State) for this volume.
        required: false
      UncorrectableIOReadErrorCount:
        type: integer
        description: >-
          The number of the uncorrectable read errors for the lifetime of the volume.
        required: false
      UncorrectableIOWriteErrorCount:
        type: integer
        description: >-
          The number of the uncorrectable write errors for the lifetime of the volume.
        required: false
    capabilities:
      feature:
        type: vlmmtrcp:VolumeMetricsFeature
      containable:
        type: vlmmtrcp:VolumeMetricsContainable
