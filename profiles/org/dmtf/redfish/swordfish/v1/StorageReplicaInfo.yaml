tosca_definitions_version: tosca_2_0
description: >-
  Types generated from JSON Schema by any2tosca
imports:
- url: odata-v4.yaml
  namespace: odatav4
- url: StorageReplicaInfo.v1_4_0.yaml
  namespace: strrplin
- url: Core.yaml
  namespace: core
- url: StorageReplicaInfo_caps.yaml
  namespace: strpincp
data_types:
  ReplicaFaultDomain:
    description: >-
      Values of ReplicaFaultDomain describe the fault domain for the replication relationship.
    derived_from: string
    validation:
      $valid_values:
      - $value
      - - Local
        - Remote
  ReplicaType:
    description: >-
      Values of ReplicaType describe the intended outcome of the replication.
    derived_from: string
    validation:
      $valid_values:
      - $value
      - - Mirror
        - Snapshot
        - Clone
        - TokenizedClone
  ReplicaUpdateMode:
    description: >-
      Values of ReplicaUpdateMode describe whether the target elements will be updated
      synchronously or asynchronously.
    derived_from: string
    validation:
      $valid_values:
      - $value
      - - Active
        - Synchronous
        - Asynchronous
        - Adaptive
node_types:
  StorageReplicaInfo:
    description: >-
      Defines the characteristics of a Storage Replica.
    derived_from: strrplin:StorageReplicaInfo
    properties:
      '@odata_id':
        type: odatav4:id
        description: >-
          The unique identifier for a resource.
        required: false
    capabilities:
      feature:
        type: strpincp:StorageReplicaInfoFeature
      containable:
        type: strpincp:StorageReplicaInfoContainable
  ReplicaInfo:
    description: >-
      Defines the characteristics of a replica of a source.
    properties:
      ConsistencyEnabled:
        type: boolean
        description: >-
          True if consistency is enabled.
        required: false
      ConsistencyState:
        type: string
        description: >-
          The current state of consistency.
        required: false
      ConsistencyStatus:
        type: string
        description: >-
          The current status of consistency.
        required: false
      ConsistencyType:
        type: string
        description: >-
          Indicates the consistency type used by the source and its associated target
          group.
        required: false
      FailedCopyStopsHostIO:
        type: boolean
        description: >-
          If true, the storage array tells host to stop sending data to source element
          if copying to a remote element fails.
        required: false
      PercentSynced:
        type: integer
        description: >-
          Specifies the percent of the work completed to reach synchronization.
        required: false
      Replica:
        type: odatav4:idRef
        description: >-
          Deprecated - Use Source Replica. The resource that is the source of this
          replica.
        required: false
      ReplicaPriority:
        type: string
        description: >-
          The priority of background copy engine I/O to be managed relative to host
          I/O operations during a sequential background copy operation.
        required: false
      ReplicaProgressStatus:
        type: string
        description: >-
          The status of the session with respect to Replication activity.
        required: false
      ReplicaReadOnlyAccess:
        type: string
        description: >-
          This property specifies whether the source, the target, or both elements
          are read only to the host.
        required: false
      ReplicaRecoveryMode:
        type: string
        description: >-
          Describes whether the copy operation continues after a broken link is restored.
        required: false
      ReplicaRole:
        type: string
        description: >-
          The source or target role of this replica.
        required: false
      ReplicaSkewBytes:
        type: integer
        description: >-
          Applies to Adaptive mode and it describes maximum number of bytes the SyncedElement
          (target) can be out of sync.
        required: false
      ReplicaState:
        type: string
        description: >-
          ReplicaState describes the state of the relationship with respect to Replication
          activity.
        required: false
      ReplicaType:
        type: string
        description: >-
          ReplicaType describes the intended outcome of the replication.
        required: false
      ReplicaUpdateMode:
        type: string
        description: >-
          Describes whether the target elements will be updated synchronously or asynchronously.
        required: false
      RequestedReplicaState:
        type: string
        description: >-
          The last requested or desired state for the relationship.
        required: false
      SyncMaintained:
        type: boolean
        description: >-
          Synchronization is maintained.
        required: false
      UndiscoveredElement:
        type: string
        description: >-
          This property specifies whether the source, the target, or both elements
          involved in a copy operation are undiscovered.
        required: false
      WhenActivated:
        type: string
        description: >-
          Specifies when point-in-time copy was taken or when the replication relationship
          is activated, reactivated, resumed or re-established.
        required: false
      WhenDeactivated:
        type: string
        description: >-
          Specifies when the replication relationship is deactivated.
        required: false
      WhenEstablished:
        type: string
        description: >-
          Specifies when the replication relationship is established.
        required: false
      WhenSuspended:
        type: string
        description: >-
          Specifies when the replication relationship is suspended.
        required: false
      WhenSynced:
        type: string
        description: >-
          The point in time that the Elements were synchronized.
        required: false
      WhenSynchronized:
        type: string
        description: >-
          Specifies when the replication relationship is synchronized.
        required: false
      SourceReplica:
        type: odatav4:idRef
        description: >-
          The URI to the source replica when located on a different Swordfish service
          instance.
        required: false
      ReplicaFaultDomain:
        type: string
        description: >-
          ReplicaFaultDomain describes the fault domain (local or remote) of the replica
          relationship.
        required: false
      RemoteSourceReplica:
        type: string
        description: >-
          ReplicaFaultDomain describes the fault domain (local or remote) of the replica
          relationship.
        required: false
    requirements:
    - DataProtectionLineOfService:
        # node: dtprlnos:DataProtectionLineOfService
        capability: core:Containable
        relationship: core:Contains
        count_range:
        - 0
        - 1
        description: >-
          A pointer to the DataProtection line of service element that describes this
          replica.
    capabilities:
      containable:
        type: strpincp:ReplicaInfoContainable
