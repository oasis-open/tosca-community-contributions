relationship_types:
  VolumeDependsOn:
    derived_from: core:DependsOn
    properties:
      ClientEndpoints@odata_count:
        type: odatav4:count
        description: >-
          The number of items in a collection.
        required: false
      ConsistencyGroups@odata_count:
        type: odatav4:count
        description: >-
          The number of items in a collection.
        required: false
      DedicatedSpareDrives@odata_count:
        type: odatav4:count
        description: >-
          The number of items in a collection.
        required: false
      Drives@odata_count:
        type: odatav4:count
        description: >-
          The number of items in a collection.
        required: false
      Oem:
        type: resource:Oem
        description: >-
          The OEM extension property.
        required: false
      ServerEndpoints@odata_count:
        type: odatav4:count
        description: >-
          The number of items in a collection.
        required: false
      SpareResourceSets@odata_count:
        type: odatav4:count
        description: >-
