        required: false
interface_types:
  VolumeActions:
    operations:
      AssignReplicaTarget:
        description: >-
          This action is used to establish a replication relationship by assigning
          an existing volume to serve as a target replica for an existing source volume.
        inputs:
          ReplicaType:
            type: strrplin:ReplicaType
            description: >-
              The type of replica relationship to be created.
            required: true
          ReplicaUpdateMode:
            type: strrplin:ReplicaUpdateMode
            description: >-
              The replica update mode (synchronous vs asynchronous).
            required: true
          TargetVolume:
            type: string
            description: >-
              The Uri to the existing target volume.
            required: true
      CheckConsistency:
        description: >-
          This action is used to force a check of the Volume's parity or redundant
          data to ensure it matches calculated values.
      CreateReplicaTarget:
        description: >-
          This action is used to create a new volume resource to provide expanded
          data protection through a replica relationship with the specified source
          volume.
        inputs:
          ReplicaType:
            type: strrplin:ReplicaType
            description: >-
              The type of replica relationship to be created.
            required: true
          ReplicaUpdateMode:
            type: strrplin:ReplicaUpdateMode
            description: >-
              The replica update mode (synchronous vs asynchronous).
            required: true
          TargetStoragePool:
            type: string
            description: >-
              The Uri to the existing target Storage Pool.
            required: true
          VolumeName:
            type: string
            description: >-
              The Name for the new target volume.
            required: false
      RemoveReplicaRelationship:
        description: >-
          This action is used to disable data synchronization between a source and
          target volume, remove the replication relationship, and optionally delete
          the target volume.
        inputs:
          DeleteTargetVolume:
            type: boolean
            description: >-
              Indicate whether or not to delete the target volume as part of the operation.
            required: false
          TargetVolume:
            type: string
            description: >-
              The Uri to the existing target volume.
            required: true
      ResumeReplication:
        description: >-
          This action is used to resume the active data synchronization between a
          source and target volume, without otherwise altering the replication relationship.
        inputs:
          TargetVolume:
            type: string
            description: >-
              The Uri to the existing target volume.
            required: true
      ReverseReplicationRelationship:
        description: >-
          This action is used to reverse the replication relationship between a source
          and target volume.
        inputs:
          TargetVolume:
            type: string
            description: >-
              The Uri to the existing target volume.
            required: true
      SplitReplication:
        description: >-
          This action is used to split the replication relationship and suspend data
          synchronization between a source and target volume.
        inputs:
          TargetVolume:
            type: string
            description: >-
              The Uri to the existing target volume.
            required: true
      SuspendReplication:
        description: >-
          This action is used to suspend active data synchronization between a source
          and target volume, without otherwise altering the replication relationship.
        inputs:
          TargetVolume:
            type: string
            description: >-
              The Uri to the existing target volume.
            required: true
node_types:
  Volume:
    description: >-
      Volume contains properties used to describe a volume, virtual disk, LUN, or
      other logical storage entity for any system.
    properties:
      AccessCapabilities:
        type: list
        description: >-
          Supported IO access capabilities.
        required: false
        entry_schema:
          type: dtstlsc:StorageAccessCapability
      BlockSizeBytes:
        type: integer
        description: >-
          The size of the smallest addressable unit (Block) of this volume in bytes.
        required: false
      CapacityBytes:
        type: integer
        description: >-
          The size in bytes of this Volume.
        required: false
      CapacitySources@odata_count:
        type: odatav4:count
        description: >-
          The number of items in a collection.
        required: false
      Compressed:
        type: boolean
        description: >-
          Indicator of whether or not the Volume has compression enabled.
        required: false
      Deduplicated:
        type: boolean
        description: >-
          Indicator of whether or not the Volume has deduplication enabled.
        required: false
      Description:
        type: resource:Description
        description: >-
          The description of this resource.  Used for commonality in the schema definitions.
        required: false
      DisplayName:
        type: string
        description: >-
          A user-configurable string to name the volume.
        required: false
      Encrypted:
        type: boolean
        description: >-
          Is this Volume encrypted.
        required: false
      EncryptionTypes:
        type: list
        description: >-
          The types of encryption used by this Volume.
        required: false
        entry_schema:
          type: string
      Id:
        type: resource:Id
        description: >-
          The unique identifier for this resource within the collection of similar
          resources.
        required: true
      Identifiers:
        type: list
        description: >-
          The Durable names for the volume.
        required: false
        entry_schema:
          type: resource:Identifier
      LogicalUnitNumber:
        type: integer
        description: >-
          Indicates the host-visible LogicalUnitNumber assigned to this Volume.
        required: false
      LowSpaceWarningThresholdPercents:
        type: list
        description: >-
          Low space warning.
        required: false
        entry_schema:
          type: integer
      Manufacturer:
        type: string
        description: >-
          The manufacturer or OEM of this storage volume.
        required: false
      MaxBlockSizeBytes:
        type: integer
        description: >-
          Max Block size in bytes.
        required: false
      MediaSpanCount:
        type: integer
        description: >-
          Indicates the number of media elements used per span in the secondary RAID
          for a hierarchical RAID type.
        required: false
      Model:
        type: string
        description: >-
          The model number for this storage volume.
        required: false
      Name:
        type: resource:Name
        description: >-
          The name of the resource or array member.
        required: true
      Oem:
        type: resource:Oem
        description: >-
          The OEM extension property.
        required: false
      Operations:
        type: list
        description: >-
          The operations currently running on the Volume.
        required: false
        entry_schema:
          type: Operation
      OptimumIOSizeBytes:
        type: integer
        description: >-
          The size in bytes of this Volume's optimum IO size.
        required: false
      ProvisioningPolicy:
        type: dtstlsc:ProvisioningPolicy
        description: >-
          This property specifies the volume's storage allocation, or provisioning
          policy.
        required: false
      RAIDType:
        type: string
        description: >-
          The RAID type of this volume.
        required: false
        validation:
          $valid_values:
          - $value
          - - RAID0
            - RAID1
            - RAID3
            - RAID4
            - RAID5
            - RAID6
            - RAID10
            - RAID01
            - RAID6TP
            - RAID1E
            - RAID50
            - RAID60
            - RAID00
            - RAID10E
            - RAID1Triple
            - RAID10Triple
            - None
      ReadCachePolicy:
        type: string
        description: >-
          Indicates the read cache policy setting for the Volume.
        required: false
        validation:
          $valid_values:
          - $value
          - - ReadAhead
            - AdaptiveReadAhead
            - 'Off'
      RecoverableCapacitySourceCount:
        type: integer
        description: >-
          Current number of capacity source resources that are available as replacements.
        required: false
      RemainingCapacityPercent:
        type: integer
        description: >-
          The percentage of the capacity remaining in the Volume.
        required: false
      ReplicaTargets:
        type: list
        description: >-
          The resources that are target replicas of this source.
        required: false
        entry_schema:
          type: odatav4:idRef
      ReplicaTargets@odata_count:
        type: odatav4:count
        description: >-
          The number of items in a collection.
        required: false
      Status:
        type: resource:Status
        description: >-
          The property contains the status of the Volume.
        required: false
      StripSizeBytes:
        type: integer
        description: >-
          The number of blocks (bytes) in a strip in a disk array that uses striped
          data mapping.
        required: false
      VolumeType:
        type: string
        description: >-
          The type of this volume.
        required: false
        validation:
          $valid_values:
          - $value
          - - RawDevice
            - NonRedundant
            - Mirrored
            - StripedWithParity
            - SpannedMirrors
            - SpannedStripesWithParity
      VolumeUsage:
        type: string
        description: >-
          Indicates the Volume usage type setting for the Volume.
        required: false
        validation:
          $valid_values:
          - $value
          - - Data
            - SystemData
            - CacheOnly
            - SystemReserve
            - ReplicationReserve
      WriteCachePolicy:
        type: string
        description: >-
          Indicates the write cache policy setting for the Volume.
        required: false
        validation:
          $valid_values:
          - $value
          - - WriteThrough
            - ProtectedWriteBack
            - UnprotectedWriteBack
            - 'Off'
      WriteCacheState:
        type: string
        description: >-
          Indicates the WriteCacheState policy setting for the Volume.
        required: false
        validation:
          $valid_values:
          - $value
          - - Unprotected
            - Protected
            - Degraded
      WriteHoleProtectionPolicy:
        type: string
        description: >-
          The policy that the RAID volume is using to address the write hole issue.
        required: false
        validation:
          $valid_values:
          - $value
          - - 'Off'
            - Journaling
            - DistributedLog
            - Oem
    requirements:
    - AllocatedPools:
        node: strplcl:StoragePoolCollection
        capability: stplclcp:StoragePoolCollectionContainable
        relationship: core:Contains
        count_range:
        - 0
        - 1
        description: >-
          An array of references to StoragePools allocated from this Volume.
    - Capacity:
        node: capacity:Capacity
        capability: cpctycps:CapacityContainable
        relationship: core:Contains
        count_range:
        - 0
        - 1
        description: >-
          Capacity utilization.
    - CapacitySources:
        node: capacity:CapacitySource
        capability: cpctycps:CapacitySourceContainable
        relationship: core:Contains
        count_range:
        - 0
        - UNBOUNDED
        description: >-
          An array of space allocations to this volume.
    - IOStatistics:
        node: isttstcs:IOStatistics
        capability: isttcps:IOStatisticsContainable
        relationship: core:Contains
        count_range:
        - 0
        - 1
        description: >-
          Statistics for this volume.
    - ReplicaInfo:
        node: strrplin:ReplicaInfo
        capability: strpincp:ReplicaInfoContainable
        relationship: core:Contains
        count_range:
        - 0
        - 1
        description: >-
          Describes this storage volume in its role as a target replica.
    - StorageGroups:
        node: strgrpcl:StorageGroupCollection
        capability: stgrclcp:StorageGroupCollectionContainable
        relationship: core:Contains
        count_range:
        - 0
        - 1
        description: >-
          An array of references to Storage Groups that includes this volume.
    - ClassOfService:
        node: clsofsr:ClassOfService
        capability: clofsrcp:ClassOfServiceFeature
        relationship: VolumeDependsOn
        count_range:
        - 0
        - 1
        description: >-
          The ClassOfService that this storage volume conforms to.
    - ClientEndpoints:
        node: endpoint:Endpoint
        capability: endpcps:EndpointFeature
        relationship: VolumeDependsOn
        count_range:
        - 0
        - UNBOUNDED
        description: >-
          An array of references to the client Endpoints associated with this volume.
    - ConsistencyGroups:
        node: cnssgrp:ConsistencyGroup
        capability: cnsgrpcp:ConsistencyGroupFeature
        relationship: VolumeDependsOn
        count_range:
        - 0
        - UNBOUNDED
        description: >-
          An array of references to the ConsistencyGroups associated with this volume.
    - DedicatedSpareDrives:
        node: drive:Drive
        capability: drvcps:DriveFeature
        relationship: VolumeDependsOn
        count_range:
        - 0
        - UNBOUNDED
        description: >-
          An array of references to the drives which are dedicated spares for this
          volume.
    - Drives:
        node: drive:Drive
        capability: drvcps:DriveFeature
        relationship: VolumeDependsOn
        count_range:
        - 0
        - UNBOUNDED
        description: >-
          An array of references to the drives which contain this volume. This will
          reference Drives that either wholly or only partly contain this volume.
    - OwningStorageService:
        node: strgsrvc:StorageService
        capability: strsrvcp:StorageServiceFeature
        relationship: VolumeDependsOn
        count_range:
        - 0
        - 1
        description: >-
          A pointer to the StorageService that owns or contains this volume.
    - ServerEndpoints:
        node: endpoint:Endpoint
        capability: endpcps:EndpointFeature
        relationship: VolumeDependsOn
        count_range:
        - 0
        - UNBOUNDED
        description: >-
          An array of references to the server Endpoints associated with this volume.
    - SpareResourceSets:
        node: sprrsrst:SpareResourceSet
        capability: sprsstcp:SpareResourceSetFeature
        relationship: VolumeDependsOn
        count_range:
        - 0
        - UNBOUNDED
        description: >-
          An array of references to SpareResourceSets.
    - StorageGroups:
        node: strggrp:StorageGroup
        capability: strgrpcp:StorageGroupFeature
        relationship: VolumeDependsOn
        count_range:
        - 0
        - UNBOUNDED
        description: >-
          An array of references to the StorageGroups associated with this volume.
    interfaces:
      Actions:
        type: VolumeActions
    capabilities:
      feature:
        type: vlmcps:VolumeFeature
      containable:
        type: vlmcps:VolumeContainable
  Operation:
    properties:
      OperationName:
        type: string
        description: >-
          The name of the operation.
        required: false
      PercentageComplete:
        type: integer
        description: >-
          The percentage of the operation that has been completed.
        required: false
    requirements:
    - AssociatedFeaturesRegistry:
        node: ftrsrgst:FeaturesRegistry
        capability: ftrrgscp:FeaturesRegistryContainable
        relationship: core:Contains
        count_range:
        - 0
        - 1
        description: >-
          A reference to the task associated with the operation if any.
    capabilities:
      containable:
        type: vlmcps:OperationContainable
