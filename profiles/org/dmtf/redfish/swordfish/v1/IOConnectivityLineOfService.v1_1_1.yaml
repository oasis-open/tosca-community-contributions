tosca_definitions_version: tosca_2_0
description: >-
  Types generated from JSON Schema by any2tosca
imports:
- url: Protocol.yaml
  namespace: protocol
- url: Resource.yaml
  namespace: resource
- url: Core.yaml
  namespace: core
- url: Protocol_caps.yaml
  namespace: prtclcps
- url: IOConnectivityLineOfService_caps.yaml
  namespace: iclnofsc
node_types:
  IOConnectivityLineOfService:
    description: >-
      A service option within the IO Connectivity line of service.
    properties:
      Description:
        type: resource:Description
        description: >-
          The description of this resource.  Used for commonality in the schema definitions.
        required: false
      Id:
        type: resource:Id
        description: >-
          The unique identifier for this resource within the collection of similar
          resources.
        required: true
      MaxBytesPerSecond:
        type: integer
        description: >-
          The maximum Bandwidth in bytes per second that a connection can support.
        required: false
      MaxIOPS:
        type: integer
        description: >-
          The maximum supported IOs per second that the connection will support for
          the selected access protocol.
        required: false
      Name:
        type: resource:Name
        description: >-
          The name of the resource or array member.
        required: true
      Oem:
        type: resource:Oem
        description: >-
          The OEM extension property.
        required: false
    requirements:
    - AccessProtocols:
        node: protocol:Protocol
        capability: prtclcps:ProtocolContainable
        relationship: core:Contains
        count_range:
        - 0
        - UNBOUNDED
        description: >-
          SupportedAccessProtocols.
    capabilities:
      feature:
        type: iclnofsc:IOConnectivityLineOfServiceFeature
      containable:
        type: iclnofsc:IOConnectivityLineOfServiceContainable
