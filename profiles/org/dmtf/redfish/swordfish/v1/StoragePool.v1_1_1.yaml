data_types:
  Actions:
    properties:
      '#StoragePool_AddDrives':
        type: AddDrives
        description: >-
          This action is used to add an additional drive, or set of drives, to a capacity
          source for the storage pool.
        required: false
      '#StoragePool_RemoveDrives':
        type: RemoveDrives
        description: >-
          This action is used to remove drive(s) from the capacity source for the
          StoragePool.
        required: false
      '#StoragePool_SetCompressionState':
        type: SetCompressionState
        description: >-
          This action is used to set the compression state of the pool.
        required: false
      '#StoragePool_SetDeduplicationState':
        type: SetDeduplicationState
        description: >-
          This action is used to set the dedupe state of the pool.
        required: false
      '#StoragePool_SetEncryptionState':
        type: SetEncryptionState
        description: >-
          This action is used to set the encryption state of the pool.
        required: false
  AddDrives:
    description: >-
      This action is used to add an additional drive, or set of drives, to a capacity
      source for the storage pool.
    properties:
      target:
        type: string
        description: >-
          Link to invoke action
        required: false
      title:
        type: string
        description: >-
          Friendly action name
        required: false
  RemoveDrives:
    description: >-
      This action is used to remove drive(s) from the capacity source for the StoragePool.
    properties:
      target:
        type: string
        description: >-
          Link to invoke action
        required: false
      title:
        type: string
        description: >-
          Friendly action name
        required: false
  SetCompressionState:
    description: >-
      This action is used to set the compression state of the pool.
    properties:
      target:
        type: string
        description: >-
          Link to invoke action
        required: false
      title:
        type: string
        description: >-
          Friendly action name
        required: false
  SetDeduplicationState:
    description: >-
      This action is used to set the dedupe state of the pool.
    properties:
      target:
        type: string
        description: >-
          Link to invoke action
        required: false
      title:
        type: string
        description: >-
          Friendly action name
        required: false
  SetEncryptionState:
    description: >-
      This action is used to set the encryption state of the pool.
    properties:
      target:
        type: string
        description: >-
          Link to invoke action
        required: false
      title:
        type: string
        description: >-
