tosca_definitions_version: tosca_2_0
artifact_types:
  Bash:
    description: >-
      Artifact type representing a script for the Bash shell
    mime_type: application/x-sh
    file_ext: [sh]
data_types:
  ContextInfo:
    properties:
      env:
        type: string
      role:
        type: string
node_types:
  Compute:
    properties:
      context:
        type: string
functions:
  get_security_context:
    description: Get security context
    signatures:
      - arguments:
        - type: ContextInfo
        result:
          type: string
        implementation:
          primary:
            type: Bash
            file: scripts/get_context.sh
service_template:
  node_templates:
    my-server:
      type: Compute
#TODO s92 example passes arguments by name but 108 passes arguments by position
# tag::s92[]
      properties:
        context: { $get_security_context: [ { env: staging, role: admin } ] }
# end::s92[]
