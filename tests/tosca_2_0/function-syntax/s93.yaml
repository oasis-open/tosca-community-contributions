tosca_definitions_version: tosca_2_0
artifact_types:
  Bash:
    description: >-
      Artifact type representing a script for the Bash shell
    mime_type: application/x-sh
    file_ext: [sh]
node_types:
  Compute:
    properties:
      nested:
        type: string
functions:
  outer_func:
    description: Outer function
    signatures:
      - arguments:
        - type: string
        - type: string
        result:
          type: string
        implementation:
          primary:
            type: Bash
            file: scripts/outer.sh
  inner_func:
    description: Inner function
    signatures:
      - arguments:
        - type: string
        - type: string
        result:
          type: string
        implementation:
          primary:
            type: Bash
            file: scripts/inner.sh
service_template:
  node_templates:
    my-server:
      type: Compute
# tag::s93[]
      properties:
        nested: { $outer_func: [ { $inner_func: [ iarg1, iarg2 ] }, oarg2 ] }
# end::s93[]
