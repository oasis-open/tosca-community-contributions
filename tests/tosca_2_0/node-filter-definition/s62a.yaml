tosca_definitions_version: tosca_2_0
data_types:
  scalar-unit.size:
    derived_from: scalar
    data_type: integer
    units:
      B: 1
      MB: 1000000

capability_types:
  Host:
    properties:
      num-cpus:
        type: integer
      mem-size:
        type: scalar-unit.size
      
relationship_types:
  HostedOn:
    description: >-
      Relationship to a host.

node_types:
  Compute:
    description: A compute node
    requirements:
      - host: 
          relationship: HostedOn
          capability: Host

# s62 uses $in_range which is not defined in TOSCA 2.0, so we will use $greater_or_equal and $less_or_equal instead
# tag::s62a[]
service_template:
  node_templates:
    my-node:
      type: Compute
      # other details omitted for brevity
      requirements:
        - host:
            node_filter:
              $and:
                - $greater_or_equal:
                  - $get_property: [ SELF, CAPABILITY, num-cpus ]
                  - 1
                - $less_or_equal:
                  - $get_property: [ SELF, CAPABILITY, num-cpus ]
                  - 4
                - $greater_or_equal:
                  - $get_property: [ SELF, CAPABILITY, mem-size ]
                  - 512 MB 
# end::s62a[]
