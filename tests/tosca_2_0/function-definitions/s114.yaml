tosca_definitions_version: tosca_2_0
artifact_types:
  Python:
    description: >-
      Artifact type representing a Python script
    mime_type: text/x-python
    file_ext: [py]
data_types:
  MyType:
    properties:
      foo:
        type: string
# tag::s114[]
functions:
  complex_arg_function:
    signatures:
      - arguments: 
        - type: map
          key_schema: string
          entry_schema:
            type: list
            entry_schema: MyType
        result: string
        implementation:
          primary:
            type: Python
            file: scripts/complex.py
# end::s114[]
