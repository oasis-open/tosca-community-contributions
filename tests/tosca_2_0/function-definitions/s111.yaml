tosca_definitions_version: tosca_2_0
artifact_types:
  Python:
    description: >-
      Artifact type representing a Python script
    mime_type: text/x-python
    file_ext: [py]
# tag::s111[]
data_types:
  MyType1:
    properties:
      foo:
        type: string
  MyType2:
    properties:
      bar:
        type: integer
  MyTypeRez:
    properties:
      foo:
        type: string
      bar:
        type: integer
functions:
  my_func_with_different_argument_types:
    signatures:
    - arguments: [ MyType1, string, string, MyType2 ]
      variadic: true
      result: MyTypeRez
      implementation:
        primary:
          type: Python
          file: scripts/my.py
# end::s111[]
