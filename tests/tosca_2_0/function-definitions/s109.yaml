      result: float
      implementation:
        primary:
          type: Python
          file: scripts/sqrt.py
    - arguments: [ float ]
      result: float
      implementation:
        primary:
          type: Python
          file: scripts/sqrt.py
    description: >
      This is a square root function that defines two signatures:
      the argument is either integer or float and the function
      returns the suare root as a float
