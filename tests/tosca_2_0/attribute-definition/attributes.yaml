tosca_definitions_version: tosca_2_0
metadata:

  template_name: Attributes Example
  template_author: Puccini
  

node_types:

  Backup:
    # Unlike "properties", you can't mark an attribute as required or not
    # Attributes are *always* added to the node template, even if they have not been assigned
    # If they don't have a "default" value, they will get an automatic, sensible default
    # (E.g., a string will get an empty string)
    # But this might not always match constraints, which would result in an error
    # So in some cases you might have to explicitly assign a default
    attributes:
      days:
        # in V1.0 this had an entry schemea defintion teh example schema was derived from string which is not allowed in V2.0
        # so for V2.0 change type to string validated in data-Type defintion
        type: DayOfWeek
      max_size:
        description: Max size
        # changed type for V2.0 testing
        type: integer

data_types:

  DayOfWeek:
    derived_from: string
    # Constraints changed to "validation" in TOSCA 2.0
    validation: { $valid_values: [ $value, ["su", "mo", "tu", "we", "th", "fr", "sa"]]}

service_template:

  node_templates:

    backup1:
      type: Backup
      attributes:
        # You can assign initial values to attributes
        # Though it's expected that they may change
        # Removed gib for V2.0 testing
        max_size: 10

    backup2:
      type: Backup
      attributes:
        # In V1.0 There was also a long notation that lets you override the description
        # but that is not allowed in V2.0 attribute assisgnment
        max_size:
          10
