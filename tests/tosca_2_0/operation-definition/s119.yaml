tosca_definitions_version: tosca_2_0
artifact_types:
  Bash:
    description: >-
      Artifact type representing a script for the Bash shell
    mime_type: application/x-sh
    file_ext: [sh]
interface_types:
  StandardInterfaceType:
    description: Interface for configuring a service
    operations:
      start:
        description: Operation to execute to start the service
node_types:
  Database:
    description: A database
    interfaces:
      standard:
        type: StandardInterfaceType
service_template:
  node_templates:
    my_database_template:
      type: Database
# tag::s119[]
      interfaces:
        standard:
          operations:
            start:
              implementation:
                primary:
                  type: Bash
                  file: scripts/start_server.sh
# end::s119[]
